# Gateway API HTTPRoutes for the C8 Self-Managed Camunda preview environment.
#
# Replaces the former nginx Ingresses. The infra-managed Gateway, the Vouch
# (Okta SSO) Middleware and the wildcard-cert TLS termination are rendered into
# this namespace by the `infra-preview-environments-gateway-api` dependency;
# these routes attach to that Gateway and reference the Vouch Middleware on
# every authenticated rule. See
# https://github.com/camunda/infra-preview-environments-gateway-api.
#
# The routes are hand-written (the dependency's `route.enabled` is false)
# because the backend service names, ports and context paths are derived from
# the camunda-platform subchart templates, mirroring the previous Ingresses
# exactly.
#
# Known gap: the nginx `satisfy: any` + `whitelist-source-range` Vouch bypass
# for internal IPs (active only when
# `global.preview.ingress.internalAuthBypass.enabled` is true, which is the
# non-default) has no faithful Traefik Gateway API equivalent — Traefik's
# ipAllowList rejects non-listed IPs rather than letting them skip auth. It is
# therefore intentionally not translated here; revisit if a consumer enables it.
---
{{- $camundaPlatform := deepCopy (index .Subcharts "camunda-platform") -}}
{{- $_ := set .Values "camundaPlatform" (deepCopy (index .Values "camunda-platform")) -}}
{{- $gateway := index .Values "infra-preview-environments-gateway-api" -}}
{{- $gatewayName := $gateway.gateway.name -}}
{{- $vouchMiddleware := $gateway.auth.middlewareName -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "camundaPlatform.fullname" $camundaPlatform }}
  labels:
    {{- include "commonLabels" $ | nindent 4 }}
  annotations:
    {{- include "commonAnnotations" $ | nindent 4 }}
spec:
  parentRefs:
  - name: {{ $gatewayName }}
  hostnames:
  - {{ include "ingress.domain" $ | quote }}
  rules:
  # app-root: redirect "/" to Console (replaces the nginx
  # `nginx.ingress.kubernetes.io/app-root` annotation).
  - matches:
    - path:
        type: Exact
        value: /
    filters:
    - type: RequestRedirect
      requestRedirect:
        statusCode: 302
        path:
          type: ReplaceFullPath
          replaceFullPath: {{ .Values.camundaPlatform.console.contextPath | quote }}
  # Console
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.camundaPlatform.console.contextPath | quote }}
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: {{ $vouchMiddleware }}
    backendRefs:
    - name: {{ template "console.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.console.service.port }}
  # Orchestration (REST gateway)
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.camundaPlatform.orchestration.contextPath | quote }}
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: {{ $vouchMiddleware }}
    backendRefs:
    - name: {{ template "orchestration.fullname" $camundaPlatform }}-gateway
      port: {{ .Values.camundaPlatform.orchestration.service.httpPort }}
  # Keycloak (Identity auth realm)
  - matches:
    - path:
        type: PathPrefix
        value: {{ include "identity.keycloak.contextPath" $camundaPlatform | quote }}
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: {{ $vouchMiddleware }}
    backendRefs:
    - name: {{ include "identity.keycloak.service" $camundaPlatform }}
      port: {{ include "identity.keycloak.port" $camundaPlatform }}
  # Identity
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.camundaPlatform.identity.contextPath | quote }}
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: {{ $vouchMiddleware }}
    backendRefs:
    - name: {{ template "identity.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.identity.service.port }}
  # Optimize
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.camundaPlatform.optimize.contextPath | quote }}
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: {{ $vouchMiddleware }}
    backendRefs:
    - name: {{ template "optimize.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.optimize.service.port }}
  # Web Modeler webapp (restapi)
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.camundaPlatform.webModeler.contextPath | quote }}
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: {{ $vouchMiddleware }}
    backendRefs:
    - name: {{ template "webModeler.restapi.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.webModeler.restapi.service.port }}
  # Web Modeler websockets
  - matches:
    - path:
        type: PathPrefix
        value: {{ include "webModeler.websocketContextPath" $camundaPlatform | quote }}
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: {{ $vouchMiddleware }}
    backendRefs:
    - name: {{ template "webModeler.websockets.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.webModeler.websockets.service.port }}
  # Connectors
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.camundaPlatform.connectors.contextPath | quote }}
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: {{ $vouchMiddleware }}
    backendRefs:
    - name: {{ template "connectors.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.connectors.service.serverPort }}
---
# Separate route for the OIDC discovery / token endpoints, served WITHOUT Vouch
# authentication (no ExtensionRef filter). These are Exact matches, which take
# precedence over the `/auth` PathPrefix rule above, so they correctly bypass
# Vouch while the rest of `/auth/**` stays authenticated.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "camundaPlatform.fullname" $camundaPlatform }}-oidc-discovery
  labels:
    {{- include "commonLabels" $ | nindent 4 }}
  annotations:
    {{- include "commonAnnotations" $ | nindent 4 }}
spec:
  parentRefs:
  - name: {{ $gatewayName }}
  hostnames:
  - {{ include "ingress.domain" $ | quote }}
  rules:
  - matches:
    # OIDC discovery document
    - path:
        type: Exact
        value: /auth/realms/camunda-platform/.well-known/openid-configuration
    # JWK set (JWT validation keys)
    - path:
        type: Exact
        value: /auth/realms/camunda-platform/protocol/openid-connect/certs
    # Token endpoint (OAuth2 flows)
    - path:
        type: Exact
        value: /auth/realms/camunda-platform/protocol/openid-connect/token
    # UserInfo endpoint
    - path:
        type: Exact
        value: /auth/realms/camunda-platform/protocol/openid-connect/userinfo
    backendRefs:
    - name: {{ include "identity.keycloak.service" $camundaPlatform }}
      port: {{ include "identity.keycloak.port" $camundaPlatform }}
