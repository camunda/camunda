# Gateway API HTTPRoutes for the C8 Self-Managed Camunda preview environment.
#
# The infra-managed Gateway, the Vouch (Okta SSO) Middleware, the error-pages
# Middleware and the wildcard-cert TLS termination are rendered into this
# namespace by the `infra-preview-environments-gateway-api` dependency; these
# routes attach to that Gateway, reference the Vouch Middleware on every
# authenticated rule, and reference the error-pages Middleware on every backend
# rule so backend 5xx responses render the shared "Preview Environment not
# available" page. See
# https://github.com/camunda/infra-preview-environments-gateway-api.
#
# The routes are hand-written (the dependency's `route.enabled` is false)
# because the backend service names, ports and context paths are derived from
# the camunda-platform subchart templates.
#
# 8.7 topology note (camunda-platform 12.3.0): this branch predates the unified
# orchestration component, the Console and the Connectors preview backends, and
# the unauthenticated OIDC-discovery bypass. The rules below mirror the former
# nginx Ingress 1:1 — Keycloak, Identity, Operate, Optimize, Tasklist, Web
# Modeler webapp and Web Modeler websockets — with the app root redirecting to
# Web Modeler. Every backend was Vouch-protected by the old Ingress (a single
# Ingress carried the Vouch annotation for all paths), so every rule here keeps
# the Vouch filter; there is no OIDC-discovery bypass rule.
#
# Known gap: the `global.preview.ingress.internalAuthBypass.enabled` source-IP
# Vouch bypass (non-default) has no faithful Traefik Gateway API equivalent —
# Traefik's ipAllowList rejects non-listed IPs rather than letting them skip
# auth — and is therefore intentionally not translated here; revisit if a
# consumer enables it.
---
{{- $camundaPlatform := deepCopy (index .Subcharts "camunda-platform") -}}
{{- $_ := set .Values "camundaPlatform" (deepCopy (index .Values "camunda-platform")) -}}
{{- $gateway := required "infra-preview-environments-gateway-api values block must be set" (index .Values "infra-preview-environments-gateway-api") -}}
{{- $gatewayName := required "infra-preview-environments-gateway-api.gateway.name must be set so the HTTPRoutes can attach to the infra-managed Gateway" $gateway.gateway.name -}}
{{- $vouchMiddleware := required "infra-preview-environments-gateway-api.auth.middlewareName must be set so the HTTPRoute filters can reference the Vouch Middleware" $gateway.auth.middlewareName -}}
{{- $errorPages := $gateway.errorPages | default dict -}}
{{- $errorsEnabled := $errorPages.enabled | default false -}}
{{- $errorsMiddleware := "" -}}
{{- if $errorsEnabled -}}
{{- $errorsMiddleware = required "infra-preview-environments-gateway-api.errorPages.middlewareName must be set when errorPages.enabled is true so the HTTPRoute filters can reference the error-pages Middleware" $errorPages.middlewareName -}}
{{- end -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "camundaPlatform.fullname" $camundaPlatform }}
  labels:
    {{- include "commonLabels" $ | nindent 4 }}
  annotations:
    {{- include "commonAnnotations" $ | nindent 4 }}
spec:
  parentRefs:
  - name: {{ $gatewayName }}
  hostnames:
  - {{ include "ingress.domain" $ | quote }}
  rules:
  # app-root: redirect "/" to Web Modeler.
  - matches:
    - path:
        type: Exact
        value: /
    filters:
    - type: RequestRedirect
      requestRedirect:
        statusCode: 302
        path:
          type: ReplaceFullPath
          replaceFullPath: {{ .Values.camundaPlatform.webModeler.contextPath | quote }}
  # Keycloak (Identity auth realm)
  - matches:
    - path:
        type: PathPrefix
        value: {{ include "identity.keycloak.contextPath" $camundaPlatform | quote }}
    # Vouch + error-pages filter set, anchored here and reused by every other
    # authenticated rule below via the *authFilters alias.
    filters: &authFilters
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: {{ $vouchMiddleware }}
    {{- if $errorsEnabled }}
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: {{ $errorsMiddleware }}
    {{- end }}
    backendRefs:
    - name: {{ include "identity.keycloak.service" $camundaPlatform }}
      port: {{ include "identity.keycloak.port" $camundaPlatform }}
  # Identity
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.camundaPlatform.identity.contextPath | quote }}
    filters: *authFilters
    backendRefs:
    - name: {{ template "identity.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.identity.service.port }}
  # Operate
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.camundaPlatform.operate.contextPath | quote }}
    filters: *authFilters
    backendRefs:
    - name: {{ template "operate.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.operate.service.port }}
  # Optimize
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.camundaPlatform.optimize.contextPath | quote }}
    filters: *authFilters
    backendRefs:
    - name: {{ template "optimize.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.optimize.service.port }}
  # Tasklist
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.camundaPlatform.tasklist.contextPath | quote }}
    filters: *authFilters
    backendRefs:
    - name: {{ template "tasklist.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.tasklist.service.port }}
  # Web Modeler webapp
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.camundaPlatform.webModeler.contextPath | quote }}
    filters: *authFilters
    backendRefs:
    - name: {{ template "webModeler.webapp.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.webModeler.webapp.service.port }}
  # Web Modeler websockets
  - matches:
    - path:
        type: PathPrefix
        value: {{ include "webModeler.websocketContextPath" $camundaPlatform | quote }}
    filters: *authFilters
    backendRefs:
    - name: {{ template "webModeler.websockets.fullname" $camundaPlatform }}
      port: {{ .Values.camundaPlatform.webModeler.websockets.service.port }}
