---
# Default values for the Connectors preview environment

# Global values
global:

  # Common labels
  labels:
    # app label will be dynamically set according to preview envrionment name
    app: monorepo
    camunda.cloud/managed-by: Helm
    camunda.cloud/source: argocd
    team: engineering-operations

  image:
    pullSecrets:
    - name: dockerhub-registry
    - name: registry-camunda-cloud

  # still required by some subcharts (e.g. elasticsearch)
  imagePullSecrets:
  - name: dockerhub-registry
  - name: registry-camunda-cloud

  # Preview environment configurations
  preview:
    git:
      # GitHub references for annotating resources
      # Branch name will be dynamically set with PR branch name
      branch: main
      repoUrl: https://github.com/camunda/camunda
    ingress:
      # The domain name under which to expose the preview environment
      domain: camunda.camunda.cloud
      # WARNING: When enabled, requests from the `sourceRange` networks (the
      # in-cluster / Teleport tunnel network) bypass Vouch/Okta authentication
      # ENTIRELY via a high-priority Traefik IngressRoute
      # (templates/internal-bypass-ingressroute.yml) — the nginx-era
      # `satisfy: any` + `whitelist-source-range` semantics. This deliberately
      # covers browser-internal requests (service-worker script fetches and
      # service-worker-issued requests) that a header-based bypass can never
      # reach, which Management Identity depends on. External traffic never
      # matches and keeps the Vouch flow. Intended only for tightly controlled
      # CI/testing scenarios (for example, CI access via a Teleport TCP tunnel).
      internalAuthBypass:
        enabled: false
        # Source ranges permitted to skip Vouch. This is where security is
        # enforced: nothing a client sends (headers, cookies) grants access —
        # only the network it connects from.
        sourceRange:
        - 10.0.0.0/8
    secrets:
      name: camunda-credentials

  # Camunda 8 Self-Managed global configurations
  elasticsearch:
    # Required so the orchestration chart renders the `camunda.data.secondary-storage.elasticsearch`
    # block (url, credentials, etc.). Without this, embedded Operate/Tasklist may fall back
    # to their defaults (e.g. `http://localhost:9200`).
    enabled: true
    url:
      # Secondary storage is an ECK-managed Elasticsearch CR (templates/elasticsearch.yml);
      # the ECK operator names the Service <cr-name>-es-http.
      host: elasticsearch-es-http

  identity:
    auth:
      # Enable Camunda Identity-based authentication
      enabled: true
      # Token issuer (Keycloak) URL
      publicIssuerUrl: https://{{ include "ingress.domain" . }}/auth/realms/camunda-platform
      admin:
        enabled: true
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: identity-admin-client-token
      console:
        redirectUrl: https://{{ include "ingress.domain" . }}/console
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: identity-console-client-token
      optimize:
        redirectUrl: https://{{ include "ingress.domain" . }}/optimize
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: identity-optimize-client-token
      webModeler:
        redirectUrl: https://{{ include "ingress.domain" . }}/modeler
    keycloak:
      contextPath: /auth
      # Keycloak is operator-managed in the shared keycloak-operator namespace
      # (templates/keycloak.yml). internal=true makes the chart render an in-cluster
      # ExternalName Service in the preview namespace pointing at it, so the /auth
      # HTTPRoute backend stays a local name (no cross-namespace backendRef needed).
      # host is tpl-rendered by the chart; the operator Service is <cr-name>-service.
      internal: true
      url:
        protocol: http
        host: '{{ .Release.Name }}-kc-service.keycloak-operator'
        port: "8080"
      auth:
        adminUser: admin
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: identity-keycloak-admin-password

  zeebeClusterName: zeebe-cluster


# Camunda 8 Self-Managed configurations
camunda-platform:

  fullnameOverride: camunda

  connectors:
    enabled: true
    fullnameOverride: connectors
    contextPath: /connectors
    # image:
    #   registry: camunda/connectors-bundle
    security:
      authentication:
        method: oidc
        oidc:
          secret:
            existingSecret: camunda-credentials
            existingSecretKey: identity-connectors-client-token
    env:
    - name: JAVA_OPTS
      value: "-Xms512m -Xmx512m"
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "0.5"
        memory: 512Mi
    nodeSelector:
      cloud.google.com/gke-nodepool: previews
    persistence:
      enabled: true
      size: 50Mi
    tolerations:
    - key: "previews"
      operator: "Exists"
      effect: "NoSchedule"

  console:
    enabled: true
    fullnameOverride: console
    contextPath: /console
    # image:
    #   registry: camunda/console
    # Overrides the default service URL because the preview environment
    # is exposed through its own (separate)ingress controller.
    configuration: |
      camunda:
        console:
          managed:
            method: plain
            releases:
            - name: {{ .Release.Name }}
              namespace: {{ .Release.Namespace }}
              version: 8.10.0-alphax
              components:
              - id: console
                version: 8.10.0-alphax
                url: https://{{ include "ingress.domain" . }}{{ .Values.console.contextPath }}
                readiness: http://{{ .Values.console.fullnameOverride }}.{{ .Release.Namespace }}:{{ .Values.console.service.managementPort }}{{ .Values.console.readinessProbe.probePath }}
              - id: keycloak
                version: 8.10.0-alphax
                url: https://{{ include "ingress.domain" . }}{{ .Values.global.identity.keycloak.contextPath }}
              - id: identity
                version: 8.10.0-alphax
                url: https://{{ include "ingress.domain" . }}{{ .Values.identity.contextPath }}
                readiness: http://{{ .Values.identity.fullnameOverride }}.{{ .Release.Namespace }}:{{ .Values.identity.service.metricsPort }}{{ .Values.identity.readinessProbe.probePath }}
              - id: webModelerWebApp
                version: 8.10.0-alphax
                url: https://{{ include "ingress.domain" . }}{{ .Values.webModeler.contextPath }}
                readiness: http://{{ .Values.webModeler.fullnameOverride }}-restapi.{{ .Release.Namespace }}:{{ .Values.webModeler.restapi.service.managementPort }}{{ .Values.webModeler.contextPath }}{{ .Values.webModeler.restapi.readinessProbe.probePath }}
              - id: optimize
                version: 8.10.0-alphax
                url: https://{{ include "ingress.domain" . }}{{ .Values.optimize.contextPath }}
                readiness: http://{{ .Values.optimize.fullnameOverride }}.{{ .Release.Namespace }}:{{ .Values.optimize.service.port }}{{ .Values.optimize.contextPath }}{{ .Values.optimize.readinessProbe.probePath }}
              - id: operate
                version: 8.10.0-alphax
                url: https://{{ include "ingress.domain" . }}{{ .Values.orchestration.contextPath }}/operate
                readiness: http://{{ .Values.orchestration.fullnameOverride }}.{{ .Release.Namespace }}:{{ .Values.orchestration.service.managementPort }}{{ .Values.orchestration.contextPath }}{{ .Values.orchestration.readinessProbe.probePath }}
              - id: tasklist
                version: 8.10.0-alphax
                url: https://{{ include "ingress.domain" . }}{{ .Values.orchestration.contextPath }}/tasklist
                readiness: http://{{ .Values.orchestration.fullnameOverride }}.{{ .Release.Namespace }}:{{ .Values.orchestration.service.managementPort }}{{ .Values.orchestration.contextPath }}{{ .Values.orchestration.readinessProbe.probePath }}
              - id: coreIdentity
                version: 8.10.0-alphax
                url: https://{{ include "ingress.domain" . }}{{ .Values.orchestration.contextPath }}/identity
              - id: connectors
                version: 8.10.0-alphax
                url: https://{{ include "ingress.domain" . }}{{ .Values.connectors.contextPath }}
                readiness: http://{{ .Values.connectors.fullnameOverride }}.{{ .Release.Namespace }}:{{ .Values.connectors.service.serverPort }}{{ .Values.connectors.contextPath }}{{ .Values.connectors.readinessProbe.probePath }}
              - id: core
                version: 8.10.0-alphax
                urls:
                  http: https://{{ include "ingress.domain" . }}{{ .Values.orchestration.contextPath }}
    env:
    - name: JAVA_OPTS
      value: "-Xms512m -Xmx512m"
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "0.5"
        memory: 512Mi
    nodeSelector:
      cloud.google.com/gke-nodepool: previews
    tolerations:
    - key: "previews"
      operator: "Exists"
      effect: "NoSchedule"

  orchestration:
    enabled: true
    fullnameOverride: orchestration
    contextPath: /orchestration
    image:
      registry: registry.camunda.cloud
      repository: team-camunda/camunda
    clusterSize: "1"
    partitionCount: "1"
    replicationFactor: "1"
    # Single-node ECK Elasticsearch (templates/elasticsearch.yml): index replicas
    # would stay unassigned and keep the ES cluster status Yellow forever, which
    # blocks the ArgoCD app from ever reporting Healthy.
    index:
      replicas: 0
    persistenceType: disk
    pvcSize: 1Gi
    javaOpts: >-
      -Xms512m -Xmx512m
      -XX:+HeapDumpOnOutOfMemoryError
      -XX:HeapDumpPath=/usr/local/zeebe/data
      -XX:ErrorFile=/usr/local/zeebe/data/zeebe_error%p.log
      -XX:+ExitOnOutOfMemoryError
    security:
      authentication:
        method: oidc
        oidc:
          redirectUrl: https://{{ include "ingress.domain" . }}/orchestration
          secret:
            existingSecret: camunda-credentials
            existingSecretKey: identity-orchestration-client-token
    data:
      disk:
        ## Adjustement required due to PVC size
        freeSpace:
          processing: 110MB
          replication: 10MB
      secondaryStorage:
        type: elasticsearch
        elasticsearch:
          # ECK Service name (templates/elasticsearch.yml), not the old Bitnami "elasticsearch".
          url: http://elasticsearch-es-http:9200
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "500m"
        memory: 512Mi
    nodeSelector:
      cloud.google.com/gke-nodepool: previews
    tolerations:
    - key: "previews"
      operator: "Exists"
      effect: "NoSchedule"

  # NOTE: Elasticsearch, identityKeycloak and webModelerPostgresql Bitnami subcharts
  # were removed in camunda-platform 15.0.0-alpha2. Secondary storage, Keycloak and
  # the databases are now provided out-of-chart via operator CRs — see
  # templates/{elasticsearch,keycloak,databases}.yml and the external* wiring above.

  identity:
    enabled: true
    fullnameOverride: identity
    contextPath: /identity
    fullURL: https://{{ include "ingress.domain" . }}{{ .Values.identity.contextPath }}
    firstUser:
      enabled: true
      username: demo
      secret:
        existingSecret: camunda-credentials
        existingSecretKey: identity-firstuser-password
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi
    nodeSelector:
      cloud.google.com/gke-nodepool: previews
    persistence:
      enabled: true
      size: 50Mi
    tolerations:
    - key: "previews"
      operator: "Exists"
      effect: "NoSchedule"

  optimize:
    enabled: true
    fullnameOverride: optimize
    contextPath: /optimize
    partitionCount: "1"
    image:
      registry: registry.camunda.cloud
      repository: team-camunda/optimize
    security:
      authentication:
        method: oidc
        oidc:
          secret:
            existingSecret: camunda-credentials
            existingSecretKey: identity-optimize-client-token
    env:
    - name: JAVA_OPTS
      value: "-Xms512m -Xmx512m"
    # Optimize manages its own indices with a separate replica default (1); on the
    # single-node preview Elasticsearch that keeps the cluster Yellow forever
    # (orchestration indices are covered by orchestration.index.replicas above).
    - name: CAMUNDA_OPTIMIZE_ELASTICSEARCH_SETTINGS_INDEX_NUMBER_OF_REPLICAS
      value: "0"
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi
    nodeSelector:
      cloud.google.com/gke-nodepool: previews
    persistence:
      enabled: false
      size: 50Mi
    tolerations:
    - key: "previews"
      operator: "Exists"
      effect: "NoSchedule"

  webModeler:
    enabled: true
    fullnameOverride: web-modeler
    contextPath: /modeler
    restapi:
      # image:
      #   repository: camunda/web-modeler-restapi
      # Database is a CloudNativePG Cluster in the preview namespace
      # (templates/databases.yml); CNPG exposes the primary at <cluster>-rw.
      externalDatabase:
        host: web-modeler-postgresql-rw
        port: 5432
        database: web-modeler
        username: web-modeler
        secret:
          existingSecret: web-modeler-postgresql-db
          existingSecretKey: password
      mail:
        # This value is required, otherwise, the restapi pod won't start.
        fromAddress: noreply@example.com
      # Override cluster configuration to provide valid version and complete config
      # The Helm chart would auto-generate cluster config but uses the image tag as version
      # which fails validation for PR builds (e.g., "pr-abc123...")
      # When providing clusters override, ALL fields must be specified
      clusters:
        - id: "default-cluster"
          name: "Default Cluster"
          version: "8.10.0-alphax"
          authentication: "BEARER_TOKEN"
          authorizations:
            enabled: true
          url:
            grpc: "grpc://orchestration-gateway:26500"
            rest: "http://orchestration-gateway:8080/orchestration"
      resources:
        limits:
          cpu: "1"
          memory: 2Gi
        requests:
          cpu: 500m
          memory: 1Gi
      nodeSelector:
        cloud.google.com/gke-nodepool: previews
      tolerations:
      - key: "previews"
        operator: "Exists"
        effect: "NoSchedule"
    websockets:
      # image:
      #   repository: camunda/web-modeler-websockets
      resources:
        limits:
          cpu: 20m
          memory: 64Mi
        requests:
          cpu: 20m
          memory: 64Mi
      nodeSelector:
        cloud.google.com/gke-nodepool: previews
      tolerations:
      - key: "previews"
        operator: "Exists"
        effect: "NoSchedule"

# Infra-managed Gateway API plumbing (Gateway + Vouch Middleware + wildcard-cert
# TLS termination) rendered into the preview namespace. Replaces the former
# `infra-preview-environments-ingress` dependency. The HTTPRoutes are
# hand-written in templates/httproute.yml, so the chart's values-driven route is
# disabled.
infra-preview-environments-gateway-api:
  baseDomain: camunda.camunda.cloud
  # Releases are named "camunda-<branch>"; strip the prefix to derive
  # "<branch>.camunda.camunda.cloud" (mirrors the ingress.domain helper).
  namePrefix: "camunda-"
  gateway:
    # Stable name so the hand-written HTTPRoutes can attach to this Gateway.
    name: preview-gateway
    tls:
      secretName: camunda-wildcard-certificate-tls
