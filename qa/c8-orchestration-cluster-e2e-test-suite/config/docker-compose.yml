networks:
  zeebe_network: {}

services:
  postgres:
    container_name: postgres
    image: postgres:18.3-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: 't2L@!AqSMg8%I%NmHM'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U identity -d identity']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - zeebe_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.13
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - cluster.name=elasticsearch
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms1024m -Xmx1024m'
      - path.repo=/usr/local/els-snapshots
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200
      - 9300:9300
    networks:
      - zeebe_network
    restart: always
    volumes:
      - ./els-snapshots:/usr/local/els-snapshots

  opensearch:
    image: opensearchproject/opensearch:2.19.5
    container_name: opensearch
    environment:
      - cluster.name=opensearch-cluster
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true # along with the memlock settings below, disables swapping
      - 'OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m' # minimum and maximum Java heap size, recommend setting both to 50% of system RAM
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=yourStrongPassword123!
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536 # maximum number of open files for the OpenSearch user, set to at least 65536 on modern systems
        hard: 65536
    ports:
      - 9200:9200
      - 9605:9605 # required for Performance Analyzer
    networks:
      - zeebe_network

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.2
    ports:
      - 5601:5601
    environment:
      - elasticsearch.hosts=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - zeebe_network

  keycloak:
    depends_on:
      postgres:
        condition: service_healthy
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.3.3
    command: start-dev
    ports:
      - '18080:8080'
      - '9000:9000'
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/identity
      KC_DB_USERNAME: identity
      KC_DB_PASSWORD: 't2L@!AqSMg8%I%NmHM'
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HTTP_PORT: '8080'
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: 'true'
    healthcheck:
      test:
        - 'CMD-SHELL'
        - |
          exec 3<>/dev/tcp/127.0.0.1/9000 &&
          printf 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          grep -q '"status":"UP"' <&3
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - zeebe_network

  camunda:
    container_name: camunda
    image: ${CAMUNDA_DOCKER_IMAGE:-camunda/camunda:SNAPSHOT}
    environment:
      - 'JAVA_TOOL_OPTIONS=-Xms512m -Xmx1g'
      - ZEEBE_BROKER_NETWORK_HOST=camunda
      - SPRING_PROFILES_ACTIVE=e2e-test,consolidated-auth,tasklist,broker,operate,admin
      - CAMUNDA_SECURITY_AUTHENTICATION_UNPROTECTEDAPI=false
      - CAMUNDA_SECURITY_AUTHORIZATIONS_ENABLED=true
      - CAMUNDA_SECURITY_AUTHENTICATION_METHOD=BASIC
      - CAMUNDA_SECURITY_MULTITENANCY_CHECKSENABLED=false
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_USERNAME=demo
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_PASSWORD=demo
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_NAME=Demo
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_EMAIL=demo@example.com
      - CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_USERS_0=demo
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_1_USERNAME=lisa
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_1_PASSWORD=lisa
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_1_NAME=lisa
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_1_EMAIL=lisa@example.com
      - CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_USERS_1=lisa
      - CAMUNDA_DATA_SECONDARY_STORAGE_TYPE=elasticsearch
      - CAMUNDA_DATA_SECONDARY_STORAGE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_DATA_SECONDARYSTORAGE_ELASTICSEARCH_WAITFORIMPORTERS=false
      # Audit log configuration
      - CAMUNDA_DATA_AUDITLOG_ENABLED=true
      - CAMUNDA_DATA_AUDITLOG_USER_CATEGORIES_0=ADMIN
      - CAMUNDA_DATA_AUDITLOG_USER_CATEGORIES_1=DEPLOYED_RESOURCES
      - CAMUNDA_DATA_AUDITLOG_USER_CATEGORIES_2=USER_TASKS
      - CAMUNDA_DATA_AUDITLOG_USER_EXCLUDES_0=VARIABLE # [AUTHORIZATION, BATCH, DECISION, GROUP, INCIDENT, MAPPING_RULE, PROCESS_INSTANCE, ROLE, TENANT, USER, USER_TASK, RESOURCE, VARIABLE]
      - CAMUNDA_DATA_AUDITLOG_USER_EXCLUDES_1=BATCH
      - CAMUNDA_DATA_AUDITLOG_CLIENT_CATEGORIES_0=ADMIN
      - CAMUNDA_DATA_AUDITLOG_CLIENT_EXCLUDES_0=PROCESS_INSTANCE
      - CAMUNDA_PROCESSINSTANCECREATION_BUSINESSIDUNIQUENESSENABLED=true
    ports:
      - 26500:26500
      - 9600:9600
      - 8080:8080
    depends_on:
      - ${DATABASE}
    networks:
      - zeebe_network
    env_file:
      - envs/.env.database.${DATABASE}

  identity:
    depends_on:
      keycloak:
        condition: service_healthy
    restart: on-failure
    container_name: identity
    image: camunda/identity:${IDENTITY_VERSION:-SNAPSHOT}
    ports:
      - '8081:8081'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--tries=1', '--spider', 'http://localhost:8082/actuator/health']
      interval: 5s
      timeout: 15s
      retries: 30
      start_period: 60s
    environment:
      SERVER_PORT: 8081
      KEYCLOAK_URL: http://keycloak:8080/auth
      IDENTITY_AUTH_PROVIDER_BACKEND_URL: http://keycloak:8080/auth/realms/camunda-platform
      KEYCLOAK_INIT_OPTIMIZE_SECRET: XALaRPl5qwTEItdwCMiPS62nVpKs7dL7
      KEYCLOAK_INIT_OPTIMIZE_ROOT_URL: http://localhost:8090
      KEYCLOAK_USERS_0_USERNAME: 'demo'
      KEYCLOAK_USERS_0_PASSWORD: 'demo'
      KEYCLOAK_USERS_0_FIRST_NAME: 'demo'
      KEYCLOAK_USERS_0_ROLES_0: 'Identity'
      KEYCLOAK_USERS_0_ROLES_1: 'Optimize'
    networks:
      - zeebe_network

  optimize:
    container_name: optimize
    image: camunda/optimize:${OPTIMIZE_VERSION:-SNAPSHOT}
    depends_on:
      identity:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    ports:
      - '8090:8090'
      - '8092:8092'
    environment:
      - SPRING_PROFILES_ACTIVE=ccsm
      - CAMUNDA_OPTIMIZE_IDENTITY_ISSUER_URL=http://localhost:18080/auth/realms/camunda-platform
      - CAMUNDA_OPTIMIZE_IDENTITY_ISSUER_BACKEND_URL=http://keycloak:8080/auth/realms/camunda-platform
      - CAMUNDA_OPTIMIZE_IDENTITY_BASE_URL=http://identity:8081/
      - CAMUNDA_OPTIMIZE_IDENTITY_CLIENTID=optimize
      - CAMUNDA_OPTIMIZE_IDENTITY_CLIENTSECRET=XALaRPl5qwTEItdwCMiPS62nVpKs7dL7
      - CAMUNDA_OPTIMIZE_IDENTITY_AUDIENCE=optimize-api
      - OPTIMIZE_ELASTICSEARCH_HOST=elasticsearch
      - OPTIMIZE_ELASTICSEARCH_HTTP_PORT=9200
      - CAMUNDA_OPTIMIZE_SECURITY_AUTH_COOKIE_SAME_SITE_ENABLED=false
      - CAMUNDA_OPTIMIZE_ENTERPRISE=false
      - CAMUNDA_OPTIMIZE_ZEEBE_ENABLED=true
      - CAMUNDA_OPTIMIZE_ZEEBE_NAME=zeebe-record
      - CAMUNDA_OPTIMIZE_ZEEBE_PARTITION_COUNT=2
      - CAMUNDA_OPTIMIZE_IMPORT_DATA_SKIP_DATA_AFTER_NESTED_DOC_LIMIT_REACHED=true
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/auth/realms/camunda-platform/protocol/openid-connect/certs
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8090/api/readyz || exit 1']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - zeebe_network
