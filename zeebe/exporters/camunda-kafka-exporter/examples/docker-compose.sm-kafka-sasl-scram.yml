# Enterprise authentication example: SASL/SCRAM-SHA-512 over TLS (SASL_SSL).
#
# Typical in large financial institutions where strong password-based authentication
# with mandatory encryption is required but Kerberos infrastructure is not available.
# Credentials are stored in the Kafka metadata log — never in plaintext.
#
# Uses apache/kafka in KRaft mode (no ZooKeeper) consistent with the module's test suite.
#
# Prerequisites:
#   1. Build an image with the Kafka exporter bundled:
#        docker build -f camunda.Dockerfile --build-arg BASE=public -t camunda/camunda:SNAPSHOT .
#   2. Generate TLS certificates:
#        bash examples/gen-certs.sh
#
# Start:
#   docker compose -f zeebe/exporters/camunda-kafka-exporter/docker-compose.sm-kafka-sasl-scram.yml up -d
#
# Stop:
#   docker compose -f zeebe/exporters/camunda-kafka-exporter/docker-compose.sm-kafka-sasl-scram.yml down -v

services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: camunda-kafka-scram
    ports:
      - "9093:9093"
    environment:
      # KRaft mode — no ZooKeeper
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:29093
      # Listeners:
      #   ADMIN      – plain TCP, Docker-internal only; used by the init container to
      #                bootstrap SCRAM credentials and by the healthcheck.
      #   SASL_SSL   – authenticated + encrypted; clients and Camunda connect here.
      #   CONTROLLER – KRaft controller channel (plain, internal only).
      #   EXTERNAL   – host-accessible SASL_SSL on port 9093.
      KAFKA_LISTENERS: ADMIN://0.0.0.0:9192,SASL_SSL://0.0.0.0:19093,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: ADMIN://kafka:9192,SASL_SSL://kafka:19093,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ADMIN:PLAINTEXT,SASL_SSL:SASL_SSL,CONTROLLER:PLAINTEXT,EXTERNAL:SASL_SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: ADMIN
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      # SSL/TLS — certs generated by examples/gen-certs.sh.
      # The apache/kafka image configure script requires filename-based SSL config:
      # files are resolved relative to /etc/kafka/secrets/.
      KAFKA_SSL_KEYSTORE_FILENAME: broker.p12
      KAFKA_SSL_KEY_CREDENTIALS: ssl-credentials
      KAFKA_SSL_KEYSTORE_CREDENTIALS: ssl-credentials
      KAFKA_SSL_KEYSTORE_TYPE: PKCS12
      # Clients present SCRAM credentials; TLS provides encryption only (no client cert).
      KAFKA_SSL_CLIENT_AUTH: none
      # Required by the apache/kafka configure script when any SASL_* listener is present.
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/secrets/kafka_server_jaas.conf"
    volumes:
      - ./certs/broker.p12:/etc/kafka/secrets/broker.p12:ro
      - ./config/sasl-scram/ssl-credentials:/etc/kafka/secrets/ssl-credentials:ro
      - ./config/sasl-scram/kafka_server_jaas.conf:/etc/kafka/secrets/kafka_server_jaas.conf:ro
      # ./certs is also bind-mounted so the demo consumer (docker exec) can reach truststore.p12
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9192"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  # Init container: creates the SCRAM-SHA-512 "zeebe" user in the running broker.
  # Runs after the broker is healthy (plain TCP admin listener ready) and exits when done.
  # In production, inject passwords via a secrets manager.
  kafka-scram-setup:
    image: apache/kafka:4.0.0
    container_name: camunda-kafka-scram-setup
    depends_on:
      kafka:
        condition: service_healthy
    command: ["bash", "-c", "/opt/kafka/bin/kafka-configs.sh --bootstrap-server kafka:9192 --alter --add-config 'SCRAM-SHA-512=[iterations=8192,password=zeebe-secret]' --entity-type users --entity-name zeebe && echo 'SCRAM user created.'"]

  camunda:
    image: ${CAMUNDA_DOCKER_IMAGE:-camunda/camunda:SNAPSHOT}
    container_name: camunda-scram
    depends_on:
      kafka-scram-setup:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
      - "26500:26500"
      - "26501:26501"
      - "26502:26502"
    volumes:
      - ./camunda-sasl-scram.yml:/usr/local/camunda/config/application.yaml:ro
      - ./certs/truststore.p12:/etc/camunda/kafka/truststore.p12:ro
    environment:
      - CAMUNDA_MODE=all-in-one
      - CAMUNDA_INSECURE=true
      - SPRING_PROFILES_ACTIVE=rdbmsH2
      - ZEEBE_BROKER_NETWORK_HOST=0.0.0.0
