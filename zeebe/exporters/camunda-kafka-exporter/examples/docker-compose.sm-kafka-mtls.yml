# Enterprise authentication example: mutual TLS (mTLS).
#
# Standard in financial services for service-to-service authentication where each service
# presents its own X.509 certificate signed by a shared CA. The broker validates the
# client certificate (ssl.client.auth=required) and clients validate the broker certificate.
# Satisfies NIST 800-204, PCI-DSS, and ISO 27001 requirements for mutual authentication.
#
# Uses apache/kafka in KRaft mode (no ZooKeeper) consistent with the module's test suite.
#
# Prerequisites:
#   1. Build an image with the Kafka exporter bundled:
#        docker build -f camunda.Dockerfile --build-arg BASE=public -t camunda/camunda:SNAPSHOT .
#   2. Generate TLS certificates:
#        bash examples/gen-certs.sh
#
# Start:
#   docker compose -f zeebe/exporters/camunda-kafka-exporter/docker-compose.sm-kafka-mtls.yml up -d
#
# Stop:
#   docker compose -f zeebe/exporters/camunda-kafka-exporter/docker-compose.sm-kafka-mtls.yml down -v

services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: camunda-kafka-mtls
    ports:
      - "9094:9094"
    environment:
      # KRaft mode — no ZooKeeper
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:29094
      # Listeners:
      #   SSL        – internal Docker network (clients + inter-broker)
      #   CONTROLLER – KRaft controller channel (plain, internal only)
      #   EXTERNAL   – host-accessible SSL on port 9094
      KAFKA_LISTENERS: SSL://0.0.0.0:19094,CONTROLLER://0.0.0.0:29094,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: SSL://kafka:19094,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SSL:SSL,CONTROLLER:PLAINTEXT,EXTERNAL:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: SSL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      # SSL/TLS — certs generated by examples/gen-certs.sh.
      # The apache/kafka image configure script requires filename-based SSL config:
      # files are resolved relative to /etc/kafka/secrets/.
      KAFKA_SSL_KEYSTORE_FILENAME: broker.p12
      KAFKA_SSL_KEY_CREDENTIALS: ssl-credentials
      KAFKA_SSL_KEYSTORE_CREDENTIALS: ssl-credentials
      KAFKA_SSL_KEYSTORE_TYPE: PKCS12
      KAFKA_SSL_TRUSTSTORE_FILENAME: truststore.p12
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: ssl-credentials
      KAFKA_SSL_TRUSTSTORE_TYPE: PKCS12
      # Enforce mutual TLS: every client must present a certificate signed by the shared CA.
      KAFKA_SSL_CLIENT_AUTH: required
      # Inter-broker SSL also uses mTLS; the broker presents its own keystore as the client cert.
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
    volumes:
      - ./certs/broker.p12:/etc/kafka/secrets/broker.p12:ro
      - ./config/mtls/ssl-credentials:/etc/kafka/secrets/ssl-credentials:ro
      - ./certs/truststore.p12:/etc/kafka/secrets/truststore.p12:ro
      # ./certs is also bind-mounted so the demo consumer (docker exec) can use /certs/ paths
      - ./certs:/certs:ro

  camunda:
    image: ${CAMUNDA_DOCKER_IMAGE:-camunda/camunda:SNAPSHOT}
    container_name: camunda-mtls
    depends_on:
      - kafka
    ports:
      - "8080:8080"
      - "26500:26500"
      - "26501:26501"
      - "26502:26502"
    volumes:
      - ./camunda-mtls.yml:/usr/local/camunda/config/application.yaml:ro
      - ./certs/truststore.p12:/etc/camunda/kafka/truststore.p12:ro
      - ./certs/client-zeebe.p12:/etc/camunda/kafka/client-zeebe.p12:ro
    environment:
      - CAMUNDA_MODE=all-in-one
      - CAMUNDA_INSECURE=true
      - SPRING_PROFILES_ACTIVE=rdbmsH2
      - ZEEBE_BROKER_NETWORK_HOST=0.0.0.0

