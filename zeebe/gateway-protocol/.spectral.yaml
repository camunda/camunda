# Spectral ruleset for OpenAPI validation
# Replaces Vacuum for comprehensive OpenAPI linting and validation
description: Recommended ruleset with additional customizations.
extends: [[spectral:oas, recommended]]
functions:
  - verifyKeyTypesPaths
  - verifyKeyTypesSchemas
  - verifyEventuallyConsistent
  - verifyRequiredPropertiesExist
  - verifyArrayPropertiesRequired
  - verifyResponsePropertiesRequired
  - verifyDeprecatedEnumMembers
  - verifyAddedInVersion
  - verifySemanticKindsRegistered
functionsDir: ./spectral-functions
rules:
  # Tag validation
  operation-tag-defined: error

  # Schema example validation rules.
  # Downgraded from error → warn because Spectral does not support Unicode regex
  # (\p{L}, \p{N}) in pattern validation. Our identifier schemas use Unicode-aware
  # patterns (e.g. ProcessDefinitionId, DecisionDefinitionId, Tag), which causes
  # false-positive failures on all example values.
  # Upstream issue: https://github.com/stoplightio/spectral/issues/2419
  # Upstream fix:   https://github.com/stoplightio/spectral/pull/2809
  # TODO: Restore to error once Spectral ships the unicodeRegExp option.
  oas3-valid-schema-example: warn
  oas3-valid-media-example: warn

  # Custom validation rules migrated from Vacuum
  no-period-in-summary:
    description: Path summary must not include period
    severity: error
    given: $.paths[*][*].summary
    then:
      function: pattern
      functionOptions:
        notMatch: ^.*\.$
    message: Summaries are short descriptions often used in navigation bars, they must not contain periods at the end. Please remove the period at the end of the summary text.

  no-flow-node-in-path-summary:
    description: Path summary must not include term "flow node"
    severity: error
    given: $.paths[*][*].summary
    then:
      function: pattern
      functionOptions:
        notMatch: .*(flow-node|flownode|flowNode|flow node).*
    message: Please replace the term "flow node" with "element".

  no-flow-node-in-path-description:
    description: Path description must not include term "flow node"
    severity: error
    given: $.paths[*][*].description
    then:
      function: pattern
      functionOptions:
        notMatch: .*(flow-node|flownode|flowNode|flow node).*
    message: Please replace the term "flow node" with "element".

  no-flow-node-in-operation-id:
    description: Path operation ID must not include term "flow node"
    severity: error
    given: $.paths[*][*].operationId
    then:
      function: pattern
      functionOptions:
        notMatch: .*(flow-node|flownode|flowNode|FlowNode|Flownode).*
    message: Please replace the term "flow node" with "element".

  no-flow-node-in-path:
    description: Paths must not include term "flow node"
    severity: error
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: .*(flow-node|flownode|flowNode).*
    message: Please replace the term "flow node" with "element".

  no-flow-node-in-component-property:
    description: Component properties must not include term "flow node"
    severity: error
    given: $.components[*][*].properties.*~
    then:
      function: pattern
      functionOptions:
        notMatch: .*(flownode|flowNode).*
    message: Please replace the term "flow node" with "element".

  require-property-descriptions:
    description: Schema properties must have a description.
    severity: error
    given: $.components.schemas[*].properties[*]
    then:
      field: description
      function: truthy

  operation-key-properties-must-be-strings:
    description: "`...Key` parameters must be of type `string`."
    severity: warn
    given: $.paths[*][*].parameters[*]
    then:
      function: verifyKeyTypesPaths
    message: Make the `...Key` property a `string`.

  schema-key-properties-must-be-strings:
    description: "`...Key` properties must be of type `string`."
    severity: warn
    given: $.components.schemas[*].properties
    then:
      function: verifyKeyTypesSchemas
    message: Make the `...Key` property a `string`.

  required-properties-must-exist:
    description: "Every entry in `required` must match a key in `properties`."
    severity: error
    given: "$.components.schemas[*]"
    then:
      function: verifyRequiredPropertiesExist

  array-properties-must-be-required:
    description: "Response array properties must be `required` and not `nullable`."
    severity: error
    given: "$.paths[*]"
    message: "{{error}}"
    then:
      function: verifyArrayPropertiesRequired

  response-properties-must-be-required:
    description: "All response body properties must be listed in `required`."
    severity: error
    given: "$.paths[*]"
    message: "{{error}}"
    then:
      function: verifyResponsePropertiesRequired

  no-eventually-consistent-on-commands:
    description: "Command (mutating) operations must not have x-eventually-consistent: true."
    severity: error
    given: $.paths[*][*]
    then:
      function: verifyEventuallyConsistent
    message: "Command operations are synchronous writes and must not be marked as eventually consistent. Only query operations (search, statistics, get) should use x-eventually-consistent: true."

  valid-deprecated-enum-members:
    description: "`x-deprecated-enum-members` must be a valid array of {name, deprecatedInVersion} referencing existing enum values."
    severity: error
    given: "$.components.schemas[*]"
    message: "{{error}}"
    then:
      function: verifyDeprecatedEnumMembers

  require-added-in-version:
    description: "Every operation must have `x-added-in-version` declaring the Camunda version in which it was introduced."
    severity: error
    given: $.paths[*][*]
    message: "{{error}}"
    then:
      function: verifyAddedInVersion

  # ── x-semantic-establishes / x-semantic-requires (camunda/camunda#52272) ──
  # Three rules:
  #   1. Schema-shape lint for x-semantic-establishes (operation-level).
  #   2. Schema-shape lint for x-semantic-requires (operation-level).
  #   3. Cross-document check: every kind: must be in semantic-kinds.json,
  #      and every required kind must be established somewhere.
  # The first two use Spectral's built-in `schema` function (no custom code);
  # the third uses verifySemanticKindsRegistered.

  semantic-establishes-shape:
    description: "`x-semantic-establishes` must conform to the documented schema."
    severity: error
    given: $.paths[*][get,put,post,patch,delete].x-semantic-establishes
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required: [kind, identifiedBy]
          additionalProperties: false
          properties:
            kind:
              type: string
              pattern: "^[A-Z][A-Za-z0-9]+$"
              description: PascalCase singular noun. The symbolic name of the established thing, not of the operation.
            shape:
              type: string
              enum: [entity, edge]
              description: Optional discriminator. Defaults to `entity`. Use `edge` for membership-style relationships observable only via member-list search.
            identifiedBy:
              type: array
              minItems: 1
              description: Ordered tuple of identifying members. Length 1 for single-key entities, length ≥ 2 for composite-key entities and edges.
              items:
                type: object
                required: [in, name, semanticType]
                additionalProperties: false
                properties:
                  in: { type: string, enum: [body, path, query, header] }
                  name: { type: string, minLength: 1 }
                  semanticType:
                    type: string
                    pattern: "^[A-Z][A-Za-z0-9]+$"

  semantic-requires-shape:
    description: "`x-semantic-requires` must conform to the documented schema."
    severity: error
    given: $.paths[*][get,put,post,patch,delete].x-semantic-requires
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required: [kind, bind]
          additionalProperties: false
          properties:
            kind:
              type: string
              pattern: "^[A-Z][A-Za-z0-9]+$"
            bind:
              type: object
              minProperties: 1
              description: Maps members of the established tuple to local parameters of the consumer.
              additionalProperties:
                type: object
                required: [from, name]
                additionalProperties: false
                properties:
                  from: { type: string, enum: [body, path, query, header] }
                  name: { type: string, minLength: 1 }

  verify-semantic-kinds-registered:
    description: "Every `kind:` referenced by x-semantic-establishes / x-semantic-requires must appear in semantic-kinds.json, every required kind must be established somewhere in the spec, and every identifiedBy/bind member must reference a parameter or top-level requestBody property that actually exists on the operation."
    severity: error
    given: "$"
    message: "{{error}}"
    then:
      function: verifySemanticKindsRegistered
