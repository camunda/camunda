# Domain file for semantic-establishes / semantic-requires test fixture.
# Each operation exercises one named violation (or, for valid cases, the
# happy path).
openapi: "3.0.3"
info:
  title: Widgets domain (test fixture)
  version: "1.0"
tags:
  - name: Test

paths:
  # ── Valid: single-key entity establish + matching consumer ───
  /valid/widgets:
    post:
      operationId: createWidget
      summary: Create a widget
      description: Establishes a Widget identified by widgetId.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: Widget
        identifiedBy:
          - { in: body, name: widgetId, semanticType: WidgetId }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                widgetId: { type: string }
              required: [widgetId]
      responses:
        '201':
          description: Created.

  /valid/widgets/{widgetId}:
    get:
      operationId: getWidget
      summary: Get a widget
      description: Requires a Widget to exist.
      x-added-in-version: "8.8"
      tags: [Test]
      parameters:
        - name: widgetId
          in: path
          required: true
          description: The widget id.
          schema: { type: string }
      x-semantic-requires:
        kind: Widget
        bind:
          widgetId: { from: path, name: widgetId }
      responses:
        '200':
          description: OK.

  # Establishes User. Required for the assignOwnerToWidget edge below to be
  # valid: the edge's identifiedBy includes Username, which the registry
  # declares as User's identifier, so User becomes a derived requires.
  /valid/users:
    post:
      operationId: createUser
      summary: Create a user
      description: Establishes a User identified by username.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: User
        identifiedBy:
          - { in: body, name: username, semanticType: Username }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
              required: [username]
      responses:
        '201':
          description: Created.

  # ── Valid: edge establish + edge consumer ────────────────────
  /valid/widgets/{widgetId}/owners/{username}:
    put:
      operationId: assignOwnerToWidget
      summary: Assign owner to widget
      description: Establishes a WidgetOwnership edge.
      x-added-in-version: "8.8"
      tags: [Test]
      parameters:
        - name: widgetId
          in: path
          required: true
          description: The widget id.
          schema: { type: string }
        - name: username
          in: path
          required: true
          description: The username.
          schema: { type: string }
      x-semantic-establishes:
        kind: WidgetOwnership
        shape: edge
        identifiedBy:
          - { in: path, name: widgetId, semanticType: WidgetId }
          - { in: path, name: username, semanticType: Username }
      responses:
        '204':
          description: Assigned.

  /valid/widgets/{widgetId}/owners/search:
    post:
      operationId: searchOwnersForWidget
      summary: Search widget owners
      description: Requires a WidgetOwnership to exist; binds only widgetId.
      x-added-in-version: "8.8"
      tags: [Test]
      parameters:
        - name: widgetId
          in: path
          required: true
          description: The widget id.
          schema: { type: string }
      x-semantic-requires:
        kind: WidgetOwnership
        bind:
          widgetId: { from: path, name: widgetId }
      responses:
        '200':
          description: OK.

  # ── Invalid: shape lint (semantic-establishes-shape) ─────────

  # 1. Missing required `kind`.
  /invalid/missing-kind:
    post:
      operationId: missingKind
      summary: Missing kind
      description: Should fail semantic-establishes-shape — missing kind.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        identifiedBy:
          - { in: body, name: widgetId, semanticType: WidgetId }
      responses:
        '201':
          description: Created.

  # 2. kind violates PascalCase pattern.
  /invalid/bad-kind-case:
    post:
      operationId: badKindCase
      summary: Bad kind case
      description: Should fail semantic-establishes-shape — kind not PascalCase.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: widget
        identifiedBy:
          - { in: body, name: widgetId, semanticType: WidgetId }
      responses:
        '201':
          description: Created.

  # 3. Typo'd top-level key — additionalProperties: false rejects it.
  /invalid/typoed-key:
    post:
      operationId: typoedKey
      summary: Typoed key
      description: Should fail semantic-establishes-shape — `identifedBy` typo.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: Widget
        identifedBy:
          - { in: body, name: widgetId, semanticType: WidgetId }
      responses:
        '201':
          description: Created.

  # 4. Bad `shape` enum value.
  /invalid/bad-shape-enum:
    post:
      operationId: badShapeEnum
      summary: Bad shape enum
      description: Should fail semantic-establishes-shape — shape not in enum.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: Widget
        shape: relation
        identifiedBy:
          - { in: body, name: widgetId, semanticType: WidgetId }
      responses:
        '201':
          description: Created.

  # 5. identifiedBy must have at least one item.
  /invalid/empty-identified-by:
    post:
      operationId: emptyIdentifiedBy
      summary: Empty identifiedBy
      description: Should fail semantic-establishes-shape — empty identifiedBy.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: Widget
        identifiedBy: []
      responses:
        '201':
          description: Created.

  # 6. identifiedBy item with bad `in` enum value.
  /invalid/identified-by-bad-in:
    post:
      operationId: identifiedByBadIn
      summary: identifiedBy bad in
      description: Should fail semantic-establishes-shape — `in: cookie` not in enum.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: Widget
        identifiedBy:
          - { in: cookie, name: widgetId, semanticType: WidgetId }
      responses:
        '201':
          description: Created.

  # ── Invalid: requires shape lint ─────────────────────────────

  # 7. Missing required `bind`.
  /invalid/requires-missing-bind:
    get:
      operationId: requiresMissingBind
      summary: Requires missing bind
      description: Should fail semantic-requires-shape — missing bind.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-requires:
        kind: Widget
      responses:
        '200':
          description: OK.

  # ── Invalid: registry / cross-reference ──────────────────────

  # 8. Establishes a kind not in the registry.
  /invalid/unknown-establishes-kind:
    post:
      operationId: unknownEstablishesKind
      summary: Unknown establishes kind
      description: Should fail verify-semantic-kinds-registered.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: Sprocket
        identifiedBy:
          - { in: body, name: sprocketId, semanticType: SprocketId }
      responses:
        '201':
          description: Created.

  # 9. Requires a kind not in the registry.
  /invalid/unknown-requires-kind:
    get:
      operationId: unknownRequiresKind
      summary: Unknown requires kind
      description: Should fail verify-semantic-kinds-registered.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-requires:
        kind: Gizmo
        bind:
          gizmoId: { from: path, name: gizmoId }
      responses:
        '200':
          description: OK.

  # 10. Requires a kind that IS in the registry but is not established
  #     anywhere in this spec — exercises the cross-reference check.
  /invalid/orphan-requires:
    get:
      operationId: orphanRequires
      summary: Orphan requires
      description: Should fail verify-semantic-kinds-registered — kind in registry but never established here.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-requires:
        kind: OrphanedKind
        bind:
          orphanedId: { from: path, name: orphanedId }
      responses:
        '200':
          description: OK.

  # 11. Edge with an identifiedBy semanticType that no entity in the registry
  #     declares as an identifier. Exercises the unresolved-endpoint check
  #     (derived-requires resolution failure).
  /invalid/widgets/{widgetId}/mystery/{mysteryId}:
    put:
      operationId: assignMysteryToWidget
      summary: Assign mystery to widget
      description: Should fail verify-semantic-kinds-registered — MysteryId is no entity's identifier.
      x-added-in-version: "8.8"
      tags: [Test]
      parameters:
        - name: widgetId
          in: path
          required: true
          description: The widget id.
          schema: { type: string }
        - name: mysteryId
          in: path
          required: true
          description: The mystery id.
          schema: { type: string }
      x-semantic-establishes:
        kind: WidgetMysteryLink
        shape: edge
        identifiedBy:
          - { in: path, name: widgetId,  semanticType: WidgetId }
          - { in: path, name: mysteryId, semanticType: MysteryId }
      responses:
        '204':
          description: Assigned.

  # 12. Edge whose identifiedBy semanticType resolves to a registered entity
  #     (Frob), but Frob is never established by any operation. Exercises
  #     the derived-requires orphan check — the edge implicitly requires
  #     Frob to exist, and nothing produces it.
  /invalid/widgets/{widgetId}/frobs/{frobId}:
    put:
      operationId: assignFrobToWidget
      summary: Assign frob to widget
      description: Should fail verify-semantic-kinds-registered — Frob is registered but never established.
      x-added-in-version: "8.8"
      tags: [Test]
      parameters:
        - name: widgetId
          in: path
          required: true
          description: The widget id.
          schema: { type: string }
        - name: frobId
          in: path
          required: true
          description: The frob id.
          schema: { type: string }
      x-semantic-establishes:
        kind: WidgetFrobLink
        shape: edge
        identifiedBy:
          - { in: path, name: widgetId, semanticType: WidgetId }
          - { in: path, name: frobId,   semanticType: FrobId }
      responses:
        '204':
          description: Assigned.

  # 13. Edge whose endpoint resolves to an external-entity (ExternalThing).
  #     The cross-reference check must NOT report ExternalThing as an
  #     orphan, because external entities have no producer by definition
  #     (camunda/camunda#52320).
  /valid/widgets/{widgetId}/external-things/{externalThingId}:
    put:
      operationId: assignExternalThingToWidget
      summary: Assign external thing to widget
      description: Should pass — ExternalThing is an external-entity, no producer required.
      x-added-in-version: "8.8"
      tags: [Test]
      parameters:
        - name: widgetId
          in: path
          required: true
          description: The widget id.
          schema: { type: string }
        - name: externalThingId
          in: path
          required: true
          description: The external thing id.
          schema: { type: string }
      x-semantic-establishes:
        kind: WidgetExternalLink
        shape: edge
        identifiedBy:
          - { in: path, name: widgetId,        semanticType: WidgetId }
          - { in: path, name: externalThingId, semanticType: ExternalThingId }
      responses:
        '204':
          description: Assigned.

  # 14. Operation that tries to `establishes` an external entity directly.
  #     Should fail — external entities have no API producer (camunda/camunda#52320).
  /invalid/external-things:
    post:
      operationId: createExternalThingDirectly
      summary: Create an external thing
      description: Should fail — ExternalThing is shape:external-entity and cannot be established.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: ExternalThing
        identifiedBy:
          - { in: body, name: id, semanticType: ExternalThingId }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201':
          description: Created.

  # 15. Operation that tries to `requires` an external entity directly.
  #     Should fail — external entities are referenced via edges only.
  /invalid/external-things/{externalThingId}:
    get:
      operationId: getExternalThingDirectly
      summary: Get an external thing
      description: Should fail — ExternalThing is shape:external-entity and cannot be required directly.
      x-added-in-version: "8.8"
      tags: [Test]
      parameters:
        - name: externalThingId
          in: path
          required: true
          description: The external thing id.
          schema: { type: string }
      x-semantic-requires:
        kind: ExternalThing
        bind:
          externalThingId: { from: path, name: externalThingId }
      responses:
        '200':
          description: OK.

  # ── Invalid: x-semantic-* binding-existence (camunda/camunda#52413) ──
  # The semantic-establishes-shape rule validates the *shape* of identifiedBy
  # entries; verify-semantic-kinds-registered now also verifies that each
  # named member actually exists on the operation. One fixture per source
  # locator (path / query / header / body) on each side (establishes /
  # requires) covers the defect class, plus the issue's exact "body member
  # but operation has no requestBody" example.

  # 16. establishes binds to a body member, but the operation declares
  #     no requestBody at all.
  /invalid/establishes-body-no-body:
    post:
      operationId: establishesBodyNoBody
      summary: Establishes from body with no requestBody
      description: Should fail — body binding but no requestBody declared.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: Widget
        identifiedBy:
          - { in: body, name: widgetId, semanticType: WidgetId }
      responses:
        '201':
          description: Created.

  # 17. establishes binds to a body member that the requestBody does not declare.
  /invalid/establishes-body-missing-prop:
    post:
      operationId: establishesBodyMissingProp
      summary: Establishes from body with missing property
      description: Should fail — body declared but does not contain widgetId.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: Widget
        identifiedBy:
          - { in: body, name: widgetId, semanticType: WidgetId }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
              required: [name]
      responses:
        '201':
          description: Created.

  # 18. establishes binds to a path parameter that the operation does not declare.
  /invalid/establishes-path-missing/{actuallyDeclared}:
    put:
      operationId: establishesPathMissing
      summary: Establishes from undeclared path parameter
      description: Should fail — path binding to widgetId, but only actuallyDeclared exists.
      x-added-in-version: "8.8"
      tags: [Test]
      parameters:
        - name: actuallyDeclared
          in: path
          required: true
          description: The actually-declared parameter.
          schema: { type: string }
      x-semantic-establishes:
        kind: Widget
        identifiedBy:
          - { in: path, name: widgetId, semanticType: WidgetId }
      responses:
        '204':
          description: OK.

  # 19. requires binds from a query parameter that the operation does not declare.
  /invalid/requires-query-missing:
    get:
      operationId: requiresQueryMissing
      summary: Requires from undeclared query parameter
      description: Should fail — query binding but no such query parameter.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-requires:
        kind: Widget
        bind:
          widgetId: { from: query, name: widgetId }
      responses:
        '200':
          description: OK.

  # 20. requires binds from a header that the operation does not declare.
  /invalid/requires-header-missing:
    get:
      operationId: requiresHeaderMissing
      summary: Requires from undeclared header
      description: Should fail — header binding but no such header parameter.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-requires:
        kind: Widget
        bind:
          widgetId: { from: header, name: X-Widget-Id }
      responses:
        '200':
          description: OK.

  # 21. requires binds from a body member that the requestBody does not declare.
  /invalid/requires-body-missing-prop:
    post:
      operationId: requiresBodyMissingProp
      summary: Requires from missing body property
      description: Should fail — body declared but does not contain widgetId.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-requires:
        kind: Widget
        bind:
          widgetId: { from: body, name: widgetId }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200':
          description: OK.

  # ── Valid: path-item-level parameters honored ────────────────
  # Path-item-level parameters apply to all operations on the path
  # (OpenAPI 3.x). The existence check must honor them, not require the
  # binding to find the parameter on the operation itself.
  /valid/widgets-pathitem/{widgetId}:
    parameters:
      - name: widgetId
        in: path
        required: true
        description: The widget id (declared at path-item level).
        schema: { type: string }
    get:
      operationId: getWidgetPathItem
      summary: Get widget via path-item parameter
      description: Path parameter declared at path-item level, not on the operation.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-requires:
        kind: Widget
        bind:
          widgetId: { from: path, name: widgetId }
      responses:
        '200':
          description: OK.
