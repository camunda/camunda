# Entry point for x-semantic-establishes / x-semantic-requires rule tests.
# Mirrors the real spec structure: paths $ref to a domain file.
openapi: "3.0.3"
info:
  title: Test Fixture — semantic-establishes
  version: "1.0"
tags:
  - name: Test

paths:
  # ── Valid ─────────────────────────────────────────────────────
  /valid/widgets:
    $ref: 'widgets.yaml#/paths/~1valid~1widgets'
  /valid/widgets/{widgetId}:
    $ref: 'widgets.yaml#/paths/~1valid~1widgets~1{widgetId}'
  /valid/users:
    $ref: 'widgets.yaml#/paths/~1valid~1users'
  /valid/widgets/{widgetId}/owners/{username}:
    $ref: 'widgets.yaml#/paths/~1valid~1widgets~1{widgetId}~1owners~1{username}'
  /valid/widgets/{widgetId}/owners/search:
    $ref: 'widgets.yaml#/paths/~1valid~1widgets~1{widgetId}~1owners~1search'

  # ── Invalid: shape lint ───────────────────────────────────────
  /invalid/missing-kind:
    $ref: 'widgets.yaml#/paths/~1invalid~1missing-kind'
  /invalid/bad-kind-case:
    $ref: 'widgets.yaml#/paths/~1invalid~1bad-kind-case'
  /invalid/typoed-key:
    $ref: 'widgets.yaml#/paths/~1invalid~1typoed-key'
  /invalid/bad-shape-enum:
    $ref: 'widgets.yaml#/paths/~1invalid~1bad-shape-enum'
  /invalid/empty-identified-by:
    $ref: 'widgets.yaml#/paths/~1invalid~1empty-identified-by'
  /invalid/identified-by-bad-in:
    $ref: 'widgets.yaml#/paths/~1invalid~1identified-by-bad-in'

  # ── Invalid: requires shape lint ──────────────────────────────
  /invalid/requires-missing-bind:
    $ref: 'widgets.yaml#/paths/~1invalid~1requires-missing-bind'

  # ── Invalid: registry / cross-reference ───────────────────────
  /invalid/unknown-establishes-kind:
    $ref: 'widgets.yaml#/paths/~1invalid~1unknown-establishes-kind'
  /invalid/unknown-requires-kind:
    $ref: 'widgets.yaml#/paths/~1invalid~1unknown-requires-kind'
  /invalid/orphan-requires:
    $ref: 'widgets.yaml#/paths/~1invalid~1orphan-requires'

  # ── Invalid: edge endpoint resolution / derived requires ──────
  /invalid/widgets/{widgetId}/mystery/{mysteryId}:
    $ref: 'widgets.yaml#/paths/~1invalid~1widgets~1{widgetId}~1mystery~1{mysteryId}'
  /invalid/widgets/{widgetId}/frobs/{frobId}:
    $ref: 'widgets.yaml#/paths/~1invalid~1widgets~1{widgetId}~1frobs~1{frobId}'

  # ── External entity (camunda/camunda#52320) ──────────────────
  /valid/widgets/{widgetId}/external-things/{externalThingId}:
    $ref: 'widgets.yaml#/paths/~1valid~1widgets~1{widgetId}~1external-things~1{externalThingId}'
  /invalid/external-things:
    $ref: 'widgets.yaml#/paths/~1invalid~1external-things'
  /invalid/external-things/{externalThingId}:
    $ref: 'widgets.yaml#/paths/~1invalid~1external-things~1{externalThingId}'

  # ── Invalid: binding existence (camunda/camunda#52413) ───────
  /invalid/establishes-body-no-body:
    $ref: 'widgets.yaml#/paths/~1invalid~1establishes-body-no-body'
  /invalid/establishes-body-missing-prop:
    $ref: 'widgets.yaml#/paths/~1invalid~1establishes-body-missing-prop'
  /invalid/establishes-path-missing/{actuallyDeclared}:
    $ref: 'widgets.yaml#/paths/~1invalid~1establishes-path-missing~1{actuallyDeclared}'
  /invalid/requires-query-missing:
    $ref: 'widgets.yaml#/paths/~1invalid~1requires-query-missing'
  /invalid/requires-header-missing:
    $ref: 'widgets.yaml#/paths/~1invalid~1requires-header-missing'
  /invalid/requires-body-missing-prop:
    $ref: 'widgets.yaml#/paths/~1invalid~1requires-body-missing-prop'
  /valid/widgets-pathitem/{widgetId}:
    $ref: 'widgets.yaml#/paths/~1valid~1widgets-pathitem~1{widgetId}'

  # ── Invalid: shape vs registry ───────────────────────────────
  /invalid/widgets/{widgetId}/wrong-shape-default/{username}:
    $ref: 'widgets.yaml#/paths/~1invalid~1widgets~1{widgetId}~1wrong-shape-default~1{username}'
  /invalid/widgets/wrong-shape-explicit:
    $ref: 'widgets.yaml#/paths/~1invalid~1widgets~1wrong-shape-explicit'

  # ── Producer-existence gate (broken producer must not suppress consumer orphan) ──
  /invalid/broken-establish:
    $ref: 'widgets.yaml#/paths/~1invalid~1broken-establish'
  /invalid/broken-establish-consumer/{brokenProducedId}:
    $ref: 'widgets.yaml#/paths/~1invalid~1broken-establish-consumer~1{brokenProducedId}'

  # ── Binding existence with $ref'd request body ───────────────
  # Production specs declare `requestBody.content.*.schema` as a `$ref`
  # to a top-level component schema, not as an inline object. The
  # body-member existence check must follow the `$ref` to inspect the
  # referenced schema's properties; otherwise a regression in Spectral
  # ref resolution (or in `collectTopLevelBodyProperties`) would
  # silently disable the check on every real `createX` operation while
  # every inline-body fixture stayed green. The ops live here in the
  # entry document so the local `#/components/schemas/...` ref is
  # resolvable in both bundled and per-file lint passes.
  /valid/establishes-body-ref-present:
    post:
      operationId: establishesBodyRefPresent
      summary: Establishes from $ref'd body schema (member present)
      description: Should pass — member exists on the $ref'd component.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: Widget
        identifiedBy:
          - { in: body, name: widgetId, semanticType: WidgetId }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWidgetWithIdRequest'
      responses:
        '201':
          description: Created.

  /invalid/establishes-body-ref-missing:
    post:
      operationId: establishesBodyRefMissing
      summary: Establishes from $ref'd body schema (member missing)
      description: |
        Should fail — body binding to widgetId, but the $ref'd component
        only declares `name`. Class-scoped guard: if Spectral ref
        resolution regressed, the existing inline-body fixtures (#16-21)
        would still pass and this defect class would silently slip
        through on the real spec.
      x-added-in-version: "8.8"
      tags: [Test]
      x-semantic-establishes:
        kind: Widget
        identifiedBy:
          - { in: body, name: widgetId, semanticType: WidgetId }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWidgetMissingIdRequest'
      responses:
        '201':
          description: Created.

components:
  schemas:
    CreateWidgetWithIdRequest:
      type: object
      properties:
        widgetId:
          type: string
        name:
          type: string
      required:
        - widgetId

    CreateWidgetMissingIdRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name
