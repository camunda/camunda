          allOf:
            - $ref: '#/components/schemas/AgentInstanceHistoryRoleEnum'
        - $ref: '#/components/schemas/AdvancedAgentInstanceHistoryRoleFilter'

    AdvancedAgentInstanceHistoryRoleFilter:
      title: Advanced filter
