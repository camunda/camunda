## Endpoint definitions

paths:
  /jobs/statistics/global:
    get:
      x-eventually-consistent: true
      tags:
        - Job
      operationId: getGlobalJobStatistics
      summary: Global job statistics
      description: |
        Returns global aggregated counts for jobs. Optionally filter by the creation time window and/or jobType.
      parameters:
        - name: from
          in: query
          required: true
          description: |
            Start of the time window to filter metrics. ISO 8601 date-time format.
          schema:
            type: string
            format: date-time
          example: "2024-07-28T15:51:28.071Z"
        - name: to
          in: query
          required: true
          description: |
            End of the time window to filter metrics. ISO 8601 date-time format.
          schema:
            type: string
            format: date-time
          example: "2024-07-29T15:51:28.071Z"
        - name: jobType
          in: query
          required: false
          description: Optional job type to limit the aggregation to a single job type.
          schema:
            type: string
          example: "fetch-customer-data"
      responses:
        "200":
          description: Global job metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalJobStatisticsQueryResult'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'

  /jobs/statistics/by-types:
    post:
      x-eventually-consistent: true
      tags:
        - Job
      operationId: getJobTypeStatistics
      summary: Get job statistics by type
      description: |
        Get statistics about jobs, grouped by job type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobTypeStatisticsQuery'
      responses:
        "200":
          description: The job type statistics result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobTypeStatisticsQueryResult'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'

  /jobs/statistics/by-workers:
    post:
      x-eventually-consistent: true
      tags:
        - Job
      operationId: getJobWorkerStatistics
      summary: Get job statistics by worker
      description: |
        Get statistics about jobs, grouped by worker, for a given job type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobWorkerStatisticsQuery'
      responses:
        "200":
          description: The job worker statistics result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobWorkerStatisticsQueryResult'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'

  /jobs/statistics/time-series:
    post:
      x-eventually-consistent: true
      tags:
        - Job
      operationId: getJobTimeSeriesStatistics
      summary: Get time-series metrics for a job type
      description: |
        Returns a list of time-bucketed metrics ordered ascending by time.
        The `from` and `to` fields select the time window of interest.
        Each item in the response corresponds to one time bucket of the requested resolution.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobTimeSeriesStatisticsQuery'
      responses:
        "200":
          description: The job time-series statistics result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobTimeSeriesStatisticsQueryResult'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'

  /jobs/statistics/errors:
    post:
      x-eventually-consistent: true
      tags:
        - Job
      operationId: getJobErrorStatistics
      summary: Get error metrics for a job type
      description: |
        Returns aggregated metrics per error for the given jobType.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobErrorStatisticsQuery'
      responses:
        "200":
          description: The job error statistics result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobErrorStatisticsQueryResult'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'

## Schema definitions

components:
  schemas:

    GlobalJobStatisticsQueryResult:
      description: Global job statistics query result.
      type: object
      required:
        - created
        - completed
        - failed
        - isIncomplete
      properties:
        created:
          $ref: '#/components/schemas/StatusMetric'
        completed:
          $ref: '#/components/schemas/StatusMetric'
        failed:
          $ref: '#/components/schemas/StatusMetric'
        isIncomplete:
          description: True if some data is missing because internal limits were reached and some metrics were not recorded.
          type: boolean
          example: false

    StatusMetric:
      description: Metric for a single job status.
      type: object
      required:
        - count
        - lastUpdatedAt
      properties:
        count:
          description: Number of jobs in this status.
          type: integer
          format: int64
          example: 145
        lastUpdatedAt:
          description: ISO 8601 timestamp of the last update for this status.
          nullable: true
          type: string
          format: date-time
          example: "2024-07-29T15:51:28.071Z"

    JobTypeStatisticsQuery:
      description: Job type statistics query.
      type: object
      properties:
        filter:
          $ref: '#/components/schemas/JobTypeStatisticsFilter'
        page:
          description: Search cursor pagination.
          allOf:
            - $ref: 'search-models.yaml#/components/schemas/CursorForwardPagination'

    JobTypeStatisticsFilter:
      description: Job type statistics search filter.
      type: object
      required:
        - from
        - to
      properties:
        from:
          description: |
            Start of the time window to filter metrics. ISO 8601 date-time format.
          type: string
          format: date-time
          example: "2024-07-28T15:51:28.071Z"
        to:
          description: |
            End of the time window to filter metrics. ISO 8601 date-time format.
          type: string
          format: date-time
          example: "2024-07-29T15:51:28.071Z"
        jobType:
          description: |
            Optional job type filter with advanced search capabilities.
            Supports exact match, pattern matching, and other operators.
          allOf:
            - $ref: 'filters.yaml#/components/schemas/StringFilterProperty'

    JobTypeStatisticsQueryResult:
      description: Job type statistics query result.
      type: object
      required:
        - items
        - page
      allOf:
        - $ref: "search-models.yaml#/components/schemas/SearchQueryResponse"
      properties:
        items:
          description: The list of job type statistics items.
          type: array
          items:
            $ref: '#/components/schemas/JobTypeStatisticsItem'

    JobTypeStatisticsItem:
      description: Statistics for a single job type.
      type: object
      required:
        - jobType
        - created
        - completed
        - failed
        - workers
      properties:
        jobType:
          description: The job type identifier.
          type: string
          example: "fetch-customer-data"
        created:
          $ref: '#/components/schemas/StatusMetric'
        completed:
          $ref: '#/components/schemas/StatusMetric'
        failed:
          $ref: '#/components/schemas/StatusMetric'
        workers:
          description: Number of distinct workers observed for this job type.
          type: integer
          format: int32
          example: 5

    JobWorkerStatisticsQuery:
      description: Job worker statistics query.
      type: object
      required:
        - filter
      properties:
        filter:
          $ref: '#/components/schemas/JobWorkerStatisticsFilter'
        page:
          description: Search cursor pagination.
          allOf:
            - $ref: 'search-models.yaml#/components/schemas/CursorForwardPagination'

    JobWorkerStatisticsFilter:
      description: Job worker statistics search filter.
      type: object
      required:
        - from
        - to
        - jobType
      properties:
        from:
          description: |
            Start of the time window to filter metrics. ISO 8601 date-time format.
          type: string
          format: date-time
          example: "2024-07-28T15:51:28.071Z"
        to:
          description: |
            End of the time window to filter metrics. ISO 8601 date-time format.
          type: string
          format: date-time
          example: "2024-07-29T15:51:28.071Z"
        jobType:
          description: Job type to return worker metrics for.
          type: string
          example: "fetch-customer-data"

    JobWorkerStatisticsQueryResult:
      description: Job worker statistics query result.
      type: object
      required:
        - items
        - page
      allOf:
        - $ref: "search-models.yaml#/components/schemas/SearchQueryResponse"
      properties:
        items:
          description: The list of per-worker statistics items.
          type: array
          items:
            $ref: '#/components/schemas/JobWorkerStatisticsItem'

    JobWorkerStatisticsItem:
      description: Statistics for a single worker within a job type.
      type: object
      required:
        - worker
        - created
        - completed
        - failed
      properties:
        worker:
          description: The name of the worker activating the jobs, mostly used for logging purposes.
          type: string
          example: "worker-1"
        created:
          $ref: '#/components/schemas/StatusMetric'
        completed:
          $ref: '#/components/schemas/StatusMetric'
        failed:
          $ref: '#/components/schemas/StatusMetric'

    JobTimeSeriesStatisticsQuery:
      description: Job time-series statistics query.
      type: object
      required:
        - filter
      properties:
        filter:
          $ref: '#/components/schemas/JobTimeSeriesStatisticsFilter'
        page:
          description: Search cursor pagination.
          allOf:
            - $ref: 'search-models.yaml#/components/schemas/CursorForwardPagination'

    JobTimeSeriesStatisticsFilter:
      description: Job time-series statistics search filter.
      type: object
      required:
        - from
        - to
        - jobType
      properties:
        from:
          description: |
            Start of the time window to filter metrics. ISO 8601 date-time format.
          type: string
          format: date-time
          example: "2024-07-28T15:51:28.071Z"
        to:
          description: |
            End of the time window to filter metrics. ISO 8601 date-time format.
          type: string
          format: date-time
          example: "2024-07-29T15:51:28.071Z"
        jobType:
          description: Job type to return time-series metrics for.
          type: string
          example: "fetch-customer-data"
        resolution:
          description: |
            Time bucket resolution as an ISO 8601 duration (for example `PT1M` for 1 minute,
            `PT1H` for 1 hour). If omitted, the server chooses a sensible default.
          type: string
          example: "PT1M"

    JobTimeSeriesStatisticsQueryResult:
      description: Job time-series statistics query result.
      type: object
      required:
        - items
        - page
      allOf:
        - $ref: "search-models.yaml#/components/schemas/SearchQueryResponse"
      properties:
        items:
          description: The list of time-bucketed statistics items, ordered ascending by time.
          type: array
          items:
            $ref: '#/components/schemas/JobTimeSeriesStatisticsItem'

    JobTimeSeriesStatisticsItem:
      description: Aggregated job metrics for a single time bucket.
      type: object
      required:
        - time
        - created
        - completed
        - failed
      properties:
        time:
          description: ISO 8601 timestamp representing the start of this time bucket.
          type: string
          format: date-time
          example: "2024-07-29T15:51:00.000Z"
        created:
          $ref: '#/components/schemas/StatusMetric'
        completed:
          $ref: '#/components/schemas/StatusMetric'
        failed:
          $ref: '#/components/schemas/StatusMetric'

    JobErrorStatisticsQuery:
      description: Job error statistics query.
      type: object
      required:
        - filter
      properties:
        filter:
          $ref: '#/components/schemas/JobErrorStatisticsFilter'
        page:
          description: Search cursor pagination.
          allOf:
            - $ref: 'search-models.yaml#/components/schemas/CursorForwardPagination'

    JobErrorStatisticsFilter:
      description: Job error statistics search filter.
      type: object
      required:
        - from
        - to
        - jobType
      properties:
        from:
          description: |
            Start of the time window to filter metrics. ISO 8601 date-time format.
          type: string
          format: date-time
          example: "2024-07-28T15:51:28.071Z"
        to:
          description: |
            End of the time window to filter metrics. ISO 8601 date-time format.
          type: string
          format: date-time
          example: "2024-07-29T15:51:28.071Z"
        jobType:
          description: Job type to return error metrics for.
          type: string
          example: "fetch-customer-data"
        errorCode:
          description: Optional error code filter with advanced search capabilities.
          allOf:
            - $ref: 'filters.yaml#/components/schemas/StringFilterProperty'
        errorMessage:
          description: Optional error message filter with advanced search capabilities.
          allOf:
            - $ref: 'filters.yaml#/components/schemas/StringFilterProperty'

    JobErrorStatisticsQueryResult:
      description: Job error statistics query result.
      type: object
      required:
        - items
        - page
      allOf:
        - $ref: "search-models.yaml#/components/schemas/SearchQueryResponse"
      properties:
        items:
          description: The list of per-error statistics items.
          type: array
          items:
            $ref: '#/components/schemas/JobErrorStatisticsItem'

    JobErrorStatisticsItem:
      description: Aggregated error metrics for a single error type and message combination.
      type: object
      required:
        - errorCode
        - errorMessage
        - workers
      properties:
        errorCode:
          description: The error code identifier.
          type: string
          example: "UNHANDLED_ERROR_EVENT"
        errorMessage:
          description: The error message.
          type: string
          example: "An unexpected error occurred."
        workers:
          description: Number of distinct workers that encountered this error.
          type: integer
          format: int32
          example: 15
