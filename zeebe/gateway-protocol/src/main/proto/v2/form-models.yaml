components:
  schemas:
    FormResult:
      type: object
      x-semantic-provider:
        - formId
        - formKey
      properties:
        tenantId:
          description: The tenant ID of the form.
          allOf:
            - $ref: "identifiers.yaml#/components/schemas/TenantId"
        formId:
          description: The user-provided identifier of the form.
          allOf:
            - $ref: "identifiers.yaml#/components/schemas/FormId"
        schema:
          description: >-
            The form content as a JSON string.
            Breaking change in 8.9: The type was changed from `object` to `string`. The form schema
            has always been serialized as a JSON string at runtime; this corrects the OpenAPI
            specification to match the actual behavior.
          type: string
        version:
          description: The version of the deployed form.
          type: integer
          format: int64
        formKey:
          allOf:
            - $ref: "keys.yaml#/components/schemas/FormKey"
          description: The assigned key, which acts as a unique identifier for this form.
