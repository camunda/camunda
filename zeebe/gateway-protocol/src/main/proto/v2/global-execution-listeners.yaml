## Endpoint definitions

paths:
  /global-execution-listeners:
    post:
      x-eventually-consistent: false
      tags:
        - Global listener
      operationId: createGlobalExecutionListener
      summary: Create global execution listener
      description: Create a new global execution listener.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGlobalExecutionListenerRequest'
        required: true
      responses:
        "201":
          description: The global execution listener was created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalExecutionListenerResult'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "409":
          description: A global execution listener with this id already exists.
          content:
            application/problem+json:
              schema:
                $ref: "problem-detail.yaml#/components/schemas/ProblemDetail"
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
        "503":
          $ref: 'common-responses.yaml#/components/responses/ServiceUnavailable'

  /global-execution-listeners/{id}:
    get:
      x-eventually-consistent: true
      tags:
        - Global listener
      operationId: getGlobalExecutionListener
      summary: Get global execution listener
      description: Get a global execution listener by its id.
      parameters:
        - name: id
          in: path
          required: true
          description: The id of the global execution listener.
          schema:
            $ref: 'identifiers.yaml#/components/schemas/GlobalListenerId'
      responses:
        "200":
          description: The global execution listener is successfully returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalExecutionListenerResult'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "404":
          description: The global execution listener with the given id was not found.
          content:
            application/problem+json:
              schema:
                $ref: "problem-detail.yaml#/components/schemas/ProblemDetail"
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'

    put:
      x-eventually-consistent: false
      tags:
        - Global listener
      operationId: updateGlobalExecutionListener
      summary: Update global execution listener
      description: Updates a global execution listener.
      parameters:
        - name: id
          in: path
          required: true
          description: The id of the global execution listener to update.
          schema:
            $ref: 'identifiers.yaml#/components/schemas/GlobalListenerId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGlobalExecutionListenerRequest'
        required: true
      responses:
        "200":
          description: The global execution listener was updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalExecutionListenerResult'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "404":
          description: The global execution listener was not found.
          content:
            application/problem+json:
              schema:
                $ref: "problem-detail.yaml#/components/schemas/ProblemDetail"
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
        "503":
          $ref: 'common-responses.yaml#/components/responses/ServiceUnavailable'

    delete:
      x-eventually-consistent: false
      tags:
        - Global listener
      operationId: deleteGlobalExecutionListener
      summary: Delete global execution listener
      description: Deletes a global execution listener.
      parameters:
        - name: id
          in: path
          required: true
          description: The id of the global execution listener to delete.
          schema:
            $ref: 'identifiers.yaml#/components/schemas/GlobalListenerId'
      responses:
        "204":
          description: The global execution listener was deleted successfully.
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "404":
          description: The global execution listener was not found.
          content:
            application/problem+json:
              schema:
                $ref: "problem-detail.yaml#/components/schemas/ProblemDetail"
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
        "503":
          $ref: 'common-responses.yaml#/components/responses/ServiceUnavailable'

  /global-execution-listeners/search:
    post:
      x-eventually-consistent: true
      tags:
        - Global listener
      operationId: searchGlobalExecutionListeners
      summary: Search global execution listeners
      description: Search for global execution listeners based on given criteria.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalExecutionListenerSearchQueryRequest'
      responses:
        "200":
          description: The global execution listener search result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalExecutionListenerSearchQueryResult'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'

## Schema definitions

components:
  schemas:
    # Enumerations
    GlobalExecutionListenerEventTypeEnum:
      type: string
      enum:
        - all
        - start
        - end
      description: The event type that triggers the execution listener.
    GlobalExecutionListenerElementTypeEnum:
      type: string
      enum:
        - serviceTask
        - userTask
        - sendTask
        - receiveTask
        - businessRuleTask
        - scriptTask
        - callActivity
        - subProcess
        - eventSubProcess
        - multiInstanceBody
        - exclusiveGateway
        - inclusiveGateway
        - parallelGateway
        - eventBasedGateway
        - startEvent
        - endEvent
        - intermediateThrowEvent
        - intermediateCatchEvent
        - boundaryEvent
        - all
      description: The BPMN element type that the listener is scoped to.
    GlobalExecutionListenerCategoryEnum:
      type: string
      enum:
        - tasks
        - gateways
        - events
        - containers
        - all
      description: The broad element type category that the listener is scoped to.

    # Common
    GlobalExecutionListenerBase:
      type: object
      allOf:
        - $ref: 'global-listeners.yaml#/components/schemas/GlobalListenerBase'
      properties:
        eventTypes:
          $ref: '#/components/schemas/GlobalExecutionListenerEventTypes'
        elementTypes:
          $ref: '#/components/schemas/GlobalExecutionListenerElementTypes'
        categories:
          $ref: '#/components/schemas/GlobalExecutionListenerCategories'
    GlobalExecutionListenerEventTypes:
      description: List of execution event types that trigger the listener.
      type: array
      items:
        $ref: '#/components/schemas/GlobalExecutionListenerEventTypeEnum'
    GlobalExecutionListenerElementTypes:
      description: List of BPMN element types the listener is scoped to. Combined with categories as union.
      type: array
      items:
        $ref: '#/components/schemas/GlobalExecutionListenerElementTypeEnum'
    GlobalExecutionListenerCategories:
      description: List of element categories the listener is scoped to. Combined with elementTypes as union.
      type: array
      items:
        $ref: '#/components/schemas/GlobalExecutionListenerCategoryEnum'

    # CRUD Requests
    CreateGlobalExecutionListenerRequest:
      type: object
      required:
        - id
        - type
        - eventTypes
      allOf:
        - $ref: '#/components/schemas/GlobalExecutionListenerBase'
      properties:
        id:
          $ref: 'identifiers.yaml#/components/schemas/GlobalListenerId'
    UpdateGlobalExecutionListenerRequest:
      type: object
      required:
        - type
        - eventTypes
      allOf:
        - $ref: '#/components/schemas/GlobalExecutionListenerBase'

    # CRUD Responses
    GlobalExecutionListenerResult:
      type: object
      required:
        - id
        - type
        - retries
        - eventTypes
        - afterNonGlobal
        - priority
        - source
      allOf:
        - $ref: '#/components/schemas/GlobalExecutionListenerBase'
      properties:
        id:
          $ref: 'identifiers.yaml#/components/schemas/GlobalListenerId'
        source:
          $ref: 'global-listeners.yaml#/components/schemas/GlobalListenerSourceEnum'

    # Search Requests
    GlobalExecutionListenerSearchQueryRequest:
      description: Global execution listener search query request.
      additionalProperties: false
      type: object
      allOf:
        - $ref: 'search-models.yaml#/components/schemas/SearchQueryRequest'
      properties:
        sort:
          description: Sort field criteria.
          type: array
          items:
            $ref: '#/components/schemas/GlobalExecutionListenerSearchQuerySortRequest'
        filter:
          description: The global execution listener search filters.
          allOf:
            - $ref: '#/components/schemas/GlobalExecutionListenerSearchQueryFilterRequest'
    GlobalExecutionListenerSearchQuerySortRequest:
      type: object
      properties:
        field:
          description: The field to sort by.
          type: string
          enum:
            - id
            - type
            - afterNonGlobal
            - priority
            - source
        order:
          $ref: 'search-models.yaml#/components/schemas/SortOrderEnum'
      required:
        - field
    GlobalExecutionListenerSearchQueryFilterRequest:
      description: Global execution listener filter request.
      type: object
      properties:
        id:
          description: Id of the global execution listener.
          allOf:
            - $ref: 'filters.yaml#/components/schemas/StringFilterProperty'
        type:
          description: Job type of the global execution listener.
          allOf:
            - $ref: 'filters.yaml#/components/schemas/StringFilterProperty'
        retries:
          description: Number of retries of the global execution listener.
          allOf:
            - $ref: 'filters.yaml#/components/schemas/IntegerFilterProperty'
        eventTypes:
          description: Event types of the global execution listener.
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/GlobalExecutionListenerEventTypeFilterProperty'
        afterNonGlobal:
          description: Whether the listener runs after model-level listeners.
          type: boolean
        priority:
          description: Priority of the global execution listener.
          allOf:
            - $ref: 'filters.yaml#/components/schemas/IntegerFilterProperty'
        source:
          description: How the global execution listener was defined.
          allOf:
            - $ref: 'global-listeners.yaml#/components/schemas/GlobalListenerSourceFilterProperty'
    GlobalExecutionListenerEventTypeFilterProperty:
      description: Global execution listener event type property with full advanced search capabilities.
      oneOf:
        - type: string
          title: Exact match
          description: Matches the value exactly.
          allOf:
            - $ref: '#/components/schemas/GlobalExecutionListenerEventTypeEnum'
        - $ref: '#/components/schemas/AdvancedGlobalExecutionListenerEventTypeFilter'
    AdvancedGlobalExecutionListenerEventTypeFilter:
      title: Advanced filter
      description: Advanced global execution listener event type filter.
      type: object
      properties:
        $eq:
          description: Checks for equality with the provided value.
          allOf:
            - $ref: '#/components/schemas/GlobalExecutionListenerEventTypeEnum'
        $neq:
          description: Checks for inequality with the provided value.
          allOf:
            - $ref: '#/components/schemas/GlobalExecutionListenerEventTypeEnum'
        $exists:
          description: Checks if the current property exists.
          type: boolean
        $in:
          description: Checks if the property matches any of the provided values.
          type: array
          items:
            $ref: '#/components/schemas/GlobalExecutionListenerEventTypeEnum'
        $like:
          $ref: "filters.yaml#/components/schemas/LikeFilter"

    # Search Responses
    GlobalExecutionListenerSearchQueryResult:
      description: Global execution listener search query response.
      type: object
      required:
        - items
      allOf:
        - $ref: 'search-models.yaml#/components/schemas/SearchQueryResponse'
      properties:
        items:
          description: The matching global execution listeners.
          type: array
          items:
            $ref: '#/components/schemas/GlobalExecutionListenerResult'
