## Endpoint definitions

paths:
  /expression/evaluation:
    post:
      operationId: evaluateExpression
      x-eventually-consistent: false
      tags:
        - Expression
      summary: Evaluate an expression
      description: |
        Evaluates a FEEL expression and returns the result. Supports references to tenant scoped
        cluster variables when a tenant ID is provided. Optionally, a `processInstanceKey` or
        `elementInstanceKey` may be provided to evaluate the expression in the variable scope of
        the given instance process or element instance variables. The two keys are mutually exclusive.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpressionEvaluationRequest'
      responses:
        '200':
          description: Expression evaluated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpressionEvaluationResult'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
      x-added-in-version: "8.9"

components:
  schemas:
    ExpressionEvaluationRequest:
      type: object
      required:
        - expression
      # processInstanceKey and elementInstanceKey are mutually exclusive: zero or one of them
      # may be set, but never both. Setting neither evaluates the expression unscoped (only
      # tenant-scoped cluster variables and request-body variables are visible).
      oneOf:
        - required:
            - processInstanceKey
        - required:
            - elementInstanceKey
        - not:
            anyOf:
              - required:
                  - processInstanceKey
              - required:
                  - elementInstanceKey
      properties:
        expression:
          type: string
          description: The expression to evaluate (e.g., "=x + y")
          example: "=x + y"
        tenantId:
          type: string
          description: Required when the expression references tenant-scoped cluster variables
          example: "tenant_123"
        processInstanceKey:
          allOf:
            - $ref: 'keys.yaml#/components/schemas/ProcessInstanceKey'
          description: |
            Key of the process instance whose variable scope should be made visible to the
            expression. Mutually exclusive with `elementInstanceKey`.
        elementInstanceKey:
          allOf:
            - $ref: 'keys.yaml#/components/schemas/ElementInstanceKey'
          description: |
            Key of the element instance whose variable scope should be made visible to the
            expression. Mutually exclusive with `processInstanceKey`.
        variables:
          type: object
          description: Optional variables for expression evaluation. These variables are only used for the current evaluation and do not persist beyond it.
          example:
            x: 10
            y: 20
          additionalProperties: true
          nullable: true
    ExpressionEvaluationResult:
      type: object
      required:
        - expression
        - result
        - warnings
      properties:
        expression:
          type: string
          description: The evaluated expression
          example: "=x + y"
        result:
          description: The result value. Its type can vary.
          # Omitting type for this field generates Object in Java, and signals Any to other consumers. It can be anything.
          example: 30
          nullable: true
        warnings:
          type: array
          description: List of warnings generated during expression evaluation
          items:
            $ref: '#/components/schemas/ExpressionEvaluationWarningItem'
          example: [ ]
    ExpressionEvaluationWarningItem:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: The warning message
          example: "No function found with name 'random' and 1 parameters"

