## Endpoint definitions

paths:
  /backups/runtime:
    post:
      x-eventually-consistent: false
      tags:
        - Backup
      operationId: takeRuntimeBackup
      x-required-permissions:
        - { resourceType: SYSTEM, permissionType: UPDATE }
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Take a runtime backup
      description: |
        Triggers a backup of runtime data on all partitions of the physical tenant.

        The `backupId` must be omitted if continuous backups and/or a backup or checkpoint
        schedule is enabled for the physical tenant, as the id is generated automatically.
        Otherwise, `backupId` is required.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TakeRuntimeBackupRequest'
      responses:
        "202":
          description: The backup has been successfully scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TakeRuntimeBackupResponse'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "409":
          description: A backup with the same or a higher id already exists.
          content:
            application/problem+json:
              schema:
                $ref: 'problem-detail.yaml#/components/schemas/ProblemDetail'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
        "503":
          $ref: 'common-responses.yaml#/components/responses/ServiceUnavailable'
        "504":
          description: The request from gateway to broker timed out.
          content:
            application/problem+json:
              schema:
                $ref: 'problem-detail.yaml#/components/schemas/ProblemDetail'
      x-added-in-version: "8.10"
    get:
      x-eventually-consistent: false
      tags:
        - Backup
      operationId: listRuntimeBackups
      x-required-permissions:
        - { resourceType: SYSTEM, permissionType: READ }
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: List runtime backups
      description: |
        Returns a list of all available runtime backups of the physical tenant, with their
        state and additional info, sorted in descending order of backupId.
      parameters:
        - name: prefix
          in: query
          required: false
          description: |
            A prefix that backup ids must match, ending in a single '*'. If omitted, all
            backups are returned.
          schema:
            $ref: '#/components/schemas/BackupIdPrefix'
      responses:
        "200":
          description: The list of runtime backups.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BackupInfo'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
        "503":
          $ref: 'common-responses.yaml#/components/responses/ServiceUnavailable'
      x-added-in-version: "8.10"

  /backups/runtime/state:
    get:
      x-eventually-consistent: false
      tags:
        - Backup
      operationId: getRuntimeBackupState
      x-required-permissions:
        - { resourceType: SYSTEM, permissionType: READ }
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Get runtime backup state
      description: |
        Returns the current checkpoint and backup state of every partition of the physical
        tenant. Unlike the `backupRuntime` actuator, this fails the whole request if the
        checkpoint state or the backup ranges cannot be retrieved from any partition, instead
        of silently returning an empty section.
      responses:
        "200":
          description: The runtime backup state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeBackupState'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
        "503":
          $ref: 'common-responses.yaml#/components/responses/ServiceUnavailable'
      x-added-in-version: "8.10"
    delete:
      x-eventually-consistent: false
      tags:
        - Backup
      operationId: deleteRuntimeBackupState
      x-required-permissions:
        - { resourceType: SYSTEM, permissionType: UPDATE }
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Delete runtime backup state
      description: |
        Resets the runtime backup state of every partition of the physical tenant, clearing
        all checkpoint info, backup info, checkpoint metadata, and backup ranges. Used when
        switching backup stores.
      responses:
        "204":
          description: The runtime backup state has been successfully reset.
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
        "503":
          $ref: 'common-responses.yaml#/components/responses/ServiceUnavailable'
      x-added-in-version: "8.10"

  /backups/runtime/state/sync:
    post:
      x-eventually-consistent: false
      tags:
        - Backup
      operationId: syncRuntimeBackupState
      x-required-permissions:
        - { resourceType: SYSTEM, permissionType: UPDATE }
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Force-write runtime backup state
      description: |
        Force-writes the checkpoint and backup metadata of every partition of the physical
        tenant to the backup store, independent of any backup being taken or confirmed, and
        returns the updated state.
      responses:
        "200":
          description: The updated runtime backup state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeBackupState'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
        "503":
          $ref: 'common-responses.yaml#/components/responses/ServiceUnavailable'
        "504":
          description: The request from gateway to broker timed out.
          content:
            application/problem+json:
              schema:
                $ref: 'problem-detail.yaml#/components/schemas/ProblemDetail'
      x-added-in-version: "8.10"

  /backups/runtime/{backupId}:
    get:
      x-eventually-consistent: false
      tags:
        - Backup
      operationId: getRuntimeBackup
      x-required-permissions:
        - { resourceType: SYSTEM, permissionType: READ }
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Get runtime backup
      description: Returns detailed status of the runtime backup with the given id.
      parameters:
        - name: backupId
          in: path
          required: true
          description: The id of the backup.
          schema:
            $ref: '#/components/schemas/BackupId'
      responses:
        "200":
          description: The runtime backup.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupInfo'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "404":
          description: A backup with the given id does not exist.
          content:
            application/problem+json:
              schema:
                $ref: 'problem-detail.yaml#/components/schemas/ProblemDetail'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
        "503":
          $ref: 'common-responses.yaml#/components/responses/ServiceUnavailable'
      x-added-in-version: "8.10"
    delete:
      x-eventually-consistent: false
      tags:
        - Backup
      operationId: deleteRuntimeBackup
      x-required-permissions:
        - { resourceType: SYSTEM, permissionType: UPDATE }
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Delete runtime backup
      description: Deletes the runtime backup with the given id.
      parameters:
        - name: backupId
          in: path
          required: true
          description: The id of the backup.
          schema:
            $ref: '#/components/schemas/BackupId'
      responses:
        "204":
          description: The backup has been successfully deleted.
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "403":
          $ref: 'common-responses.yaml#/components/responses/Forbidden'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
        "503":
          $ref: 'common-responses.yaml#/components/responses/ServiceUnavailable'
      x-added-in-version: "8.10"

components:
  schemas:
    BackupId:
      title: Backup ID
      description: |
        The id of the backup. Must be a positive numerical value. As backups are logically
        ordered by their ids (ascending), each successive backup must use a higher id than the
        previous one.
      type: integer
      format: int64
      example: 1
      minimum: 1

    BackupIdPrefix:
      title: Backup ID Prefix
      description: |
        A prefix of a backup id, followed by a single '*' as a wildcard, matching any backup id
        starting with the given prefix.
      type: string
      pattern: "^\\d*\\*$"
      example: "17567*"

    PartitionId:
      title: Partition ID
      description: The id of a partition. Always a positive number greater than or equal to 1.
      type: integer
      format: int32
      minimum: 1
      example: 3

    StateCode:
      title: Runtime Backup State
      description: The aggregated state of the backup, computed from the state of each partition.
      type: string
      enum:
        - DOES_NOT_EXIST
        - IN_PROGRESS
        - COMPLETED
        - FAILED
        - INCOMPLETE
        - DELETED
      example: IN_PROGRESS

    TakeRuntimeBackupRequest:
      title: TakeRuntimeBackupRequest
      description: Request body for taking a runtime backup.
      type: object
      properties:
        backupId:
          description: |
            The id of the backup to take. Must be omitted if continuous backups and/or a
            backup or checkpoint schedule is enabled for the physical tenant.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/BackupId'
      required:
        - backupId

    TakeRuntimeBackupResponse:
      title: TakeRuntimeBackupResponse
      description: Response body for taking a runtime backup.
      type: object
      properties:
        backupId:
          description: The id of the backup that has been scheduled.
          allOf:
            - $ref: '#/components/schemas/BackupId'
      required:
        - backupId

    BackupInfo:
      title: Backup Info
      description: |
        Detailed status of a runtime backup. The aggregated state is computed from the backup
        state of each partition as:
        - If the backup of all partitions is 'COMPLETED', the overall state is 'COMPLETED'.
        - If one partition is 'FAILED', the overall state is 'FAILED'.
        - Otherwise, if one partition is 'DOES_NOT_EXIST', the overall state is 'INCOMPLETE'.
        - Otherwise, if one partition is 'IN_PROGRESS', the overall state is 'IN_PROGRESS'.
      type: object
      properties:
        backupId:
          description: The id of the backup.
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/BackupId'
        state:
          description: The aggregated state of the backup.
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/StateCode'
        failureReason:
          description: Reason for failure if the state is 'FAILED'.
          type: string
          nullable: true
          example: ""
        details:
          readOnly: true
          description: |
            Detailed status of the backup per partition. Always contains every partition of
            the physical tenant.
          type: array
          items:
            $ref: '#/components/schemas/PartitionBackupInfo'
      required:
        - backupId
        - state
        - failureReason
        - details

    PartitionBackupInfo:
      title: Partition Backup Info
      description: Detailed info of the backup for a given partition.
      type: object
      properties:
        partitionId:
          description: The id of the partition.
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/PartitionId'
        state:
          description: The state of the backup on this partition.
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/StateCode'
        failureReason:
          description: Failure reason if the state is 'FAILED'.
          type: string
          nullable: true
          example: ""
        createdAt:
          description: The timestamp at which the backup was started on this partition.
          readOnly: true
          type: string
          format: date-time
          nullable: true
          example: "2022-09-15T13:10:38.176514094Z"
        lastUpdatedAt:
          description: |
            The timestamp at which the backup was last updated on this partition, e.g. changed
            state from 'IN_PROGRESS' to 'COMPLETED'.
          readOnly: true
          type: string
          format: date-time
          nullable: true
          example: "2022-09-15T13:10:38.176514094Z"
        snapshotId:
          description: The id of the snapshot which is included in this backup.
          type: string
          readOnly: true
          nullable: true
          example: "238632143-55-690906332-690905294"
        firstLogPosition:
          description: The first log position included in this backup.
          type: integer
          format: int64
          readOnly: true
          nullable: true
          example: 5
        checkpointPosition:
          description: The position of the checkpoint for this backup.
          type: integer
          format: int64
          readOnly: true
          nullable: true
          example: 10
        brokerId:
          description: The id of the broker from which the backup was taken for this partition.
          type: integer
          format: int32
          readOnly: true
          nullable: true
          example: 0
          minimum: 0
        brokerVersion:
          description: |
            The version of the broker from which the backup was taken for this partition.
          type: string
          readOnly: true
          nullable: true
          example: "8.10.0"
      required:
        - partitionId
        - state
        - failureReason
        - createdAt
        - lastUpdatedAt
        - snapshotId
        - firstLogPosition
        - checkpointPosition
        - brokerId
        - brokerVersion

    CheckpointType:
      title: Checkpoint Type
      description: The type of the checkpoint.
      type: string
      enum:
        - MARKER
        - SCHEDULED_BACKUP
        - MANUAL_BACKUP
      example: MARKER

    BackupType:
      title: Backup Type
      description: The type of the backup.
      type: string
      enum:
        - MANUAL_BACKUP
        - SCHEDULED_BACKUP
      example: SCHEDULED_BACKUP

    CheckpointId:
      title: Checkpoint ID
      description: |
        The id of the checkpoint. Must be a positive numerical value. As checkpoints are
        logically ordered by their ids (ascending), each successive checkpoint must use a
        higher id than the previous one.
      type: integer
      format: int64
      example: 1
      minimum: 0

    PartitionCheckpointState:
      title: Partition Checkpoint State
      description: Detailed information about the checkpoint state for a given partition.
      type: object
      properties:
        checkpointId:
          description: The id of the checkpoint.
          allOf:
            - $ref: '#/components/schemas/CheckpointId'
        checkpointType:
          description: The type of the checkpoint.
          allOf:
            - $ref: '#/components/schemas/CheckpointType'
        partitionId:
          description: The id of the partition.
          allOf:
            - $ref: '#/components/schemas/PartitionId'
        checkpointPosition:
          description: The log position of the checkpoint.
          type: integer
          format: int64
          example: 1500
        checkpointTimestamp:
          description: The timestamp at which the checkpoint was created.
          type: string
          format: date-time
          example: "2020-01-01T00:00:00Z"
      required:
        - checkpointId
        - checkpointType
        - partitionId
        - checkpointPosition
        - checkpointTimestamp

    PartitionBackupState:
      title: Partition Backup State
      description: Detailed information about the backup state for a given partition.
      type: object
      properties:
        checkpointId:
          description: The id of the checkpoint this backup is based on.
          allOf:
            - $ref: '#/components/schemas/CheckpointId'
        checkpointType:
          description: The type of the backup.
          allOf:
            - $ref: '#/components/schemas/BackupType'
        partitionId:
          description: |
            The id of the partition. Omitted when nested inside a backup range's `start`/`end`,
            where the partition is already identified by the enclosing range.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PartitionId'
        checkpointPosition:
          description: The log position of the checkpoint this backup is based on.
          type: integer
          format: int64
          example: 1500
        firstLogPosition:
          description: The first log position included in this backup.
          type: integer
          format: int64
          example: 5
        checkpointTimestamp:
          description: The timestamp at which the checkpoint was created.
          type: string
          format: date-time
          example: "2020-01-01T00:00:00Z"
      required:
        - checkpointId
        - checkpointType
        - partitionId
        - checkpointPosition
        - firstLogPosition
        - checkpointTimestamp

    PartitionBackupRange:
      title: Partition Backup Range
      description: Information about one backup range for a partition.
      type: object
      properties:
        partitionId:
          description: The id of the partition.
          allOf:
            - $ref: '#/components/schemas/PartitionId'
        start:
          description: The oldest backup in the range.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PartitionBackupState'
        end:
          description: The newest backup in the range.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PartitionBackupState'
      required:
        - partitionId
        - start
        - end

    RuntimeBackupState:
      title: Runtime Backup State
      description: Information about the checkpoint and backup state of the physical tenant.
      type: object
      properties:
        checkpointStates:
          type: array
          description: List of partition checkpoint states.
          items:
            $ref: '#/components/schemas/PartitionCheckpointState'
        backupStates:
          type: array
          description: List of partition backup states.
          items:
            $ref: '#/components/schemas/PartitionBackupState'
        ranges:
          type: array
          description: List of partition backup ranges.
          items:
            $ref: '#/components/schemas/PartitionBackupRange'
      required:
        - checkpointStates
        - backupStates
        - ranges
