# Endpoint definitions

paths:
  /topology:
    get:
      x-eventually-consistent: false
      tags:
        - Cluster
      operationId: getTopology
      x-required-permissions: []
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Get cluster topology
      description: Obtains the current topology of the cluster the gateway is part of.
      responses:
        "200":
          description: Obtains the current topology of the cluster the gateway is part of.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopologyResponse'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "500":
            $ref: 'common-responses.yaml#/components/responses/InternalServerError'
      x-added-in-version: "8.5"

  /status:
    get:
      x-eventually-consistent: false
      tags:
        - Cluster
      operationId: getStatus
      x-required-permissions: []
      # Public health-check endpoint — declared unauthenticated at runtime
      # via SecurityPathAdapter. `security: []` overrides the conditional
      # enforcement on the global schemes for this operation.
      security: []
      summary: Get cluster status
      description: Checks the health status of the cluster by verifying if there's at least one partition with a healthy leader.
      responses:
        "204":
          description: The cluster is UP and has at least one partition with a healthy leader.
        "503":
          description: The cluster is DOWN and does not have any partition with a healthy leader.
      x-added-in-version: "8.8"

  /mode:
    patch:
      x-eventually-consistent: false
      tags:
        - Recovery
      operationId: changeClusterMode
      x-required-permissions: []
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Change cluster mode
      description: >-
        Transitions the cluster between processing and recovery mode. This is a non-blocking
        operation: the request is acknowledged once the change has been accepted, before the
        transition itself has completed. Entering recovery mode deactivates all partitions so
        that only a restricted set of read-only operations remains available; exiting recovery
        mode returns the cluster to normal processing. Returns the planned cluster change so its
        progress can be monitored via the topology.
      parameters:
        - name: mode
          in: query
          required: true
          description: The target cluster mode.
          schema:
            type: string
            enum:
              - PROCESSING
              - RECOVERING
        - name: dryRun
          in: query
          required: false
          description: >-
            If true, the requested change is only validated and the resulting plan is returned,
            without applying it to the cluster.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: The mode change request was accepted; returns the planned cluster changes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterModeChangeResponse'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
      x-added-in-version: "8.10"

  /restore:
    post:
      x-eventually-consistent: false
      tags:
        - Recovery
      operationId: restore
      x-required-permissions: []
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Restore from a backup
      description: >-
        Restores the cluster from a backup. The restore is described either by a single backup ID
        or by a time range (`from`/`to`) that selects the backups to restore. This endpoint is only
        accessible while the cluster is in recovery mode; requests are rejected otherwise. The
        request is validated and acknowledged, but the restore itself is performed asynchronously.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreRequest'
        required: true
      responses:
        "202":
          description: The restore request was accepted; returns the planned cluster changes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterModeChangeResponse'
        "400":
          $ref: 'common-responses.yaml#/components/responses/InvalidData'
        "401":
          $ref: 'common-responses.yaml#/components/responses/Unauthorized'
        "409":
          description: The cluster is not in recovery mode, so the restore cannot be accepted.
        "500":
          $ref: 'common-responses.yaml#/components/responses/InternalServerError'
      x-added-in-version: "8.10"

## Schema definitions

components:
  schemas:
    TopologyResponse:
      description: The response of a topology request.
      type: object
      required:
        - brokers
        - clusterSize
        - partitionsCount
        - replicationFactor
        - gatewayVersion
        - lastCompletedChangeId
        - clusterId
      properties:
        brokers:
          description: A list of brokers that are part of this cluster.
          type: array
          items:
            $ref: '#/components/schemas/BrokerInfo'
        clusterId:
          description: The cluster Id.
          type: string
          nullable: true
        clusterSize:
          description: The number of brokers in the cluster.
          type: integer
          format: int32
          example: 3
        partitionsCount:
          description: The number of partitions are spread across the cluster.
          type: integer
          format: int32
          example: 3
        replicationFactor:
          description: The configured replication factor for this cluster.
          type: integer
          format: int32
          example: 3
        gatewayVersion:
          description: The version of the Zeebe Gateway.
          type: string
          example: 8.8.0
        lastCompletedChangeId:
          description: ID of the last completed change
          type: string
          example: "-1"
      x-properties-added-in-version:
        - propertyName: brokers
          addedInVersion: "8.6"
        - propertyName: clusterId
          addedInVersion: "8.9"
        - propertyName: clusterSize
          addedInVersion: "8.6"
        - propertyName: partitionsCount
          addedInVersion: "8.6"
        - propertyName: replicationFactor
          addedInVersion: "8.6"
        - propertyName: gatewayVersion
          addedInVersion: "8.6"
        - propertyName: lastCompletedChangeId
          addedInVersion: "8.8"

    BrokerInfo:
      description: Provides information on a broker node.
      type: object
      required:
        - nodeId
        - host
        - port
        - partitions
        - version
      properties:
        nodeId:
          description: The unique (within a cluster) node ID for the broker.
          type: integer
          format: int32
          example: 0
        host:
          description: The hostname for reaching the broker.
          type: string
          example: zeebe-0.zeebe-broker-service.b7fd7aa3-b973-4128-8789-74cd2318992c-zeebe.svc.cluster.local
        port:
          description: The port for reaching the broker.
          type: integer
          format: int32
          example: 26501
        partitions:
          description: A list of partitions managed or replicated on this broker.
          type: array
          items:
            $ref: '#/components/schemas/Partition'
        version:
          description: The broker version.
          type: string
          example: 8.8.0

    Partition:
      description: Provides information on a partition within a broker node.
      type: object
      required:
        - partitionId
        - role
        - health
        - state
      properties:
        partitionId:
          description: The unique ID of this partition.
          type: integer
          format: int32
          example: 1
        role:
          description: Describes the Raft role of the broker for a given partition.
          type: string
          example: leader
          enum:
            - leader
            - follower
            - inactive
        health:
          description: Describes the current health of the partition.
          type: string
          example: healthy
          enum:
            - healthy
            - unhealthy
            - dead
        state:
          description: >
            Describes the current operational state of the partition within the cluster
            configuration.
          type: string
          example: active
          enum:
            - unknown
            - joining
            - active
            - leaving
            - recovering
      x-properties-added-in-version:
        - propertyName: state
          addedInVersion: "8.10"

    ClusterModeChangeResponse:
      description: The planned changes resulting from a cluster mode transition request.
      type: object
      required:
        - changeId
        - plannedChanges
      properties:
        changeId:
          description: The ID of the cluster change that was triggered by the request.
          type: string
          example: "7"
        plannedChanges:
          description: The ordered list of operations that will be applied to complete the change.
          type: array
          items:
            $ref: '#/components/schemas/ClusterModeChangeOperation'

    ClusterModeChangeOperation:
      description: A single operation that is part of a cluster mode change.
      type: object
      required:
        - operation
        - mode
      properties:
        operation:
          description: The type of the operation.
          type: string
          example: ModeChangeOperation
        mode:
          description: The target mode of the operation, if applicable.
          type: string
          nullable: true
          example: RECOVERING

    RestoreRequest:
      description: >-
        Describes a restore request. Provide either a list of backup IDs or a time range
        (`from`/`to`) that selects the backups to restore; the two are mutually exclusive.
      type: object
      properties:
        from:
          description: The start of the time range to restore from, as an ISO 8601 timestamp.
          type: string
          format: date-time
          nullable: true
          example: "2024-01-01T10:00:00Z"
        to:
          description: The end of the time range to restore from, as an ISO 8601 timestamp.
          type: string
          format: date-time
          nullable: true
          example: "2024-01-01T12:00:00Z"
        backupIds:
          description: The IDs of the backups to restore from, one per partition.
          type: array
          nullable: true
          items:
            type: integer
            format: int64
          example: [100, 101]
