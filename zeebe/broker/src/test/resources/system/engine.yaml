zeebe:
  broker:
    experimental:
      engine:
        messages:
          ttlCheckerBatchLimit: 1000
          ttlCheckerInterval: 15s
        caches:
          drgCacheCapacity: 2000
          formCacheCapacity: 2000
          processCacheCapacity: 2000
          groupNameCacheCapacity: 2000
          candidateGroupNameResolution: false
        jobs:
          timeoutCheckerPollingInterval: 15s
          timeoutCheckerBatchLimit: 1000
        jobMetrics:
          exportInterval: 10m
          enabled: false
          maxWorkerNameLength: 50
          maxJobTypeLength: 75
          maxTenantIdLength: 20
          maxUniqueKeys: 5000
        validators:
          maxIdFieldLength: 255
          maxNameFieldLength: 256
          resultsOutputMaxSize: 2000
        distribution:
          redistributionInterval: 60s
          maxBackoffDuration: 20m
        maxProcessDepth: 2000
        globalListeners:
          userTask:
            - type: test1
              eventTypes:
                - creating
                - canceling
              retries: 5
            - type: test2
              eventTypes:
                - assigning
                - canceling
              retries: 2
              afterNonGlobal: true
        expression:
          timeout: 2s
        processInstanceCreation:
          businessIdUniquenessEnabled: true
        startup:
          rpaReexportMigrationEnabled: false
        layeredState:
          enabled: true
          persistInterval: 5s
          maxBytesPerStore: 32MB
          maxBufferedBytes: 8MB
          ladderStartFraction: 0.6
          ladderFlatOutFraction: 0.8
          absorbDeletes: false
          pipelineSegmentLimit: 8
          persistMinSliceBytes: 2MB
          persistPacingTargetFraction: 0.5
