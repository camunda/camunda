global:
  secrets:
    autoGenerated: true
    name: camunda-credentials
  # Identity authentication is enabled for Optimize
  identity:
    auth:
      enabled: true
      publicIssuerUrl: "http://pg-optimize-latency-load-test-keycloak/auth/realms/camunda-platform"
      optimize:
        clientId: optimize
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: identity-optimize-client-token
        redirectUrl: "http://pg-optimize-latency-load-test:80"

identity:
  enabled: true

optimize:
  enabled: true

identityKeycloak:
  enabled: true
