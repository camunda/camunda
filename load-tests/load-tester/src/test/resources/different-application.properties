load-tester.monitor-data-availability=false
load-tester.monitor-data-availability-interval=50ms
load-tester.perform-read-benchmarks=true
load-tester.disabled-queries=process_instances_active,audit_log_by_category

load-tester.starter.rate=30.5
load-tester.starter.rate-duration=5m
load-tester.starter.bpmn-xml-path=bpmn/realistic/bankCustomerComplaintDisputeHandling.bpmn
