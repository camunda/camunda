# Integration test configuration - overrides application.yaml to enable the Camunda client
camunda:
  client:
    mode: selfManaged
    auth:
      method: none
    zeebe:
      enabled: true
      # Switch ITs to REST. The REST API added new fields (e.g. tenantFilter)
      # but the camunda-process-test-java image is now refreshed periodically (12h)
      # to keep up with backend changes.
      prefer-rest-over-grpc: true
      defaults:
        type: benchmark-task
