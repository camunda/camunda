# Camunda Load Tester - Spring Boot Configuration
# Override any property via environment variables, e.g.:
#   CAMUNDA_CLIENT_GRPC_ADDRESS=http://zeebe:26500
#   LOAD_TESTER_STARTER_RATE=500

server:
  port: 9600

# Logging configuration
logging:
  level:
    root: ${LOG_LEVEL:WARN}
    io.camunda.client.job.poller: ERROR
    # Apache HC5 (used by CamundaClient's REST transport) logs every 503 retry
    # at INFO, flooding starter/worker pod logs under benchmark load when
    # LOG_LEVEL=INFO. Pin this package to WARN; override with
    # LOGGING_LEVEL_ORG_APACHE_HC_CLIENT5_HTTP_IMPL_ASYNC=INFO to debug retries.
    org.apache.hc.client5.http.impl.async: WARN

management:
  server:
    port: ${server.port}
  endpoints:
    web:
      # Match the old HOCON app's paths so Prometheus ServiceMonitors
      # (and Grafana dashboards) that scrape `/metrics` keep working
      # without a Helm chart change. Without this, metrics are at
      # /actuator/prometheus and the Helm-managed scraper gets an empty
      # response, so worker/starter panels show no data.
      base-path: /
      path-mapping:
        prometheus: metrics
      exposure:
        include: health,prometheus

# Camunda client configuration (auto-configured by camunda-spring-boot-starter)
camunda:
  client:
    mode: self-managed
    grpc-address: ${ZEEBE_GRPC_ADDRESS:http://localhost:26500}
    rest-address: ${ZEEBE_REST_ADDRESS:http://localhost:8080}
    prefer-rest-over-grpc: true
    # Randomize DNS resolution + short connection TTL so pooled connections are
    # regularly re-resolved and requests fan out across all gateway pod IPs.
    # Requires the deployment to target a headless service (see load-test-values.yaml).
    use-client-side-load-balancing: true
    # Since the starter doesn't need any job worker execution threads
    execution-threads: 0
    max-http-connections: 105 # more than process-starter-concurrency to allow for monitoring availability calls
    auth:
      method: ${ZEEBE_AUTH_METHOD:none}
      username: ${ZEEBE_AUTH_USERNAME:demo}
      password: ${ZEEBE_AUTH_PASSWORD:demo}
      client-id: ${ZEEBE_CLIENT_ID:orchestration}
      client-secret: ${ZEEBE_CLIENT_SECRET:demo}
      audience: ${ZEEBE_TOKEN_AUDIENCE:orchestration-api}
      token-url: ${ZEEBE_AUTHORIZATION_SERVER_URL:http://localhost:18080/auth/realms/camunda-platform/protocol/openid-connect/token}
    worker:
      defaults:
        # Bridge LOAD_TESTER_WORKER_* env vars from the Helm chart so that
        # @JobWorker picks up the correct values per deployment.
        name: ${LOAD_TESTER_WORKER_WORKER_NAME:benchmark-worker}
        type: ${LOAD_TESTER_WORKER_JOB_TYPE:benchmark-task}
        stream-enabled: true
        max-jobs-active: ${LOAD_TESTER_WORKER_CAPACITY:30}
        poll-interval: ${LOAD_TESTER_WORKER_POLLING_DELAY:1s}
        # Default: completionDelay(300ms) * 6 = 1800ms. The old HOCON app computed
        # this dynamically; here it's static. Update if completionDelay changes.
        timeout: 1800ms

# Load tester specific configuration
# These are application-level properties consumed by Starter.java and Worker.java.
# They are distinct from camunda.client.worker.defaults.* (above) which control the
# framework-level job activation (type, capacity, polling, streaming, timeout).
load-tester:
  monitor-data-availability: ${LOAD_TESTER_MONITOR_DATA_AVAILABILITY:true}
  monitor-data-availability-interval: 250ms
  perform-read-benchmarks: ${LOAD_TESTER_PERFORM_READ_BENCHMARKS:false}
  disabled-queries: ${ZEEBE_DISABLED_QUERIES:}
  starter:
    process-id: ${LOAD_TESTER_STARTER_PROCESS_ID:benchmark}
    rate: ${LOAD_TESTER_STARTER_RATE:300}
    rate-duration: ${LOAD_TESTER_STARTER_RATE_DURATION:1s}
    threads: ${LOAD_TESTER_STARTER_THREADS:2}
    bpmn-xml-path: ${LOAD_TESTER_STARTER_BPMN_XML_PATH:bpmn/one_task.bpmn}
    # Extra BPMN models: set via indexed env vars, e.g.
    # LOAD_TESTER_STARTER_EXTRA_BPMN_MODELS_0_=bpmn/realistic/refundingProcess.bpmn
    extra-bpmn-models: []
    business-key: ${LOAD_TESTER_STARTER_BUSINESS_KEY:businessKey}
    payload-path: ${LOAD_TESTER_STARTER_PAYLOAD_PATH:bpmn/big_payload.json}
    with-results: false
    with-results-timeout: 60s
    duration-limit: ${LOAD_TESTER_STARTER_DURATION_LIMIT:0}
    msg-name: msg
    start-via-message: false
    process-starter-concurrency: 100 # less than the number of http connections to avoid saturating the pool and causing timeouts
  # Worker-specific properties consumed by Worker.java.
  # These control what the job handler does (completion delay, message publishing, payload).
  # Connection properties (type, name, threads, capacity, polling, streaming, timeout)
  # are configured via camunda.client.worker.defaults.* above.
  worker:
    completion-delay: ${LOAD_TESTER_WORKER_COMPLETION_DELAY:300ms}
    payload-path: ${LOAD_TESTER_WORKER_PAYLOAD_PATH:bpmn/big_payload.json}
    send-message: ${LOAD_TESTER_WORKER_SEND_MESSAGE:false}
    message-name: ${LOAD_TESTER_WORKER_MESSAGE_NAME:messageName}
    correlation-key-variable-name: ${LOAD_TESTER_WORKER_CORRELATION_KEY_VARIABLE_NAME:correlationKey-var}

# Worker-profile override: worker pods actually handle jobs, so they need a real
# thread pool. Matches the old HOCON app.worker.threads=10 default.
---
spring.config.activate.on-profile: worker
camunda:
  client:
    execution-threads: ${LOAD_TESTER_WORKER_THREADS:10}
