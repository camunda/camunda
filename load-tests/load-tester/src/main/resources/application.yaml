# Camunda Load Tester - Spring Boot Configuration
# Override any property via environment variables, e.g.:
#   CAMUNDA_CLIENT_GRPC_ADDRESS=http://zeebe:26500
#   LOAD_TESTER_STARTER_RATE=500

server:
  port: 9600

management:
  server:
    port: ${server.port}
  endpoints:
    web:
      exposure:
        include: health,prometheus

