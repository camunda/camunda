# Camunda Load Tester - Spring Boot configuration.
# Override any property via environment variables, e.g. CAMUNDA_CLIENT_ZEEBE_GRPC_ADDRESS,
# LOAD_TESTER_STARTER_RATE, etc.

server:
  port: 9600

logging:
  level:
    root: ${LOG_LEVEL:WARN}
    # HC5 logs every 503 retry at INFO and floods pod logs under benchmark load.
    org.apache.hc.client5.http.impl.async: WARN

management:
  server:
    port: ${server.port}
  endpoints:
    web:
      # Map /metrics to Prometheus output so Helm-managed ServiceMonitors keep working.
      base-path: /
      path-mapping:
        prometheus: metrics
      exposure:
        include: health,prometheus

camunda:
  client:
    mode: selfManaged
    auth:
      client-id: ${ZEEBE_CLIENT_ID:zeebe}
      client-secret: ${ZEEBE_CLIENT_SECRET:demo}
      token-url: ${ZEEBE_AUTHORIZATION_SERVER_URL:http://localhost:18080/auth/realms/camunda-platform/protocol/openid-connect/token}
    zeebe:
      audience: ${ZEEBE_TOKEN_AUDIENCE:zeebe-api}
      grpc-address: ${ZEEBE_GRPC_ADDRESS:http://localhost:26500}
      rest-address: ${ZEEBE_REST_ADDRESS:http://localhost:8080}
      prefer-rest-over-grpc: false
      # 0 in starter profile (no job workers); the worker profile below overrides to 10.
      execution-threads: 0
      defaults:
        name: ${LOAD_TESTER_WORKER_WORKER_NAME:benchmark-worker}
        type: ${LOAD_TESTER_WORKER_JOB_TYPE:benchmark-task}
        stream-enabled: true
        max-jobs-active: ${LOAD_TESTER_WORKER_CAPACITY:30}
        poll-interval: ${LOAD_TESTER_WORKER_POLLING_DELAY:1s}
        timeout: 1800ms

# Load-tester application properties (consumed by Starter.java / Worker.java).
load-tester:
  starter:
    process-id: ${LOAD_TESTER_STARTER_PROCESS_ID:benchmark}
    rate: ${LOAD_TESTER_STARTER_RATE:300}
    rate-duration: ${LOAD_TESTER_STARTER_RATE_DURATION:1s}
    threads: ${LOAD_TESTER_STARTER_THREADS:2}
    bpmn-xml-path: ${LOAD_TESTER_STARTER_BPMN_XML_PATH:bpmn/one_task.bpmn}
    # Extra BPMN models: set via indexed env vars, e.g.
    # LOAD_TESTER_STARTER_EXTRA_BPMN_MODELS_0_=bpmn/realistic/refundingProcess.bpmn
    extra-bpmn-models: []
    business-key: ${LOAD_TESTER_STARTER_BUSINESS_KEY:businessKey}
    payload-path: ${LOAD_TESTER_STARTER_PAYLOAD_PATH:bpmn/big_payload.json}
    with-results: false
    with-results-timeout: 60s
    duration-limit: ${LOAD_TESTER_STARTER_DURATION_LIMIT:0}
    msg-name: msg
    start-via-message: false
  worker:
    completion-delay: ${LOAD_TESTER_WORKER_COMPLETION_DELAY:300ms}
    payload-path: ${LOAD_TESTER_WORKER_PAYLOAD_PATH:bpmn/big_payload.json}
    send-message: ${LOAD_TESTER_WORKER_SEND_MESSAGE:false}
    message-name: ${LOAD_TESTER_WORKER_MESSAGE_NAME:messageName}
    correlation-key-variable-name: ${LOAD_TESTER_WORKER_CORRELATION_KEY_VARIABLE_NAME:correlationKey-var}

# Worker-profile override: worker pods actually handle jobs, so they need a real
# thread pool. Matches the old HOCON app.worker.threads=10 default.
---
spring.config.activate.on-profile: worker
camunda:
  client:
    zeebe:
      execution-threads: ${LOAD_TESTER_WORKER_THREADS:10}
