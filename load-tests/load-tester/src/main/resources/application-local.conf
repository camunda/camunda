include "application"   # inherit all defaults

app {
  brokerUrl     = "http://localhost:26500"
  brokerRestUrl = "http://localhost:8080"
  tls = false

  # Each process binds a Prometheus metrics port — must be unique per process.
  # Port 9600 is taken by the Zeebe orchestration container (docker-compose).
  # Override with MONITORING_PORT env var (see run-local.sh).
  monitoringPort = 19600
  monitoringPort = ${?MONITORING_PORT}

  auth {
    type = "OAUTH"
    oauth {
      clientId     = "orchestration"
      clientSecret = "secret"
      audience     = "orchestration-api"
      authzUrl     = "http://localhost:18080/auth/realms/camunda-platform/protocol/openid-connect/token"
    }
  }

  starter {
    processId       = "bankDisputeHandling"
    bpmnXmlPath     = "bpmn/realistic/bankCustomerComplaintDisputeHandling.bpmn"
    extraBpmnModels = ["bpmn/realistic/refundingProcess.bpmn"]
    payloadPath     = "bpmn/realistic/realisticPayload.json"
    rate            = 1     # instances/sec — safe for local; increase for load test
    threads         = 1
    durationLimit   = 0     # 0 = run until stopped
  }

  worker {
    threads         = 2
    capacity        = 10
    completionDelay = 100ms
    streamEnabled   = true
    jobType         = ${?ZEEBE_WORKER_JOB_TYPE}    # required: set via env var
    workerName      = ${?ZEEBE_WORKER_NAME}         # optional: defaults to benchmark-worker
  }
}
