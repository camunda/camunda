app {
  brokerUrl = "http://localhost:26500"
  brokerUrl = ${?ZEEBE_GRPC_ADDRESS}
  brokerRestUrl = "http://localhost:8080"
  brokerRestUrl = ${?ZEEBE_REST_ADDRESS}
  tls = false
  tls = ${?TLS}
  preferRest = false
  monitoringPort = 9600
  monitorDataAvailability = true
  monitorDataAvailabilityInterval = 250ms
  performReadBenchmarks = false
  disabledQueries = ""
  disabledQueries = ${?ZEEBE_DISABLED_QUERIES}
  enableOptimizeReportMetric = false
  enableOptimizeReportMetric = ${?ENABLE_OPTIMIZE_REPORT_METRIC}

  auth {
    type = "NONE" # NONE, BASIC
    type = ${?ZEEBE_AUTH_TYPE}
    basic {
      username = "demo"
      password = "demo"
    }

    oauth {
      audience = "orchestration-api"
      audience = ${?ZEEBE_TOKEN_AUDIENCE}
      clientId = "orchestration"
      clientId = ${?ZEEBE_CLIENT_ID}
      clientSecret = ""
      clientSecret = ${?ZEEBE_CLIENT_SECRET}
      authzUrl = "http://localhost:8080/auth/realms/camunda-platform/protocol/openid-connect/token"
      authzUrl = ${?ZEEBE_AUTHORIZATION_SERVER_URL}
    }
  }

  starter {
    processId = "benchmark"
    rate = 300
    rateDuration = 1s
    threads = 2
    bpmnXmlPath = "bpmn/one_task.bpmn"
    extraBpmnModels = []
    businessKey = "businessKey"
    payloadPath = "bpmn/big_payload.json"
    withResults = false
    withResultsTimeout = 60s
    durationLimit = 0
    msgName = "msg"
    startViaMessage = false
  }

  worker {
    jobType = "benchmark-task"
    workerName = "benchmark-worker"
    threads = 10
    capacity = 30
    pollingDelay = 1s
    completionDelay = 300ms
    payloadPath = "bpmn/big_payload.json"
    streamEnabled = true
    # if 0, timeout defaults to completionDelay * 6
    timeout = 0
    # timeout = 1800ms
    sendMessage = false
    messageName = "messageName"
    correlationKeyVariableName = "correlationKey-var"
  }

  optimize {
    baseUrl = "http://localhost:8083"
    baseUrl = ${?OPTIMIZE_BASE_URL}
    keycloakUrl = "http://localhost:18080"
    keycloakUrl = ${?OPTIMIZE_KEYCLOAK_URL}
    realm = "camunda-platform"
    realm = ${?OPTIMIZE_REALM}
    clientId = "optimize"
    clientId = ${?OPTIMIZE_CLIENT_ID}
    clientSecret = "demo-optimize-secret"
    clientSecret = ${?OPTIMIZE_CLIENT_SECRET}
    username = "demo"
    username = ${?OPTIMIZE_USERNAME}
    password = "demo"
    password = ${?OPTIMIZE_PASSWORD}
    processDefinitionKey = ""
    processDefinitionKey = ${?OPTIMIZE_PROCESS_DEFINITION_KEY}
    # Evaluation interval in seconds (default: 60 seconds = 1 minute)
    evaluationIntervalSeconds = 60
    evaluationIntervalSeconds = ${?OPTIMIZE_EVALUATION_INTERVAL_SECONDS}
    # Retry configuration for Keycloak authentication
    authRetryMaxAttempts = 30
    authRetryMaxAttempts = ${?OPTIMIZE_AUTH_RETRY_MAX_ATTEMPTS}
    authRetryDelaySeconds = 10
    authRetryDelaySeconds = ${?OPTIMIZE_AUTH_RETRY_DELAY_SECONDS}
    # Enable JWT bearer token auth (direct password grant) instead of cookie-based auth code flow
    jwtAuthEnabled = true
    jwtAuthEnabled = ${?OPTIMIZE_JWT_AUTH_ENABLED}
  }
}
