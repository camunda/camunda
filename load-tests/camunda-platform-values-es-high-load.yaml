# Elasticsearch tuning overlay for high-throughput load tests (500–1000 PI/s).
# Apply on top of camunda-platform-values.yaml via the stress-500/750/1000 scenarios.
#
# Node sizing: ES pods run on n2-standard-8 (8 vCPU, 32 GB RAM) as set by the
# nodeSelector in camunda-platform-values.yaml. Values here stay within that envelope.
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  Rate    heapSize   CPU       Memory   Notes                            │
# │  500/s   6g         7000m     20Gi     these values                     │
# │  750/s   6g         7000m     20Gi     these values + 5 ES replicas     │
# │  1000/s  6g         7000m     20Gi     these values + 7 ES replicas     │
# └─────────────────────────────────────────────────────────────────────────┘
#
# To scale ES replicas for 750+/s, add to your make command:
#   additional_platform_configuration="--set elasticsearch.master.replicaCount=5"
#
# ── With Optimize ─────────────────────────────────────────────────────────
# Optimize runs analytics queries (aggregations, date histograms) against ES,
# adding substantial read pressure on top of the Camunda exporter write load.
# Recommendations when optimize.enabled=true:
#   - Keep refresh_interval ≤ 10 s so dashboards stay near-real-time.
#   - Add more replicas (5+) to parallelize query execution:
#       additional_platform_configuration="--set elasticsearch.master.replicaCount=5"
#   - Increase heap further (e.g. --set elasticsearch.master.heapSize=8g) if
#     you see GC pressure on ES pods during Optimize's import/analysis cycles.
#
# ── Without Optimize (optimize.enabled=false) ─────────────────────────────
# ES is write-only; the read pressure from analytics is eliminated entirely.
#   - Extend refresh_interval to 30s for maximum indexing throughput:
#       additional_platform_configuration="--set-json 'elasticsearch.extraConfig={\"index.refresh_interval\":\"30s\",\"index.translog.flush_threshold_size\":\"2gb\",\"logger.org.elasticsearch.deprecation\":\"OFF\"}'"
#   - 3 replicas (default) is sufficient; no read-side scaling is needed.
#   - You can reclaim the memory saved on read caches for larger write buffers.

elasticsearch:
  master:
    # Doubled from the 3g baseline. ES recommends heap ≤ 50% of container RAM
    # and no more than 26 GB (to keep compressed oops). 6g / 20Gi = 30 % — safe.
    heapSize: 6g
    resources:
      requests:
        cpu: 7000m
        memory: 20Gi
      limits:
        cpu: 7000m
        memory: 20Gi
  extraConfig:
    # Reduce refresh frequency from the 1s default to 10s.
    # Camunda exporters produce large bulk batches; less frequent refreshes allow
    # ES to merge segments in bigger units, reducing I/O amplification and
    # improving sustained indexing throughput.
    index.refresh_interval: "10s"
    # Allow the translog to accumulate up to 2 GB before flushing to disk.
    # Default is 512mb; under high PI/s the translog fills quickly, causing
    # frequent flushes that compete with ongoing indexing.
    index.translog.flush_threshold_size: "2gb"
    # Increase the write thread-pool queue from the default (200) to 2000 so
    # that bursts of bulk requests from the Camunda exporter are queued rather
    # than rejected with HTTP 429s.
    thread_pool.write.queue_size: 2000
    logger.org.elasticsearch.deprecation: "OFF"
