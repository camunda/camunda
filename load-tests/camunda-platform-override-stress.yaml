# Zeebe broker application-override for stress scenarios (stress-500/750/1000).
# Injected as application-override.yml — loaded after application.yml (higher priority).
#
# Disables consistency-check overhead (same as the max scenario) and raises the
# flow-control write limit to accommodate the higher PI/s target rates.

# Disable expensive consistency checks so they don't cap throughput.
zeebe.broker.experimental.consistencyChecks.enablePreconditions: "false"
zeebe.broker.experimental.consistencyChecks.enableForeignKeyChecks: "false"

# Raise the flow-control write limit from the 10 000 default.
# At 500 PI/s a typical process generates ~5 000 records/s (commands + events);
# at 1 000 PI/s that doubles. The limit must exceed the sustained record rate or
# the broker will throttle starters before ES becomes the bottleneck.
zeebe.broker.flowControl.write.limit: 20000
