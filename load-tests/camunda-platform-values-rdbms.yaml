###########################################################################
# Use the internal registry mirror to avoid Docker Hub rate limiting in the benchmark cluster
image:
  registry: europe-west1-docker.pkg.dev
  repository: camunda-benchmark/dockerhub/bitnami/postgresql
  tag: latest

postgresqlSharedPreloadLibraries: pg_stat_statements

primary:
  resources:
    requests:
      memory: 16Gi
      cpu: 4000m
    limits:
      cpu: 4000m
      memory: 16Gi

  nodeSelector:
    component: benchmark-n2-standard-8

  tolerations:
    - key: nodepool
      operator: Equal
      value: n2-standard-8
      effect: NoSchedule

  persistence:
    size: 512Gi
    storageClass: "ssd"

  extendedConfiguration: |-
    # WAL Performance Tuning
    wal_buffers = 128MB
    max_wal_size = 4GB
    min_wal_size = 1GB
    checkpoint_timeout = 20min
    checkpoint_completion_target = 0.9
    wal_writer_delay = 200ms
    wal_writer_flush_after = 1MB

    # Memory Settings
    shared_buffers = 4GB
    effective_cache_size = 10GB
    work_mem = 64MB
    maintenance_work_mem = 1GB

    # Autovacuum - Aggressive for high UPDATE/DELETE volume
    autovacuum_max_workers = 6
    autovacuum_naptime = 15s
    autovacuum_vacuum_scale_factor = 0.03
    autovacuum_analyze_scale_factor = 0.02
    autovacuum_vacuum_cost_limit = 5000

    # Monitoring
    pg_stat_statements.track = all
    pg_stat_statements.max = 10000
    track_io_timing = on
    track_functions = all

########################################################################################
################################################### Elasticsearch cluster configuration
########################################################################################
# We need ES for Optimize
# But we do not need such a big cluster as with the Camunda Exporter, as we do not need to store as much data in ES, and we do not need to run any queries on it.
elasticsearch:
  enabled: true
  clusterName: "elasticsearch"
  master:
    fullnameOverride: elastic
    nameOverride: elastic
    ## @param elasticsearch.master.replicaCount defines number of master-elegible replicas to deploy
    replicaCount: 3
    pdb:
      minAvailable: 2
    ## @param elasticsearch.master.heapSize
    heapSize: 3g
    persistence:
      ## @param elasticsearch.master.persistence.size
      size: 256Gi
      storageClass: "ssd"
      accessModes: ["ReadWriteOnce"]
    resources:
      requests:
        cpu: 3000m
        memory: 6Gi
      limits:
        cpu: 3000m
        memory: 6Gi
    nodeSelector:
      component: benchmark-n2-standard-4
    tolerations:
      - key: nodepool
        operator: Equal
        value: n2-standard-4
        effect: NoSchedule
