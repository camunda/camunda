###########################################################################
# Use the internal registry mirror to avoid Docker Hub rate limiting in the benchmark cluster
image:
  registry: europe-west1-docker.pkg.dev
  repository: camunda-benchmark/dockerhub/bitnami/postgresql
  tag: latest

architecture: replication

postgresqlSharedPreloadLibraries: pg_stat_statements

primary:
  initdb:
    scripts:
      01-grant-pg-read-all-stats.sql: |
        GRANT pg_read_all_stats TO camunda;

  resources:
    requests:
      memory: 8Gi
      cpu: 3000m
    limits:
      cpu: 3000m
      memory: 12Gi

  nodeSelector:
    component: benchmark-n2-standard-8
    topology.kubernetes.io/zone: __AVAILABILITY_ZONE__

  tolerations:
    - key: nodepool
      operator: Equal
      value: n2-standard-8
      effect: NoSchedule

  persistence:
    size: 512Gi
    storageClass: "benchmark-ssd-zonal-v1"

  extendedConfiguration: |-
    # WAL Performance Tuning
    wal_buffers = 128MB
    max_wal_size = 4GB
    min_wal_size = 1GB
    checkpoint_timeout = 20min
    checkpoint_completion_target = 0.9
    wal_writer_delay = 200ms
    wal_writer_flush_after = 1MB

    # Memory Settings
    shared_buffers = 2GB
    effective_cache_size = 7GB
    work_mem = 32MB
    maintenance_work_mem = 1GB

    # Autovacuum - Aggressive for high UPDATE/DELETE volume
    autovacuum_max_workers = 6
    autovacuum_naptime = 15s
    autovacuum_vacuum_scale_factor = 0.03
    autovacuum_analyze_scale_factor = 0.02
    autovacuum_vacuum_cost_limit = 5000

    # Monitoring
    pg_stat_statements.track = all
    pg_stat_statements.max = 10000
    track_io_timing = on
    track_functions = all

readReplicas:
  replicaCount: 2

  resources:
    requests:
      memory: 8Gi
      cpu: 3000m
    limits:
      cpu: 3000m
      memory: 12Gi

  nodeSelector:
    component: benchmark-n2-standard-8
    topology.kubernetes.io/zone: __AVAILABILITY_ZONE__

  tolerations:
    - key: nodepool
      operator: Equal
      value: n2-standard-8
      effect: NoSchedule

  persistence:
    size: 512Gi
    storageClass: "benchmark-ssd-zonal-v1"

