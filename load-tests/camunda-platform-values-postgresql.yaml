########################################################################################
################################################### Global cluster configuration
########################################################################################
global:
  postgresql:
    auth:
      database: camunda
      username: camunda
      password: camunda
      postgresPassword: camunda
  # needed to allow the pass-through-cache for postgres images
  security:
    allowInsecureImages: true

########################################################################################
################################################### Orchestration cluster configuration
########################################################################################
orchestration:
  data:
    secondaryStorage:
      rdbms:
        # In replication mode the Bitnami chart exposes the writer via the primary service.
        url: jdbc:postgresql://postgresql-primary:5432/camunda

###########################################################################
#
#    ######  #######  #####  #######  #####  ######  #######  #####
#    #     # #     # #     #    #    #     # #     # #       #     #
#    #     # #     # #          #    #       #     # #       #
#    ######  #     #  #####     #    #  #### ######  #####    #####
#    #       #     #       #    #    #     # #   #   #             #
#    #       #     # #     #    #    #     # #    #  #       #     #
