{{- if .Values.keycloak.enabled }}
---
# This configures the "admin" credentials for Keycloak itself.
apiVersion: v1
kind: Secret
metadata:
  namespace: "{{ .Values.keycloak.namespace }}"
  name: "{{ include "load-test-setup.keycloak.admin-secret-name" . }}"
  labels:
    # Same convention as the Keycloak CR's labels, so this Secret can be found
    # and cleaned up alongside it (it lives in the shared keycloak-operator
    # namespace, not the load test's own namespace).
    camunda.io/load-test-namespace: "{{ .Release.Namespace }}"
    deadline-date: "{{ .Values.deadlineDate }}"
type: kubernetes.io/basic-auth
data:
{{- $secretName := dict
            "namespace" $.Release.Namespace
            "user" .Values.keycloak.adminUser.secret.key
}}
  username: "{{ .Values.keycloak.adminUser.username | b64enc }}"
  password: "{{ include "generate-secret" $secretName | b64enc }}"
---
{{- end }}
