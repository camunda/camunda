# -- Global values propagated to the camunda-load-tests (load-tester) subchart.
global:
  # -- Extra configuration merged into the load test applications' config file.
  # Seeded as an empty map so callers can add keys via
  # `--set global.extraConfig.<key>=<value>` (e.g. the Makefile sets
  # `global.extraConfig.load-tester.monitor-data-availability=false` for the
  # `none` storage scenario). The subchart ships this key as `null`, and
  # `load-tester-values-defaults.yaml` supplies a `global:` block without `extraConfig`.
  # Without a map default here, Helm's global coalescing silently drops the
  # `--set` value, so the load-test-config ConfigMap (and its starter/workers
  # wiring) never renders for the `none` scenario. An empty map is falsy, so the
  # ConfigMap still only renders when a key is actually set.
  extraConfig: {}

# -- Name of the load test.
name: ""

# -- Name or handle of the person owning this load-test deployment.
author: ""

# -- Date (YYYY-MM-DD) after which this load-test environment can be reclaimed.
deadlineDate: ""

# -- Optional Kubernetes topology zone to pin workloads to (e.g. `europe-west1-b`).
# When set, configures the `topology.kubernetes.io/zone` annotation on the namespace resources.
topologyZone: ""

# -- Internal URL of the Camunda management endpoint. Used by the
# `leader-balancer` CronJob to trigger periodic partition rebalancing via
# `POST {{ camundaManagementUrl }}/actuator/rebalance`.
camundaManagementUrl: http://camunda:9600

# -- The configuration for the load test metrics exporter
metricsExporter:
  image:
    # -- The registry hosting the load test metrics exporter Docker image
    registry: registry.camunda.cloud/team-reliability-testing
    # -- The repository hosting the load test metrics exporter Docker image
    repository: metrics-exporter
    # -- The tag of the load test metrics exporter Docker image
    tag: latest

  database:
    # -- URL of the database (Elasticsearch or OpenSearch) HTTP endpoint for metrics queries.
    # Defaults to the ECK-generated ClusterIP service name for Elasticsearch.
    url: http://elasticsearch-es-http:9200

# -- Configuration for the optional chaos-killer CronJob.
# When enabled, one randomly-selected matching pod is deleted per run to simulate
# unscheduled restarts (e.g. PostgreSQL, Zeebe broker, Elasticsearch).
chaosKiller:
  # -- Set to true to deploy the chaos-killer CronJob.
  enabled: false
  # -- Cron schedule for the chaos-killer (default: once per hour).
  schedule: "0 * * * *"
  # -- Space-separated shell glob patterns. One pod matching any pattern is deleted per run.
  targetPatterns: "camunda-* elastic-* postgresql-*"

# -- load-tester subchart toggle. Set to false to skip deploying the load
# generators (e.g. for a bare cluster setup).
load-tester:
  enabled: true

# -- Configuration for the load test applications.
loadTest:
  # -- Client configuration
  client:
    # -- OIDC configuration for the load test applications
    oidc:
      clientId: orchestration
      zeebeRestAddress: http://camunda:8080
      # -- The complete "/token" URL endpoint of the authentication server.
      # Either set the complete URL used to fetch OIDC token from the
      # authentication server, or keep it at the default empty value to use the
      # built-in Keycloak instance. (Keycloak *must* also be enabled in this case.)
      authServer:
      zeebeGrpcAddress: http://camunda:26500
      authorizationAudience: orchestration-api
      # -- The name of the key used to generate credentials for the load test client applications.
      # This key is used:
      # 1. During the cluster provisioning, to create a client ID/password through Keycloak
      # 2. While configuring the load test application, to create the same password as used by Keycloak.
      secret:
        key: orchestration-security-authentication-oidc-secret

# -- Configuration for the ECK-managed Elasticsearch cluster.
# When enabled, deploys an `Elasticsearch` custom resource managed by the ECK operator.
# The HTTP API is served over plain HTTP (TLS disabled) with anonymous superuser access —
# appropriate for load-test environments, not production.
elasticsearch:
  # -- Set to true to deploy an Elasticsearch cluster via the ECK operator.
  enabled: false

  # -- The name of the underlying Elasticsearch resource.
  # Changing this also changes the names of the other resources deployed by the
  # ECK Operator, like the Kubernetes Services exposing the access to
  # Elasticsearch.
  name: elasticsearch

  # -- Elasticsearch version to deploy. Must be within the range supported by the installed ECK operator (>= 8.x)
  # See https://www.elastic.co/docs/deploy-manage/deploy/cloud-on-k8s#stack-compatibility
  version: 8.18.0

  # -- Number of Elasticsearch nodes in the cluster.
  count: 3

  # -- Environment variables injected into the Elasticsearch container.
  # Use ES_JAVA_OPTS to tune JVM heap size relative to the container memory limit.
  # See https://www.elastic.co/docs/deploy-manage/deploy/cloud-on-k8s/manage-compute-resources#k8s-elasticsearch-memory
  env:
  - name: ES_JAVA_OPTS
    value: -Xms3g -Xmx3g

  # -- CPU and memory resource requests and limits for the Elasticsearch container.
  resources:
    limits:
      cpu: "7"
      memory: 8Gi
    requests:
      cpu: "7"
      memory: 8Gi

  # -- Persistent storage configuration for each Elasticsearch node.
  storage:
    # -- Kubernetes StorageClass for the PersistentVolumeClaim.
    storageClassName: benchmark-ssd-zonal-v1
    # -- Storage capacity requested per Elasticsearch node.
    requests: 512Gi

  # -- Node selector labels for Elasticsearch pod scheduling.
  # The top-level `topologyZone` value is also applied as `topology.kubernetes.io/zone`.
  nodeSelector:
    component: benchmark-n2-standard-8

  # -- Tolerations applied to Elasticsearch pods.
  tolerations:
  - effect: NoSchedule
    key: nodepool
    operator: Equal
    value: n2-standard-8


# -- Configure the Keycloak deployment.
keycloak:
  # -- Whether to deploy Keycloak or not.
  enabled: true

  # -- The Keycloak image to be deployed.
  image:
    registry: europe-west1-docker.pkg.dev/camunda-benchmark
    repository: dockerhub/camunda/keycloak
    tag: quay-optimized-26.6.4

  # -- CPU and memory resource requests and limits for the Keycloak instance.
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  http:
    # -- The port Keycloak listens on for HTTP traffic.
    # Use a non-default port to avoid conflict with Zeebe Gateway on port 8080
    # during port-forwarding.
    port: 18080

  # -- Node selector labels for Keycloak pod scheduling.
  # The top-level `topologyZone` value is also applied as
  # `topology.kubernetes.io/zone`.
  nodeSelector:
    component: benchmark-n2-standard-4

  # -- Tolerations applied to the Keycloak pod.
  tolerations:
    - key: nodepool
      operator: Equal
      value: n2-standard-4
      effect: NoSchedule

  adminUser:
    # -- The name of the initial "admin" user in Keycloak.
    # This should be the same user as configured in Identity's `global.identity.keycloak.auth.adminUser`.
    username: admin
    secret:
      # -- The name of the key used to generate credentials for the Keycloak admin user.
      # This key is used:
      # 1. To generate the "admin" password when creating the Keycloak instance
      # 2. To configure the credentials used by Identity when connecting to Keycloak.
      # It should match the key configured in Identity's
      # `global.identity.keycloak.auth.secret.existingSecretKey`.
      key: identity-keycloak-admin-password

  # -- The namespace to host the Keycloak instance.
  # We deploy Keycloak using the Keycloak Operator, which is currently limited
  # to managed custom resources in a single namespace only.
  # As such, we **have** to deploy Keycloak in the same namespace as the
  # Keycloak Operator and we can't simply Keycloak in the load test namespace.
  # This option allows to configure in which namespace Keycloak will be
  # managed.
  # This probably should not be changed.
  namespace: keycloak-operator

  # -- Configure the PostgreSQL cluster to be used by Keycloak.
  postgresql:
    # -- The name of the CNPG Cluster resource deployed for Keycloak.
    clusterName: postgresql-keycloak

    # -- The name of the PostgreSQL database created for Keycloak.
    databaseName: keycloak

    # -- The name of the PostgreSQL user Keycloak uses to connect to its database.
    databaseUser: keycloak

    # -- The PostgreSQL CNPG image to be used when creating a CNPG-based
    # PostgreSQL cluster.
    image:
      registry: europe-west1-docker.pkg.dev/camunda-benchmark
      repository: ghcrio/cloudnative-pg/postgresql
      tag: "18.4"

    # -- CPU and memory resource requests and limits for the PostgreSQL cluster.
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 150m
        memory: 192Mi

    # -- Persistent storage configuration for the PostgreSQL cluster.
    storage:
      size: 1Gi
      storageClass: benchmark-ssd-zonal-v1

    # -- Node selector labels for PostgreSQL pod scheduling
    # The top-level `topologyZone` value is also applied as `topology.kubernetes.io/zone`.
    nodeSelector:
      component: benchmark-n2-standard-4

    # -- Tolerations applied to PostgreSQL pods.
    tolerations:
      - key: nodepool
        operator: Equal
        value: n2-standard-4
        effect: NoSchedule
