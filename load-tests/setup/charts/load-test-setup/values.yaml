# -- Global values propagated to the camunda-load-tests (load-tester) subchart.
global:
  # -- Extra configuration merged into the load test applications' config file.
  # Seeded as an empty map so callers can add keys via
  # `--set global.extraConfig.<key>=<value>` (e.g. the Makefile sets
  # `global.extraConfig.load-tester.monitor-data-availability=false` for the
  # `none` storage scenario). The subchart ships this key as `null`, and
  # `load-tester-values-defaults.yaml` supplies a `global:` block without `extraConfig`.
  # Without a map default here, Helm's global coalescing silently drops the
  # `--set` value, so the load-test-config ConfigMap (and its starter/workers
  # wiring) never renders for the `none` scenario. An empty map is falsy, so the
  # ConfigMap still only renders when a key is actually set.
  extraConfig: {}

# -- Name of the load test.
name: ""

# -- Name or handle of the person owning this load-test deployment.
author: ""

# -- Date (YYYY-MM-DD) after which this load-test environment can be reclaimed.
deadlineDate: ""

# -- Optional Kubernetes topology zone to pin workloads to (e.g. `europe-west1-b`).
# When set, configures the `topology.kubernetes.io/zone` annotation on the namespace resources.
topologyZone: ""

# -- Internal URL of the Camunda management endpoint. Used by the
# `leader-balancer` CronJob to trigger periodic partition rebalancing via
# `POST {{ camundaManagementUrl }}/actuator/rebalance`.
camundaManagementUrl: http://camunda:9600

# -- The configuration for the load test metrics exporter
metricsExporter:
  image:
    # -- The registry hosting the load test metrics exporter Docker image
    registry: registry.camunda.cloud/team-reliability-testing
    # -- The repository hosting the load test metrics exporter Docker image
    repository: metrics-exporter
    # -- The tag of the load test metrics exporter Docker image
    tag: latest

  database:
    # -- The URL to the database (Elasticsearch or OpenSearch) endpoint to fetch metrics from.
    url: http://elastic:9200

# -- Configuration for the optional chaos-killer CronJob.
# When enabled, one randomly-selected matching pod is deleted per run to simulate
# unscheduled restarts (e.g. PostgreSQL, Zeebe broker, Elasticsearch).
chaosKiller:
  # -- Set to true to deploy the chaos-killer CronJob.
  enabled: false
  # -- Cron schedule for the chaos-killer (default: once per hour).
  schedule: "0 * * * *"
  # -- Space-separated shell glob patterns. One pod matching any pattern is deleted per run.
  targetPatterns: "camunda-* elastic-* postgresql-*"

# -- load-tester subchart toggle. Set to false to skip deploying the load
# generators (e.g. for a bare cluster setup).
load-tester:
  enabled: true

# -- Configuration for the load test applications.
loadTest:
  # -- Client configuration
  client:
    # -- OIDC configuration for the load test applications
    oidc:
      clientId: orchestration
      zeebeRestAddress: http://camunda:8080
      authServer: http://keycloak/auth/realms/camunda-platform/protocol/openid-connect/token
      zeebeGrpcAddress: http://camunda:26500
      authorizationAudience: orchestration-api
      # -- The name of the key used to generate credentials for the load test client applications.
      # This key is used:
      # 1. During the cluster provisioning, to create a client ID/password through Keycloak
      # 2. While configuring the load test application, to create the same password as used by Keycloak.
      secret:
        key: orchestration-security-authentication-oidc-secret
