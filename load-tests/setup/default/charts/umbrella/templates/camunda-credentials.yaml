apiVersion: v1
kind: Secret
metadata:
  name: camunda-credentials
type: Opaque
stringData:
  {{- with .Values.credentials }}
  identity-firstuser-password: "{{ .identity.firstuser.password }}"
  identity-keycloak-admin-password: "{{ .identity.keycloak.admin.password }}"
  identity-keycloak-postgresql-admin-password: "{{ .identity.keycloak.postgresql.admin.password }}"
  identity-keycloak-postgresql-user-password: "{{ .identity.keycloak.postgresql.user.password }}"
  identity-postgresql-admin-password: "{{ .identity.postgresql.admin.password }}"
  identity-postgresql-user-password: "{{ .identity.postgresql.user.password }}"
  orchestration-security-authentication-oidc-secret: "{{ .orchestration.security.authentication.oidc.secret }}"
  connectors-security-authentication-oidc-secret: "{{ .connectors.security.authentication.oidc.secret }}"
  identity-admin-client-token: "{{ .identity.admin.client.token }}"
  identity-optimize-client-token: "{{ .identity.optimize.client.token }}"
  {{- end }}
