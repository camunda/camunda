---
# Source: camunda-platform/templates/orchestration/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: camunda
  labels:
    app: camunda-platform
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/instance: c8-golden-stable-89-opensearch-stable
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: camunda-platform
    camunda.io/created-by: golden-test
    camunda.io/purpose: load-test

    app.kubernetes.io/component: zeebe-broker
    app.kubernetes.io/version: "8.9.9"
  annotations:
spec:
  replicas: 3
  selector:
    matchLabels:
      app: camunda-platform
      app.kubernetes.io/name: opensearch
      app.kubernetes.io/instance: c8-golden-stable-89-opensearch-stable
      app.kubernetes.io/managed-by: Helm
      app.kubernetes.io/part-of: camunda-platform
      app.kubernetes.io/component: zeebe-broker
  serviceName: "camunda"
  updateStrategy:
    type: RollingUpdate
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app: camunda-platform
        app.kubernetes.io/name: opensearch
        app.kubernetes.io/instance: c8-golden-stable-89-opensearch-stable
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: camunda-platform
        camunda.io/created-by: golden-test
        camunda.io/purpose: load-test

        app.kubernetes.io/component: zeebe-broker
        app.kubernetes.io/version: "8.9.9"
      annotations:

    spec:
      imagePullSecrets:
        - name: harbor-registry
      initContainers:
      containers:
        - name: orchestration
          image: docker.io/camunda/camunda:TEST
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: true
            privileged: true
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          command: ["bash", "/usr/local/bin/startup.sh"]
          env:
            - name: LC_ALL
              value: C.UTF-8
            - name: K8S_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_SERVICE_NAME
              value: "camunda"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            
            - name: VALUES_ORCHESTRATION_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: camunda-credentials
                  key: orchestration-security-authentication-oidc-secret
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=25.0 -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/usr/local/camunda/data -XX:ErrorFile=/usr/local/camunda/data/zeebe_error%p.log -XX:NativeMemoryTracking=summary -Xlog:gc*:file=/usr/local/camunda/data/gc.log:time:filecount=7,filesize=8M"
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ZEEBE_LOG_APPENDER
              value: Stackdriver
            - name: ZEEBE_LOG_STACKDRIVER_SERVICENAME
              value: zeebe
            - name: ZEEBE_LOG_STACKDRIVER_SERVICEVERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ATOMIX_LOG_LEVEL
              value: INFO
            - name: ZEEBE_LOG_LEVEL
              value: DEBUG
            - name: SPRING_CONFIG_ADDITIONALLOCATION
              value: /usr/local/camunda/config/application.yml,optional:/usr/local/camunda/config/application-override.yml
            
            
            
          envFrom:
            - configMapRef:
                name: c8-golden-stable-89-opensearch-stable-documentstore-env-vars
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 26501
              name: command
            - containerPort: 26502
              name: internal
            - containerPort: 9600
              name: server
            - containerPort: 26500
              name: grpc
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              scheme: HTTP
              port: 9600
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
            timeoutSeconds: 1
          resources:
            limits:
              cpu: 3000m
              memory: 4Gi
            requests:
              cpu: 3000m
              memory: 4Gi
          volumeMounts:
            - name: config
              mountPath: /usr/local/bin/startup.sh
              subPath: startup.sh
            - name: data
              mountPath: /usr/local/camunda/data
            - name: exporters
              mountPath: /exporters
            - mountPath: /tmp
              name: tmp
            - name: config
              mountPath: /usr/local/camunda/config/application.yaml
              subPath: application.yaml
            - name: config
              mountPath: /usr/local/camunda/config/application.yml
              subPath: application.yml
            - name: config
              mountPath: /usr/local/camunda/config/application-override.yml
              subPath: application-override.yml
            
            - mountPath: /usr/local/camunda/logs
              name: logs
      volumes:
        - name: config
          configMap:
            name: camunda-configuration
            defaultMode: 492
        - name: exporters
          emptyDir: {}
        - name: tmp
          emptyDir: {}
          
        - emptyDir: {}
          name: logs
      serviceAccountName: camunda
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        component: benchmark-n2-standard-4-stable
        topology.kubernetes.io/zone: europe-west1-b
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - zeebe-broker
              topologyKey: kubernetes.io/hostname
      tolerations:
        - effect: NoSchedule
          key: nodepool
          operator: Equal
          value: n2-standard-4-stable
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
        annotations:
          {}
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: benchmark-ssd-zonal-v1
        resources:
          requests:
            storage: "64Gi"
