---
# Source: camunda-platform/templates/common/configmap-release.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: c8-golden-main-none-camunda-platform-release
  labels:
    app: camunda-platform
    app.kubernetes.io/name: camunda-platform
    app.kubernetes.io/instance: c8-golden-main-none
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: camunda-platform
    camunda.io/created-by: golden-test
    camunda.io/purpose: load-test

  annotations:
    {}
data:
  info: |-
    - name: c8-golden-main-none
      namespace: c8-golden-main-none
      version: 15.0.0-alpha1
      tags:
      - dev
      custom-properties: []
      components:
      - name: Keycloak
        id: keycloak
        version: 26.3.3
        url: http://localhost:18080/auth
      - name: Identity
        id: identity
        version: 8.10.0-alpha1
        url: http://localhost:8080
        readiness: http://identity.c8-golden-main-none:82/actuator/health
        metrics: http://identity.c8-golden-main-none:82/actuator/prometheus
      - name: Operate
        id: operate
        version: SNAPSHOT
        url: http://localhost:8080/operate
        readiness: http://camunda.c8-golden-main-none:9600/actuator/health/readiness
        metrics: http://camunda.c8-golden-main-none:9600/actuator/prometheus
      - name: Tasklist
        id: tasklist
        version: SNAPSHOT
        url: http://localhost:8080/tasklist
        readiness: http://camunda.c8-golden-main-none:9600/actuator/health/readiness
        metrics: http://camunda.c8-golden-main-none:9600/actuator/prometheus
      - name: Orchestration Admin
        id: orchestrationIdentity
        version: SNAPSHOT
        url: http://localhost:8080/admin
        readiness: http://camunda.c8-golden-main-none:9600/actuator/health/readiness
        metrics: http://camunda.c8-golden-main-none:9600/actuator/prometheus
    
      - name: Orchestration Cluster
        id: orchestration
        version: SNAPSHOT
        urls:
          grpc: http://localhost:26500
          http: http://localhost:8080
        readiness: http://camunda.c8-golden-main-none:9600/actuator/health/readiness
        metrics: http://camunda.c8-golden-main-none:9600/actuator/prometheus
