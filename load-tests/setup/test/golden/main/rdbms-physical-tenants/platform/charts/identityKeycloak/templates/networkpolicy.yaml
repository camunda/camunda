# Source: camunda-platform/charts/identityKeycloak/templates/networkpolicy.yaml
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: keycloak
  namespace: "c8-golden-main-rdbms-physical-tenants"
  labels:
    app.kubernetes.io/instance: c8-golden-main-rdbms-physical-tenants
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: keycloak

    app.kubernetes.io/component: keycloak
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: c8-golden-main-rdbms-physical-tenants
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/component: keycloak
  policyTypes:
    - Ingress
    - Egress
  egress:
    - {}
  ingress:
    - ports:
        - port: 7800
        - port: 8080
