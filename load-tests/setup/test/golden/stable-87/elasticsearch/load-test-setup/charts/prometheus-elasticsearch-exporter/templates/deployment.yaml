---
# Source: load-test-setup/charts/prometheus-elasticsearch-exporter/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prom-els-exporter
  labels:

    app.kubernetes.io/name: prometheus-elasticsearch-exporter
    app.kubernetes.io/instance: load-test-setup

    app.kubernetes.io/managed-by: Helm
    camunda.io/created-by: golden-test
    camunda.io/purpose: load-test
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus-elasticsearch-exporter
      app.kubernetes.io/instance: load-test-setup
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:

        app.kubernetes.io/name: prometheus-elasticsearch-exporter
        app.kubernetes.io/instance: load-test-setup

        app.kubernetes.io/managed-by: Helm
        camunda.io/created-by: golden-test
        camunda.io/purpose: load-test
    spec:
      serviceAccountName: default
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          env:
          image: "europe-west1-docker.pkg.dev/camunda-benchmark/quayio/prometheuscommunity/elasticsearch-exporter:v1.10.0"
          imagePullPolicy: IfNotPresent
          command: ["elasticsearch_exporter",
                    "--log.format=json",
                    "--log.level=info",
                    "--es.uri=http://elasticsearch-es-http:9200",
                    "--es.all",
                    "--es.indices",
                    "--es.indices_settings",
                    "--es.indices_mappings",
                    "--no-es.aliases",
                    "--es.shards",
                    "--collector.snapshots",
                    "--es.timeout=30s",
                    "--web.listen-address=:9108",
                    "--web.telemetry-path=/metrics"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 9108
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "20"]
      nodeSelector:
        topology.kubernetes.io/zone: europe-west1-c
