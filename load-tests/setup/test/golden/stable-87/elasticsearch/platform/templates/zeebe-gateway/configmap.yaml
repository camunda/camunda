---
# Source: camunda-platform/templates/zeebe-gateway/configmap.yaml
kind: ConfigMap
metadata:
  name: c8-golden-stable-87-elasticsearch-zeebe-gateway-configuration
  labels:
    app: camunda-platform
    app.kubernetes.io/name: camunda-platform
    app.kubernetes.io/instance: c8-golden-stable-87-elasticsearch
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: camunda-platform
    camunda.io/created-by: golden-test
    camunda.io/purpose: load-test

    app.kubernetes.io/component: zeebe-gateway

apiVersion: v1
data:
  gateway-log4j2.xml: |
  application.yaml: |
    spring:
      servlet:
        multipart:
          max-file-size: "10MB"
          max-request-size: "10MB"
      profiles:
        active: "identity-auth"

    # Camunda Database configuration
    camunda.database:
      type: elasticsearch
      # Cluster name
      clusterName: elasticsearch
      # Elasticsearch full url
      url: "http://elasticsearch-es-http:9200"

    server:
      address: "0.0.0.0"
      port: "8080"
      tomcat:
        max-http-form-post-size: "10MB"
    camunda:
      identity:
        type: "KEYCLOAK"
        issuerBackendUrl: "http://keycloak:80/auth/realms/camunda-platform"
        audience: "zeebe-api"
        baseUrl: "http://identity:80"
    zeebe:
      gateway:
        enable: true
        security:
          authentication:
            mode: identity
        monitoring:
          host: 0.0.0.0
          port: "9600"
        cluster:
          clusterName: zeebe
          port: "26502"
        network:
          host: 0.0.0.0
          port: "26500"
          maxMessageSize: "10MB"
  application.yml: |
    zeebe.gateway.monitoring.enabled: "true"
    zeebe.gateway.threads.managementThreads: "1"
