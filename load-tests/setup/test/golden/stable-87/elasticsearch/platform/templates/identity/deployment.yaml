---
# Source: camunda-platform/templates/identity/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  labels:
    app: camunda-platform
    app.kubernetes.io/name: camunda-platform
    app.kubernetes.io/instance: c8-golden-stable-87-elasticsearch
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: camunda-platform
    camunda.io/created-by: golden-test
    camunda.io/purpose: load-test

    app.kubernetes.io/component: identity

  annotations:
    {}
spec:
  strategy:
    type: RollingUpdate
  replicas: 1
  selector:
    matchLabels:
      app: camunda-platform
      app.kubernetes.io/name: camunda-platform
      app.kubernetes.io/instance: c8-golden-stable-87-elasticsearch
      app.kubernetes.io/managed-by: Helm
      app.kubernetes.io/part-of: camunda-platform
      app.kubernetes.io/component: identity
  template:
    metadata:
      labels:
        app: camunda-platform
        app.kubernetes.io/name: camunda-platform
        app.kubernetes.io/instance: c8-golden-stable-87-elasticsearch
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: camunda-platform
        camunda.io/created-by: golden-test
        camunda.io/purpose: load-test

        app.kubernetes.io/component: identity

      annotations:

    spec:
      imagePullSecrets:
        - name: harbor-registry
      initContainers:
        []
      containers:
        - name: camunda-platform
          image: camunda/identity:8.7.22
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: CAMUNDA_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: c8-golden-stable-87-elasticsearch-camunda-platform-license
                  key: CAMUNDA_LICENSE_KEY
            - name: KEYCLOAK_INIT_OPERATE_SECRET
              valueFrom:
                secretKeyRef:
                  name: c8-golden-stable-87-elasticsearch-operate-identity-secret
                  key: identity-operate-client-token
            - name: KEYCLOAK_INIT_CONSOLE_ROOT_URL
              value: "http://localhost:8080"
            - name: KEYCLOAK_INIT_TASKLIST_SECRET
              valueFrom:
                secretKeyRef:
                  name: c8-golden-stable-87-elasticsearch-tasklist-identity-secret
                  key: identity-tasklist-client-token
            - name: KEYCLOAK_INIT_OPTIMIZE_SECRET
              valueFrom:
                secretKeyRef:
                  name: c8-golden-stable-87-elasticsearch-optimize-identity-secret
                  key: identity-optimize-client-token
            - name: KEYCLOAK_INIT_CONNECTORS_SECRET
              valueFrom:
                secretKeyRef:
                  name: c8-golden-stable-87-elasticsearch-connectors-identity-secret
                  key: identity-connectors-client-token
            - name: KEYCLOAK_INIT_WEBMODELER_ROOT_URL
              value: "http://localhost:8084"
            - name: KEYCLOAK_INIT_ZEEBE_NAME
              value: "Zeebe"
            - name: KEYCLOAK_INIT_ZEEBE_SECRET
              valueFrom:
                secretKeyRef:
                  name: camunda-credentials
                  key: identity-zeebe-client-token
            - name: KEYCLOAK_URL
              value: "http://keycloak:80/auth"
            - name: KEYCLOAK_SETUP_USER
              value: "admin"
            - name: KEYCLOAK_SETUP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: camunda-credentials
                  key: identity-keycloak-admin-password
            - name: VALUES_IDENTITY_FIRSTUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: camunda-credentials
                  key: identity-firstuser-password
            - name: IDENTITY_LOG_APPENDER
              value: Stackdriver
          envFrom:
            - configMapRef:
                name: c8-golden-stable-87-elasticsearch-camunda-platform-documentstore-env-vars
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 600m
              memory: 400Mi
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 8082
              name: metrics
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /actuator/health
              scheme: HTTP
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            - name: config
              mountPath: /app/config/application.yaml
              subPath: application.yaml

      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: identity-configuration
      serviceAccountName: identity
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        
        topology.kubernetes.io/zone: europe-west1-c
      tolerations:
        
        - effect: NoSchedule
          key: nodepool
          operator: Equal
          value: n2-standard-4
