---
# Source: camunda-platform/templates/connectors/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectors
  labels:
    app: camunda-platform
    app.kubernetes.io/name: camunda-platform
    app.kubernetes.io/instance: c8-golden-stable-87-elasticsearch-stable
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: camunda-platform
    camunda.io/created-by: golden-test
    camunda.io/purpose: load-test

    app.kubernetes.io/component: connectors

  annotations:
    {}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: camunda-platform
      app.kubernetes.io/name: camunda-platform
      app.kubernetes.io/instance: c8-golden-stable-87-elasticsearch-stable
      app.kubernetes.io/managed-by: Helm
      app.kubernetes.io/part-of: camunda-platform
      app.kubernetes.io/component: connectors
  template:
    metadata:
      labels:
        app: camunda-platform
        app.kubernetes.io/name: camunda-platform
        app.kubernetes.io/instance: c8-golden-stable-87-elasticsearch-stable
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: camunda-platform
        camunda.io/created-by: golden-test
        camunda.io/purpose: load-test

        app.kubernetes.io/component: connectors

      annotations:

    spec:
      imagePullSecrets:
        - name: harbor-registry
      initContainers:
        []
      containers:
        - name: connectors
          image: camunda/connectors-bundle:8.7.20
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: CAMUNDA_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: c8-golden-stable-87-elasticsearch-stable-camunda-platform-license
                  key: CAMUNDA_LICENSE_KEY
            - name: OPERATE_CLIENT_CLIENT_ID
              value: "connectors"
            - name: OPERATE_CLIENT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: c8-golden-stable-87-elasticsearch-stable-connectors-identity-secret
                  key: identity-connectors-client-token
            - name: CAMUNDA_IDENTITY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: c8-golden-stable-87-elasticsearch-stable-connectors-identity-secret
                  key: identity-connectors-client-token
            - name: CAMUNDA_CLIENT_AUTH_CLIENT_ID
              value: "zeebe"
            - name: CAMUNDA_CLIENT_AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: camunda-credentials
                  key: identity-zeebe-client-token
            - name: CAMUNDA_CLIENT_AUTH_TOKENURL
              value: "http://c8-golden-stable-87-elasticsearch-stable.keycloak-operator.svc:18080/auth/realms/camunda-platform/protocol/openid-connect/token"
            - name: CAMUNDA_CLIENT_ZEEBE_AUDIENCE
              value: "zeebe-api"
            
            - name: CONNECTORS_LOG_APPENDER
              value: stackdriver
          envFrom:
            - configMapRef:
                name: c8-golden-stable-87-elasticsearch-stable-camunda-platform-identity-env-vars
            - configMapRef:
                name: c8-golden-stable-87-elasticsearch-stable-camunda-platform-documentstore-env-vars
          resources:
            limits:
              cpu: 2
              memory: 2Gi
            requests:
              cpu: 1
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            - name: config
              mountPath: /config/application.yml
              subPath: application.yml
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: connectors-configuration
      serviceAccountName: connectors
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        
        topology.kubernetes.io/zone: europe-west1-c
      tolerations:
        
        - effect: NoSchedule
          key: nodepool
          operator: Equal
          value: n2-standard-4
