---
# Source: camunda-platform/templates/service-monitor/orchestration-service-monitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: camunda-gateway
  labels:
    app: camunda-platform
    app.kubernetes.io/name: camunda-platform
    app.kubernetes.io/instance: c8-golden-stable-88-elasticsearch-stable
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: camunda-platform
    camunda.io/created-by: golden-test
    camunda.io/purpose: load-test

    release: monitoring
spec:
  selector:
    matchLabels:
      app: camunda-platform
      app.kubernetes.io/component: zeebe-gateway
  endpoints:
    - honorLabels: true
      path: /actuator/prometheus
      port: server
      interval: 30s
