---
# Source: camunda-platform/templates/optimize/configmap.yaml
kind: ConfigMap
metadata:
  name: optimize-configuration
  labels:
    app: camunda-platform
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/instance: c8-golden-stable-88-opensearch-stable
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: camunda-platform
    camunda.io/created-by: golden-test
    camunda.io/purpose: load-test

    app.kubernetes.io/component: optimize
    app.kubernetes.io/version: "8.8.24"
apiVersion: v1
data:
  environment-config.yaml: |
    zeebe:
      enabled: true
      partitionCount: 3
      name: "zeebe-record"
    es:
      connection:
        nodes:
          - host: "${OPTIMIZE_ELASTICSEARCH_HOST:localhost}"
            httpPort: ${OPTIMIZE_ELASTICSEARCH_HTTP_PORT:9200}
    spring:
      servlet:
        multipart:
          max-file-size: "10MB"
          max-request-size: "10MB"
      profiles:
        active: "ccsm"
    security:
      auth:
        cookie:
          same-site:
            enabled: false
        ccsm:
          redirectRootUrl: "http://localhost:8083"
    api:
      audience: "optimize-api"
      jwtSetUri: "http://keycloak/auth/realms/camunda-platform/protocol/openid-connect/certs"
    
    ## Configure Optimize data cleanup
    historyCleanup:
      cronTrigger: '*/30 * * * *'
      ttl: 'P1D'
      processDataCleanup:
        enabled: true
  application-ccsm.yaml: |
    camunda:
      identity:
        clientId: "optimize"
        audience: "optimize-api"
        issuer: "http://localhost:18080/auth/realms/camunda-platform"
        issuerBackendUrl: "http://keycloak/auth/realms/camunda-platform"
