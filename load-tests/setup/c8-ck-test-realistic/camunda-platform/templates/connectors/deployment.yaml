---
# Source: camunda-platform/templates/connectors/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectors
  labels:
    app: camunda-platform
    app.kubernetes.io/name: camunda-platform
    app.kubernetes.io/instance: c8-ck-test-realistic
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: camunda-platform
    camunda.io/created-by: ck-claude-test
    camunda.io/purpose: load-test
    helm.sh/chart: camunda-platform-15.0.0-alpha0
    app.kubernetes.io/component: connectors
    app.kubernetes.io/version: "8.9.0"
  annotations:
    {}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: camunda-platform
      app.kubernetes.io/name: camunda-platform
      app.kubernetes.io/instance: c8-ck-test-realistic
      app.kubernetes.io/managed-by: Helm
      app.kubernetes.io/part-of: camunda-platform
      app.kubernetes.io/component: connectors
  template:
    metadata:
      labels:
        app: camunda-platform
        app.kubernetes.io/name: camunda-platform
        app.kubernetes.io/instance: c8-ck-test-realistic
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: camunda-platform
        camunda.io/created-by: ck-claude-test
        camunda.io/purpose: load-test
        helm.sh/chart: camunda-platform-15.0.0-alpha0
        app.kubernetes.io/component: connectors
        app.kubernetes.io/version: "8.9.0"
      annotations:
        checksum/config: 1497768b7eb01cf89b1425ce6af3de3e80f375579bacd20227a02ef51daedbb6
    spec:
      imagePullSecrets:
        - name: harbor-registry
      initContainers:
        []
      containers:
        - name: connectors
          image: camunda/connectors-bundle:8.9.0
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            
            - name: VALUES_CAMUNDA_IDENTITY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: camunda-credentials
                  key: connectors-security-authentication-oidc-secret
            
            
            - name: CONNECTORS_LOG_APPENDER
              value: stackdriver
          envFrom:
            - configMapRef:
                name: c8-ck-test-realistic-camunda-platform-identity-env-vars
            - configMapRef:
                name: c8-ck-test-realistic-camunda-platform-documentstore-env-vars
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            - name: config
              mountPath: /config/application.yaml
              subPath: application.yaml
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: connectors-configuration
      serviceAccountName: connectors
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        
        component: benchmark-n2-standard-4
        topology.kubernetes.io/zone: europe-west1-d
      tolerations:
        
        - effect: NoSchedule
          key: nodepool
          operator: Equal
          value: n2-standard-4
