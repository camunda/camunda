# Override values for https://github.com/opensearch-project/helm-charts

clusterName: "opensearch"
nameOverride: "opensearch"
masterService: "opensearch"

majorVersion: "2.19.0"

replicas: 3

config:
  opensearch.yml: |
    cluster.name: opensearch
    network.host: 0.0.0.0
    plugins.security.disabled: true
    # Disable deprecation logging to avoid filling up the logs with warnings about deprecated features that we might be using in our tests
    logger.org.opensearch.deprecation: "OFF"

  # Log as JSON
  log4j2.properties: |
    appender.console.type = Console
    appender.console.name = console
    appender.console.layout.type = OpenSearchJsonLayout
    appender.console.layout.type_name = json_logger

    rootLogger.level = info
    rootLogger.appenderRef.console.ref = console

extraEnvs:
  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
    value: "yourStrongPassword123!"

opensearchJavaOpts: "-Xms3g -Xmx3g"

sysctlInit:
  enabled: true
sysctlVmMaxMapCount: 262144

resources:
  requests:
    cpu: 7000m
    memory: 8Gi
  limits:
    cpu: 7000m
    memory: 8Gi

persistence:
  enabled: true
  size: 512Gi
  storageClass: benchmark-ssd-zonal-v1

nodeSelector:
  component: benchmark-n2-standard-8
  topology.kubernetes.io/zone: __AVAILABILITY_ZONE__

tolerations:
  - key: nodepool
    operator: Equal
    value: n2-standard-8
    effect: NoSchedule

antiAffinity: "hard"

protocol: http

securityConfig:
  enabled: false
