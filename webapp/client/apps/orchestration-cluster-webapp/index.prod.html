<!doctype html>
<html
	lang="en"
	xmlns:th="http://www.thymeleaf.org"
	th:attr="data-context-path=${contextPath},data-base-name=${baseName},data-is-enterprise=${isEnterprise},data-mixpanel-token=${mixpanelToken},data-mixpanel-api-host=${mixpanelApiHost},data-organization-id=${organizationId},data-cluster-id=${clusterId}"
>
	<head>
		<meta charset="utf-8" />
		<base href="/" th:attr="href=${baseName}" />
		<link rel="icon" href="./favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#000000" />

		<!-- Basic meta -->
		<meta name="title" content="Camunda" />
		<meta name="description" content="Manage, monitor, and automate your processes with Camunda." />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Camunda" />
		<meta property="og:description" content="Manage, monitor, and automate your processes with Camunda." />
		<meta
			property="og:image"
			content="https://camunda.com/wp-content/uploads/2022/04/1200x627_Camunda_Homepage_Ftd-Image.png"
		/>
		<meta name="og:url" content="https://camunda.com" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Camunda" />
		<meta name="twitter:description" content="Manage, monitor, and automate your processes with Camunda." />
		<meta
			name="twitter:image"
			content="https://camunda.com/wp-content/uploads/2022/04/1200x627_Camunda_Homepage_Ftd-Image.png"
		/>
		<meta name="twitter:url" content="https://camunda.com" />

		<title>Camunda</title>
	</head>
	<body>
		<noscript>You need to enable JavaScript to run this app.</noscript>
		<div id="app"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
