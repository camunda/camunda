<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Joke Generator 3000</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-brand" th:href="@{/}">Joke Generator 3000</a>
      <div class="nav-links">
        <a class="nav-link" th:href="@{/jokes}">Jokes</a>
        <a class="nav-link active" th:href="@{/jokes/admin}">Admin</a>
        <span class="nav-username" th:if="${username != null}" th:text="${username}"></span>
        <button th:if="${username != null}" class="btn btn-danger btn-sm" id="logout-btn">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="content">
    <div class="admin-wrapper">
      <div class="admin-header">
        <h1>Joke Admin Panel</h1>
        <p>Create and manage jokes</p>
      </div>

      <div class="alert alert-success mb-3" th:if="${success}">
        Joke created successfully!
      </div>

      <!-- Create joke form -->
      <div class="admin-card">
        <h2 class="admin-section-title">Create a New Joke</h2>
        <form class="admin-form" th:action="@{/jokes/admin}" method="post">
          <div class="admin-field">
            <label for="setup">Setup</label>
            <textarea id="setup" name="setup" required placeholder="Why did the chicken..."></textarea>
          </div>
          <div class="admin-field">
            <label for="punchline">Punchline</label>
            <textarea id="punchline" name="punchline" required placeholder="To get to the other side!"></textarea>
          </div>
          <div class="admin-field">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="general">General</option>
              <option value="programming">Programming</option>
              <option value="science">Science</option>
            </select>
          </div>
          <div class="admin-form-actions">
            <button type="submit" class="btn btn-primary">Create Joke</button>
          </div>
        </form>
      </div>

      <!-- Existing jokes list -->
      <h2 class="admin-section-title">All Jokes</h2>
      <div class="jokes-grid">
        <div class="joke-card" th:each="joke : ${jokes}">
          <div class="joke-card-setup" th:text="${joke.setup}">Setup</div>
          <div class="joke-card-punchline" th:text="${joke.punchline}">Punchline</div>
          <div class="joke-card-meta">
            <span class="joke-card-category" th:text="${joke.category}">general</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    Powered by <a th:href="@{/}">Gatekeeper</a>
  </footer>

  <script th:src="@{/js/logout.js}"></script>

</body>
</html>
