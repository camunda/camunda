<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!-- Shared head fragment -->
<th:block th:fragment="head(pageTitle)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} + ' | Joke Generator 3000'">Joke Generator 3000</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</th:block>

<!-- Navigation bar fragment -->
<nav th:fragment="nav" class="nav">
  <div class="nav-inner">
    <a class="nav-brand" th:href="@{/}">Joke Generator 3000</a>
    <div class="nav-links">
      <a class="nav-link" th:href="@{/jokes}" th:if="${username != null}">Jokes</a>
      <a class="nav-link" th:href="@{/jokes/admin}" th:if="${isAdmin}">Admin</a>
      <span class="nav-username" th:if="${username != null}" th:text="${username}"></span>
      <form th:if="${username != null}" th:action="@{/logout}" method="post" style="display:inline">
        <button type="submit" class="btn btn-danger btn-sm">Logout</button>
      </form>
    </div>
  </div>
</nav>

<!-- Footer fragment -->
<footer th:fragment="footer" class="footer">
  Powered by <a th:href="@{/}">Gatekeeper</a>
</footer>

</html>
