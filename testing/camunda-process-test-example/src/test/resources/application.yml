camunda:
  process-test:
    # Default: use a shared runtime for fast test execution
    # Override to per test class to use a different configuration
    runtime-mode: shared

logging:
  level:
    root: info
    io:
      camunda:
        process:
          test: info
    # Hide default logging from Testcontainers
    org:
      testcontainers: warn
    tc: error
