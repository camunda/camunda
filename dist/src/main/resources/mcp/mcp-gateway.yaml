spring:
  ai:
    mcp:
      server:
        enabled: true
        type: sync
        protocol: stateless
        annotation-scanner:
          enabled: true
  autoconfigure:
    exclude:
      - org.springframework.ai.mcp.server.common.autoconfigure.McpServerStatelessAutoConfiguration
      - org.springframework.ai.mcp.server.autoconfigure.McpServerStatelessWebMvcAutoConfiguration
