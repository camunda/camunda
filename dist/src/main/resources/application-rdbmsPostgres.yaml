# Local development configuration for Camunda with the RDBMS Postgres database from db/docker-compose.yml

camunda:
  data:
    secondary-storage:
      type: rdbms
      rdbms:
        url: jdbc:postgresql:camunda
        username: camunda
        password: camunda
        replication:
          enabled: true
          min-sync-replicas: 1
logging:
  level:
    io.camunda.exporter.rdbms.replication: DEBUG
