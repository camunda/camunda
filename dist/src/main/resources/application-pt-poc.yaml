camunda:
  security:
    authentication:
      method: oidc
      # All OIDC providers are declared at root, with their audiences alongside the rest of their
      # settings. Tokens are routed to the right provider by the host's
      # IssuerAndAudienceAwareOidcDecoderFactory: when two registrations share an issuer URI (as
      # `tenanta` and `default-via-tenanta` do — both on the `tenanta` Keycloak realm), the
      # `aud` claim picks the registration whose declared audiences intersect it. This is what
      # makes per-provider audiences viable across registrations that share an issuer.
      #
      # Per-PT config (under `camunda.physical-tenants.<id>.security.authentication.*`) keeps just
      # `providers.assigned` plus optional per-field overrides (clientId/clientSecret/audiences/
      # scope/...) — PT-side non-null fields beat root.
      oidc:                # default slot — registration id "oidc"
        client-id: camunda-pt-default-client
        client-secret: default-secret
        issuer-uri: http://localhost:8081/realms/default
        audiences: [pt-default-aud]
      providers:
        oidc:
          tenanta:
            client-id: camunda-pt-tenanta-client
            client-secret: tenanta-secret
            issuer-uri: http://localhost:8082/realms/tenanta
            audiences: [pt-tenanta-aud]
          default-via-tenanta:
            client-id: camunda-pt-default-via-tenanta-client
            client-secret: default-via-tenanta-secret
            issuer-uri: http://localhost:8082/realms/tenanta
            audiences: [pt-default-via-tenanta-aud]
  physical-tenants:
    default:
      security:
        authentication:
          providers:
            # The default PT uses the cluster-default oidc slot AND a named provider that also
            # exists in root config. PT-side overrides (audiences, client-id, client-secret) can
            # be applied per-provider under `providers.oidc.<id>.<field>` here to diverge from
            # root if needed; absent overrides inherit from root.
            assigned: [oidc, default-via-tenanta]
    tenanta:
      security:
        authentication:
          providers:
            assigned: [tenanta]

server:
  port: 8080

# Walking-skeleton diagnostics: trace which SecurityFilterChain matches each
# request and which filter handles it. Remove once Task 4 is verified.
# Also writes the log to /tmp/oc.log for easier consumption than terminal output.
logging:
  file:
    name: /tmp/oc.log
  level:
    org.springframework.security: DEBUG
    org.springframework.security.web.FilterChainProxy: TRACE

# NOTE: the consolidated-auth and pt-security profiles are pulled in by the
# spring.profiles.group.pt-poc declaration in application.properties — Spring
# Boot 2.4+ forbids spring.profiles.include inside profile-specific resources.
