camunda:
  security:
    authentication:
      method: oidc
      # Root declares two OIDC providers — the default slot `oidc` (the default IdP at the
      # `default` Keycloak realm) and the named slot `tenanta` (the shared IdP at the `tenanta`
      # Keycloak realm). Both PTs that use the tenanta IdP refer to the same registration id
      # (`tenanta`); per-PT overrides under `camunda.physical-tenants.<id>.security.authentication
      # .providers.oidc.<id>.<field>` diverge clientId/clientSecret/audiences from root for that
      # tenant's view of the shared IdP. The root `tenanta` entry below uses the DEFAULT
      # tenant's client at that realm — i.e., it is "the tenanta IdP, as seen by the default
      # tenant". The tenanta tenant overrides clientId/secret/audiences below.
      #
      # Audiences travel with the ClientRegistration via providerConfigurationMetadata (added by
      # PerTenantClientRegistrations.buildRegistration for PT-side registrations and by
      # OidcOverrideBeansConfiguration#jwtDecoder for root-side ones). The custom
      # MetadataAwareTokenValidatorFactory reads audiences from that metadata, so per-PT audience
      # overrides flow correctly through both the access-token decoder and the issuer/audience
      # aware router. Without metadata-based audiences the validator returned for the shared
      # `tenanta` registration would always reflect ROOT audiences regardless of which PT's
      # registration the token routed to.
      oidc:                # default slot — registration id "oidc"
        client-id: camunda-pt-default-client
        client-secret: default-secret
        issuer-uri: http://localhost:8081/realms/default
        audiences: [pt-default-aud]
      providers:
        oidc:
          tenanta:
            # The "tenanta" provider in root is the default tenant's view of the tenanta IdP.
            # It uses the default tenant's client at that realm (camunda-pt-default-via-tenanta-
            # client) and the default tenant's audience (pt-default-via-tenanta-aud). The
            # tenanta tenant overrides clientId/secret/audiences from its physical-tenants.tenanta
            # .security.* overlay below.
            client-id: camunda-pt-default-via-tenanta-client
            client-secret: default-via-tenanta-secret
            issuer-uri: http://localhost:8082/realms/tenanta
            audiences: [pt-default-via-tenanta-aud]
  physical-tenants:
    default:
      security:
        authentication:
          providers:
            # The default PT picks BOTH root providers — `oidc` (its primary IdP) and `tenanta`
            # (the shared IdP viewed as default's secondary). No PT-side overrides: the default
            # PT uses the exact root values for both.
            assigned: [oidc, tenanta]
    tenanta:
      security:
        authentication:
          providers:
            assigned: [tenanta]
            oidc:
              tenanta:
                # PT-side override: the tenanta tenant uses its OWN client at the tenanta
                # Keycloak realm (camunda-pt-tenanta-client) and audience pt-tenanta-aud. The
                # remaining fields (issuerUri) inherit from root.
                client-id: camunda-pt-tenanta-client
                client-secret: tenanta-secret
                audiences: [pt-tenanta-aud]

server:
  port: 8080

# Walking-skeleton diagnostics: trace which SecurityFilterChain matches each
# request and which filter handles it. Remove once Task 4 is verified.
# Also writes the log to /tmp/oc.log for easier consumption than terminal output.
logging:
  file:
    name: /tmp/oc.log
  level:
    org.springframework.security: DEBUG
    org.springframework.security.web.FilterChainProxy: TRACE

# NOTE: the consolidated-auth profile is pulled in by the spring.profiles.group.pt-poc
# declaration in application.properties — Spring Boot 2.4+ forbids
# spring.profiles.include inside profile-specific resources. The per-tenant
# SecurityFilterChain wiring activates automatically from the camunda.physical-tenants.*
# entries above; no separate profile gates it.
