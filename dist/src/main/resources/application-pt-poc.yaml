camunda:
  security:
    authentication:
      method: oidc
      # Root-level OIDC slots remain populated as host-side scaffolding for the OC OIDC
      # machinery in OidcOverrideBeansConfiguration, which (under pt-security) is still
      # active and constructs an ambient ClientRegistrationRepository from these entries.
      # The PT chains themselves do NOT consume these root slots — they bind their own
      # per-tenant SecurityConfiguration under camunda.physical-tenants.<id>.security.*
      # below and resolve providers via providers.assigned. The duplication is a
      # walking-skeleton artefact and goes away once OidcOverrideBeansConfiguration's
      # clientRegistrationRepository bean is also gated by !pt-security.
      oidc:
        client-id: camunda-pt-default-client
        client-secret: default-secret
        issuer-uri: http://localhost:8081/realms/default
      providers:
        oidc:
          tenanta:
            client-id: camunda-pt-tenanta-client
            client-secret: tenanta-secret
            issuer-uri: http://localhost:8082/realms/tenanta
  # Per-tenant overlays. Each tenant declares its OWN providers.assigned list and the
  # OIDC slots those entries resolve to (default slot vs. named slots under
  # providers.oidc.<name>). The PoC deliberately exercises BOTH resolution paths:
  # the default tenant uses the default slot (registration id "oidc"); tenant A uses
  # a named slot (registration id "tenanta"). See PerTenantOidcRegistry for the
  # resolution rule.
  physical-tenants:
    default:
      security:
        authentication:
          # Per-PT audience allowlist (Task 17 / spec D8). Bearer tokens presented to the
          # default tenant's API chain must carry an aud claim that intersects this set.
          # The two clients backing default's two assigned IdPs each emit a different aud
          # (see realm exports), so this list has both entries.
          expected-audiences:
            - pt-default-aud
            - pt-default-via-tenanta-aud
          oidc:                # default slot — registration id "oidc"
            client-id: camunda-pt-default-client
            client-secret: default-secret
            issuer-uri: http://localhost:8081/realms/default
          providers:
            # Multi-IdP for the default tenant (spec D7 multi-IdP picker; Task 17). The
            # first entry resolves to the default slot above; the second to a NAMED slot
            # under providers.oidc.default-via-tenanta below. The IdP behind the second
            # entry is the SAME Keycloak realm tenant A uses — same issuer, different
            # client at the IdP (which emits a tenant-specific aud claim).
            assigned: [oidc, default-via-tenanta]
            oidc:
              default-via-tenanta:
                client-id: camunda-pt-default-via-tenanta-client
                client-secret: default-via-tenanta-secret
                issuer-uri: http://localhost:8082/realms/tenanta
    tenanta:
      security:
        authentication:
          # Per-PT audience allowlist (Task 17 / spec D8). Bearer tokens against tenant A's
          # API chain must carry aud=pt-tenanta-aud. The same realm at :8082 also backs the
          # default tenant's secondary IdP — that client emits aud=pt-default-via-tenanta-aud
          # which is NOT in this list, so a token minted via that client is rejected here.
          expected-audiences:
            - pt-tenanta-aud
          providers:
            assigned: [tenanta]
            oidc:
              tenanta:         # named slot — registration id "tenanta"
                client-id: camunda-pt-tenanta-client
                client-secret: tenanta-secret
                issuer-uri: http://localhost:8082/realms/tenanta

server:
  port: 8080

# Walking-skeleton diagnostics: trace which SecurityFilterChain matches each
# request and which filter handles it. Remove once Task 4 is verified.
# Also writes the log to /tmp/oc.log for easier consumption than terminal output.
logging:
  file:
    name: /tmp/oc.log
  level:
    org.springframework.security: DEBUG
    org.springframework.security.web.FilterChainProxy: TRACE

# NOTE: the consolidated-auth and pt-security profiles are pulled in by the
# spring.profiles.group.pt-poc declaration in application.properties — Spring
# Boot 2.4+ forbids spring.profiles.include inside profile-specific resources.
