server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Serve generated dashboard as index
    location = / {
        alias /app/;
        index index.html;
    }
    location = /index.html {
        alias /app/index.html;
    }

    # Enable directory listing for file browsing
    location /bpmn/ {
        autoindex on;
        autoindex_format html;
    }

    # Reverse proxy to Camunda REST API (avoids CORS issues)
    location /v2/ {
        proxy_pass http://host.docker.internal:8080/v2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
