services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION:-8.19.16}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - cluster.name=docker-cluster
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      # Disable SVE (Scalable Vector Extension) for Java on M4+ machines with "-XX:UseSVE=0"
      - "ES_JAVA_OPTS=-Xms1024m -Xmx1024m -XX:UseSVE=0 -XX:+IgnoreUnrecognizedVMOptions"
      - "CLI_JAVA_OPTS=-XX:UseSVE=0 -XX:+IgnoreUnrecognizedVMOptions"
      - path.repo=/usr/local/els-snapshots
      - action.destructive_requires_name=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200
      - 9300:9300
    restart: always
    volumes:
      - ./els-snapshots:/usr/local/els-snapshots

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.2
    ports:
      - 5601:5601
    links:
      - elasticsearch

  camunda:
    container_name: camunda
    image: camunda/camunda:SNAPSHOT
    environment:
      - SPRING_PROFILES_ACTIVE=broker,operate,tasklist,consolidated-auth,dev-data
      - CAMUNDA_SECURITY_AUTHENTICATION_METHOD=basic
      - CAMUNDA_SECURITY_AUTHENTICATION_UNPROTECTEDAPI=false
      - CAMUNDA_SECURITY_AUTHORIZATIONS_ENABLED=true
      - CAMUNDA_SECURITY_MULTITENANCY_CHECKSENABLED=false
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_USERNAME=demo
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_PASSWORD=demo
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_NAME=Demo
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_EMAIL=demo@example.com
      - CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_USERS_0=demo
      - JAVA_TOOL_OPTIONS=-Xms512m -Xmx2g
      - ZEEBE_BROKER_CLUSTER_PARTITIONS_COUNT=4
      #- "JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,address=8000,server=y,suspend=n"
      - CAMUNDA_DATA_SECONDARYSTORAGE_TYPE=elasticsearch
      - CAMUNDA_DATA_SECONDARYSTORAGE_ELASTICSEARCH_URL=http://elasticsearch:9200
    ports:
      - 26500:26500
      - 9600:9600
      - 8080:8080
    depends_on:
      - elasticsearch
    restart: always

  ldap-test-server:
    container_name: ldap-test-server
    image: rroemhild/test-openldap
    ports:
      - 10389:10389
      - 10636:10636
    restart: always

  opensearch-init:
    image: bash
    privileged: true
    user: root
    command: [ "sysctl", "-w", "vm.max_map_count=262144" ]

  opensearch:
    image: opensearchproject/opensearch:${OS_VERSION:-2.19.5}
    container_name: opensearch
    depends_on:
      - opensearch-init
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch
      - discovery.seed_hosts=opensearch
      - plugins.security.disabled=true
      - cluster.initial_cluster_manager_nodes=opensearch
      - bootstrap.memory_lock=true # along with the memlock settings below, disables swapping
      - path.repo=/usr/local/os-snapshots
      - "OPENSEARCH_JAVA_OPTS=-Xms1G -Xmx1G" # minimum and maximum Java heap size, recommend setting both to 50% of system RAM
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=yourStrongPassword123!
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536 # maximum number of open files for the OpenSearch user, set to at least 65536 on modern systems
        hard: 65536
    ports:
      - "9200:9200"
      - "9601:9600" # required for Performance Analyzer
    volumes:
      - ./os-snapshots:/usr/local/os-snapshots

  camunda-opensearch:
    container_name: camunda-opensearch
    image: camunda/camunda:SNAPSHOT
    environment:
      - SPRING_PROFILES_ACTIVE=broker,operate,tasklist,consolidated-auth,dev-data
      - CAMUNDA_SECURITY_AUTHENTICATION_METHOD=basic
      - CAMUNDA_SECURITY_AUTHENTICATION_UNPROTECTEDAPI=false
      - CAMUNDA_SECURITY_AUTHORIZATIONS_ENABLED=true
      - CAMUNDA_SECURITY_MULTITENANCY_CHECKSENABLED=false
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_USERNAME=demo
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_PASSWORD=demo
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_NAME=Demo
      - CAMUNDA_SECURITY_INITIALIZATION_USERS_0_EMAIL=demo@example.com
      - CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_USERS_0=demo
      - JAVA_TOOL_OPTIONS=-Xms512m -Xmx2g
      - ZEEBE_BROKER_CLUSTER_PARTITIONS_COUNT=4
      - CAMUNDA_DATA_SECONDARYSTORAGE_TYPE=opensearch
      - CAMUNDA_DATA_SECONDARYSTORAGE_OPENSEARCH_URL=http://opensearch:9200
      - ZEEBE_BROKER_EXPORTERS_CAMUNDAEXPORTER_CLASSNAME=io.camunda.exporter.CamundaExporter
      - ZEEBE_BROKER_EXPORTERS_CAMUNDAEXPORTER_ARGS_CONNECT_URL=http://opensearch:9200
      - ZEEBE_BROKER_EXPORTERS_CAMUNDAEXPORTER_ARGS_CONNECT_TYPE=opensearch
      - ZEEBE_BROKER_EXPORTERS_CAMUNDAEXPORTER_ARGS_BULK_SIZE=1
    ports:
      - 26500:26500
      - 9600:9600
      - 8080:8080
    depends_on:
      - opensearch
    restart: always
