version: 3

project:
  id: camunda/camunda@optimize
  labels:
  - camunda8
  - optimize
  policy: Camunda8 Distribution
  url: https://github.com/camunda/connectors

maven:
  scope-exclude:
  - import
  - provided
  - system
  - test

targets:
  exclude:
    # Maven is the license source of truth. The Gradle build is a parallel experiment;
    # exclude it so FOSSA never runs its Gradle analyzer (which also lacks config-cache support).
    - type: gradle
