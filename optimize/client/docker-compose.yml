services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION:-8.19.11}
    container_name: elasticsearch
    profiles: ['cloud', 'self-managed', 'cloud:elasticsearch', 'self-managed:elasticsearch']
    environment:
      - TZ=Europe/Berlin
      - xpack.security.enabled=false
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - cluster.name=elasticsearch
      - cluster.routing.allocation.disk.watermark.high=95%
      - cluster.routing.allocation.disk.watermark.high.max_headroom=150GB
      - action.destructive_requires_name=false
      - http.port=9200
      - ES_JAVA_OPTS=-Xms${ELASTIC_JVM_MEMORY:-1}g -Xmx${ELASTIC_JVM_MEMORY:-1}g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200
      - 9300:9300
    restart: always
    cpu_count: 4
    mem_limit: 2g
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cat/health | grep -q green']
      interval: 30s
      timeout: 5s
      retries: 3
  opensearch:
    image: opensearchproject/opensearch:${OS_VERSION:-2.19.4}
    container_name: opensearch
    profiles: ['cloud:opensearch', 'self-managed:opensearch']
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch
      - discovery.seed_hosts=opensearch
      - plugins.security.disabled=true
      - cluster.initial_cluster_manager_nodes=opensearch
      - bootstrap.memory_lock=true # along with the memlock settings below, disables swapping
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m # minimum and maximum Java heap size, recommend setting both to 50% of system RAM
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${CAMUNDA_OPTIMIZE_OPENSEARCH_SECURITY_PASSWORD:-ThisIsAStrongOptimizePassword79!}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536 # maximum number of open files for the OpenSearch user, set to at least 65536 on modern systems
        hard: 65536
    ports:
      - 9200:9200
      - 9305:9300
    restart: always
    cpu_count: 4
    mem_limit: 2g
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cat/health | grep -q green']
      interval: 30s
      timeout: 10s
      retries: 5
  zeebe:
    image: camunda/zeebe:${ZEEBE_VERSION:-8.9.0}
    profiles: ['cloud', 'self-managed', 'cloud:elasticsearch', 'self-managed:elasticsearch']
    container_name: zeebe
    environment:
      - 'JAVA_TOOL_OPTIONS=-Xms512m -Xmx512m'
      # Zeebe 8.9 enables gRPC + REST authentication by default; the legacy
      # Optimize backend + e2e seeder talk to it unauthenticated, so opt out.
      - ZEEBE_BROKER_GATEWAY_SECURITY_AUTHENTICATION_MODE=none
      - CAMUNDA_SECURITY_AUTHENTICATION_UNPROTECTEDAPI=true
      - CAMUNDA_SECURITY_AUTHORIZATIONS_ENABLED=false
    ports:
      - '26500:26500'
      - '9600:9600'
    healthcheck:
      test: ['CMD-SHELL', "timeout 10s bash -c ':> /dev/tcp/127.0.0.1/9600' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    volumes:
      - ../zeebe-application.yml:/usr/local/zeebe/config/application.yaml
    depends_on:
      - elasticsearch
  zeebe-opensearch:
    image: camunda/zeebe:${ZEEBE_VERSION:-8.9.0}
    profiles: ['cloud:opensearch', 'self-managed:opensearch']
    container_name: zeebe-opensearch
    environment:
      - 'JAVA_TOOL_OPTIONS=-Xms512m -Xmx512m'
      - ZEEBE_EXPORTER_CLASS_NAME=io.camunda.zeebe.exporter.opensearch.OpensearchExporter
      - DATABASE_URL=http://opensearch
      - DATABASE_PORT=9200
    ports:
      - 26500:26500
      - 9600:9600
    healthcheck:
      test: ['CMD-SHELL', "timeout 10s bash -c ':> /dev/tcp/127.0.0.1/9600' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    volumes:
      - ../zeebe-application.yml:/usr/local/zeebe/config/application.yaml
    depends_on:
      - opensearch
  postgres:
    container_name: postgres
    image: postgres:${POSTGRES_VERSION:-15-alpine}
    profiles: ['self-managed', 'self-managed:opensearch', 'self-managed:elasticsearch']
    environment:
      POSTGRES_DB: bitnami_keycloak
      POSTGRES_USER: bn_keycloak
      POSTGRES_PASSWORD: bn_keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  keycloak:
    container_name: keycloak
    # camunda/keycloak:26.3.3 is a bitnami-style image — uses KEYCLOAK_* env vars,
    # not Quarkus KC_* CLI flags. Pinned to 26.3.x because camunda/identity:8.9.0
    # uses an admin REST contract that 26.5.x has since changed.
    image: camunda/keycloak:${KEYCLOAK_VERSION:-26.3.3}
    profiles: ['self-managed', 'self-managed:opensearch', 'self-managed:elasticsearch']
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '18080:18080'
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/18080' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    environment:
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_HTTP_PORT: 18080
      # bitnami's KEYCLOAK_HTTP_RELATIVE_PATH is silently ignored by the
      # camunda/keycloak:26.3.x build, so we set the underlying Quarkus option
      # directly to keep Keycloak rooted at /auth (matches what Identity and
      # the legacy Optimize compose expect).
      KEYCLOAK_HTTP_RELATIVE_PATH: /auth
      KC_HTTP_RELATIVE_PATH: /auth
      KEYCLOAK_ENABLE_HEALTH_ENDPOINTS: "true"
      KEYCLOAK_DATABASE_HOST: postgres
      KEYCLOAK_DATABASE_PORT: 5432
      KEYCLOAK_DATABASE_NAME: bitnami_keycloak
      KEYCLOAK_DATABASE_USER: bn_keycloak
      KEYCLOAK_DATABASE_PASSWORD: bn_keycloak
      # The bitnami wrapper for Keycloak 26.3 maps KEYCLOAK_ADMIN_USER to
      # --bootstrap-admin-username but does not pair the password, causing
      # "bootstrap-admin-username available only when bootstrap admin password
      # is set" on startup. Pass the Quarkus vars explicitly to compensate.
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
  identity:
    depends_on:
      keycloak:
        condition: service_healthy
    restart: on-failure
    container_name: identity
    image: camunda/identity:${IDENTITY_VERSION:-8.9.0}
    profiles: ['self-managed', 'self-managed:opensearch', 'self-managed:elasticsearch']
    ports:
      - '8081:8081'
    volumes:
      # Identity 8.9 reads its component / client / role / user bootstrap from a
      # mounted application.yaml. Without this file it creates users but cannot
      # find the realm roles to assign them, producing a 404 on
      # KeycloakUserInitializer.assignRolesToUser. The legacy KEYCLOAK_USERS_*
      # env-var seeding from earlier Identity versions is no longer supported.
      - ./.identity/application.yaml:/app/application.yaml
    healthcheck:
      test: ['CMD', 'wget', '-q', '--tries=1', '--spider', 'http://localhost:8082/actuator/health']
      interval: 5s
      timeout: 15s
      retries: 30
      start_period: 60s
    environment:
      HOST: localhost
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      VALUES_KEYCLOAK_INIT_OPTIMIZE_SECRET: XALaRPl5qwTEItdwCMiPS62nVpKs7dL7
      CAMUNDA_IDENTITY_CLIENT_SECRET: demo-identity-secret
  operate:
    profiles: ['self-managed', 'self-managed:elasticsearch']
    image: camunda/operate:${OPERATE_VERSION:-8.9.0}
    container_name: operate
    environment:
      - CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_OPERATE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_OPERATE_ARCHIVER_WAITPERIODBEFOREARCHIVING=1m
      - SPRING_PROFILES_ACTIVE=dev-data
      - CAMUNDA_OPERATE_IDENTITY_ISSUER_URL=http://localhost:18080/auth/realms/camunda-platform
      - CAMUNDA_OPERATE_IDENTITY_ISSUER_BACKEND_URL=http://localhost:18080/auth/realms/camunda-platform
      - CAMUNDA_OPERATE_IDENTITY_CLIENT_ID=operate
      - CAMUNDA_OPERATE_IDENTITY_CLIENT_SECRET=the-cake-is-alive
      - CAMUNDA_OPERATE_IDENTITY_AUDIENCE=operate-api
      - CAMUNDA_OPERATE_BACKUP_REPOSITORYNAME=test
      - SERVER_SERVLET_CONTEXT_PATH=/
      - CAMUNDA_OPERATE_CLUSTERNODE_PARTITIONIDS=1,2
    ports:
      - '28080:8080'
    healthcheck:
      test: ['CMD-SHELL', "wget -O - -q 'http://localhost:8080/actuator/health/readiness'"]
      interval: 30s
      timeout: 1s
      retries: 5
      start_period: 30s
    depends_on:
      - elasticsearch
      - zeebe
    restart: always
  operate-opensearch:
    profiles: ['self-managed:opensearch']
    image: camunda/operate:${OPERATE_VERSION:-8.9.0}
    container_name: operate-opensearch
    environment:
      - SERVER_PORT=8080
      - CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS=zeebe-opensearch:26500
      - CAMUNDA_OPERATE_OPENSEARCH_URL=http://opensearch:9200
      - CAMUNDA_OPERATE_ZEEBEOPENSEARCH_URL=http://opensearch:9200
      - CAMUNDA_OPERATE_DATABASE=opensearch
      - CAMUNDA_OPERATE_ARCHIVER_WAITPERIODBEFOREARCHIVING=1m
      - SPRING_PROFILES_ACTIVE=dev-data
      - CAMUNDA_OPERATE_IDENTITY_ISSUER_URL=http://localhost:18080/auth/realms/camunda-platform
      - CAMUNDA_OPERATE_IDENTITY_ISSUER_BACKEND_URL=http://localhost:18080/auth/realms/camunda-platform
      - CAMUNDA_OPERATE_IDENTITY_CLIENT_ID=operate
      - CAMUNDA_OPERATE_IDENTITY_CLIENT_SECRET=the-cake-is-alive
      - CAMUNDA_OPERATE_IDENTITY_AUDIENCE=operate-api
      - CAMUNDA_OPERATE_BACKUP_REPOSITORYNAME=test
      - SERVER_SERVLET_CONTEXT_PATH=/
      - CAMUNDA_OPERATE_CLUSTERNODE_PARTITIONIDS=1,2
    ports:
      - '28080:8080'
    healthcheck:
      test: ['CMD-SHELL', "wget -O - -q 'http://localhost:8080/actuator/health/readiness'"]
      interval: 30s
      timeout: 1s
      retries: 5
      start_period: 30s
    depends_on:
      - opensearch
      - zeebe-opensearch
    restart: always
