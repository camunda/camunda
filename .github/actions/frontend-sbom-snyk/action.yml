---
name: Frontend SBOM Snyk

# owner: @camunda/monorepo-devops-team

description: Generate a frontend SBOM and scan it with Snyk

inputs:
  directory:
    description: Frontend directory containing package.json
    required: true
  package-manager:
    description: Package manager used by the frontend
    required: false
    default: "npm"
  sbom-file:
    description: Path to the generated CycloneDX JSON SBOM file
    required: true
  node-version:
    description: Node.js version to use
    required: false
    default: "20"
  project-name:
    description: Human readable project name for logging
    required: true
  snyk-org:
    description: Snyk organization to scan against
    required: false
    default: "team-zeebe"
  severity-threshold:
    description: Minimum vulnerability severity that fails the job
    required: false
    default: "high"

runs:
  using: composite
  steps:
    - name: Setup Node for npm
      if: inputs.package-manager == 'npm'
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.directory }}/package-lock.json

    - name: Setup Node for yarn
      if: inputs.package-manager == 'yarn'
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Snyk CLI
      uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

    - name: Install dependencies with npm
      if: inputs.package-manager == 'npm'
      working-directory: ${{ inputs.directory }}
      shell: bash
      run: npm ci

    - name: Install dependencies with yarn
      if: inputs.package-manager == 'yarn'
      working-directory: ${{ inputs.directory }}
      shell: bash
      run: yarn install --frozen-lockfile

    - name: Generate SBOM with npm
      if: inputs.package-manager == 'npm'
      working-directory: ${{ inputs.directory }}
      shell: bash
      run: npm run extract-sbom

    - name: Generate SBOM with yarn
      if: inputs.package-manager == 'yarn'
      working-directory: ${{ inputs.directory }}
      shell: bash
      run: yarn extract-sbom

    - name: Verify generated SBOM path
      shell: bash
      run: |
        test -f "${{ inputs.sbom-file }}"
        printf 'Using SBOM for %s: %s\n' "${{ inputs.project-name }}" "${{ inputs.sbom-file }}"

    - name: Scan SBOM with Snyk
      shell: bash
      env:
        SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
      run: |
        snyk sbom test \
          --file="${{ inputs.sbom-file }}" \
          --org="${{ inputs.snyk-org }}" \
          --severity-threshold="${{ inputs.severity-threshold }}"
