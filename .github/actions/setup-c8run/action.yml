---
name: Setup c8run build
description: Sets up the required stack to build, install, and run c8run

inputs:
  checkout:
    description: Whether to check out source
    required: false
    default: true
  os:
    description: The OS to run the action on
    required: false
    default: ubuntu-latest
  vault-address:
    description: Vault URL to retrieve secrets from
    required: false
  vault-role-id:
    description: Vault Role ID to use
    required: false
  vault-secret-id:
    description: Vault Secret ID to use
    required: false
  source-build:
    description: true if the camunda build should be built from source, false will build from latest camunda release
    required: false
    default: false
  local-archive-build:
    description: true if camunda platform should be taken from a local archive
    required: false
    default: false
  repository:
    description: The repository to build from
    required: false
    default: camunda/camunda
  github-token:
    description: The GitHub token to use to clone camunda
    required: true

outputs:
  path-to-c8run-build:
    description: The path to the c8run build

env:
  NODE_OPTIONS: "--max_old_space_size=4096"

permissions:
  actions: write
  attestations: none
  checks: write
  contents: read
  deployments: none
  id-token: none
  issues: none
  discussions: none
  packages: none
  pages: none
  pull-requests: none
  repository-projects: none
  security-events: none
  statuses: write

runs:
  using: composite
  steps:
    - if: ${{ inputs.os == 'ubuntu-latest' }}
      name: disable and stop mono-xsp4.service
      shell: bash
      run: |
        sudo systemctl stop mono-xsp4.service || true
        sudo systemctl disable mono-xsp4.service || true
        sudo killall mono || true
        sudo killall xsp4 || true

    - if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        repository: ${{ inputs.repository }}
        token: ${{ inputs.github-token }}

    - name: Import Secrets
      id: secrets
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
      with:
        url: ${{ inputs.vault-address }}
        method: approle
        roleId: ${{ inputs.vault-role-id }}
        secretId: ${{ inputs.vault-secret-id }}
        secrets: |
          secret/data/products/distribution/ci/nexus USER | NEXUS_USERNAME;
          secret/data/products/distribution/ci/nexus PASSWORD | NEXUS_PASSWORD;

    - name: print architecture
      run: arch
      shell: bash

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ">=1.23.1"
        cache: false # disabling since not working anyways without a cache-dependency-path specified

    - name: Setup Java 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: "temurin"
        java-version: "21"

    - uses: ./.github/actions/setup-build
      if: ${{ inputs.source-build == 'true' }}
      with:
        vault-secret-id: ${{ inputs.vault-secret-id }}
        vault-address: ${{ inputs.vault-address }}
        vault-role-id: ${{ inputs.vault-role-id }}

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24

    - name: Install node dependencies
      if: ${{ inputs.source-build == 'true' }}
      working-directory: ./tasklist/client
      shell: bash
      run: npm ci

    - uses: camunda/infra-global-github-actions/setup-yarn-cache@main
      if: ${{ inputs.source-build == 'true' }}
      with:
        directory: identity/client

    - name: Install node dependencies
      if: ${{ inputs.source-build == 'true' }}
      working-directory: ./operate/client
      shell: bash
      run: npm ci

    - name: Install node dependencies
      if: ${{ inputs.source-build == 'true' }}
      working-directory: ./identity/client
      shell: bash
      run: npm ci

    - uses: ./.github/actions/build-zeebe
      if: ${{ inputs.source-build == 'true' }}
      id: build-zeebe
      with:
        maven-extra-args: "-Dskip.fe.build=false"

    - name: Copy zeebe build
      if: ${{ inputs.source-build == 'true' }}
      run: cp $distball ./c8run/
      shell: bash
      env:
        distball: ${{ steps.build-zeebe.outputs.distball }}

    - name: Get version number from zeebe archive
      if: ${{ inputs.source-build == 'true' }}
      run: echo CAMUNDA_VERSION=$( echo $distball | grep -o 'camunda-zeebe-.*' | sed 's/camunda-zeebe-//' | sed 's/\.tar\.gz//') >> $GITHUB_ENV
      shell: bash
      env:
        distball: ${{ steps.build-zeebe.outputs.distball }}

    - name: Get version of camunda-dist
      if: ${{ inputs.local-archive-build == 'true' }}
      run: echo CAMUNDA_VERSION=$(ls camunda-zeebe*.tar.gz | grep -o 'camunda-zeebe-.*' | sed 's/camunda-zeebe-//' | sed 's/\.tar\.gz//') >> $GITHUB_ENV
      shell: bash
      working-directory: ./c8run

    - name: Set up Java 25 for C8Run packaging
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: "temurin"
        java-version: "25"

    - name: Build c8run
      run: go build -o c8run ./cmd/c8run
      shell: bash
      working-directory: ./c8run

    - name: Build c8run packager
      run: go build -o packager ./cmd/packager
      shell: bash
      working-directory: ./c8run

    - name: make a package
      run: ./packager package
      shell: bash
      working-directory: ./c8run
      env:
        JAVA_ARTIFACTS_USER: ${{ steps.secrets.outputs.NEXUS_USERNAME }}
        JAVA_ARTIFACTS_PASSWORD: ${{ steps.secrets.outputs.NEXUS_PASSWORD }}

    - name: ls
      run: ls
      shell: bash
      working-directory: ./c8run

    - name: Verify packaged bundled JRE
      run: |
        set -euo pipefail

        goos="$(go env GOOS)"
        goarch="$(go env GOARCH)"
        case "$goarch" in
          amd64) package_arch="x86_64" ;;
          arm64) package_arch="aarch64" ;;
          *) echo "Unsupported Go architecture: $goarch" >&2; exit 1 ;;
        esac

        archive="$(ls camunda8-run-* | head -n 1)"
        expected_suffix="-${goos}-${package_arch}."
        if [[ "$archive" != *"$expected_suffix"* ]]; then
          echo "Expected C8Run archive for ${goos}-${package_arch}, got ${archive}" >&2
          exit 1
        fi

        smoke_dir="$(mktemp -d)"
        trap 'rm -rf "$smoke_dir"' EXIT
        case "$archive" in
          *.zip) unzip -q "$archive" -d "$smoke_dir" ;;
          *.tar.gz) tar -xzf "$archive" -C "$smoke_dir" ;;
          *) echo "Unsupported C8Run archive type: $archive" >&2; exit 1 ;;
        esac

        run_dir="$(find "$smoke_dir" -maxdepth 1 -mindepth 1 -type d | head -n 1)"
        java_binary="$run_dir/jre/bin/java"
        test -x "$java_binary"
        if command -v file >/dev/null 2>&1; then
          file "$java_binary"
        fi
        env -u JAVA_HOME -u JAVA_VERSION -u JDK_JAVA_OPTIONS "$java_binary" -version
        java_version="$(env -u JAVA_HOME -u JAVA_VERSION -u JDK_JAVA_OPTIONS "$java_binary" JavaVersion)"
        echo "Bundled Java version: $java_version"
        if [[ "$java_version" != 25* ]]; then
          echo "Expected bundled Java 25, got $java_version" >&2
          exit 1
        fi
      shell: bash
      working-directory: ./c8run

    - if: ${{ inputs.os == 'ubuntu-latest' }}
      name: Linux - Run c8run
      run: ./c8run start --config e2e_tests/prefix-config.yaml
      shell: bash
      working-directory: ./c8run

    - if: ${{ startsWith(inputs.os, 'macos') }}
      name: Mac - Run c8run
      shell: bash
      run: ./c8run start --config e2e_tests/prefix-config.yaml
      working-directory: ./c8run

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: camunda8-run-build-${{ inputs.os }}
        path: ./c8run/camunda8-run*
        retention-days: 1

    - name: define c8run filepath
      id: path-to-build
      run: echo "path-to-c8run-build=$( ls ./c8run/camunda8-run* )" >> $GITHUB_OUTPUT
      shell: bash
