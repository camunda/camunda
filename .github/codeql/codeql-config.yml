# CodeQL configuration for the Code Quality AI Pipeline (FALLBACK / LOCAL).
#
# In the workflow, the Stage 1 `hotspots` job generates a dynamic config
# at runtime (paths driven by code-maat hotspot ranking) which the
# `codeql-scan` job consumes via codeql-action/init's `config-file:`
# input. This static file is the base used when a dynamic config has
# not been produced — local runs, manual debugging, or pipeline failures
# that prevent the hotspots job from completing.
#
# Query pack: security-and-quality (broad). Switch to security-extended
# if the volume of findings is unmanageable.

name: "Code Quality AI Pipeline — CodeQL configuration"

queries:
  - uses: security-and-quality

paths:
  - zeebe/engine

paths-ignore:
  - "**/target/**"
  - "**/generated-sources/**"
