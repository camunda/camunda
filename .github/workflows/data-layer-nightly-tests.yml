name: Data Layer Nightly Tests

on:
  schedule:
    # Run at 02:00 every night
    - cron: '0 2 * * *'
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]

jobs:
  nightly-tests:
    name: "Data Layer Nightly Tests (${{ matrix.branch }})"
    strategy:
      fail-fast: false
      matrix:
        branch: [stable/8.9]
    # Run on schedule, manual dispatch, or PR with 'run-dl-nightly-tests' label
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       (github.event.action == 'labeled' && github.event.label.name == 'run-dl-nightly-tests' ||
        github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'run-dl-nightly-tests')))
    runs-on: gcp-perf-core-8-default
    timeout-minutes: 60
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/heads/${{ matrix.branch }}

      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/github.com/organizations/camunda NEXUS_USR;
            secret/data/github.com/organizations/camunda NEXUS_PSW;

      - uses: ./.github/actions/setup-build
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: "Create settings.xml"
        uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
              "id": "camunda-nexus",
              "username": "${{ steps.secrets.outputs.NEXUS_USR }}",
              "password": "${{ steps.secrets.outputs.NEXUS_PSW }}"
            }]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "*", "name": "camunda Nexus"}]'

      - uses: ./.github/actions/build-zeebe
        with:
          maven-extra-args: "-Dskip.fe.build=true -DskipOptimize=true"

      - name: Run Nightly Tests
        env:
          FLAKY_TEST_RERUN_COUNT: 3
        run: |
          ./mvnw -B --no-snapshot-updates \
          -D skipUTs -D skipChecks \
          -D maven.javadoc.skip=true \
          -D failsafe.rerunFailingTestsCount=2 \
          -D flaky.test.reportDir=failsafe-reports \
          -D junit.jupiter.extensions.autodetection.enabled=true \
          -pl qa/acceptance-tests \
          -D groups="dl-nightly" \
          -D failsafe.excludedGroups="" \
          -P dl-nightly \
          verify

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: data-layer-nightly-test-failures-${{ matrix.branch }}
          path: qa/acceptance-tests/target/failsafe-reports/
          retention-days: 7

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [nightly-tests]
    if: failure() && false # Set to false to disable notification for now, enable when needed
    timeout-minutes: 5
    permissions: {}
    steps:
      # Removed checkout - not needed for notification
      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/camunda/ci/github-actions DATA_ENGINE_CI_ALERT_WEBHOOK_URL;

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ steps.secrets.outputs.DATA_ENGINE_CI_ALERT_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":alarm: *Data Layer Nightly Tests failed:*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "@camunda/data-layer Please check the related workflow execution: https://github.com/camunda/camunda/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
