# Nightly workflow that runs the Data Layer Nightly Tests against configurable branches.
# test location: qa/acceptance-tests
# owner: @camunda/data-layer
name: Data Layer Nightly Tests

on:
  schedule:
    # Run at 02:00 every night
    - cron: '0 2 * * *'
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TEST_OWNER: '@camunda/data-layer'

jobs:
  nightly-tests:
    name: "Data Layer Nightly Tests (${{ matrix.branch }})"
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJSON(github.event_name == 'schedule' && '["stable/8.9","main"]' || format('[{0}]', toJSON(github.event.pull_request.head.ref || github.ref_name))) }}
    # Run fixed branches on schedule, or the current branch for manual dispatch and PR label runs
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       (github.event.action == 'labeled' && github.event.label.name == 'run-dl-nightly-tests' ||
        github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'run-dl-nightly-tests')))
    runs-on: gcp-perf-core-16-default
    timeout-minutes: 90
    permissions:
      contents: read
    # Local Docker registry used by the rolling-update test to serve the current-test image
    services:
      registry:
        image: registry:3
        ports:
          - 5000:5000
    env:
      CAMUNDA_TEST_DOCKER_IMAGE: localhost:5000/camunda/camunda:current-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || format('refs/heads/{0}', matrix.branch) }}

      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/github.com/organizations/camunda NEXUS_USR;
            secret/data/github.com/organizations/camunda NEXUS_PSW;

      - uses: ./.github/actions/setup-build
        with:
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          minimus: "true"

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: "Create settings.xml"
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          githubServer: false
          servers: |
            [{
              "id": "camunda-nexus",
              "username": "${{ steps.secrets.outputs.NEXUS_USR }}",
              "password": "${{ steps.secrets.outputs.NEXUS_PSW }}"
            }]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "*", "name": "camunda Nexus"}]'

      - uses: ./.github/actions/build-zeebe
        id: build-zeebe
        with:
          maven-extra-args: "-Dskip.fe.build=true -DskipOptimize=true"

      - uses: ./.github/actions/build-platform-docker
        with:
          repository: localhost:5000/camunda/camunda
          version: current-test
          dockerfile: camunda.Dockerfile
          push: true
          distball: ${{ steps.build-zeebe.outputs.distball }}

      - name: Run Nightly Tests
        env:
          FLAKY_TEST_RERUN_COUNT: 3
        run: |
          ./mvnw -B --no-snapshot-updates \
          -D skipUTs -D skipChecks \
          -D maven.javadoc.skip=true \
          -D "failsafe.rerunFailingTestsCount=${FLAKY_TEST_RERUN_COUNT:-3}" \
          -D flaky.test.reportDir=failsafe-reports \
          -D junit.jupiter.extensions.autodetection.enabled=true \
          -D "argLine=--add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED" \
          -pl qa/acceptance-tests \
          -D groups="dl-nightly" \
          -D failsafe.excludedGroups="" \
          -P dl-nightly,parallel-tests \
          verify

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: data-layer-nightly-test-failures-${{ matrix.branch }}
          path: qa/acceptance-tests/target/failsafe-reports/
          retention-days: 7
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          job_name: "nightly-tests/${{ matrix.branch }}"
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [nightly-tests]
    if: |
      failure() &&
      github.event_name == 'schedule'
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/camunda/ci/github-actions DATA_ENGINE_CI_ALERT_WEBHOOK_URL;

      - name: Send Slack notification
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ steps.secrets.outputs.DATA_ENGINE_CI_ALERT_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":alarm: *Data Layer Nightly Tests failed:*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "@camunda/data-layer Please check the related workflow execution: https://github.com/camunda/camunda/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
