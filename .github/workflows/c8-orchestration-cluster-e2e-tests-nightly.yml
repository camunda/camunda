# description: Runs End to End tests on the C8 Orchestration Cluster (ie, Tasklist, Operate). This workflow runs on a schedule
# test location: /qa/core-application-e2e-test-suite
# type: CI
# owner: @camunda/qa-engineering
---
name: C8 Orchestration Cluster E2E Tests Nightly

#on:
#  schedule:
#    - cron: "0 0 * * *" # Run all tests at midnight UTC

on:
  pull_request:
    types: [opened, edited, synchronize]  # Triggers on PR open, new comits on PR and when the PR description is edited

permissions:
  contents: read

jobs:
  api-tests:
    name: API Tests (${{ matrix.branch }})
    strategy:
      fail-fast: false
      matrix:
        branch: [test-update-api-workflow]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Start Camunda
        shell: bash
        run: |
          if [[ "${{ matrix.branch }}" == "stable/8.6" || "${{ matrix.branch }}" == "stable/8.7" ]]; then
            echo "Using single services for Camunda 8.6 and 8.7"
            DATABASE=elasticsearch docker compose up -d operate tasklist
          else
            echo "Using standalone camunda container"
            echo "Starting Camunda with NON_STANDALONE:$NON_STANDALONE, database:$DATABASE"
            DATABASE=elasticsearch docker compose up -d camunda
          fi
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite/config

      - name: List running Docker containers
        shell: bash
        run: docker ps -a
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite/config

      - name: Wait for services to be ready
        id: wait-for-services
        shell: bash
        run: |
          echo "Checking if services are up..."
          ready=false
          for i in {1..90}; do
            if [[ "${{ matrix.branch }}" == "stable/8.6" || "${{ matrix.branch }}" == "stable/8.7" ]]; then
              tasklist_status=$(curl -s -m 5 http://localhost:8080 || echo "Failed")
              operate_status=$(curl -s -m 5 http://localhost:8081 || echo "Failed")
            else
              tasklist_status=$(curl -s -m 5 http://localhost:8080/tasklist || echo "Failed")
              operate_status=$(curl -s -m 5 http://localhost:8080/operate || echo "Failed")
              identity_status=$(curl -s -m 5 http://localhost:8080/identity || echo "Failed")
            fi

            if [[ "${{ matrix.branch }}" == "stable/8.6" || "${{ matrix.branch }}" == "stable/8.7" ]]; then
              if [[ "$tasklist_status" != "Failed" && "$operate_status" != "Failed" ]]; then
                echo "Services are ready!"
                ready=true
                break
              fi
            else
              if [[ "$tasklist_status" != "Failed" && "$operate_status" != "Failed" && "$identity_status" != "Failed" ]]; then
                echo "Services are ready!"
                ready=true
                break
              fi
            fi

            echo "Waiting for services... ($i/90)"
            echo "Response from Tasklist: $tasklist_status"
            echo "Response from Operate: $operate_status"
            [[ -n "$identity_status" ]] && echo "Response from Identity: $identity_status"
            sleep 10
          done

          if [ "$ready" = true ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "Services failed to start in time."
            exit 1
          fi
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite/config

      - name: Print Docker logs before failing
        shell: bash
        if: failure()
        run: |
          if [[ "${{ matrix.branch }}" == "stable/8.6" || "${{ matrix.branch }}" == "stable/8.7" ]]; then
            docker compose logs tasklist
            docker compose logs operate
          else
            docker compose logs camunda
          fi
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite/config

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: qa/c8-orchestration-cluster-e2e-test-suite/package-lock.json

      - name: Clean install dependencies
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          npm install
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite

      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false # we rely on step outputs, no need for environment variables
          secrets: |
            secret/data/github.com/organizations/camunda TESTRAIL_QA_EMAIL;
            secret/data/github.com/organizations/camunda TESTRAIL_QA_PSW;
            secret/data/products/camunda/ci/github-actions SLACK_CORE_DOMAIN_BOT_TOKEN;

      - name: Install Playwright Browsers
        shell: bash
        run: npx playwright install --with-deps chromium
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite

      - name: Python setup
        if: always()
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run API tests
        shell: bash
        env:
          LOCAL_TEST: "false"
          CAMUNDA_AUTH_STRATEGY: "BASIC"
          CAMUNDA_BASIC_AUTH_USERNAME: "demo"
          CAMUNDA_BASIC_AUTH_PASSWORD: "demo"
          INCLUDE_SLACK_REPORTER: true
          SLACK_BOT_USER_OAUTH_TOKEN: ${{ steps.secrets.outputs.SLACK_CORE_DOMAIN_BOT_TOKEN }}
          VERSION: ${{ matrix.branch }}
          API_TESTS_ONLY: true
          CAMUNDA_TASKLIST_V2_MODE_ENABLED: "false"
          DATABASE: "Elasticsearch"
        run: |
          if [[ "${{ matrix.branch }}" == "stable/8.6" || "${{ matrix.branch }}" == "stable/8.7" ]]; then
            export CORE_APPLICATION_TASKLIST_URL="http://localhost:8080"
            export CORE_APPLICATION_OPERATE_URL="http://localhost:8081"
            export ZEEBE_REST_ADDRESS="http://localhost:8089"
          else
            export CORE_APPLICATION_URL="http://localhost:8080"
            export ZEEBE_REST_ADDRESS="http://localhost:8080"
          fi

          echo "Running API tests"
          npm run test -- --project=api-tests
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite

      - name: Publish test results to TestRail
        if: always()
        shell: bash
        env:
          TESTRAIL_HOST: "https://camunda.testrail.com/"
          TESTRAIL_USERNAME: ${{ steps.secrets.outputs.TESTRAIL_QA_EMAIL }} # Use the imported secret
          TESTRAIL_KEY: ${{ steps.secrets.outputs.TESTRAIL_QA_PSW }} # Use the imported secret
          JUNIT_RESULTS_FILE: "qa/c8-orchestration-cluster-e2e-test-suite/test-results/junit-report.xml"
          BRANCH_NAME: ${{ matrix.branch }}
        run: |
          pip install trcli
          trcli -y -h "$TESTRAIL_HOST" \
            --project 'C8' \
            --username "$TESTRAIL_USERNAME" \
            --key "$TESTRAIL_KEY" \
            parse_junit --suite-id 17050 \
            --title "Nightly C8 Orchestration Cluster Test Results - $BRANCH_NAME - API tests - $(date '+%Y-%m-%d %H:%M:%S')" \
            --close-run \
            -f "$JUNIT_RESULTS_FILE"

      - name: Sanitize branch name for artifact names
        id: sanitize
        if: always()
        shell: bash
        run: |
          branch="${{ matrix.branch }}"
          # Replace invalid artifact-name characters (at least '/')
          safe_branch="${branch//\//-}"
          echo "safe_branch=$safe_branch" >> "$GITHUB_OUTPUT"

      - name: Upload json report to GitHub Actions Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: json-report-nightly-api-${{ steps.sanitize.outputs.safe_branch }}
          path: qa/c8-orchestration-cluster-e2e-test-suite/json-report/**
          retention-days: 60

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          job_name: "c8-orchestration-cluster-e2e-nightly-api-tests/${{ matrix.branch }}"
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  api-tests-rdbms:
    name: API Tests (H2/RDBMS) (${{ matrix.branch }})
    strategy:
      fail-fast: false
      matrix:
        branch: [test-update-api-workflow]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions: {}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false # we rely on step outputs, no need for environment variables
          secrets: |
            secret/data/github.com/organizations/camunda TESTRAIL_QA_EMAIL;
            secret/data/github.com/organizations/camunda TESTRAIL_QA_PSW;
            secret/data/products/camunda/ci/github-actions SLACK_CORE_DOMAIN_BOT_TOKEN;

      - uses: ./.github/actions/setup-build
        with:
          maven-cache-key-modifier: e2e-h2-api-tests
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Build Camunda distribution
        run: ./mvnw install -Dquickly -T1C

      - name: Extract distribution
        run: |
          mkdir -p dev-dist
          exploded="dist/target/camunda-zeebe"
          if [ -d "$exploded/bin" ]; then
            cp -a "$exploded"/. dev-dist/
          else
            tarball=$(find dist/target -maxdepth 1 -name 'camunda-zeebe-*.tar.gz' | head -1)
            if [ -z "$tarball" ]; then
              echo "ERROR: No dist build output found."
              exit 1
            fi
            tar xzf "$tarball" --strip-components=1 -C dev-dist
          fi

      - name: Start Camunda with H2/RDBMS
        run: |
          chmod +x dev-dist/bin/camunda
          export SPRING_PROFILES_ACTIVE="broker,consolidated-auth,admin,tasklist,operate"
          export ZEEBE_CLOCK_CONTROLLED="true"

          # Auth configuration
          export CAMUNDA_SECURITY_AUTHENTICATION_UNPROTECTEDAPI="false"
          export CAMUNDA_SECURITY_AUTHORIZATIONS_ENABLED="true"
          export CAMUNDA_SECURITY_AUTHENTICATION_METHOD="BASIC"
          export CAMUNDA_SECURITY_MULTITENANCY_CHECKSENABLED="false"
          export CAMUNDA_SECURITY_INITIALIZATION_USERS_0_USERNAME="demo"
          export CAMUNDA_SECURITY_INITIALIZATION_USERS_0_PASSWORD="demo"
          export CAMUNDA_SECURITY_INITIALIZATION_USERS_0_NAME="Demo"
          export CAMUNDA_SECURITY_INITIALIZATION_USERS_0_EMAIL="demo@example.com"
          export CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_USERS_0="demo"
          export CAMUNDA_SECURITY_INITIALIZATION_USERS_1_USERNAME="lisa"
          export CAMUNDA_SECURITY_INITIALIZATION_USERS_1_PASSWORD="lisa"
          export CAMUNDA_SECURITY_INITIALIZATION_USERS_1_NAME="lisa"
          export CAMUNDA_SECURITY_INITIALIZATION_USERS_1_EMAIL="lisa@example.com"
          export CAMUNDA_SECURITY_INITIALIZATION_DEFAULTROLES_ADMIN_USERS_1="lisa"

          # H2 in-memory database with RDBMS secondary storage
          export CAMUNDA_DATA_SECONDARY_STORAGE_TYPE="rdbms"
          export CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_URL="jdbc:h2:mem:cpt;DB_CLOSE_DELAY=-1;MODE=PostgreSQL"
          export CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_USERNAME="sa"
          export CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_PASSWORD=""
          export CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_AUTO_DDL="true"
          export CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_FLUSH_INTERVAL="PT0S"
          export CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_HISTORY_DEFAULT_HISTORY_TTL="PT60S"
          export CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_HISTORY_MIN_HISTORY_CLEANUP_INTERVAL="PT10S"
          export CAMUNDA_DATA_SECONDARY_STORAGE_RDBMS_HISTORY_MAX_HISTORY_CLEANUP_INTERVAL="PT60S"

          # Audit log
          export CAMUNDA_DATA_AUDITLOG_ENABLED="true"
          export CAMUNDA_DATA_AUDITLOG_USER_CATEGORIES_0="ADMIN"
          export CAMUNDA_DATA_AUDITLOG_USER_CATEGORIES_1="DEPLOYED_RESOURCES"
          export CAMUNDA_DATA_AUDITLOG_USER_CATEGORIES_2="USER_TASKS"
          export CAMUNDA_DATA_AUDITLOG_USER_EXCLUDES_0="VARIABLE"
          export CAMUNDA_DATA_AUDITLOG_USER_EXCLUDES_1="BATCH"
          export CAMUNDA_DATA_AUDITLOG_CLIENT_CATEGORIES_0="ADMIN"
          export CAMUNDA_DATA_AUDITLOG_CLIENT_EXCLUDES_0="PROCESS_INSTANCE"

          dev-dist/bin/camunda > dev-dist/camunda.log 2>&1 &
          echo $! > dev-dist/camunda.pid

      - name: Wait for Camunda to be ready
        run: |
          for i in $(seq 1 90); do
            if curl -sf -u demo:demo http://localhost:8080/v2/topology >/dev/null 2>&1; then
              exit 0
            fi
            echo "Attempt $i: Camunda not ready yet"
            sleep 5
          done
          tail -100 dev-dist/camunda.log
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: qa/c8-orchestration-cluster-e2e-test-suite/package-lock.json

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite

      - name: Run API tests
        env:
          LOCAL_TEST: "false"
          CORE_APPLICATION_URL: "http://localhost:8080"
          ZEEBE_REST_ADDRESS: "http://localhost:8080"
          CAMUNDA_AUTH_STRATEGY: "BASIC"
          CAMUNDA_BASIC_AUTH_USERNAME: "demo"
          CAMUNDA_BASIC_AUTH_PASSWORD: "demo"
          CAMUNDA_TASKLIST_V2_MODE_ENABLED: "false"
          DATABASE: "RDBMS"
          INCLUDE_SLACK_REPORTER: true
          SLACK_BOT_USER_OAUTH_TOKEN: ${{ steps.secrets.outputs.SLACK_CORE_DOMAIN_BOT_TOKEN }}
        run: npm run test -- --project=api-tests
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite

      - name: Stop Camunda
        if: always()
        run: |
          if [ -f dev-dist/camunda.pid ]; then
            kill "$(cat dev-dist/camunda.pid)" 2>/dev/null || true
          fi

      - name: Publish test results to TestRail
        if: always()
        shell: bash
        env:
          TESTRAIL_HOST: "https://camunda.testrail.com/"
          TESTRAIL_USERNAME: ${{ steps.secrets.outputs.TESTRAIL_QA_EMAIL }} # Use the imported secret
          TESTRAIL_KEY: ${{ steps.secrets.outputs.TESTRAIL_QA_PSW }} # Use the imported secret
          JUNIT_RESULTS_FILE: "qa/c8-orchestration-cluster-e2e-test-suite/test-results/junit-report.xml"
          BRANCH_NAME: ${{ matrix.branch }}
        run: |
          pip install trcli
          trcli -y -h "$TESTRAIL_HOST" \
            --project 'C8' \
            --username "$TESTRAIL_USERNAME" \
            --key "$TESTRAIL_KEY" \
            parse_junit --suite-id 17050 \
            --title "Nightly C8 Orchestration Cluster Test Results - $BRANCH_NAME - API tests - RDBMS - $(date '+%Y-%m-%d %H:%M:%S')" \
            --close-run \
            -f "$JUNIT_RESULTS_FILE"

      - name: Sanitize branch name for artifact names
        id: sanitize
        if: always()
        shell: bash
        run: |
          branch="${{ matrix.branch }}"
          # Replace invalid artifact-name characters (at least '/')
          safe_branch="${branch//\//-}"
          echo "safe_branch=$safe_branch" >> "$GITHUB_OUTPUT"

      - name: Upload json report to GitHub Actions Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: json-report-nightly-api-rdbms-${{ steps.sanitize.outputs.safe_branch }}
          path: qa/c8-orchestration-cluster-e2e-test-suite/json-report/**
          retention-days: 60

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          job_name: "c8-orchestration-cluster-e2e-nightly-api-rdbms-tests/${{ matrix.branch }}"
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
  nightly-tests:
    name: nightly-tests (${{ matrix.branch }} - Tasklist ${{ matrix.tasklist_mode }} mode)
    strategy:
      fail-fast: false
      matrix:
        branch: [test-update-api-workflow]
        tasklist_mode: [v1, v2]
        exclude:
          # V2 mode only supported on main branch - exclude V2 for older branches
          - branch: stable/8.6
            tasklist_mode: v2
          - branch: stable/8.7
            tasklist_mode: v2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Start Camunda
        run: |
          if [[ "${{ matrix.branch }}" == "stable/8.6" || "${{ matrix.branch }}" == "stable/8.7" ]]; then
            echo "Using single services for Camunda 8.6 and 8.7"
            DATABASE=elasticsearch docker compose up -d operate tasklist
          else
            echo "Using standalone camunda container"
            if [[ "${{ matrix.tasklist_mode }}" == "v1" ]]; then
              echo "Starting with Tasklist V1 mode enabled"
              CAMUNDA_TASKLIST_V2_MODE_ENABLED=false DATABASE=elasticsearch docker compose up -d camunda
            else
              echo "Starting with default Tasklist V2 mode"
              export DATABASE=elasticsearch
            echo "Starting Camunda with NON_STANDALONE:$NON_STANDALONE, database:$DATABASE"
            DATABASE=elasticsearch docker compose up -d camunda
            fi
          fi
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite/config

      - name: List running Docker containers
        run: docker ps -a
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite/config

      - name: Wait for services to be ready
        id: wait-for-services
        run: |
          echo "Checking if services are up..."
          ready=false
          for i in {1..90}; do
            if [[ "${{ matrix.branch }}" == "stable/8.6" || "${{ matrix.branch }}" == "stable/8.7" ]]; then
              tasklist_status=$(curl -s -m 5 http://localhost:8080 || echo "Failed")
              operate_status=$(curl -s -m 5 http://localhost:8081 || echo "Failed")
            else
              tasklist_status=$(curl -s -m 5 http://localhost:8080/tasklist || echo "Failed")
              operate_status=$(curl -s -m 5 http://localhost:8080/operate || echo "Failed")
              identity_status=$(curl -s -m 5 http://localhost:8080/identity || echo "Failed")
            fi

            if [[ "${{ matrix.branch }}" == "stable/8.6" || "${{ matrix.branch }}" == "stable/8.7" ]]; then
              if [[ "$tasklist_status" != "Failed" && "$operate_status" != "Failed" ]]; then
                echo "Services are ready!"
                ready=true
                break
              fi
            else
              if [[ "$tasklist_status" != "Failed" && "$operate_status" != "Failed" && "$identity_status" != "Failed" ]]; then
                echo "Services are ready!"
                ready=true
                break
              fi
            fi

            echo "Waiting for services... ($i/90)"
            echo "Response from Tasklist: $tasklist_status"
            echo "Response from Operate: $operate_status"
            [[ -n "$identity_status" ]] && echo "Response from Identity: $identity_status"
            sleep 10
          done

          if [ "$ready" = true ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "Services failed to start in time."
            exit 1
          fi
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite/config

      - name: Print Docker logs before failing
        if: failure()
        run: |
          if [[ "${{ matrix.branch }}" == "stable/8.6" || "${{ matrix.branch }}" == "stable/8.7" ]]; then
            docker compose logs tasklist
            docker compose logs operate
          else
            docker compose logs camunda
          fi
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite/config

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: qa/c8-orchestration-cluster-e2e-test-suite/package-lock.json

      - name: Clean install dependencies
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          npm install
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite

      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false # we rely on step outputs, no need for environment variables
          secrets: |
            secret/data/github.com/organizations/camunda TESTRAIL_QA_EMAIL;
            secret/data/github.com/organizations/camunda TESTRAIL_QA_PSW;
            secret/data/products/camunda/ci/github-actions SLACK_CORE_DOMAIN_BOT_TOKEN;

      - name: Install Playwright Browsers
        shell: bash
        run: npx playwright install --with-deps chromium
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite

      - name: Python setup
        if: always()
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run tests
        shell: bash
        env:
          LOCAL_TEST: "false"
          CAMUNDA_AUTH_STRATEGY: "BASIC"
          CAMUNDA_BASIC_AUTH_USERNAME: "demo"
          CAMUNDA_BASIC_AUTH_PASSWORD: "demo"
          INCLUDE_SLACK_REPORTER: true
          SLACK_BOT_USER_OAUTH_TOKEN: ${{ steps.secrets.outputs.SLACK_CORE_DOMAIN_BOT_TOKEN }}
          VERSION: ${{ matrix.branch }}
          CAMUNDA_TASKLIST_V2_MODE_ENABLED: ${{ matrix.tasklist_mode == 'v2' && 'true' || 'false' }}
        run: |
          if [[ "${{ matrix.branch }}" == "stable/8.6" || "${{ matrix.branch }}" == "stable/8.7" ]]; then
            export CORE_APPLICATION_TASKLIST_URL="http://localhost:8080"
            export CORE_APPLICATION_OPERATE_URL="http://localhost:8081"
            export ZEEBE_REST_ADDRESS="http://localhost:8089"
          else
            export CORE_APPLICATION_URL="http://localhost:8080"
            export ZEEBE_REST_ADDRESS="http://localhost:8080"
          fi

          if [[ "${{ matrix.tasklist_mode }}" == "v2" ]]; then
            if [[ "${{ matrix.branch }}" == "main" || "${{ matrix.branch }}" == "stable/8.9" ]]; then
              echo "Running all tests in V2 mode on ${{ matrix.branch }}, excluding V1-specific tests"
              npm run test -- --project=chromium --grep-invert "tests/(common-flows/v1|tasklist/v1)/"
            else
              echo "Running all tests in V2 mode: excluding @v1-only tests"
              npm run test -- --project=chromium --grep-invert "@v1-only"
            fi
          else
            if [[ "${{ matrix.branch }}" == "main" || "${{ matrix.branch }}" == "stable/8.9" ]]; then
              echo "Running V1 specific tests only: common-flows/v1/ and tests/tasklist/v1/"
              npm run test -- --project=chromium tests/common-flows/v1/ tests/tasklist/v1/
            elif [[ "${{ matrix.branch }}" == "stable/8.8" ]]; then
              # stable/8.8: no v1/ directories, run regular directories for V1 mode
              echo "Running focused tests in V1 mode"
              npm run test -- --project=chromium tests/tasklist/ tests/common-flows/
            else
              echo "Running all tests in V1 mode"
              npm run test -- --project=chromium
            fi
          fi
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite

      - name: Publish test results to TestRail
        if: always()
        shell: bash
        env:
          TESTRAIL_HOST: "https://camunda.testrail.com/"
          TESTRAIL_USERNAME: ${{ steps.secrets.outputs.TESTRAIL_QA_EMAIL }} # Use the imported secret
          TESTRAIL_KEY: ${{ steps.secrets.outputs.TESTRAIL_QA_PSW }} # Use the imported secret
          JUNIT_RESULTS_FILE: "qa/c8-orchestration-cluster-e2e-test-suite/test-results/junit-report.xml"
          BRANCH_NAME: ${{ matrix.branch }}
        run: |
          pip install trcli
          trcli -y -h "$TESTRAIL_HOST" \
            --project 'C8' \
            --username "$TESTRAIL_USERNAME" \
            --key "$TESTRAIL_KEY" \
            parse_junit --suite-id 17050 \
            --title "Nightly C8 Orchestration Cluster Test Results - $BRANCH_NAME (Tasklist ${{ matrix.tasklist_mode }} mode) - $(date '+%Y-%m-%d %H:%M:%S')" \
            --close-run \
            -f "$JUNIT_RESULTS_FILE"

      - name: Sanitize branch name for artifact names
        id: sanitize
        if: always()
        shell: bash
        run: |
          branch="${{ matrix.branch }}"
          # Replace invalid artifact-name characters (at least '/')
          safe_branch="${branch//\//-}"
          echo "safe_branch=$safe_branch" >> "$GITHUB_OUTPUT"

      - name: Upload json report to GitHub Actions Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: json-report-nightly-e2e-${{ steps.sanitize.outputs.safe_branch }}${{ matrix.tasklist_mode && format('-{0}', matrix.tasklist_mode) || '' }}
          path: qa/c8-orchestration-cluster-e2e-test-suite/json-report/**
          retention-days: 60

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          job_name: "c8-orchestration-cluster-e2e-nightly-tests/${{ matrix.tasklist_mode }}"
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
