# description: Checks that all files in the repository have an owner defined in .codeowners
# type: CI
# owner: @camunda/orchestration-cluster
---
name: CI Codeowners Check

on:
  pull_request:
    types:
      - opened
      - synchronize

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

env:
  GHA_BEST_PRACTICES_LINTER: enabled

jobs:
  codeowners-check:
    name: Check all files have owners
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      TEST_OWNER: Orchestration Cluster
      TEST_PRODUCT: Orchestration Cluster
      TEST_TYPE: CI
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Print metadata
        uses: ./.github/actions/print-metadata

      - name: Setup codeowners-cli
        uses: ./.github/actions/setup-codeowners-cli

      - name: Check for unowned files
        run: |
          set -euo pipefail

          unowned="$(codeowners-cli unowned --root ./)"

          if [[ -n "${unowned}" ]]; then
            echo "::error::The following files have no owner in .codeowners:"
            echo "${unowned}"
            echo ""
            echo "Please add ownership rules for these files in .codeowners"
            exit 1
          fi

          echo "✅ All files have owners."

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
