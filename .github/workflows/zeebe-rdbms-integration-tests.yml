# description: Runs Integration tests on different versions and vendors of RDBMS databases
# test location: /qa/acceptance-tests
# type: CI
# owner: @camunda/core-features, @camunda/data-layer
name: Rdbms Manual/Scheduled Run Integration Tests

on:
  workflow_dispatch:
    inputs:
      notify-slack-on-failure:
        description: "Whether workflow_dispatch runs should send Slack notifications on failure/cancellation"
        required: false
        type: boolean
        default: false
  workflow_call:
  pull_request:
    paths:
      - ".ci/db-versions.yml"
      - ".github/actions/read-db-versions/**"
      - ".github/workflows/zeebe-rdbms-integration-tests.yml"
  schedule:
    - cron: "0 5 * * Mon-Fri"

env:
  TEST_OWNER: '@camunda/core-features'
  GHA_BEST_PRACTICES_LINTER: enabled

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

jobs:
  trigger-stable-8-9-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v7
      - name: Trigger stable/8.9 nightly run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run --ref stable/8.9 zeebe-rdbms-integration-tests.yml -f notify-slack-on-failure=true
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  # Reads all supported RDBMS versions from .ci/db-versions.yml and generates
  # the test matrix. Add or remove versions there — this workflow updates automatically.
  generate-matrix:
    name: "Generate RDBMS matrix"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.read-versions.outputs.rdbms-matrix }}
    steps:
      - uses: actions/checkout@v7
      - name: Read DB versions
        id: read-versions
        uses: ./.github/actions/read-db-versions

  # Builds the distball once and shares it with every matrix shard below via GCS,
  # replacing a per-shard reactor build (~33 shards). See #56931.
  build-distball:
    permissions:
      contents: read
      id-token: write  # google-github-actions/auth (WIF) mints a GitHub OIDC token
    uses: ./.github/workflows/ci-build-distball-reusable.yml
    secrets: inherit
    with:
      skip-artifact-upload: true  # no docker-checks-style GH-artifact consumer in this workflow

  rdbms-integration-tests:
    name: "RDBMS ${{ matrix.database-name }}"
    needs: [ generate-matrix, build-distball ]
    permissions:
      actions: write
      contents: read
      id-token: write  # ci-database-integration-tests-reusable declares it (WIF); required to restore the shared distball from GCS
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/ci-database-integration-tests-reusable.yml
    secrets: inherit
    with:
      database-type: ${{ matrix.database-type }}
      database-image-version: ${{ matrix.database-image-version }}
      database-name: ${{ matrix.database-name }}
      it-database-type: ${{ matrix.it-database-type }}
      notify-slack-on-failure: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.notify-slack-on-failure) }}
      use-shared-distball: true

  rdbms-history-tests:
    name: "RDBMS History Tests / ${{ matrix.database-name }}"
    needs: [ generate-matrix, build-distball ]
    permissions:
      actions: write
      contents: read
      id-token: write  # ci-database-integration-tests-reusable declares it (WIF); required to restore the shared distball from GCS
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/ci-database-integration-tests-reusable.yml
    secrets: inherit
    with:
      database-type: ${{ matrix.database-type }}
      database-image-version: ${{ matrix.database-image-version }}
      database-name: ${{ matrix.database-name }}
      it-database-type: "${{ matrix.it-database-type }}"
      maven-profiles: "history"
      test-type: "history-tests"
      test-type-label: "History"
      runs-on: "gcp-perf-core-8-default"
      notify-slack-on-failure: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.notify-slack-on-failure) }}
      use-shared-distball: true

  rdbms-identity-tests:
    name: "RDBMS Identity Tests / ${{ matrix.database-name }}"
    needs: [ generate-matrix, build-distball ]
    permissions:
      actions: write
      contents: read
      id-token: write  # ci-database-integration-tests-reusable declares it (WIF); required to restore the shared distball from GCS
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/ci-database-integration-tests-reusable.yml
    secrets: inherit
    with:
      database-type: ${{ matrix.database-type }}
      database-image-version: ${{ matrix.database-image-version }}
      database-name: ${{ matrix.database-name }}
      it-database-type: "${{ matrix.it-database-type }}"
      maven-profiles: "identity-tests"
      test-type: "identity-tests"
      test-type-label: "Identity"
      notify-slack-on-failure: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.notify-slack-on-failure) }}
      use-shared-distball: true
