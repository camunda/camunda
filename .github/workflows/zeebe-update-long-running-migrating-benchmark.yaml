# description: Updates the rolling release benchmark weekly with the latest release tag.
#              Fetches the latest GitHub release, then deploys as 'release-rolling' with
#              a realistic workload via custom Helm values.
# calls: camunda-load-test.yml
# type: CI
# owner: @camunda/core-features
name: Zeebe Long Running Migrating Benchmark
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1" # every Monday at 00:00

jobs:
  fetch-release:
    name: Fetch latest release
    permissions: {}
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.fetch_release.outputs.release-tag }}
    steps:
      - name: Fetch latest release
        id: fetch_release
        run: |
          echo "release-tag=$(curl -s https://api.github.com/repos/camunda/camunda/releases/latest | jq -r '.tag_name')" >> "$GITHUB_OUTPUT"
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          sparse-checkout: .github
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  update-long-running-migrating-benchmark:
    name: Update Long Running Migrating Benchmark with realistic load
    permissions: {}
    needs:
      - fetch-release
    uses: ./.github/workflows/camunda-load-test.yml
    secrets: inherit
    with:
      name: release-rolling
      ref: refs/tags/${{ needs.fetch-release.outputs.release-tag }}
      load-test-load: >
        --set starter.rate=5
        --set worker.replicas=1
        --set timer.replicas=1
        --set timer.rate=5
        --set publisher.replicas=1
        --set publisher.rate=5
        --set camunda-platform.elasticsearch.master.persistence.size=128Gi
        --set camunda-platform.zeebe.retention.minimumAge=1d
