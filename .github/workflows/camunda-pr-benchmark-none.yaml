# type: CI
# owner: @camunda/reliability-testing
name: Camunda PR Benchmark (none)
on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  benchmark:
    name: Benchmark (none)
    if: >
      (contains(fromJSON('["labeled", "unlabeled"]'), github.event.action) && github.event.label.name == 'benchmark-none') ||
      (contains(fromJSON('["synchronize", "closed"]'), github.event.action) && contains(github.event.pull_request.labels.*.name, 'benchmark-none'))
    uses: ./.github/workflows/pr-benchmark-pipeline.yml
    secrets: inherit
    with:
      label: 'benchmark-none'
      secondary-storage-type: 'none'
      ref: ${{ github.event.pull_request.head.ref }}
