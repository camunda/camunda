name: Operate Frontend

env:
  TEST_PRODUCT: Operate

on:
  push:
    branches:
      - 'main'
      - 'stable/**'
      - 'release**'
    paths:
      - '.github/workflows/operate-frontend.yml'
      - 'operate/client/**'
  pull_request:
    paths:
      - '.github/workflows/operate-frontend.yml'
      - 'operate/client/**'

# Limit workflow to 1 concurrent run per ref (branch): new commit -> old runs are canceled to save costs
# Exception for main branch: complete builds for every commit needed for confidenence
concurrency:
  cancel-in-progress: true
  group: ${{ format('{0}-{1}', github.workflow, github.ref == 'refs/heads/main' && github.sha || github.ref) }}

jobs:
  linting-and-testing:
    name: Linting & Testing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operate/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: camunda/infra-global-github-actions/setup-yarn-cache@main
        with:
          directory: operate/client
      - run: yarn install --frozen-lockfile
        name: Install dependencies
      - run: yarn ts-check
        name: Type checks
      - run: yarn eslint
        name: ESLint
      - run: yarn test:ci
        name: Unit & Integration tests

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  sbom-snyk:
    name: Snyk SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}  # GITHUB_TOKEN unused in this job
    env:
      TEST_TYPE: Tool
      TEST_OWNER: Core Features
    defaults:
      run:
        working-directory: operate/client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - uses: camunda/infra-global-github-actions/setup-yarn-cache@main
        with:
          directory: operate/client
      - name: Generate and scan frontend SBOM
        uses: ./.github/actions/frontend-sbom-snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          directory: operate/client
          package-manager: yarn
          node-version: "20"
          sbom-file: operate/client/build/cyclonedx/bom.json
          project-name: Operate frontend
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
