# description: This is a Workflow runs tests and created updated screenshots of Tasklist
# test location: /tasklist/client/
# type: CI Helper
# owner: @camunda/core-features
name: Tasklist Update Visual Regression Snapshots

on:
  pull_request:
    types: [labeled, synchronize]

# Limit workflow to 1 concurrent run per ref (branch) and trigger event (push/schedule/etc): new commit -> old runs are canceled to save costs
# Exception for main + stable/* branches: complete builds for every commit needed for confidence
# Exception for deploy jobs that have to wait for each other to avoid overwriting
concurrency:
  cancel-in-progress: true
  group: ${{ format('{0}-{1}-{2}', github.workflow, github.event_name, (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/stable/')) && github.sha || github.ref) }}

env:
  CLIENT_DIR: ./tasklist/client

jobs:
  update-snapshots:
    if: github.event.pull_request.state != 'closed' && (github.event.label.name == 'update-snapshots' || contains( github.event.pull_request.labels.*.name, 'update-snapshots'))
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1
      options: --user 1001:1000

    steps:
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup NodeJS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install node dependencies
        uses: ./.github/actions/npm-ci-with-retry
        with:
          directory: ${{ env.CLIENT_DIR }}
      - name: Build frontend
        working-directory: ${{ env.CLIENT_DIR }}
        run: npm run build:visual-regression
      - name: Update snapshots
        working-directory: ${{ env.CLIENT_DIR }}
        run: npm run test:visual --update-snapshots
      - name: Commit screenshots
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "test: updated tasklist snapshots"
          file_pattern: "tasklist/client/**/*.png"
