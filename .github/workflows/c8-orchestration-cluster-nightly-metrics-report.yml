# description: Daily report summarising the latest C8 Orchestration Cluster
#              nightly workflow run outcomes, grouped by API and E2E test
#              categories with versions in ascending order. Posted to Slack.
# type: CI
# owner: @camunda/test-automation-team
---
name: C8 Orchestration Cluster Nightly Metrics Report

on:
  schedule:
    - cron: "0 4 * * *" # 4:00 AM UTC — after all nightly tests complete
  workflow_dispatch: {}

defaults:
  run:
    shell: bash

permissions:
  actions: read
  contents: read

jobs:
  nightly-metrics-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/camunda/ci/github-actions SLACK_CORE_DOMAIN_BOT_TOKEN;

      - name: Collect workflow run results
        id: report
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Fetch the latest completed run for a workflow file and return
          # "<conclusion> <html_url>".
          get_run_status() {
            local workflow_file="$1"
            local result
            result=$(gh api \
              "/repos/${REPO}/actions/workflows/${workflow_file}/runs?per_page=1&status=completed" \
              --jq 'if (.workflow_runs | length) > 0
                    then .workflow_runs[0] | "\(.conclusion) \(.html_url)"
                    else "no_runs #" end' 2>/dev/null) || result="unknown #"
            echo "$result"
          }

          status_emoji() {
            case "$1" in
              success)   echo ":white_check_mark:" ;;
              failure)   echo ":x:" ;;
              cancelled) echo ":warning:" ;;
              no_runs)   echo ":hourglass:" ;;
              *)         echo ":question:" ;;
            esac
          }

          # Global counters for overall summary
          TOTAL_RUNS=0
          TOTAL_SUCCESS=0

          # Build a single result line and update global counters.
          # Sets BUILD_LINE_RESULT with the formatted line.
          build_line() {
            local label="$1"
            local workflow_file="$2"
            local status_line
            status_line=$(get_run_status "$workflow_file")
            local conclusion="${status_line%% *}"
            local url="${status_line#* }"
            local emoji
            emoji=$(status_emoji "$conclusion")

            TOTAL_RUNS=$((TOTAL_RUNS + 1))
            if [[ "$conclusion" == "success" ]]; then
              TOTAL_SUCCESS=$((TOTAL_SUCCESS + 1))
            fi

            BUILD_LINE_RESULT="${emoji} ${label} — <${url}|View Run>"
          }

          calc_percent() {
            local s=$1 t=$2
            if [[ $t -gt 0 ]]; then
              awk "BEGIN {printf \"%.1f\", ($s/$t)*100}"
            else
              echo "0.0"
            fi
          }

          # ── Collect results per category ────────────────────────────────────
          # Each parent category (API, E2E) has subcategories (Elasticsearch, RDBMS).

          # — API — Elasticsearch (versions ASC) —
          api_es_success=0; api_es_total=0; api_es_lines=""
          for entry in \
            "8.7|c8-orchestration-cluster-nightly-8.7-api-es.yml" \
            "8.8|c8-orchestration-cluster-nightly-8.8-api-es.yml" \
            "8.9|c8-orchestration-cluster-nightly-8.9-api-es.yml" \
            "main|c8-orchestration-cluster-nightly-main-api-es.yml"; do
            build_line "${entry%%|*}" "${entry#*|}"
            api_es_lines+="${BUILD_LINE_RESULT}"$'\n'
            api_es_total=$((api_es_total + 1))
            [[ "$BUILD_LINE_RESULT" == ":white_check_mark:"* ]] && api_es_success=$((api_es_success + 1))
          done

          # — API — RDBMS (versions ASC) —
          api_rdbms_success=0; api_rdbms_total=0; api_rdbms_lines=""
          for entry in \
            "8.9|c8-orchestration-cluster-nightly-8.9-api-rdbms.yml" \
            "main|c8-orchestration-cluster-nightly-main-api-rdbms.yml"; do
            build_line "${entry%%|*}" "${entry#*|}"
            api_rdbms_lines+="${BUILD_LINE_RESULT}"$'\n'
            api_rdbms_total=$((api_rdbms_total + 1))
            [[ "$BUILD_LINE_RESULT" == ":white_check_mark:"* ]] && api_rdbms_success=$((api_rdbms_success + 1))
          done

          # — E2E — Elasticsearch (versions ASC) —
          e2e_es_success=0; e2e_es_total=0; e2e_es_lines=""
          for entry in \
            "8.7|c8-orchestration-cluster-nightly-8.7-e2e.yml" \
            "8.8|c8-orchestration-cluster-nightly-8.8-e2e.yml" \
            "8.9|c8-orchestration-cluster-nightly-8.9-e2e.yml" \
            "main|c8-orchestration-cluster-nightly-main-e2e.yml"; do
            build_line "${entry%%|*}" "${entry#*|}"
            e2e_es_lines+="${BUILD_LINE_RESULT}"$'\n'
            e2e_es_total=$((e2e_es_total + 1))
            [[ "$BUILD_LINE_RESULT" == ":white_check_mark:"* ]] && e2e_es_success=$((e2e_es_success + 1))
          done

          # — E2E — RDBMS (versions ASC) —
          # NOTE: No E2E RDBMS nightly workflows exist yet. Uncomment when added.
          # e2e_rdbms_success=0; e2e_rdbms_total=0; e2e_rdbms_lines=""
          # for entry in \
          #   "8.9|c8-orchestration-cluster-nightly-8.9-e2e-rdbms.yml" \
          #   "main|c8-orchestration-cluster-nightly-main-e2e-rdbms.yml"; do
          #   build_line "${entry%%|*}" "${entry#*|}"
          #   e2e_rdbms_lines+="${BUILD_LINE_RESULT}"$'\n'
          #   e2e_rdbms_total=$((e2e_rdbms_total + 1))
          #   [[ "$BUILD_LINE_RESULT" == ":white_check_mark:"* ]] && e2e_rdbms_success=$((e2e_rdbms_success + 1))
          # done

          # ── Combined category totals ─────────────────────────────────────────
          api_success=$((api_es_success + api_rdbms_success))
          api_total=$((api_es_total + api_rdbms_total))
          e2e_success=$((e2e_es_success))
          e2e_total=$((e2e_es_total))

          # ── Compute overall summary ─────────────────────────────────────────
          TOTAL_FAILURE=$((TOTAL_RUNS - TOTAL_SUCCESS))
          OVERALL_PERCENT=$(calc_percent "$TOTAL_SUCCESS" "$TOTAL_RUNS")
          TODAY=$(date -u +"%d.%m.%Y")

          # ── Write outputs ───────────────────────────────────────────────────
          {
            echo "REPORT_DATE=${TODAY}"

            echo "SUMMARY<<EOF"
            echo "Summary: ${TOTAL_RUNS} total runs | :white_check_mark: ${TOTAL_SUCCESS} success | :x: ${TOTAL_FAILURE} failure | :bar_chart: ${OVERALL_PERCENT}%"
            echo "EOF"

            echo "API_REPORT<<EOF"
            echo "━━ *API Tests* ━━"
            echo ":bar_chart: Overall: $(calc_percent $api_success $api_total)% (${api_success}/${api_total})"
            echo ""
            echo "*Elasticsearch*"
            echo ":bar_chart: Success Rate: $(calc_percent $api_es_success $api_es_total)% (${api_es_success}/${api_es_total})"
            printf '%s' "$api_es_lines"
            echo ""
            echo "*RDBMS*"
            echo ":bar_chart: Success Rate: $(calc_percent $api_rdbms_success $api_rdbms_total)% (${api_rdbms_success}/${api_rdbms_total})"
            printf '%s' "$api_rdbms_lines"
            echo "EOF"

            echo "E2E_REPORT<<EOF"
            echo "━━ *E2E Tests* ━━"
            echo ":bar_chart: Overall: $(calc_percent $e2e_success $e2e_total)% (${e2e_success}/${e2e_total})"
            echo ""
            echo "*Elasticsearch*"
            echo ":bar_chart: Success Rate: $(calc_percent $e2e_es_success $e2e_es_total)% (${e2e_es_success}/${e2e_es_total})"
            printf '%s' "$e2e_es_lines"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Debug report output
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Summary:"
          cat <<'BLOCK'
          ${{ steps.report.outputs.SUMMARY }}
          BLOCK
          echo ""
          echo "API Report:"
          cat <<'BLOCK'
          ${{ steps.report.outputs.API_REPORT }}
          BLOCK
          echo ""
          echo "E2E Report:"
          cat <<'BLOCK'
          ${{ steps.report.outputs.E2E_REPORT }}
          BLOCK

      - name: Post report to Slack
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ steps.secrets.outputs.SLACK_CORE_DOMAIN_BOT_TOKEN }}
          payload: |
            channel: "c8-orchestration-cluster-e2e-test-results"
            text: "C8 Orchestration Cluster Nightly Metrics Report"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: ":crescent_moon: C8 Orchestration Cluster Nightly Report — ${{ steps.report.outputs.REPORT_DATE }}"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: ${{ toJSON(steps.report.outputs.SUMMARY) }}
              - type: "divider"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: ${{ toJSON(steps.report.outputs.API_REPORT) }}
              - type: "divider"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: ${{ toJSON(steps.report.outputs.E2E_REPORT) }}

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
