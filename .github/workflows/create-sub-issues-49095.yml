name: Create Sub-Issues for Operate E2E Tests (#49095)

# This workflow creates sub-issues in https://github.com/camunda/camunda/issues/49095
# for every test file that was skipped in https://github.com/camunda/camunda/pull/49093
# as part of the Operate process instance page redesign (issue #46750).

on:
  workflow_dispatch:
  push:
    branches:
      - copilot/create-sub-issues-for-test-files

permissions:
  issues: write

jobs:
  create-sub-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create sub-issues for skipped Operate E2E tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: camunda/camunda
          PARENT_ISSUE: 49095
        run: |
          set -euo pipefail

          # Function to create an issue and link it as a sub-issue of the parent
          create_sub_issue() {
            local title="$1"
            local body="$2"

            # Check if an issue with this title already exists to avoid duplicates
            EXISTING=$(gh issue list \
              --repo "$REPO" \
              --search "$title" \
              --state open \
              --json number,title \
              --jq ".[] | select(.title == \"$title\") | .number" \
              | head -1)

            if [ -n "$EXISTING" ]; then
              echo "Issue already exists: #$EXISTING - $title"
              ISSUE_NUMBER="$EXISTING"
            else
              # Create the new issue
              ISSUE_URL=$(gh issue create \
                --repo "$REPO" \
                --title "$title" \
                --body "$body" \
                --label "kind/task" \
                --label "component/operate")
              ISSUE_NUMBER="${ISSUE_URL##*/}"
              echo "Created issue #$ISSUE_NUMBER: $title"
            fi

            # Link it as a sub-issue of the parent issue
            EXISTING_SUBISSUE=$(gh api \
              "/repos/$REPO/issues/$PARENT_ISSUE/sub_issues" \
              --jq ".[] | select(.number == $ISSUE_NUMBER) | .number" \
              2>/dev/null || echo "")

            if [ -n "$EXISTING_SUBISSUE" ]; then
              echo "Issue #$ISSUE_NUMBER is already a sub-issue of #$PARENT_ISSUE"
            else
              gh api \
                --method POST \
                "/repos/$REPO/issues/$PARENT_ISSUE/sub_issues" \
                -f sub_issue_id="$ISSUE_NUMBER" \
                && echo "Added #$ISSUE_NUMBER as sub-issue of #$PARENT_ISSUE" \
                || echo "Warning: Could not add #$ISSUE_NUMBER as sub-issue (may need to enable sub-issues feature)"
            fi
          }

          # ─────────────────────────────────────────────────────────────
          # 1. auditLog.spec.ts
          # ─────────────────────────────────────────────────────────────
          create_sub_issue \
            "Fix skipped Operate E2E test: Audit log entries can be filtered by process instance key" \
            "## Context

Fix and reenable the following test skipped due to the process instance page redesign (#46750),
tracked in #49093.

**Test file:** \`qa/c8-orchestration-cluster-e2e-test-suite/tests/operate/auditLog.spec.ts\`

## Skipped test(s)

- \`test.skip('Audit log entries can be filtered by process instance key')\`

## Acceptance criteria

- [ ] The test passes reliably and is re-enabled (change \`test.skip\` back to \`test\`)

## Parent issue

Sub-issue of #49095"

