name: Finalize Sub-Issues for Operate E2E Tests (#49095)

# Context: 11 sub-issues were already created (#49225–#49235) via the Copilot agent
# but without labels and without sub-issue linking (the OAuth token didn't have those perms).
# This workflow applies the missing labels and links them as sub-issues of #49095.
# Run via workflow_dispatch.

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  finalize-sub-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels and link as sub-issues of #49095
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python3 {0}
        run: |
          import subprocess
          import json
          import sys
          import time

          REPO = "camunda/camunda"
          PARENT_ISSUE = 49095

          # The 11 issues already created — one per test file changed in PR #49093
          CREATED_ISSUES = [49225, 49226, 49227, 49228, 49229, 49230, 49231, 49232, 49233, 49234, 49235]
          LABELS = ["kind/task", "component/operate"]


          def run_gh(args):
              result = subprocess.run(
                  ["gh"] + args,
                  capture_output=True,
                  text=True,
              )
              if result.returncode != 0:
                  print(f"ERROR: gh {' '.join(args[:4])}\n{result.stderr[:200]}", file=sys.stderr)
                  return None
              return result.stdout.strip()


          def get_existing_sub_issues():
              output = run_gh(["api", f"/repos/{REPO}/issues/{PARENT_ISSUE}/sub_issues"])
              if not output:
                  return set()
              items = json.loads(output)
              return {item["number"] for item in items}


          existing_sub_issues = get_existing_sub_issues()
          print(f"Existing sub-issues of #{PARENT_ISSUE}: {existing_sub_issues}")

          for issue_number in CREATED_ISSUES:
              print(f"\nProcessing #{issue_number}...")

              # Apply labels
              label_result = run_gh([
                  "issue", "edit",
                  str(issue_number),
                  "--repo", REPO,
                  "--add-label", ",".join(LABELS),
              ])
              if label_result is not None:
                  print(f"  ✓ Labels applied: {LABELS}")
              else:
                  print(f"  ✗ Failed to apply labels")

              # Link as sub-issue
              if issue_number in existing_sub_issues:
                  print(f"  ✓ Already linked as sub-issue of #{PARENT_ISSUE}")
              else:
                  link_result = run_gh([
                      "api",
                      "--method", "POST",
                      f"/repos/{REPO}/issues/{PARENT_ISSUE}/sub_issues",
                      "-f", f"sub_issue_id={issue_number}",
                  ])
                  if link_result is not None:
                      print(f"  ✓ Linked as sub-issue of #{PARENT_ISSUE}")
                      existing_sub_issues.add(issue_number)
                  else:
                      print(f"  ✗ Failed to link as sub-issue")

              time.sleep(0.3)

          print(f"\n✅ Done! Finalized {len(CREATED_ISSUES)} sub-issues under #{PARENT_ISSUE}")
          print("\nSub-issue URLs:")
          for n in CREATED_ISSUES:
              print(f"  https://github.com/{REPO}/issues/{n}")
