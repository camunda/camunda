# owner: Camunda-Ex #team-camunda-ex on Slack
# DRI: Josh Wulf <josh.wulf@camunda.com>
#
# Regression guard: proves the openapi-lint CI job in ci.yml is working correctly.
#
# Runs the ACTUAL openapi-lint job from ci.yml (extracted via yq) against:
#   1. Fixture specs with known defects → linters MUST detect them (no false negatives)
#   2. The current spec on main → linters MUST pass (no false positives)
#
# If either gate fails, alerts Slack that the OpenAPI CI quality gate is unreliable.
# Non-blocking: does not affect PR merges or other workflows.
#
# See: https://github.com/camunda/camunda/issues/46055

name: "Regression Guard / OpenAPI Lint"

on:
  schedule:
    # Daily at 06:00 UTC (08:00 CET) — early enough to catch issues before the workday
    - cron: '0 6 * * *'
  workflow_dispatch: {} # manual trigger for testing

defaults:
  run:
    shell: bash

jobs:
  regression-guard:
    name: "Prove OpenAPI lint quality gate"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: {}  # GITHUB_TOKEN unused in this job
    env:
      # renovate: datasource=github-releases depName=nektos/act
      ACT_VERSION: '0.2.74'
      ACT_SHA256: '7512b40671e073a011470e216eb2256d1b3ae37b5970d53dc23b29375ffb90f6'
    steps:
      - uses: actions/checkout@v6

      - name: Install act
        run: |
          wget -qO /tmp/act.tar.gz \
            "https://github.com/nektos/act/releases/download/v${ACT_VERSION}/act_Linux_x86_64.tar.gz"
          echo "${ACT_SHA256}  /tmp/act.tar.gz" | sha256sum -c -
          sudo tar xz -C /usr/local/bin act < /tmp/act.tar.gz
          rm -f /tmp/act.tar.gz
          act --version

      - name: Run regression guard
        run: bash .github/scripts/regression-guard-openapi.sh

  notify-on-failure:
    name: "Alert Slack on failure"
    runs-on: ubuntu-latest
    needs: [regression-guard]
    if: failure()
    timeout-minutes: 5
    permissions: {}
    steps:
      - uses: actions/checkout@v6

      - name: Send Slack alert
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_CAMUNDA_EX_CI_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":alarm: *OpenAPI Lint Regression Guard Failed*\n<@UKVPQ732P> The CI quality gate for the C8 REST OpenAPI spec cannot be proven to be working correctly."
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "This means either:\n• The linters failed to detect known defects (false negative — spec bugs can land on main undetected)\n• The linters fail on the current spec (false positive — or the spec has a regression)\n\nPlease check this <https://github.com/camunda/camunda/actions/runs/${{ github.run_id }}|workflow run> for details."
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Owner: #team-camunda-ex | DRI: Josh Wulf | <https://github.com/camunda/camunda/issues/46055|Issue #46055>"
                    }
                  ]
                }
              ]
            }

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
