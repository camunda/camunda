# Enforce SHA-pinning of 3rd-party GitHub Actions on PR-touched workflow files.
# Policy in .github/zizmor.yml: actions/*, github/*, camunda/* may use tags;
# everything else must be SHA-pinned. Closes #25934.
#
# Reusable workflow — invoked from `ci.yml`'s `pin-check` job so the result
# rolls up into the `check-results` umbrella that branch protection enforces.
# File-level gating (skip when no action files changed) happens at the caller
# via `detect-changes.outputs.actionlint`, and again at the diff step below.
#
# Behavior:
#   - unpinned-uses violations  → ::error + bot PR comment + job fails
#   - other zizmor audits       → ::warning only (visibility, never gates)
#   - same violations re-pushed → no comment churn (state stored in comment body)

name: check-action-pins

on:
  workflow_call:

# pull-requests: write needed for the bot comment.
# Fork PRs get a read-only token from GitHub — comment step silently skips.
permissions:
  contents: read
  pull-requests: write

jobs:
  pin-check:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so the diff step has both base and head commits available.
      - name: Check out PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # --diff-filter=AM skips deletions (don't gate PRs that REMOVE bad files).
      - name: List added/edited action files
        id: changed
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          mapfile -t files < <(git diff --name-only --diff-filter=AM "$base" "$head" -- \
            '.github/workflows/*.yml' \
            '.github/workflows/*.yaml' \
            '.github/actions/**/action.yml' \
            '.github/actions/**/action.yaml')
          printf '%s\n' "${files[@]}" > changed.txt
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"
          echo "Files to lint:"; cat changed.txt

      - name: Install zizmor
        if: steps.changed.outputs.count != '0'
        run: pipx install 'zizmor==1.24.1'

      # One zizmor invocation; one awk pass that:
      #   - keeps unpinned-uses errors (gating) and writes them to JSON for the comment step
      #   - demotes every other ::error and ::notice to ::warning (advisory only)
      - name: Run zizmor
        if: steps.changed.outputs.count != '0'
        run: |
          set -uo pipefail
          out=$(xargs -a changed.txt -r zizmor --config .github/zizmor.yml --format=github 2>&1) || true
          echo "$out" | awk -v jsonfile=unpinned-violations.json '
            BEGIN { v = "[" }
            /^::error / && /title=unpinned-uses/ {
              print
              match($0, /file=[^,]+/); path = substr($0, RSTART+5, RLENGTH-5)
              match($0, /line=[0-9]+/); line = substr($0, RSTART+5, RLENGTH-5)
              v = v (n++ ? "," : "") "{\"path\":\"" path "\",\"line\":" line "}"
              next
            }
            /^::error /  { sub(/^::error /,  "::warning "); print; next }
            /^::notice / { sub(/^::notice /, "::warning "); print; next }
                         { print }
            END { print v "]" > jsonfile }
          '
          echo "Captured violations:"; cat unpinned-violations.json

      # State stored in a hidden HTML state blob inside the bot comment body
      # so the next run can compare and avoid spam:
      #   prev state           | current run    | action
      #   ─────────────────────┼────────────────┼─────────────────────
      #   no comment           | clean          | noop
      #   no comment           | violations     | create violation comment
      #   same violations      | same set       | noop  (no rebase churn)
      #   different violations | different set  | update comment in place
      #   has violations       | clean          | update to "resolved"
      #   already resolved     | clean          | noop
      #   already resolved     | violations     | update with new violations
      - name: Manage PR comment
        if: steps.changed.outputs.count != '0' && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- check-action-pins-bot -->';
            const STATE_RE = /<!--\s*state:\s*(.*?)\s*-->/;
            const stateLine = (s) => `<!-- state: ${JSON.stringify(s)} -->`;

            const current = fs.existsSync('unpinned-violations.json')
              ? JSON.parse(fs.readFileSync('unpinned-violations.json', 'utf8'))
              : [];

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            let prev = { violations: [], resolved: false };
            if (existing) {
              const m = existing.body.match(STATE_RE);
              if (m) { try { prev = JSON.parse(m[1]); } catch (_) {} }
            }

            const key = v => `${v.path}:${v.line}`;
            const sameSet = (a, b) =>
              a.map(key).sort().join('|') === b.map(key).sort().join('|');

            let action;
            if (current.length === 0) {
              action = (prev.violations.length === 0 || prev.resolved) ? 'noop' : 'resolve';
            } else {
              action = (!prev.resolved && sameSet(prev.violations, current)) ? 'noop' : 'update';
            }
            console.log(`Decision: ${action} (prev=${JSON.stringify(prev)}, current=${current.length})`);

            const violationBody = (violations) => [
              MARKER,
              stateLine({ violations, resolved: false }),
              '',
              '## ❌ Unpinned 3rd-party GitHub Action(s) detected',
              '',
              'This PR introduces or modifies one or more `uses:` lines that reference an external 3rd-party action by tag or branch instead of a 40-character commit SHA. Per [issue #25934](https://github.com/camunda/camunda/issues/25934), all external actions must be SHA-pinned to mitigate supply-chain attacks (mutable tag refs can be silently rewritten by a compromised upstream).',
              '',
              '### Offending lines',
              ...violations.map(v => `- \`${v.path}:${v.line}\``),
              '',
              '### How to fix',
              'Replace each `@<tag>` with `@<sha> # <tag>`. Look up the SHA via:',
              '```bash',
              'gh api repos/<owner>/<repo>/git/refs/tags/<tag> --jq .object.sha',
              '```',
              'Example:',
              '```yaml',
              '- uses: foo/bar@a1b2c3d4e5f60123456789abcdef0123456789ab # v1.2.3',
              '```',
              '',
              '### Need an exception?',
              'If this action genuinely cannot be SHA-pinned (e.g. the vendor publishes only tags, or there is a policy reason), please contact the **monorepo-devops team on Slack**. The team owns the pinning policy and can apply the right exception centrally.',
            ].join('\n');

            const resolvedBody = () => [
              MARKER,
              stateLine({ violations: [], resolved: true }),
              '',
              '## ✅ Pinning issue resolved',
              '',
              'All previously detected unpinned 3rd-party action references in this PR have been fixed. Compliant with the SHA-pinning policy ([issue #25934](https://github.com/camunda/camunda/issues/25934)).',
            ].join('\n');

            if (action === 'noop') return;
            const body = action === 'resolve' ? resolvedBody() : violationBody(current);
            const common = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            };
            if (existing) {
              await github.rest.issues.updateComment({ ...common, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...common, body });
            }

      # Separate from the awk step so the bot comment lands BEFORE the red ❌.
      - name: Gate on unpinned-uses violations
        if: steps.changed.outputs.count != '0'
        run: |
          set -euo pipefail
          if [ "$(jq 'length' unpinned-violations.json)" -gt 0 ]; then
            echo "::error::Unpinned 3rd-party action(s) detected — see PR comment and annotations above"
            exit 1
          fi
          echo "✓ no unpinned 3rd-party actions in this PR's diff"
