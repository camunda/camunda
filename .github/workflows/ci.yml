      test-type-label: "Identity"

  rdbms-integration-tests:
    if: needs.detect-changes.outputs.rdbms-integration-tests == 'true'
    needs: [ detect-changes ]
    name: "General / Integration / RDBMS ITs"
    timeout-minutes: 30
    runs-on: gcp-perf-core-8-default
    strategy:
      # In case of stress testing, we want the status from all jobs.
      fail-fast: false
      matrix:
        # Opt-in to stress testing this job via the PR label "ci:stress-test".
        include: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci:stress-test') && fromJson('[{"stressRun":1},{"stressRun":2},{"stressRun":3},{"stressRun":4},{"stressRun":5},{"stressRun":6},{"stressRun":7},{"stressRun":8},{"stressRun":9},{"stressRun":10}]') || fromJson('[{"stressRun":1}]') }}
    outputs:
      flakyTests: ${{ steps.analyze-test-run.outputs.flakyTests }}
    permissions: { }  # no GITHUB_TOKEN is needed
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-build
        with:
          dockerhub-readonly: true
          maven-cache-key-modifier: it-rdbms
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
      - uses: ./.github/actions/build-zeebe
        with:
          maven-extra-args: -T1C -PskipFrontendBuild
      - name: Create build output log file
        run: echo "BUILD_OUTPUT_FILE_PATH=$(mktemp)" >> "$GITHUB_ENV"
      # Run integration tests with RDBMS database
      - name: Maven Test Build DataLayer
        shell: bash
        run: >
          ./mvnw -B -T1C --no-snapshot-updates
          -D forkCount=1
          -D maven.javadoc.skip=true
          -D skipUTs -D skipChecks
          -D failsafe.rerunFailingTestsCount=${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci:stress-test') && '0' || env.FLAKY_TEST_RERUN_COUNT }} -D flaky.test.reportDir=failsafe-reports
          -P rdbms,extract-flaky-tests
          -pl qa/acceptance-tests
          verify
          | tee "${BUILD_OUTPUT_FILE_PATH}"
      - name: Analyze Test Runs
        id: analyze-test-run
        if: always()
        uses: ./.github/actions/analyze-test-runs
        with:
          buildOutputFilePath: ${{ env.BUILD_OUTPUT_FILE_PATH }}
      - name: Upload test artifacts
        uses: ./.github/actions/collect-test-artifacts
        if: ${{ failure() || cancelled() || steps.analyze-test-run.outputs.flakyTests != '' }}
        with:
          name: "[IT] RDBMS (${{ matrix.stressRun }})"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          job_name: ${{ format('rdbms-integration-tests{0}', matrix.stressRun != 1 && format('/{0}', matrix.stressRun) || '') }}
          build_status: ${{ job.status }}
          user_reason: ${{ (steps.analyze-test-run.outputs.flakyTests != '') && 'flaky-tests' || '' }}
          user_description: "General"
          detailed_junit_tests: true
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  integration-tests:
    if: needs.detect-changes.outputs.java-code-changes == 'true'
    name: "${{ matrix.module }} / Integration / ${{ matrix.name }} ITs (${{ matrix.stressRun }})"
    needs: [ detect-changes, setup-tests ]
    timeout-minutes: 30
    permissions: { }  # GITHUB_TOKEN unused in this job
    runs-on: ${{ matrix.runs-on }}
    outputs:
      flakyTests: ${{ steps.analyze-test-run.outputs.flakyTests }}
    strategy:
      # In case of stress testing, we want the status from all jobs.
      fail-fast: false
      matrix:
        # Opt-in to stress testing this job via the PR label "ci:stress-test".
        include: ${{ fromJson(needs.setup-tests.outputs.INTEGRATION_TESTS_MATRIX) }}
    env:
      ZEEBE_TEST_DOCKER_IMAGE: localhost:5000/camunda/zeebe:current-test
      OPERATE_TEST_DOCKER_IMAGE: localhost:5000/camunda/operate:current-test
      TASKLIST_TEST_DOCKER_IMAGE: localhost:5000/camunda/tasklist:current-test
      CAMUNDA_TEST_DOCKER_IMAGE: localhost:5000/camunda/camunda:current-test
      CAMUNDA_DOCKER_IMAGE_NAME: localhost:5000/camunda/camunda
      DOCKER_IMAGE_TAG: current-test
      TEST_TYPE: Integration
    services:
      registry:
        image: registry:3
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Generate cache key with current hour
        if: matrix.group == 'qa-update'
        id: cache-key
        run: echo "hour=$(date -u +%Y%m%d%H)" >> "$GITHUB_OUTPUT"
      - name: Cache Zeebe versions (hourly refresh)
        if: matrix.group == 'qa-update'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .cache/camunda
          key: zeebe-versions-${{ steps.cache-key.outputs.hour }}
          restore-keys: |
            zeebe-versions-
      - name: Print metadata
        uses: ./.github/actions/print-metadata
        with:
          test_product: "${{ matrix.name }}"
          test_owner: "${{ matrix.owner }}"
      - uses: ./.github/actions/setup-build
        with:
          maven-cache-key-modifier: it-${{ matrix.group }}
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          minimus: true
      - uses: ./.github/actions/build-zeebe
        id: build-zeebe
        with:
          maven-extra-args: -T1C -PskipFrontendBuild
      - uses: ./.github/actions/build-platform-docker
        if: ${{ matrix.docker-file != '' }}
        with:
          repository: ${{ matrix.docker-repository }}
          version: ${{ env.DOCKER_IMAGE_TAG }}
          dockerfile: ${{ matrix.docker-file }}
          push: true
          distball: ${{ steps.build-zeebe.outputs.distball }}
      - uses: ./.github/actions/build-platform-docker
        if: ${{ matrix.group == 'root' }}
        with:
          repository: localhost:5000/camunda/operate
          version: ${{ env.DOCKER_IMAGE_TAG }}
          dockerfile: operate.Dockerfile
          push: true
          distball: ${{ steps.build-zeebe.outputs.distball }}
      - uses: ./.github/actions/build-platform-docker
        if: ${{ matrix.group == 'root' }}
        with:
          repository: localhost:5000/camunda/tasklist
          version: ${{ env.DOCKER_IMAGE_TAG }}
          dockerfile: tasklist.Dockerfile
          push: true
          distball: ${{ steps.build-zeebe.outputs.distball }}
      - name: Create build output log file
        run: echo "BUILD_OUTPUT_FILE_PATH=$(mktemp)" >> "$GITHUB_ENV"
      - name: Maven Test Build Integration
        env:
          GH_TOKEN: ${{ github.token }}
          # Propagate matrix test filters (may be empty for other matrix entries)
          TEST_FILTER: ${{ matrix.test-filter }}
          IS_STRESS_ENABLED: ${{ matrix.allow-stress == true && github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci:stress-test') }}
        shell: bash
        run: >
          ./mvnw -B -T ${{ matrix.maven-build-threads }} --no-snapshot-updates
          -D forkCount=${{ matrix.maven-test-fork-count }}
          -D maven.javadoc.skip=true
          -D skipUTs -D skipChecks
          -D failsafe.rerunFailingTestsCount=${{ env.IS_STRESS_ENABLED == 'true' && '0' || env.FLAKY_TEST_RERUN_COUNT }} -D flaky.test.reportDir=failsafe-reports
          -Dio.camunda.process.test.camundaDockerImageName="${{ env.CAMUNDA_DOCKER_IMAGE_NAME }}"
          -Dio.camunda.process.test.camundaDockerImageVersion="${{ env.DOCKER_IMAGE_TAG }}"
          -Dio.camunda.process.test.camundaVersion="${{ env.DOCKER_IMAGE_TAG }}"
          -P parallel-tests,extract-flaky-tests,skipFrontendBuild
          -pl ${{ matrix.maven-modules }}
          ${TEST_FILTER:+-Dit.test="${TEST_FILTER}"}
          verify
          | tee "${BUILD_OUTPUT_FILE_PATH}"
      - name: Analyze Test Runs
        id: analyze-test-run
        if: always()
        continue-on-error: true
        uses: ./.github/actions/analyze-test-runs
        with:
          buildOutputFilePath: ${{ env.BUILD_OUTPUT_FILE_PATH }}
      - name: Upload test artifacts
        uses: ./.github/actions/collect-test-artifacts
        if: ${{ failure() || cancelled() || steps.analyze-test-run.outputs.flakyTests != '' }}
        continue-on-error: true
        with:
          name: "[IT] ${{ matrix.name }} (${{ matrix.stressRun }})"
      - name: Write matrix outputs for test analysis
        uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375 # 1.0.0
        id: matrix-write
        continue-on-error: true
        with:
          matrix-step-name: ${{ github.job }}
          matrix-key: ${{ matrix.module }} - [IT] ${{ matrix.name }} - ${{ matrix.owner }} (${{ matrix.stressRun }})
          outputs: |-
            flakyTests: ${{ toJson(steps.analyze-test-run.outputs.flakyTests) }}
            hasFlaky: ${{ steps.analyze-test-run.outputs.flakyTests != '' }}
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          job_name: ${{ format('integration-tests/{0}{1}', matrix.group, matrix.stressRun != 1 && format('/{0}', matrix.stressRun) || '') }}
          build_status: ${{ job.status }}
          user_reason: ${{ (steps.analyze-test-run.outputs.flakyTests != '') && 'flaky-tests' || '' }}
          user_description: ${{ matrix.owner }}
          detailed_junit_tests: true
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  archunit-tests:
    if: needs.detect-changes.outputs.java-code-changes == 'true'
    name: "General / Unit - ArchUnit"
    needs: [ detect-changes ]
    timeout-minutes: 20
    permissions: { }  # GITHUB_TOKEN unused in this job
    runs-on: gcp-perf-core-16-default
    env:
      TEST_OWNER: General
      TEST_PRODUCT: Camunda
      TEST_TYPE: Unit
    outputs:
      flakyTests: ${{ steps.analyze-test-run.outputs.flakyTests }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - uses: ./.github/actions/setup-build
        with:
          maven-cache-key-modifier: archunit-tests
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
      - uses: ./.github/actions/build-zeebe
        id: build-zeebe
        with:
          maven-extra-args: -T1C -Dquickly
      - name: Create build output log file
        run: echo "BUILD_OUTPUT_FILE_PATH=$(mktemp)" >> "$GITHUB_ENV"
      - name: Maven Test Build
        shell: bash
        # we use the verify goal here as flaky test extraction is bound to the post-integration-test
        # phase of Maven https://maven.apache.org/guides/introduction/introduction-to-the-lifecycle.html#default-lifecycle
        run: >
          ./mvnw -B --no-snapshot-updates
          -D skipITs -D skipQaBuild=false -D skipChecks -Dsurefire.rerunFailingTestsCount=${{ env.FLAKY_TEST_RERUN_COUNT }}
          -P skipFrontendBuild,extract-flaky-tests
          -pl :camunda-archunit-tests
          -am
          -Dtest='*ArchTest'
          -Dsurefire.failIfNoSpecifiedTests=false
          verify
          | tee "${BUILD_OUTPUT_FILE_PATH}"
      - name: Analyze Test Runs
        id: analyze-test-run
        if: always()
        uses: ./.github/actions/analyze-test-runs
        with:
          buildOutputFilePath: ${{ env.BUILD_OUTPUT_FILE_PATH }}
      - name: Upload test artifacts
        uses: ./.github/actions/collect-test-artifacts
        if: ${{ failure() || cancelled() || steps.analyze-test-run.outputs.flakyTests != '' }}
        with:
          name: "[UT] General - ArchUnit"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          user_reason: ${{ (steps.analyze-test-run.outputs.flakyTests != '') && 'flaky-tests' || '' }}
          user_description: "General"
          detailed_junit_tests: true
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  docker-checks:
    if: needs.detect-changes.outputs.camunda-docker-tests == 'true'
    name: "Docker / Tool / Checks"
    needs: [ detect-changes ]
    runs-on: ubuntu-latest
    outputs:
      flakyTests: ${{ steps.analyze-test-run.outputs.flakyTests }}
    timeout-minutes: 30
    permissions:
      security-events: write
    services:
      # local registry is used as this job needs to push as it builds multi-platform images
      registry:
        image: registry:3
        ports:
          - 5000:5000
    env:
      LOCAL_DOCKER_IMAGE: localhost:5000/camunda/camunda
      TEST_ELASTICSEARCH_IMAGE: docker.elastic.co/elasticsearch/elasticsearch:8.19.11
      DOCKER_PLATFORMS: "linux/arm64,linux/amd64" # build AMD64 last so it gets picked up by the test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          config: ./.hadolint.yaml
          dockerfile: ./camunda.Dockerfile
          format: sarif
          output-file: ./hadolint.sarif
          no-color: true
          verbose: true
      - name: Upload Hadolint Results
        if: always()
        continue-on-error: ${{ github.event_name == 'merge_group' }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: ./hadolint.sarif
      - uses: ./.github/actions/setup-build
        with:
          maven-cache-key-modifier: docker-checks
          dockerhub-readonly: true
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          minimus: true
      - uses: ./.github/actions/build-zeebe
        id: build-camunda
        with:
          maven-extra-args: -PskipFrontendBuild,-include-optimize
      - uses: ./.github/actions/build-platform-docker
        id: build-camunda-docker
        with:
          # we use a local registry for pushing
          repository: ${{ env.LOCAL_DOCKER_IMAGE }}
          distball: ${{ steps.build-camunda.outputs.distball }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          dockerfile: camunda.Dockerfile
          # push is needed for multi-arch images as buildkit does not support loading them locally
          push: true

      # Since subsequent steps of this job need a lot of disk space for downloaded
      # database Docker images, we try to clean all unused caches and free space here.
      - name: Cleanup docker images
        run: |
          docker buildx prune -f
          docker system prune -af

      - name: Verify Docker image
        # Skip verification on fork PRs as there public base images are used that don't match our golden labels
        if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
        uses: ./.github/actions/verify-platform-docker
        with:
          imageName: ${{ env.LOCAL_DOCKER_IMAGE }}
          date: ${{ steps.build-camunda-docker.outputs.date }}
          revision: ${{ github.sha }}
          version: ${{ steps.build-camunda-docker.outputs.version }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          goldenfile: camunda-docker-labels.golden.json
          dockerfile: camunda.Dockerfile
      - name: Create build output log file
        run: echo "BUILD_OUTPUT_FILE_PATH=$(mktemp)" >> "$GITHUB_ENV"
      - name: Pull local docker image
        # We pull the image to ensure that we have the right platform image locally,
        # as the runner might be on the arm64 if that was pulled last by the verify step
        run: docker pull ${{ env.LOCAL_DOCKER_IMAGE }}:${{ steps.build-camunda-docker.outputs.version }}
      - name: Run Docker tests
        shell: bash
        # we use the verify goal here as flaky test extraction is bound to the post-integration-test
        # phase of Maven https://maven.apache.org/guides/introduction/introduction-to-the-lifecycle.html#default-lifecycle
        run: >
          ./mvnw -pl dist/ --no-snapshot-updates -DskipChecks -Dassembly.skipAssembly=true
          -DskipUTs -Dit.test=*DockerIT -Dfailsafe.rerunFailingTestsCount=${{ env.FLAKY_TEST_RERUN_COUNT }}
          -P parallel-tests,extract-flaky-tests
          -Dcamunda.docker.test.enabled=true
          -Dcamunda.docker.test.image="${{ env.LOCAL_DOCKER_IMAGE }}:${{ steps.build-camunda-docker.outputs.version }}"
          -Dcamunda.docker.test.elasticsearch.image="${{ env.TEST_ELASTICSEARCH_IMAGE }}"
          verify
          | tee "${BUILD_OUTPUT_FILE_PATH}"
      - name: Analyze Test Runs
        id: analyze-test-run
        if: always()
        uses: ./.github/actions/analyze-test-runs
        with:
          buildOutputFilePath: ${{ env.BUILD_OUTPUT_FILE_PATH }}
      - name: Upload test artifacts
        uses: ./.github/actions/collect-test-artifacts
        if: ${{ failure() || cancelled() || steps.analyze-test-run.outputs.flakyTests != '' }}
        with:
          name: "[IT] Camunda Docker Tests"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          detailed_junit_tests: true
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          user_description: "General"
          user_reason: ${{ (steps.analyze-test-run.outputs.flakyTests != '') && 'flaky-tests' || '' }}

  utils-flaky-tests-summary:
    name: flaky tests summary comment
    if: always() && github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
    needs:
      - archunit-tests
      - database-integration-tests
      - docker-checks
      - general-unit-tests
      - history-tests
      - identity-tests
      - integration-tests
      - rdbms-integration-tests
      - zeebe-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Read Zeebe unit tests matrix outputs
        uses: cloudposse/github-action-matrix-outputs-read@33cac12fa9282a7230a418d859b93fdbc4f27b5a # 1.0.0
        id: zeebe-matrix-read
        with:
          matrix-step-name: zeebe-unit-tests
      - name: Read Integration tests matrix outputs
        uses: cloudposse/github-action-matrix-outputs-read@33cac12fa9282a7230a418d859b93fdbc4f27b5a # 1.0.0
        id: integration-matrix-read
        with:
          matrix-step-name: integration-tests
      - name: Read Database integration tests matrix outputs
        uses: cloudposse/github-action-matrix-outputs-read@33cac12fa9282a7230a418d859b93fdbc4f27b5a # 1.0.0
        id: database-integration-matrix-read
        with:
          matrix-step-name: database-integration-tests
      - name: Read history tests matrix outputs
        uses: cloudposse/github-action-matrix-outputs-read@33cac12fa9282a7230a418d859b93fdbc4f27b5a # 1.0.0
        id: history-matrix-read
        with:
          matrix-step-name: history-tests
      - name: Read identity tests matrix outputs
        uses: cloudposse/github-action-matrix-outputs-read@33cac12fa9282a7230a418d859b93fdbc4f27b5a # 1.0.0
        id: identity-matrix-read
        with:
          matrix-step-name: identity-tests
      - name: Collect flaky test results
        id: collect-results
        uses: ./.github/actions/collect-flaky-tests
        with:
          general-unit-tests-result: ${{ needs.general-unit-tests.result }}
          general-unit-tests-flaky: ${{ needs.general-unit-tests.outputs.flakyTests }}
          database-integration-tests-result: ${{ needs.database-integration-tests.result }}
          database-matrix-output-result: ${{ steps.database-integration-matrix-read.outputs.result }}
          history-tests-result: ${{ needs.history-tests.result }}
          history-matrix-output-result: ${{ steps.history-matrix-read.outputs.result }}
          identity-tests-result: ${{ needs.identity-tests.result }}
          identity-matrix-output-result: ${{ steps.identity-matrix-read.outputs.result }}
          rdbms-tests-result: ${{ needs.rdbms-integration-tests.result }}
          rdbms-tests-flaky: ${{ needs.rdbms-integration-tests.outputs.flakyTests }}
          docker-checks-result: ${{ needs.docker-checks.result }}
          docker-checks-flaky: ${{ needs.docker-checks.outputs.flakyTests }}
          zeebe-tests-result: ${{ needs.zeebe-unit-tests.result }}
          zeebe-matrix-output-result: ${{ steps.zeebe-matrix-read.outputs.result }}
          integration-tests-result: ${{ needs.integration-tests.result }}
          integration-matrix-output-result: ${{ steps.integration-matrix-read.outputs.result }}
      - name: Update flaky tests comment
        uses: ./.github/actions/flaky-tests-summary-comment
        with:
          flaky-tests-data: '${{ steps.collect-results.outputs.flaky_tests_data }}'
          pr-number: ${{ github.event.pull_request.number }}
          branch-name: ${{ github.event.pull_request.head.ref }}
      - name: Delete matrix job generated artifacts
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118 # v6.0.0
        with:
          name: |
            zeebe-unit-tests-*
            integration-tests-*

  identity-frontend-tests:
    if: needs.detect-changes.outputs.identity-frontend-tests == 'true'
    name: "Identity / Unit - Front End"
    needs: [ detect-changes ]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions: { }  # GITHUB_TOKEN unused in this job
    defaults:
      run:
        working-directory: identity/client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'identity/client/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run test:format
      - name: Lint code
        run: npm run test:lint
      - name: Unit & Integration tests
        run: npm run test:unit
      - name: Check licenses
        run: npm run test:licenses
      - name: Build frontend
        run: npm run build
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          user_description: "Identity"

  identity-frontend-sbom-snyk:
    if: needs.detect-changes.outputs.identity-frontend-tests == 'true'
    name: "Identity / Tool - Front End - Snyk SBOM"
    needs: [ detect-changes ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: { }  # GITHUB_TOKEN unused in this job
    env:
      TEST_OWNER: Identity
      TEST_PRODUCT: Identity
      TEST_TYPE: Tool
    defaults:
      run:
        working-directory: identity/client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - name: Import Snyk token from Vault
        id: snyk-secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/camunda/ci/snyk zeebe-api-token | SNYK_TOKEN;
      - uses: ./.github/actions/frontend-sbom-snyk
        env:
          SNYK_TOKEN: ${{ steps.snyk-secrets.outputs.SNYK_TOKEN }}
        with:
          directory: identity/client
          sbom-file: identity/client/dist/cyclonedx/bom.json
          project-name: Identity frontend
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          user_description: "Identity"

  tasklist-ci:
    if: needs.detect-changes.outputs.java-code-changes == 'true' || needs.detect-changes.outputs.frontend-changes == 'true'
    name: "Tasklist"
    needs: [ detect-changes ]
    uses: ./.github/workflows/ci-tasklist.yml
    secrets: inherit
    permissions: { }
    with:
      runFeTests: ${{ needs.detect-changes.outputs.tasklist-frontend-changes  == 'true' }}
      runBeTests: ${{ needs.detect-changes.outputs.tasklist-backend-changes == 'true' || needs.detect-changes.outputs.zeebe-changes == 'true' }}

  operate-ci:
    if: needs.detect-changes.outputs.java-code-changes == 'true' || needs.detect-changes.outputs.frontend-changes == 'true'
    name: "Operate"
    needs: [ detect-changes ]
    uses: ./.github/workflows/ci-operate.yml
    secrets: inherit
    permissions: { }
    with:
      runFeTests: ${{ needs.detect-changes.outputs.operate-frontend-changes == 'true' }}
      runBeTests: ${{ needs.detect-changes.outputs.operate-backend-changes == 'true' || needs.detect-changes.outputs.zeebe-changes == 'true'}}

  optimize-ci:
    if: ${{ needs.detect-changes.outputs.java-code-changes == 'true' || needs.detect-changes.outputs.frontend-changes == 'true' }}
    name: "Optimize"
    needs: [ detect-changes ]
    uses: ./.github/workflows/ci-optimize.yml
    secrets: inherit
    permissions: { }
    with:
      runFeTests: ${{ needs.detect-changes.outputs.optimize-frontend-changes == 'true' }}
      runBeTests: ${{ needs.detect-changes.outputs.optimize-backend-changes == 'true' || needs.detect-changes.outputs.zeebe-changes == 'true' }}

  zeebe-ci:
    if: needs.detect-changes.outputs.zeebe-changes == 'true'
    name: "Zeebe"
    needs: [ detect-changes ]
    uses: ./.github/workflows/ci-zeebe.yml
    secrets: inherit
    with:
      stable-branch: ${{ needs.detect-changes.outputs.stable-branch-changes == 'true' }}

  webapp-client:
    if: needs.detect-changes.outputs.webapp-client-changes == 'true'
    name: "Webapp Client"
    needs: [ detect-changes ]
    uses: ./.github/workflows/ci-webapp-client.yml
    secrets: inherit
    permissions: { }

  # TODO: Enable when we are willing to run these tests on every PR.
  # orchestration-cluster-smoke-tests:
  #   if: needs.detect-changes.outputs.orchestration-cluster-smoke-tests == 'true' || needs.detect-changes.outputs.java-code-changes == 'true' || needs.detect-changes.outputs.frontend-changes == 'true'
  #   name: "Orchestration Cluster / [Smoke] UI"
  #   needs: [ detect-changes ]
  #   uses: ./.github/workflows/ci-orchestration-cluster-smoke-tests.yml
  #   secrets: inherit
  #   permissions: { }

  c8-e2e-test-suite:
    if: needs.detect-changes.outputs.c8-e2e-test-suite-changes == 'true'
    name: "Lint / C8 E2E Test Suite"
    needs: [ detect-changes ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {} # GITHUB_TOKEN unused in this job
    defaults:
      run:
        working-directory: qa/c8-orchestration-cluster-e2e-test-suite
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Lint (tsc + eslint)
        run: npm run lint
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  protobuf-checks:
    name: "Protobuf Backwards Compatibility"
    needs: [ detect-changes ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    env:
      # set the comparison based on the type of workflow trigger:
      #   - for PRs, we use the last commit of the base
      #   - for merge queues, we use the last commit of the target merge queue
      #   - for a push, we use the last commit before the push
      BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
    if: needs.detect-changes.outputs.protobuf-changes == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: pr-body
        name: Fetch latest PR body
        if: github.event_name == 'pull_request'
        run: |
          {
            echo 'result<<EOF'
            gh pr view ${{ github.event.pull_request.number }} --json body | jq '.body'
            echo EOF
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
        # by the default the action will compare against the base branch, or if on push, against the
        # previous commit
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        if: |
          !(contains(steps.pr-body.outputs.result, 'BREAKING CHANGE:') ||
            contains(github.event.merge_group.head_commit.message, 'BREAKING CHANGE:') ||
            contains(github.event.push.commits.*.message, 'BREAKING CHANGE:'))
        with:
          format: false
          lint: false
          push: false
          archive: false
          breaking: true
          breaking_against: '${{ github.event.repository.clone_url }}#format=git,commit=${{ env.BASE_SHA }}'
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          user_description: "General"

  openapi-lint:
    name: "Lint / C8 REST OpenAPI"
    if: needs.detect-changes.outputs.openapi-changes == 'true'
    needs: [ detect-changes ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}  # GITHUB_TOKEN unused in this job
    env:
      # renovate: datasource=npm depName=@stoplight/spectral-cli
      SPECTRAL_VERSION: '6.15.0'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js for Spectral
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - name: Install Spectral CLI
        run: npm install -g "@stoplight/spectral-cli@${SPECTRAL_VERSION}"
        shell: bash
      - name: Run OpenAPI Linter (Structural pass)
        # Spectral provides comprehensive OpenAPI validation including:
        # - Schema structure validation (catches issues like required: false at property level)
        # - x-eventually-consistent annotation correctness (command operations must not be marked eventually consistent)
        # - Works correctly with multi-part specs using external $ref
        run: >
          spectral lint zeebe/gateway-protocol/src/main/proto/v2/rest-api.yaml
          --ruleset zeebe/gateway-protocol/.spectral.yaml
          --fail-severity error
        shell: bash
      - name: Run OpenAPI Linter (File-level pass)
        # - Custom business rules (flow node terminology, key properties, descriptions)
        # This requires a different invocation to the structural pass: glob, to run per-file.
        # See: https://github.com/camunda/camunda/issues/46274
        run: >
          spectral lint "zeebe/gateway-protocol/src/main/proto/v2/*.yaml"
          --ruleset zeebe/gateway-protocol/.spectral.yaml
          --fail-severity error
        shell: bash
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          user_description: "General"

  renovatelint:
    if: needs.detect-changes.outputs.renovate-config-changes == 'true'
    name: "Lint / Renovate Config Validator"
    needs: [ detect-changes ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}  # GITHUB_TOKEN unused in this job
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - run: |
          npx --yes --package "renovate@latest" -c "renovate-config-validator"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  shell-script-tests:
    name: "Shell / Script Tests"
    needs: [ detect-changes ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run ci-relevance tests
        run: bats .github/scripts/ci-relevance/check.bats
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  check-results:
    # Used by the merge queue to check all tests, including the unit test matrix.
    # New test jobs must be added to the `needs` lists!
    # This name is hard-coded in the branch rules; remember to update that if this name changes
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      checks: read
      pull-requests: write
    needs: # BELOW LIST IS IN ALPHABETICAL ORDER
      - actionlint
      - archunit-tests
      - build-platform-frontend
      - c8-e2e-test-suite
      - codeowners-check
      - commitlint
      - database-integration-tests
      - dependency-cycle-check
      - detect-changes
      - docker-checks
      - general-unit-tests
      - history-tests
      - identity-frontend-sbom-snyk
      - identity-frontend-tests
      - identity-tests
      - integration-tests
      - java-checks
      - junit-vintage-check
      - maven-spotless-linter
      - openapi-lint
      - orchestration-cluster-smoke-tests
      - operate-ci
      - optimize-ci
      - protobuf-checks
      - rdbms-integration-tests
      - renovatelint
      - setup-tests
      - shell-script-tests
      - tasklist-ci
      - validate-pom-metadata
      - webapp-client
      - zeebe-ci
      - zeebe-unit-tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check for aborted jobs
        continue-on-error: true
        uses: ./.github/actions/observe-aborted-jobs
        with:
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
      - name: Post CI Failure Reasons
        continue-on-error: true
        uses: ./.github/actions/post-ci-failure-reasons
        with:
          github_token: ${{ github.token }}
          has_failures: ${{ contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure') }}
      - run: |
          echo "The \`check-results\` job has the function to fail if any previous job was unsuccessful!"
          echo "If you're reading this and wondering what the is the problem, please check other GHA jobs of this workflow run to for errors/cancellation and see their logs."

          # shellcheck disable=SC2242
          exit ${{ ((contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure')) && 1) || 0 }}


  # Dynamically generate the concurrency group based on branch name
  utils-get-concurrency-group-for-maven-snapshot:
    needs: [ check-results ]
    uses: ./.github/workflows/generate-concurrency-group.yml
    secrets: inherit
    permissions:
      contents: read
    if: always() && needs.check-results.result == 'success'
    with:
      base_group_name: deploy-maven-snapshot

  deploy-snapshots:
    name: Deploy snapshot artifacts
    needs: [ check-results, utils-get-concurrency-group-for-maven-snapshot ]
    runs-on: gcp-perf-core-8-default
    timeout-minutes: 25
    permissions: { }  # GITHUB_TOKEN unused in this job
    if: always() && needs.check-results.result == 'success' && github.repository == 'camunda/camunda' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/stable/'))
    concurrency:
      group: ${{ needs.utils-get-concurrency-group-for-maven-snapshot.outputs.concurrency_group_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-build
        with:
          maven-cache-key-modifier: snapshots
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
      - uses: ./.github/actions/build-frontend
        id: build-operate-fe
        with:
          directory: ./operate/client
          package-manager: "npm"
      - uses: ./.github/actions/build-frontend
        id: build-tasklist-fe
        with:
          directory: ./tasklist/client
          package-manager: "npm"
      - uses: ./.github/actions/build-frontend
        id: build-identity-fe
        with:
          directory: ./identity/client
          package-manager: "npm"
      # compile and generate-sources to ensure that the Javadoc can be properly generated; compile is
      # necessary when using annotation preprocessors for code generation, as otherwise the symbols are
      # not resolve-able by the Javadoc generator
      - run: ./mvnw -B -T1C -D skipTests -D skipChecks -PskipFrontendBuild compile generate-sources source:jar javadoc:jar deploy
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          user_description: "General"

  # Dynamically generate the Docker tag (e.g., SNAPSHOT or X.Y-SNAPSHOT) based on branch name
  utils-get-snapshot-docker-tag:
    needs: [ check-results ]
    uses: ./.github/workflows/generate-snapshot-docker-tag.yml
    secrets: inherit
    permissions:
      contents: read
    if: always() && needs.check-results.result == 'success'

  # Dynamically generate the concurrency group based on branch name
  utils-get-concurrency-group-for-docker-snapshot:
    needs: [ check-results ]
    uses: ./.github/workflows/generate-concurrency-group.yml
    secrets: inherit
    permissions:
      contents: read
    if: always() && needs.check-results.result == 'success'
    with:
      base_group_name: deploy-camunda-docker-snapshot

  deploy-camunda-docker-snapshot:
    name: Deploy snapshot Camunda Docker image
    needs: [ check-results, utils-get-snapshot-docker-tag, utils-get-concurrency-group-for-docker-snapshot ]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions: { }  # GITHUB_TOKEN unused in this job
    if: always() && needs.check-results.result == 'success' && github.repository == 'camunda/camunda' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/stable/'))
    concurrency:
      group: ${{ needs.utils-get-concurrency-group-for-docker-snapshot.outputs.concurrency_group_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-build
        with:
          dockerhub: true
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          minimus: true
      - uses: ./.github/actions/build-frontend
        id: build-operate-fe
        with:
          directory: ./operate/client
          package-manager: "npm"
      - uses: ./.github/actions/build-frontend
        id: build-tasklist-fe
        with:
          directory: ./tasklist/client
          package-manager: "npm"
      - uses: ./.github/actions/build-frontend
        id: build-identity-fe
        with:
          directory: ./identity/client
          package-manager: "npm"
      - uses: ./.github/actions/build-zeebe
        id: build-camunda
        with:
          maven-extra-args: -PskipFrontendBuild
      - uses: ./.github/actions/build-platform-docker
        id: build-camunda-docker
        with:
          repository: camunda/camunda
          version: |
            ${{ needs.utils-get-snapshot-docker-tag.outputs.version_tag }}
            ${{ needs.utils-get-snapshot-docker-tag.outputs.snapshot_tag }}
          distball: ${{ steps.build-camunda.outputs.distball }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          dockerfile: camunda.Dockerfile
          push: true
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          user_description: "General"
