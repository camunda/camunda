# description: Reusable benchmark pipeline for PR load tests. Handles the full
#              createâ†’awaitâ†’profileâ†’comment cycle for a single benchmark type.
#              Also handles cleanup on label removal/close.
# called-by: camunda-pr-benchmark.yml
# calls: camunda-load-test.yml, profile-load-test.yml
# type: CI
# owner: @camunda/reliability-testing
name: PR Benchmark Pipeline
on:
  workflow_call:
    inputs:
      label:
        description: 'PR label that triggered this benchmark (e.g., benchmark, benchmark-postgresql)'
        required: true
        type: string
      ref:
        description: 'Branch ref to sanitize, deploy, and profile'
        required: true
        type: string
      secondary-storage-type:
        description: 'Storage backend (elasticsearch, opensearch, postgresql, mysql, mariadb, mssql, oracle, none)'
        required: true
        type: string
      reuse-tag:
        description: 'Pre-built image tag from the internal registry. When set, skips the image build step.'
        required: false
        type: string
        default: ''

defaults:
  run:
    shell: bash

env:
  CLUSTER: camunda-benchmark-prod
  TELEPORT_JOIN_TOKEN: infra-benchmark-prod-github-action-zeebe

jobs:
  compute-namespace:
    name: Compute Namespace
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.assemble.outputs.name }}
      storage-type: ${{ inputs.secondary-storage-type }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: compute-suffix
        name: Compute namespace suffix
        run: |
          storage_type="${{ inputs.secondary-storage-type }}"
          suffix=$([[ "$storage_type" == "elasticsearch" ]] && echo "" || echo "-${storage_type}")
          max_length=$((60 - ${#suffix}))
          {
            echo "suffix=$suffix"
            echo "max-length=$max_length"
          } >> "$GITHUB_OUTPUT"

      - id: sanitize
        name: Sanitize branch name
        uses: camunda/infra-global-github-actions/sanitize-branch-name@main
        with:
          branch: ${{ inputs.ref }}
          max_length: ${{ steps.compute-suffix.outputs.max-length }}

      - id: assemble
        name: Assemble namespace name
        run: |
          branch="${{ steps.sanitize.outputs.branch_name }}"
          echo "name=c8-${branch%-}${{ steps.compute-suffix.outputs.suffix }}" >> "$GITHUB_OUTPUT"

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  create-benchmark:
    name: Benchmark
    needs: compute-namespace
    if: >
      (github.event.action == 'labeled' && github.event.label.name == inputs.label) ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, inputs.label))
    uses: ./.github/workflows/camunda-load-test.yml
    secrets: inherit
    with:
      name: ${{ needs.compute-namespace.outputs.name }}
      ref: ${{ inputs.ref }}
      scenario: 'max'
      secondary-storage-type: ${{ needs.compute-namespace.outputs.storage-type }}
      reuse-tag: ${{ inputs.reuse-tag }}

  await-benchmark:
    name: Await Benchmark
    needs: create-benchmark
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Wait for load test to stabilize
        run: sleep 900  # 15 minutes
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  run-profiling:
    name: Run Profiling
    needs: [compute-namespace, await-benchmark]
    uses: ./.github/workflows/profile-load-test.yml
    secrets: inherit
    with:
      name: ${{ needs.compute-namespace.outputs.name }}
      pod: ''
      database: ${{ needs.compute-namespace.outputs.storage-type }}

  comment-pr:
    name: Comment on PR with profiling results
    needs: [run-profiling, compute-namespace]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: 'read'
      pull-requests: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Comment PR with profiling results
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // List all downloaded artifacts
            const artifactPath = 'artifacts';
            const artifacts = fs.readdirSync(artifactPath);

            // Get artifact IDs from GitHub API
            const { data: workflowArtifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            let comment = '## Profiling Results - ${{ needs.compute-namespace.outputs.storage-type }}\n\n';
            comment += 'The benchmark has been profiled with the following events:\n\n';
            comment += '| Event | Pod | Artifact |\n';
            comment += '|-------|-----|----------|\n';

            const artifactPrefix = 'flamegraph-${{ needs.compute-namespace.outputs.storage-type }}';
            const regex = new RegExp(artifactPrefix + '-(\\w+)-(\\w+-\\d+)');
            artifacts.forEach(artifact => {
              const match = artifact.match(regex);
              if (match) {
                const event = match[1];
                const pod = match[2];

                // Find the artifact ID for this artifact name
                const artifactInfo = workflowArtifacts.artifacts.find(a => a.name === artifact);
                if (artifactInfo) {
                  const downloadUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${artifactInfo.id}`;
                  comment += `| ${event} | ${pod} | [Download](${downloadUrl}) |\n`;
                } else {
                  comment += `| ${event} | ${pod} | N/A |\n`;
                }
              }
            });

            comment += '\nđź“Š [View all artifacts and workflow summary](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  delete-benchmark:
    name: Benchmark Cleanup
    needs: compute-namespace
    if: >
      (github.event.action == 'unlabeled' && github.event.label.name == inputs.label) ||
      (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, inputs.label))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Teleport
        uses: teleport-actions/setup@b638ff596557cc3959eb6b5287d5e58e0c8ac6a6 # v1.1.1
        with:
          proxy: camunda.teleport.sh:443
          version: auto
      - name: Authenticate to Cluster using Teleport
        uses: teleport-actions/auth-k8s@0f46164469ae4fcd4d359d40e06bab17d4be17c9 # v2.0.6
        with:
          proxy: camunda.teleport.sh:443
          token: ${{ env.TELEPORT_JOIN_TOKEN }}
          kubernetes-cluster: ${{ env.CLUSTER }}
      - name: Delete benchmark namespace
        run: kubectl delete ns "${{ needs.compute-namespace.outputs.name }}" --ignore-not-found
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
