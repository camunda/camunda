# description: Nightly E2E tests for C8 Orchestration Cluster on stable/8.7
# type: CI
# owner: @camunda/qa-engineering
---
name: "C8 Orchestration Cluster Nightly: 8.7 E2E Tests"

on:
  schedule:
    - cron: "0 0 * * *" # Run at midnight UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-v1:
    uses: ./.github/workflows/c8-orchestration-cluster-e2e-tests-reusable-e2e.yml
    with:
      branch: stable/8.7
      camunda_docker_image: "camunda/camunda:8.7-SNAPSHOT"
      is_standalone: false
      tasklist_mode: v1
      test_args: "--project=chromium"
      observe_job_name: "c8-orchestration-cluster-e2e-nightly-tests/stable-8.7/v1"
    secrets: inherit
