# description: Regenerates load-tests/setup golden files (rendered Kubernetes manifests) and
#              commits the diff back to the PR branch when the "generate-golden" label is
#              present. Companion to load-test-golden-test.yml, which only verifies.
# test location: load-tests/setup/test
# type: ci
# owner: @camunda/reliability-testing
---
name: Load Test Setup - Golden File Update

on:
  pull_request:
    types: [labeled, synchronize]
    paths:
      - "load-tests/setup/**"

# Limit workflow to 1 concurrent run per ref (branch): new commit -> old runs are canceled to save costs
# Exception for main branch: complete builds for every commit needed for confidenence
concurrency:
  cancel-in-progress: true
  group: ${{ format('{0}-{1}', github.workflow, github.ref == 'refs/heads/main' && github.sha || github.ref) }}

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  update-golden:
    if: github.event.pull_request.state != 'closed' && (github.event.label.name == 'generate-golden' || contains(github.event.pull_request.labels.*.name, 'generate-golden'))
    name: Update Golden Files
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: load-tests/setup/test/go.mod
          cache-dependency-path: load-tests/setup/test/go.sum

      - name: Set up Helm
        uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

      - name: Regenerate golden files
        working-directory: load-tests/setup/test
        run: make update-golden

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push golden files
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git add load-tests/setup/test/golden/
          if git diff --cached --quiet; then
            echo "No golden file changes to commit."
          else
            git commit -m "test: update golden files"
            git push origin HEAD:"$BRANCH"
          fi

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
