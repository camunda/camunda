# type: Project Management
# owner: @camunda/core-features-team
---
# Urgency Field Automation
#
# This workflow automatically calculates and updates the Urgency field for issues.
#
# How it works:
# - Triggers when issues are opened, labeled, unlabeled, reopened, or transferred
# - Calculates urgency based on severity/likelihood OR impact/when labels using risk matrices
# - Updates the org-level Urgency issue field with values: immediate, next, planned, someday
# - Syncs urgency to project-level Urgency fields for configured projects (e.g. #187)
# - Can be called from other repos via workflow_call for cross-repo support
#
# Labels (Option 1 - Risk-based):
# - severity/{low,mid,high,critical} - Required to trigger severity/likelihood calculation
# - likelihood/{low,mid,high,unknown} - Optional, defaults to unknown (treated as low)
#
# Labels (Option 2 - Impact-based):
# - impact/{low,medium,high} - Required to trigger impact/when calculation
# - when/{later,soon,now} - Optional, defaults to later
#
# Other labels:
# - urgency-locked - Prevents automatic urgency updates while showing calculated value
#
# Note: If both severity and impact labels are present, the higher urgency wins
#
# Manual usage:
#   gh workflow run assign-urgency-to-issue.yml -f issue_number=123
#
# Cross-repo usage (add to other repos in the org):
#   jobs:
#     urgency:
#       uses: camunda/camunda/.github/workflows/assign-urgency-to-issue.yml@main
#       with:
#         issue_number: ${{ github.event.issue.number }}
#         repo: ${{ github.event.repository.name }}
#       secrets: inherit
#
name: Assign urgency field when issue is updated

on:
  issues:
    types: [opened, labeled, unlabeled, reopened, transferred]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
      dry_run:
        description: 'Dry run mode - calculate urgency but do not update field'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      issue_number:
        description: 'Issue number to process (must be numeric)'
        required: true
        type: string # workflow_call only supports string/boolean; GraphQL -F coerces to Int
      repo:
        description: 'Repository name (e.g. web-modeler)'
        required: true
        type: string

concurrency:
  group: update-urgency-${{ inputs.issue_number || github.event.inputs.issue_number || github.event.issue.number }}-${{ inputs.repo || github.event.repository.name }}
  cancel-in-progress: true

jobs:
  assign-urgency-to-issue:
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 10
    env:
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ inputs.repo || github.event.repository.name }}
      ISSUE_NUMBER: ${{ inputs.issue_number || github.event.inputs.issue_number || github.event.issue.number }}
      # Org-level Urgency issue field (camunda org, single-select)
      # Query: gh api graphql -f query='{organization(login:"camunda"){issueFields(first:30){nodes{...on IssueFieldSingleSelect{id name options{id name}}}}}}'
      URGENCY_FIELD_ID: 'IFSS_kgDNKAw'
      # Projects whose project-level Urgency field should be kept in sync
      # (for public projects where org-level fields are not visible)
      SYNC_PROJECT_NUMBERS: '187'
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Generate GitHub token
        id: github-token
        uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@fc4fa13813cbc1835129967f10a12f24aa7a393c # main
        with:
          github-app-id-vault-key: PROJECT_BOARD_AUTOMATION_APP_ID
          github-app-id-vault-path: secret/data/products/camunda/ci/camunda
          github-app-private-key-vault-key: PROJECT_BOARD_AUTOMATION_APP_PRIVATE_KEY
          github-app-private-key-vault-path: secret/data/products/camunda/ci/camunda
          vault-auth-method: approle
          vault-auth-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-auth-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          vault-url: ${{ secrets.VAULT_ADDR }}
      - name: Dump event issue JSON
        run: |
          cat << 'EOF'
          ${{ toJSON(github.event.issue) }}
          EOF
      - name: Fetch issue data
        id: fetch_data
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "🔬 DRY RUN MODE - No changes will be made"
          fi

          # Validate issue number is numeric
          if ! [[ "$ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "❌ Invalid issue number: '$ISSUE_NUMBER' (must be numeric)"
            exit 1
          fi

          echo "🔍 Fetching issue #${ISSUE_NUMBER} from ${OWNER}/${REPO}"

          # Fetch issue labels, type, current org-level urgency, and project memberships
          QUERY="query(\$owner:String!,\$repo:String!,\$issueNumber:Int!){
            repository(owner:\$owner,name:\$repo){
              issue(number:\$issueNumber){
                id
                issueType { name }
                labels(first:100){ nodes { name } }
                issueFieldValues(first:50){
                  nodes{
                    ... on IssueFieldSingleSelectValue {
                      field { ... on IssueFieldSingleSelect { id name } }
                      name
                      optionId
                    }
                  }
                }
                projectItems(first:100){
                  nodes{
                    id
                    project{ id number }
                    fieldValues(first:50){
                      nodes{
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          field { ... on ProjectV2SingleSelectField { name } }
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          }"

          RESP=$(gh api graphql -f query="$QUERY" -F owner="$OWNER" -F repo="$REPO" -F issueNumber="$ISSUE_NUMBER") || {
            echo "❌ GraphQL query failed:"
            echo "$RESP"
            exit 1
          }

          ISSUE_DATA=$(echo "$RESP" | jq -c '.data.repository.issue')

          if [[ "$ISSUE_DATA" == "null" || -z "$ISSUE_DATA" ]]; then
            echo "❌ Issue #${ISSUE_NUMBER} not found in ${OWNER}/${REPO}"
            exit 1
          fi

          echo "✅ Fetched issue data"

          {
            echo "issue_data<<EOF"
            echo "$ISSUE_DATA"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check labels
        id: check_labels
        run: |
          set -euo pipefail

          ISSUE_DATA='${{ steps.fetch_data.outputs.issue_data }}'

          # Extract issue type and labels
          ISSUE_TYPE=$(echo "$ISSUE_DATA" | jq -r '.issueType.name // empty')
          LABELS=$(echo "$ISSUE_DATA" | jq -c '.labels.nodes | map(.name)')

          echo "📋 Issue type: ${ISSUE_TYPE:-none}"

          # Extract and validate severity, likelihood, impact & when
          severity=$(echo "$LABELS" | jq -r '.[] | select(startswith("severity/")) | sub("severity/"; "") | select(. == "low" or . == "mid" or . == "high" or . == "critical")' | head -n1)
          likelihood=$(echo "$LABELS" | jq -r '.[] | select(startswith("likelihood/")) | sub("likelihood/"; "") | select(. == "low" or . == "mid" or . == "high" or . == "unknown")' | head -n1)
          impact=$(echo "$LABELS" | jq -r '.[] | select(startswith("impact/")) | sub("impact/"; "") | select(. == "low" or . == "medium" or . == "high")' | head -n1)
          when=$(echo "$LABELS" | jq -r '.[] | select(startswith("when/")) | sub("when/"; "") | select(. == "later" or . == "soon" or . == "now")' | head -n1)

          # Log extracted labels
          if [[ -n "$severity" ]]; then
            echo "🏷️ Severity: $severity"
          fi

          if [[ -n "$likelihood" ]]; then
            echo "🏷️ Likelihood: $likelihood"
          fi

          if [[ -n "$impact" ]]; then
            echo "🏷️ Impact: $impact"
          fi

          if [[ -n "$when" ]]; then
            echo "🏷️ When: $when"
          fi

          # Log hint if no matching labels found
          if [[ -z "$severity" && -z "$impact" ]]; then
            echo "💡 No severity or impact labels found - urgency will not be calculated"
          fi

          # Check for urgency-locked label
          has_urgency_locked=$(echo "$LABELS" | jq -r 'any(. == "urgency-locked")')

          if [[ "$has_urgency_locked" == "true" ]]; then
            echo "🔒 Issue has 'urgency-locked' label - automatic urgency updates will be skipped"
          fi

          {
            echo "severity=$severity"
            echo "likelihood=$likelihood"
            echo "impact=$impact"
            echo "when=$when"
            echo "has_urgency_locked=$has_urgency_locked"
          } >> "$GITHUB_OUTPUT"

      - name: Calculate urgency from severity
        id: calculate_urgency_from_severity
        if: steps.check_labels.outputs.severity != ''
        run: |
          set -euo pipefail
          SEVERITY='${{ steps.check_labels.outputs.severity }}'
          LIKELIHOOD='${{ steps.check_labels.outputs.likelihood }}'

          # Default missing or unknown likelihood to low
          if [[ -z "$LIKELIHOOD" || "$LIKELIHOOD" == "unknown" ]]; then
            LIKELIHOOD="low"
            echo "ℹ️  Likelihood not set or unknown, using low for urgency calculation"
          fi

          # Severity/Likelihood Matrix:
          #   Likelihood →     low        mid        high
          #   Severity ↓
          #   low              someday    someday    someday
          #   mid              someday    planned    next
          #   high             planned    next       next
          #   critical         immediate  immediate  immediate
          #
          # Use case statement for bash 3.2+ compatibility
          case "${SEVERITY}_${LIKELIHOOD}" in
            low_low|low_mid|low_high|mid_low)
              URGENCY="someday"
              ;;
            mid_mid|high_low)
              URGENCY="planned"
              ;;
            mid_high|high_mid|high_high)
              URGENCY="next"
              ;;
            critical_low|critical_mid|critical_high)
              URGENCY="immediate"
              ;;
            *)
              URGENCY="someday"
              ;;
          esac

          echo "🎯 Urgency (from severity/likelihood): $URGENCY"
          echo "urgency=$URGENCY" >> "$GITHUB_OUTPUT"

      - name: Calculate urgency from impact
        id: calculate_urgency_from_impact
        if: steps.check_labels.outputs.impact != ''
        run: |
          set -euo pipefail
          IMPACT='${{ steps.check_labels.outputs.impact }}'
          WHEN='${{ steps.check_labels.outputs.when }}'

          # Default when to later if not set
          if [[ -z "$WHEN" ]]; then
            WHEN="later"
            echo "ℹ️  When not set, defaulting to later"
          fi

          # Impact/When Matrix:
          #   When →           later      soon       now
          #   Impact ↓
          #   low              someday    planned    planned
          #   medium           planned    next       next
          #   high             planned    next       immediate
          #
          # Use case statement for bash 3.2+ compatibility
          case "${IMPACT}_${WHEN}" in
            low_later)
              URGENCY="someday"
              ;;
            low_soon|low_now|medium_later|high_later)
              URGENCY="planned"
              ;;
            medium_soon|medium_now|high_soon)
              URGENCY="next"
              ;;
            high_now)
              URGENCY="immediate"
              ;;
            *)
              URGENCY="someday"
              ;;
          esac

          echo "🎯 Urgency (from impact/when): $URGENCY"
          echo "urgency=$URGENCY" >> "$GITHUB_OUTPUT"

      - name: Validate urgency
        id: validate_urgency
        if: steps.calculate_urgency_from_severity.outputs.urgency != '' || steps.calculate_urgency_from_impact.outputs.urgency != ''
        run: |
          set -euo pipefail
          URGENCY_FROM_SEVERITY='${{ steps.calculate_urgency_from_severity.outputs.urgency }}'
          URGENCY_FROM_IMPACT='${{ steps.calculate_urgency_from_impact.outputs.urgency }}'

          # Urgency priority: immediate > next > planned > someday
          # Use case statement for bash 3.2+ compatibility
          get_urgency_priority() {
            case "$1" in
              immediate) echo 4 ;;
              next) echo 3 ;;
              planned) echo 2 ;;
              someday) echo 1 ;;
              *) echo 0 ;;
            esac
          }

          if [[ -n "$URGENCY_FROM_IMPACT" && -n "$URGENCY_FROM_SEVERITY" ]]; then
            IMPACT_PRIORITY=$(get_urgency_priority "$URGENCY_FROM_IMPACT")
            SEVERITY_PRIORITY=$(get_urgency_priority "$URGENCY_FROM_SEVERITY")

            if (( IMPACT_PRIORITY >= SEVERITY_PRIORITY )); then
              URGENCY="$URGENCY_FROM_IMPACT"
            else
              URGENCY="$URGENCY_FROM_SEVERITY"
            fi
            echo "🎯 Selected urgency: $URGENCY (from severity=$URGENCY_FROM_SEVERITY, from impact=$URGENCY_FROM_IMPACT)"
          elif [[ -n "$URGENCY_FROM_IMPACT" ]]; then
            URGENCY="$URGENCY_FROM_IMPACT"
            echo "🎯 Selected urgency: $URGENCY"
          else
            URGENCY="$URGENCY_FROM_SEVERITY"
            echo "🎯 Selected urgency: $URGENCY"
          fi

          echo "urgency=$URGENCY" >> "$GITHUB_OUTPUT"

      - name: Update org-level Urgency field
        if: steps.validate_urgency.outputs.urgency != ''
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        run: |
          set -euo pipefail

          ISSUE_DATA='${{ steps.fetch_data.outputs.issue_data }}'
          ISSUE_ID=$(echo "$ISSUE_DATA" | jq -r '.id')
          NEW_URGENCY='${{ steps.validate_urgency.outputs.urgency }}'
          HAS_URGENCY_LOCKED='${{ steps.check_labels.outputs.has_urgency_locked }}'

          # Org-level urgency field option IDs
          declare -A OPTION_IDS=(
            [immediate]="IFSSO_kgDNOUI"
            [next]="IFSSO_kgDNOUM"
            [planned]="IFSSO_kgDNOUQ"
            [someday]="IFSSO_kgDNOUU"
          )

          # Extract current urgency value from org-level issue field
          CURRENT_URGENCY=$(echo "$ISSUE_DATA" | jq -r --arg fieldId "$URGENCY_FIELD_ID" \
            '.issueFieldValues.nodes[] | select(.field.id==$fieldId) | .name // empty')

          echo "🔄 Org-level urgency: '${CURRENT_URGENCY:-(empty)}' → '${NEW_URGENCY}'"

          # Check if urgency would change
          if [[ "$CURRENT_URGENCY" == "$NEW_URGENCY" ]]; then
            echo "⏭️ Org-level urgency already set to '$NEW_URGENCY'"
            exit 0
          fi

          # Check for urgency-locked label
          if [[ "$HAS_URGENCY_LOCKED" == "true" ]]; then
            echo "🔒 Update skipped - issue has 'urgency-locked' label"
            exit 0
          fi

          # Dry run check
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "🔬 DRY RUN: Update skipped (dry run mode)"
            exit 0
          fi

          OPTION_ID="${OPTION_IDS[$NEW_URGENCY]:-}"

          if [[ -z "$OPTION_ID" ]]; then
            echo "❌ No option ID mapped for urgency value '$NEW_URGENCY'"
            exit 1
          fi

          JSON_PAYLOAD=$(jq -n \
            --arg issueId "$ISSUE_ID" \
            --arg fieldId "$URGENCY_FIELD_ID" \
            --arg optionId "$OPTION_ID" \
            '{
              "query": "mutation($input: SetIssueFieldValueInput!) { setIssueFieldValue(input: $input) { issue { id } } }",
              "variables": {
                "input": {
                  "issueId": $issueId,
                  "issueFields": [{
                    "fieldId": $fieldId,
                    "singleSelectOptionId": $optionId
                  }]
                }
              }
            }')

          MUTATION_RESP=$(gh api graphql -H "Content-Type: application/json" --input - <<< "$JSON_PAYLOAD" 2>&1) || {
            echo "❌ GraphQL mutation failed:"
            echo "$MUTATION_RESP"
            exit 1
          }

          if echo "$MUTATION_RESP" | jq -e '.errors' > /dev/null 2>&1; then
            echo "❌ GraphQL mutation returned errors:"
            echo "$MUTATION_RESP" | jq '.errors'
            exit 1
          fi

          echo "✅ Updated org-level urgency: '${CURRENT_URGENCY:-(empty)}' → '${NEW_URGENCY}'"

      - name: Sync urgency to project-level fields
        if: steps.validate_urgency.outputs.urgency != ''
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        run: |
          set -euo pipefail

          ISSUE_DATA='${{ steps.fetch_data.outputs.issue_data }}'
          URGENCY_FIELD_NAME='Urgency'
          HAS_URGENCY_LOCKED='${{ steps.check_labels.outputs.has_urgency_locked }}'

          # For locked issues, use the current org-level value instead of the calculated one
          if [[ "$HAS_URGENCY_LOCKED" == "true" ]]; then
            NEW_URGENCY=$(echo "$ISSUE_DATA" | jq -r --arg fieldId "$URGENCY_FIELD_ID" \
              '.issueFieldValues.nodes[] | select(.field.id==$fieldId) | .name // empty')
            if [[ -z "$NEW_URGENCY" ]]; then
              echo "🔒 urgency-locked but no org-level value to sync — skipping"
              exit 0
            fi
            echo "🔒 urgency-locked — syncing org-level value '$NEW_URGENCY' to project"
          else
            NEW_URGENCY='${{ steps.validate_urgency.outputs.urgency }}'
          fi

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "🔬 DRY RUN: Project sync skipped"
            exit 0
          fi

          # Iterate over configured projects to sync
          for PROJECT_NUM in $SYNC_PROJECT_NUMBERS; do
            # Find the project item for this project
            PROJECT_ITEM=$(echo "$ISSUE_DATA" | jq -c --argjson pn "$PROJECT_NUM" \
              '.projectItems.nodes[] | select(.project.number==$pn)')

            if [[ -z "$PROJECT_ITEM" || "$PROJECT_ITEM" == "null" ]]; then
              echo "⏭️ Issue not in project #${PROJECT_NUM} — skipping sync"
              continue
            fi

            PROJECT_ITEM_ID=$(echo "$PROJECT_ITEM" | jq -r '.id')
            PROJECT_V2_ID=$(echo "$PROJECT_ITEM" | jq -r '.project.id')

            # Check current project-level urgency
            CURRENT_PROJECT_URGENCY=$(echo "$PROJECT_ITEM" | jq -r --arg fn "$URGENCY_FIELD_NAME" \
              '.fieldValues.nodes[] | select(.field.name==$fn) | .name // empty')

            if [[ "$CURRENT_PROJECT_URGENCY" == "$NEW_URGENCY" ]]; then
              echo "⏭️ Project #${PROJECT_NUM}: already set to '$NEW_URGENCY'"
              continue
            fi

            echo "🔄 Project #${PROJECT_NUM}: '${CURRENT_PROJECT_URGENCY:-(empty)}' → '${NEW_URGENCY}'"

            # Fetch project field and option IDs
            FIELD_DATA=$(gh api graphql -f query="
              query(\$projectId:ID!){
                node(id:\$projectId){
                  ... on ProjectV2 {
                    fields(first:100){
                      nodes{
                        ... on ProjectV2SingleSelectField { id name options { id name } }
                      }
                    }
                  }
                }
              }" -F projectId="$PROJECT_V2_ID") || {
              echo "⚠️ Project #${PROJECT_NUM}: failed to fetch fields — skipping"
              continue
            }

            FIELD_ID=$(echo "$FIELD_DATA" | jq -r --arg name "$URGENCY_FIELD_NAME" \
              '.data.node.fields.nodes[] | select(.name==$name) | .id // empty')

            if [[ -z "$FIELD_ID" ]]; then
              echo "⏭️ Project #${PROJECT_NUM}: no '$URGENCY_FIELD_NAME' field — skipping"
              continue
            fi

            OPTION_ID=$(echo "$FIELD_DATA" | jq -r --arg name "$URGENCY_FIELD_NAME" --arg value "$NEW_URGENCY" \
              '.data.node.fields.nodes[] | select(.name==$name) | .options[]? | select(.name==$value) | .id // empty')

            if [[ -z "$OPTION_ID" ]]; then
              echo "⚠️ Project #${PROJECT_NUM}: option '$NEW_URGENCY' not found — skipping"
              continue
            fi

            # Update project-level field
            JSON_PAYLOAD=$(jq -n \
              --arg projectId "$PROJECT_V2_ID" \
              --arg itemId "$PROJECT_ITEM_ID" \
              --arg fieldId "$FIELD_ID" \
              --arg optionId "$OPTION_ID" \
              '{
                "query": "mutation($input: UpdateProjectV2ItemFieldValueInput!) { updateProjectV2ItemFieldValue(input: $input) { projectV2Item { id } } }",
                "variables": {
                  "input": {
                    "projectId": $projectId,
                    "itemId": $itemId,
                    "fieldId": $fieldId,
                    "value": { "singleSelectOptionId": $optionId }
                  }
                }
              }')

            MUTATION_RESP=$(gh api graphql -H "Content-Type: application/json" --input - <<< "$JSON_PAYLOAD" 2>&1) || {
              echo "⚠️ Project #${PROJECT_NUM}: mutation failed — skipping"
              continue
            }

            if echo "$MUTATION_RESP" | jq -e '.errors' > /dev/null 2>&1; then
              echo "⚠️ Project #${PROJECT_NUM}: mutation errors:"
              echo "$MUTATION_RESP" | jq '.errors'
              continue
            fi

            echo "✅ Project #${PROJECT_NUM}: synced to '${NEW_URGENCY}'"
          done
