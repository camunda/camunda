# description: This workflow runs a smoke test for the load test setup when load test files or workflow are changed.
# It deploys a load test with a branch-specific namespace to verify the setup works correctly, then cleans up the namespace.
# type: CI
# owner: camunda/orchestration-cluster-team

name: Camunda smoke load test
on:
  push:
    branches:
      - main
      - stable/*
      - release-*
    paths:
      - '.github/workflows/camunda-load-test.yml'
      - '.github/workflows/camunda-smoke-load-test.yml'
      - 'load-tests/**'
  pull_request:
    paths:
      - '.github/workflows/camunda-load-test.yml'
      - '.github/workflows/camunda-smoke-load-test.yml'
      - 'load-tests/**'

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

env:
  CLUSTER: camunda-benchmark-prod
  TELEPORT_JOIN_TOKEN: infra-benchmark-prod-github-action-zeebe

jobs:
  calculate-test-name:
    name: Calculate test name
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: { }
    outputs:
      test-name: ${{ steps.name.outputs.test-name }}
    steps:
      - uses: actions/checkout@v6
      - name: Calculate test name
        id: name
        run: |
          # Create a unique test name based on the branch and commit
          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          # Sanitize branch name for use as namespace (remove slashes, replace with dashes)
          sanitized_branch="${branch_name//\//-}"
          # Truncate to fit namespace constraints and add commit hash
          short_commit="$(git rev-parse --short HEAD)"
          test_name="smoke-${sanitized_branch}-${short_commit}"
          # Ensure namespace starts with c8- as required by access policy
          echo "test-name=c8-${test_name}" | cut -c1-63 >> "$GITHUB_OUTPUT"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  run-smoke-load-test:
    name: Deploy smoke load test
    needs: calculate-test-name
    uses: ./.github/workflows/camunda-load-test.yml
    secrets: inherit
    with:
      name: ${{ needs.calculate-test-name.outputs.test-name }}
      ttl: 1
      scenario: latency
      enable-optimize: false
      build-frontend: false

  cleanup-namespace:
    name: Cleanup namespace
    needs:
      - calculate-test-name
      - run-smoke-load-test
    if: always() && needs.calculate-test-name.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Teleport
        uses: teleport-actions/setup@v1
        with:
          version: 17.2.2
      - name: Authenticate to Cluster using Teleport
        uses: teleport-actions/auth-k8s@v2
        with:
          proxy: camunda.teleport.sh:443
          token: ${{ env.TELEPORT_JOIN_TOKEN }}
          kubernetes-cluster: ${{ env.CLUSTER }}
      - name: Delete namespace
        run: |
          namespace="${{ needs.calculate-test-name.outputs.test-name }}"
          echo "Deleting namespace: $namespace"
          cd load-tests/setup
          ./deleteLoadTest.sh "$namespace" || echo "Namespace deletion initiated or already deleted"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
