# description: Nightly frontend SBOM vulnerability scan using Snyk.
#              Reports failures to #team-core-features-frontend on Slack.
# type: CI
# owner: @camunda/core-features
---
name: Frontend SBOM Snyk Nightly

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch: {}

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  TEST_OWNER: '@camunda/core-features'

jobs:
  identity-fe-sbom-snyk:
    name: "Identity / Front End - Snyk SBOM"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: {}
    env:
      TEST_TYPE: Tool
    defaults:
      run:
        working-directory: identity/client
    steps:
      - uses: camunda/infra-global-github-actions/start-build-monitor@be5b0496892a83e6b3c5cedb818b771e8ed68121 # main
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 1
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - name: Import Snyk token from Vault
        id: snyk-secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/camunda/ci/snyk zeebe-api-token | SNYK_TOKEN;
      - uses: ./.github/actions/frontend-sbom-snyk
        env:
          SNYK_TOKEN: ${{ steps.snyk-secrets.outputs.SNYK_TOKEN }}
        with:
          directory: identity/client
          sbom-file: identity/client/dist/cyclonedx/bom.json
          project-name: Identity frontend
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  operate-fe-sbom-snyk:
    name: "Operate / Front End - Snyk SBOM"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: {}
    env:
      TEST_TYPE: Tool
    defaults:
      run:
        working-directory: operate/client
    steps:
      - uses: camunda/infra-global-github-actions/start-build-monitor@be5b0496892a83e6b3c5cedb818b771e8ed68121 # main
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 1
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - name: Import Snyk token from Vault
        id: snyk-secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/camunda/ci/snyk zeebe-api-token | SNYK_TOKEN;
      - name: Generate and scan frontend SBOM
        uses: ./.github/actions/frontend-sbom-snyk
        env:
          SNYK_TOKEN: ${{ steps.snyk-secrets.outputs.SNYK_TOKEN }}
        with:
          directory: operate/client
          sbom-file: operate/client/build/cyclonedx/bom.json
          project-name: Operate frontend
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  tasklist-fe-sbom-snyk:
    name: "Tasklist / Front End - Snyk SBOM"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: {}
    env:
      TEST_TYPE: Tool
    defaults:
      run:
        working-directory: tasklist/client
    steps:
      - uses: camunda/infra-global-github-actions/start-build-monitor@be5b0496892a83e6b3c5cedb818b771e8ed68121 # main
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 1
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - name: Import Snyk token from Vault
        id: snyk-secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/camunda/ci/snyk zeebe-api-token | SNYK_TOKEN;
      - name: Generate and scan frontend SBOM
        uses: ./.github/actions/frontend-sbom-snyk
        env:
          SNYK_TOKEN: ${{ steps.snyk-secrets.outputs.SNYK_TOKEN }}
        with:
          directory: tasklist/client
          sbom-file: tasklist/client/build/cyclonedx/bom.json
          project-name: Tasklist frontend
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  optimize-fe-sbom-snyk:
    name: "Optimize / Front End - Snyk SBOM"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: {}
    defaults:
      run:
        working-directory: optimize/client
    env:
      TEST_TYPE: Tool
    steps:
      - uses: camunda/infra-global-github-actions/start-build-monitor@be5b0496892a83e6b3c5cedb818b771e8ed68121 # main
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 1
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - name: "Parse pom.xml for versions"
        id: "pom_info"
        uses: YunaBraska/java-info-action@06acbcb53e1e6234536ce18519dcd5d24a7e5fbe # 3.0.7
        with:
          work-dir: ./optimize
      - uses: camunda/infra-global-github-actions/setup-yarn-cache@f7e888c5b7d9220bb4a549306c1cbaf798670d0e # setup-yarn-cache: v1.0.0
        with:
          directory: optimize/client
      - name: Import Snyk token from Vault
        id: snyk-secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/camunda/ci/snyk zeebe-api-token | SNYK_TOKEN;
      - name: Generate and scan frontend SBOM
        uses: ./.github/actions/frontend-sbom-snyk
        env:
          SNYK_TOKEN: ${{ steps.snyk-secrets.outputs.SNYK_TOKEN }}
        with:
          directory: optimize/client
          package-manager: yarn
          node-version: ${{ steps.pom_info.outputs.x_version_node }}
          sbom-file: optimize/client/dist/cyclonedx/bom.json
          project-name: Optimize frontend
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  report-to-slack:
    name: "Report failures to Slack"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    needs:
      - identity-fe-sbom-snyk
      - operate-fe-sbom-snyk
      - tasklist-fe-sbom-snyk
      - optimize-fe-sbom-snyk
    if: always() && contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 1
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - name: Import Slack token from Vault
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/camunda/ci/github-actions SLACK_CORE_DOMAIN_BOT_TOKEN;
      - name: Build status summary
        id: summary
        run: |
          identity="${{ needs.identity-fe-sbom-snyk.result }}"
          operate="${{ needs.operate-fe-sbom-snyk.result }}"
          tasklist="${{ needs.tasklist-fe-sbom-snyk.result }}"
          optimize="${{ needs.optimize-fe-sbom-snyk.result }}"

          icon() { [[ "$1" == "success" ]] && echo ":white_check_mark:" || echo ":x:"; }

          {
            echo "REPORT<<EOF"
            echo "$(icon "$identity") *Identity* — ${identity}"
            echo "$(icon "$operate") *Operate* — ${operate}"
            echo "$(icon "$tasklist") *Tasklist* — ${tasklist}"
            echo "$(icon "$optimize") *Optimize* — ${optimize}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Post to Slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ steps.secrets.outputs.SLACK_CORE_DOMAIN_BOT_TOKEN }}
          payload: |
            channel: "C0A0SKKTXD0"
            text: "Frontend SBOM Snyk Nightly — failures detected"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "Frontend SBOM Snyk Nightly — failures detected"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: ${{ toJSON(steps.summary.outputs.REPORT) }}
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
