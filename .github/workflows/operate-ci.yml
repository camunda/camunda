# description: Runs legacy integration CI tests
# test location: operate/qa/integration-tests
# type: CI
# owner: @camunda/core-features, @camunda/data-layer
name: "[Legacy] Operate"
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'stable/**'
      - 'release**'
    paths:
      - '.ci/**'
      - '.github/actions/**'
      - '.github/workflows/operate-*'
      - 'bom/*'
      - 'operate.Dockerfile'
      - 'operate/**'
      - 'parent/*'
      - 'pom.xml'
      - 'webapps-common/**'
      - 'zeebe/**'
      - 'clients/**'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - '.ci/**'
      - '.github/actions/**'
      - '.github/workflows/operate-*'
      - 'bom/*'
      - 'operate/**'
      - 'pom.xml'
      - 'operate.Dockerfile'
      - 'parent/*'
      - 'webapps-common/**'
      - 'zeebe/**'
      - 'clients/**'
permissions:
  contents: read

# Limit workflow to 1 concurrent run per ref (branch): new commit -> old runs are canceled to save costs
# Exception for main branch: complete builds for every commit needed for confidenence
concurrency:
  cancel-in-progress: true
  group: ${{ format('{0}-{1}', github.workflow, github.ref == 'refs/heads/main' && github.sha || github.ref) }}

jobs:
  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      pull-requests: write
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/ci-gate
      - uses: ./.github/actions/ci-gate
        id: gate
        with:
          github-token: ${{ github.token }}

  # builds image and pushes to Dockerhub if branch is `main`
  run-operate-build:
    name: "Build / Operate and Image"
    needs: [ci-gate]
    if: needs.ci-gate.outputs.should-run == 'true'
    uses: ./.github/workflows/operate-ci-build-reusable.yml
    secrets: inherit
    with:
      branch: ${{ github.head_ref || github.ref_name }} # head_ref = branch name on PR, ref_name = `main` or `stable/**`
  # over 10min run time
  run-core-features-integration-tests:
    name: "Integration"
    needs: [ci-gate]
    if: needs.ci-gate.outputs.should-run == 'true'
    uses: ./.github/workflows/operate-ci-test-reusable.yml
    secrets: inherit
    with:
      branch: ${{ github.head_ref || github.ref_name }}
      command: ./mvnw -f operate/qa/integration-tests verify -B -DskipChecks -Dfailsafe.rerunFailingTestsCount=2
      test-type: Core Features ITs
      runner-type: gcp-core-32-default
