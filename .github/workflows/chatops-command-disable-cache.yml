# type: CI Helper - ChatOps
# owner: @camunda/monorepo-devops-team
---
name: chatops-command-ci-disable-cache

on:
  repository_dispatch:
    types: [ci-disable-cache-command, ci-enable-cache-command]

env:
  NO_CACHE_LABEL: "ci:no-cache"

jobs:
  chatops-command-disable-cache:
    permissions:
      contents: write       # for git push
      pull-requests: write  # for gh pr edit
      issues: write         # for label management (gh pr edit --add/remove-label uses Issues API)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Create URL to the run output
      id: vars
      run: |
        {
        echo "run_url=https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        } >> "$GITHUB_OUTPUT"

    - name: Generate a GitHub token
      id: github-token
      uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@6c85c5de572dbc1790e5e7b4636c2ad9f5b614d8 # generate-github-app-token-from-vault-secrets: v1.1.0
      with:
        github-app-id-vault-key: GITHUB_OPTIMIZE_APP_ID
        github-app-id-vault-path: secret/data/products/optimize/ci/camunda-optimize
        github-app-private-key-vault-key: GITHUB_OPTIMIZE_APP_KEY
        github-app-private-key-vault-path: secret/data/products/optimize/ci/camunda-optimize
        vault-auth-method: approle
        vault-auth-role-id: ${{ secrets.VAULT_ROLE_ID }}
        vault-auth-secret-id: ${{ secrets.VAULT_SECRET_ID}}
        vault-url: ${{ secrets.VAULT_ADDR }}

    - name: Dump the client payload context
      env:
        PAYLOAD_CONTEXT: ${{ toJson(github.event.client_payload) }}
      run: echo "$PAYLOAD_CONTEXT"

    - name: Validate request
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.client_payload.pull_request.number }}
        COMMENT_ID: ${{ github.event.client_payload.github.payload.comment.id }}
      run: |
        if [[ -z "$PR_NUMBER" ]]; then
          echo "::error::Command was not executed on a PR"; exit 1
        fi
        # Derive PR data from API — not from attacker-controlled client_payload
        PR_DATA=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER")
        HEAD_REPO=$(echo "$PR_DATA" | jq -r '.head.repo.full_name')
        PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.user.login')
        if [ "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
          echo "::error::Refusing to push to fork PR ($HEAD_REPO)"; exit 1
        fi
        # Derive commenter from comment API and verify comment belongs to this PR
        COMMENT_DATA=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID")
        COMMENTER=$(echo "$COMMENT_DATA" | jq -r '.user.login')
        COMMENT_PR=$(echo "$COMMENT_DATA" | jq -r '.issue_url | split("/") | last')
        if [ "$COMMENT_PR" != "$PR_NUMBER" ]; then
          echo "::error::Comment $COMMENT_ID does not belong to PR #$PR_NUMBER"; exit 1
        fi
        if [ "$COMMENTER" != "$PR_AUTHOR" ]; then
          echo "::error::Commenter ($COMMENTER) is not the PR author ($PR_AUTHOR)"; exit 1
        fi

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Git User Setup
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Disable cache restoration
      id: ci-disable-cache
      if: ${{ github.event.client_payload.slash_command.command == 'ci-disable-cache' }}
      shell: bash
      env:
        GH_REPO: ${{ github.repository }}
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.client_payload.pull_request.number }}
      run: |
        if [[ -n "$PR_NUMBER" ]]; then
            BRANCH=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.head.ref')
            gh pr edit "$PR_NUMBER" --add-label "$NO_CACHE_LABEL"
            echo "Checkout branch $BRANCH and pushing empty commit"
            git fetch && git checkout "$BRANCH"
            git commit --allow-empty -m "ci: REMOVEME" && git push
        else
          echo ":debug:Command was not executed on a PR"
        fi

    - name: Enable cache restoration
      id: ci-enable-cache
      if: ${{ github.event.client_payload.slash_command.command == 'ci-enable-cache' }}
      shell: bash
      env:
        GH_REPO: ${{ github.repository }}
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.client_payload.pull_request.number }}
      run: |
        if [[ -n "$PR_NUMBER" ]]; then
            BRANCH=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.head.ref')
            gh pr edit "$PR_NUMBER" --remove-label "$NO_CACHE_LABEL"
            echo "Checkout branch $BRANCH and pushing empty commit"
            git fetch && git checkout "$BRANCH"
            git commit --allow-empty -m "ci: REMOVEME" && git push
        else
          echo ":debug:Command was not executed on a PR"
        fi

    - name: Add reaction
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        token: ${{ steps.github-token.outputs.token }}
        repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
        comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
        reactions: "+1"
        reactions-edit-mode: replace

    - name: Update comment in case of failure
      if: failure()
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        token: ${{ steps.github-token.outputs.token }}
        comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
        body: |
          > Had issues fulfilling your command, check the [logs](${{ steps.vars.outputs.run_url }})
        reactions: confused
