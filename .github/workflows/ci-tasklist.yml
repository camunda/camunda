# Unified CI for Tasklist. Runs backend unit tests, front end unit tests, backup restore tests on ES and OS, and docker tests
# test location: /tasklist, tasklist/qa/backup-restore-tests, tasklist/qa/integration-tests
# called by: ci.yml
# type: CI
# owner: @camunda/core-features
name: Tasklist CI

on:
  workflow_dispatch:
    inputs:
      runFeTests:
        description: "Set to true to run front end tests for Tasklist"
        type: boolean
        required: true
      runBeTests:
        description: "Set to true to run back end tests for Tasklist"
        type: boolean
        required: true
      use-shared-distball:
        description: "Restore the shared distball m2 from GCS in ci-webapp-run-ut-reuseable instead of build-zeebe. Set by ci.yml only (which has a build-distball job); leave false for standalone workflow_dispatch."
        type: boolean
        required: false
        default: false
      build-tool:
        description: "Build tool to use ('maven' or 'gradle'). Gradle is PR-only opt-in via the 'gradle-build' label."
        type: string
        required: false
        default: maven
  workflow_call:
    inputs:
      runFeTests:
        description: "Set to true if Tasklist front-end code was changed"
        type: boolean
        required: true
      runBeTests:
        description: "Set to true if Tasklist back-end code was changed"
        type: boolean
        required: true
      use-shared-distball:
        description: "Restore the shared distball m2 from GCS in ci-webapp-run-ut-reuseable instead of build-zeebe. Set by ci.yml only (which has a build-distball job); leave false for standalone workflow_dispatch."
        type: boolean
        required: false
        default: false
      build-tool:
        description: "Build tool to use ('maven' or 'gradle'). Gradle is PR-only opt-in via the 'gradle-build' label."
        type: string
        required: false
        default: maven

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

env:
  TEST_OWNER: '@camunda/core-features'
  GHA_BEST_PRACTICES_LINTER: enabled
  TEST_PRODUCT: Tasklist
  CLIENT_DIR: tasklist/client

jobs:
  # run this test every time the workflow is triggered
  tasklist-backend-unit-tests:
    name: "Unit"
    uses: ./.github/workflows/ci-webapp-run-ut-reuseable.yml
    # When ci.yml sets use-shared-distball, the reusable workflow restores the shared distball
    # m2 from GCS via WIF instead of running build-zeebe (see #52693); that needs id-token.
    permissions:
      contents: read
      id-token: write
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        suite: [ DataLayer, CoreFeatures ]
        include:
          - suite: DataLayer
            suiteName: Data Layer
            owner: '@camunda/data-layer'
            modules: "tasklist-webapp"
          - suite: CoreFeatures
            suiteName: Core Features
            owner: '@camunda/core-features'
          - suite: CoreFeatures
            suiteName: Core Features
            modules: "tasklist-webapp"
    with:
      componentName: "Tasklist"
      suite: ${{ matrix.suite }}
      suiteName: ${{ matrix.suiteName }}
      owner: ${{ matrix.owner }}
      use-shared-distball: ${{ inputs.use-shared-distball }}
      build-tool: ${{ inputs.build-tool }}
      modules: ${{ matrix.modules }}
      gradleSuiteAsTask: true

  fe-type-check:
    if: inputs.runFeTests
    name: "Tool /  Front End - Type check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {} # GITHUB_TOKEN unused in this job
    env:
      TEST_TYPE: Tool
      TEST_PRODUCT: Tasklist
    defaults:
      run:
        working-directory: ${{ env.CLIENT_DIR }}
    steps:
      - uses: camunda/infra-global-github-actions/start-build-monitor@6f1db2426ec34a020db86cb6a6fecb5bda9f8138 # main
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install dependencies
        uses: ./.github/actions/npm-ci-with-retry
        with:
          directory: ${{ env.CLIENT_DIR }}
      - run: npm run ts-check
        name: Type checks
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  fe-eslint:
    if: inputs.runFeTests
    name: "Tool / Front End - ESLint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {} # GITHUB_TOKEN unused in this job
    env:
      TEST_TYPE: Tool
      TEST_PRODUCT: Tasklist
    defaults:
      run:
        working-directory: ${{ env.CLIENT_DIR }}
    steps:
      - uses: camunda/infra-global-github-actions/start-build-monitor@6f1db2426ec34a020db86cb6a6fecb5bda9f8138 # main
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install dependencies
        uses: ./.github/actions/npm-ci-with-retry
        with:
          directory: ${{ env.CLIENT_DIR }}
      - run: npm run lint:eslint
        name: ESLint
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  fe-stylelint:
    if: inputs.runFeTests
    name: "Tool / Front End - Stylelint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {} # GITHUB_TOKEN unused in this job
    env:
      TEST_TYPE: Tool
    defaults:
      run:
        working-directory: ${{ env.CLIENT_DIR }}
    steps:
      - uses: camunda/infra-global-github-actions/start-build-monitor@6f1db2426ec34a020db86cb6a6fecb5bda9f8138 # main
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install dependencies
        uses: ./.github/actions/npm-ci-with-retry
        with:
          directory: ${{ env.CLIENT_DIR }}
      - run: npm run lint:stylelint
        name: Stylelint
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  fe-prettier:
    if: inputs.runFeTests
    name: "Tool / Front End - Prettier"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {} # GITHUB_TOKEN unused in this job
    env:
      TEST_TYPE: Tool
      TEST_PRODUCT: Tasklist
    defaults:
      run:
        working-directory: ${{ env.CLIENT_DIR }}
    steps:
      - uses: camunda/infra-global-github-actions/start-build-monitor@6f1db2426ec34a020db86cb6a6fecb5bda9f8138 # main
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install dependencies
        uses: ./.github/actions/npm-ci-with-retry
        with:
          directory: ${{ env.CLIENT_DIR }}
      - run: npm run lint:prettier
        name: Prettier
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  fe-tests:
    if: inputs.runFeTests
    name: "Unit - Front End"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: {} # GITHUB_TOKEN unused in this job
    env:
      TEST_TYPE: Unit
    defaults:
      run:
        working-directory: ${{ env.CLIENT_DIR }}
    steps:
      - uses: camunda/infra-global-github-actions/start-build-monitor@6f1db2426ec34a020db86cb6a6fecb5bda9f8138 # main
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install dependencies
        uses: ./.github/actions/npm-ci-with-retry
        with:
          directory: ${{ env.CLIENT_DIR }}
      - run: npm run test:ci
        name: Unit & Integration tests
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  fe-visual-regression-tests:
    if: inputs.runFeTests
    name: "Unit - Front End - Visual Regression"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {} # GITHUB_TOKEN unused in this job
    env:
      TEST_TYPE: visual-regression
    container:
      image: mcr.microsoft.com/playwright:v1.61.1
      options: --user 1001:1000
    defaults:
      run:
        working-directory: ${{ env.CLIENT_DIR }}
    steps:
      - uses: camunda/infra-global-github-actions/start-build-monitor@6f1db2426ec34a020db86cb6a6fecb5bda9f8138 # main
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - name: Setup NodeJS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install node dependencies
        uses: ./.github/actions/npm-ci-with-retry
        with:
          directory: ${{ env.CLIENT_DIR }}
      - name: Build frontend
        run: npm run build:visual-regression
      - name: Run Playwright tests
        run: npm run test:visual
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: tasklist-visual-regression-report
          path: tasklist/client/playwright-report/
          retention-days: 30
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  fe-a11y-tests:
    if: inputs.runFeTests
    name: "Tool / Front End - a11y"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {} # GITHUB_TOKEN unused in this job
    env:
      TEST_TYPE: Tool
    container:
      image: mcr.microsoft.com/playwright:v1.61.1
      options: --user 1001:1000
    defaults:
      run:
        working-directory: ${{ env.CLIENT_DIR }}
    steps:
      - uses: camunda/infra-global-github-actions/start-build-monitor@6f1db2426ec34a020db86cb6a6fecb5bda9f8138 # main
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Print metadata
        uses: ./.github/actions/print-metadata
      - name: Setup NodeJS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install node dependencies
        uses: ./.github/actions/npm-ci-with-retry
        with:
          directory: ${{ env.CLIENT_DIR }}
      - name: Build frontend
        run: npm run build
      - name: Run A11y tests
        run: npm run test:a11y
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: tasklist-a11y-report
          path: tasklist/client/playwright-report/
          retention-days: 30
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

