# description: Runs Playwright visual regression tests and commits updated snapshots for Operate
# test location: /operate/client/
# type: CI Helper
# owner: @camunda/core-features
name: Operate Update Visual Regression Snapshots

on:
  pull_request:
    types: [labeled, synchronize]

# Limit workflow to 1 concurrent run per ref (branch): new commit -> old runs are canceled to save costs
# Exception for main branch: complete builds for every commit needed for confidence
concurrency:
  cancel-in-progress: true
  group: ${{ format('{0}-{1}', github.workflow, github.ref == 'refs/heads/main' && github.sha || github.ref) }}

jobs:
  update-snapshots:
    if: github.event.pull_request.state != 'closed' && (github.event.label.name == 'update-snapshots' || contains( github.event.pull_request.labels.*.name, 'update-snapshots'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    container:
      image: mcr.microsoft.com/playwright:v1.61.1
      options: --user 1001:1000

    steps:
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup NodeJS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install node dependencies
        uses: ./.github/actions/npm-ci-with-retry
        with:
          directory: ./operate/client
      - name: Build frontend
        working-directory: ./operate/client
        run: npm run build:visual-regression
      - name: Update snapshots
        working-directory: ./operate/client
        run: npm run test:visual -- --update-snapshots
      - name: Commit screenshots
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "test: updated operate visual regression snapshots"
          file_pattern: "operate/client/**/*.png"
