# description: Runs Integration tests on min and max versions of each supported major series of Elasticsearch and OpenSearch
# test location: /qa/acceptance-tests
# type: CI
# owner: @camunda/core-features, @camunda/data-layer
name: Search DB Manual/Scheduled Run Integration Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".ci/db-versions.yml"
      - ".github/actions/read-db-versions/**"
      - ".github/workflows/zeebe-search-integration-tests.yml"
  schedule:
    - cron: "0 5 * * Mon-Fri"

env:
  GHA_BEST_PRACTICES_LINTER: enabled

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

jobs:
  # Reads search DB versions from .ci/db-versions.yml and generates a min/max matrix.
  # Add or remove versions there — this workflow updates automatically.
  generate-matrix:
    name: "Generate search DB matrix"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.read-versions.outputs.es-os-matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Read DB versions
        id: read-versions
        uses: ./.github/actions/read-db-versions
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  search-integration-tests:
    name: "Search ${{ matrix.database-name }}"
    needs: [ generate-matrix ]
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/ci-database-integration-tests-reusable.yml
    secrets: inherit
    with:
      database-type: ${{ matrix.database-type }}
      database-container: ${{ matrix.database-container }}
      database-image-version: ${{ matrix.database-image-version }}
      database-name: ${{ matrix.database-name }}
      it-database-type: ${{ matrix.it-database-type }}
      notify-slack-on-failure: ${{ github.event_name == 'schedule' }}

  search-history-tests:
    name: "Search History Tests / ${{ matrix.database-name }}"
    needs: [ generate-matrix ]
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/ci-database-integration-tests-reusable.yml
    secrets: inherit
    with:
      database-type: "${{ matrix.database-type }}"
      database-container: "${{ matrix.database-container }}"
      database-image-version: "${{ matrix.database-image-version }}"
      database-name: "${{ matrix.database-name }}"
      it-database-type: "${{ matrix.it-database-type }}"
      maven-profiles: "history"
      test-type: "history-tests"
      test-type-label: "History"
      runs-on: "gcp-perf-core-8-default"
      notify-slack-on-failure: ${{ github.event_name == 'schedule' }}

  search-identity-tests:
    name: "Search Identity Tests / ${{ matrix.database-name }}"
    needs: [ generate-matrix ]
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/ci-database-integration-tests-reusable.yml
    secrets: inherit
    with:
      database-type: "${{ matrix.database-type }}"
      database-container: "${{ matrix.database-container }}"
      database-image-version: "${{ matrix.database-image-version }}"
      database-name: "${{ matrix.database-name }}"
      it-database-type: "${{ matrix.it-database-type }}"
      maven-profiles: "identity-tests"
      test-type: "identity-tests"
      test-type-label: "Identity"
      notify-slack-on-failure: ${{ github.event_name == 'schedule' }}
