# type: CI
# owner: @camunda/reliability-testing
name: Camunda PR Benchmark (opensearch)
on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - closed

concurrency:
  # Relevant events (label/unlabel this DB's label, or sync/close while it's set) share a stable
  # group so cancel-in-progress correctly supersedes an in-progress run for the same DB+PR.
  # Irrelevant events get a unique per-run group so they can neither cancel nor be cancelled by
  # runs for other DBs.
  group: >-
    ${{
      (
        (contains(fromJSON('["labeled", "unlabeled"]'), github.event.action) && github.event.label.name == 'benchmark-opensearch')
        || (contains(fromJSON('["synchronize", "closed"]'), github.event.action) && contains(github.event.pull_request.labels.*.name, 'benchmark-opensearch'))
      )
      && format('{0}-{1}', github.workflow, github.event.pull_request.number)
      || format('{0}-noop-{1}', github.workflow, github.run_id)
    }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  benchmark:
    name: Benchmark (opensearch)
    if: >
      (contains(fromJSON('["labeled", "unlabeled"]'), github.event.action) && github.event.label.name == 'benchmark-opensearch') ||
      (contains(fromJSON('["synchronize", "closed"]'), github.event.action) && contains(github.event.pull_request.labels.*.name, 'benchmark-opensearch'))
    uses: ./.github/workflows/pr-benchmark-pipeline.yml
    secrets: inherit
    with:
      label: 'benchmark-opensearch'
      secondary-storage-type: 'opensearch'
      ref: ${{ github.event.pull_request.head.ref }}
