# description: Verifies a load test deployment is healthy. Cleanup is delegated to
#              camunda-delete-load-test.yml and runs regardless of verify outcome.
# called-by: camunda-scheduled-release-load-tests.yml
# type: CI
# owner: @camunda/reliability-testing
name: Verify and cleanup load test
on:
  workflow_call:
    inputs:
      namespace:
        description: 'Kubernetes namespace where the load test is deployed'
        type: string
        required: true

env:
  CLUSTER: camunda-benchmark-prod
  TELEPORT_JOIN_TOKEN: infra-benchmark-prod-github-action-zeebe
  # Workaround to prevent the Kubernetes client SDK from failing while
  # https://github.com/gravitational/teleport/issues/64188 is opened.
  # See https://app.incident.io/camunda/incidents/5624 for more details.
  # This needs to be applied to all the subcommands run in this workflow.
  # Consider removing this once
  # https://github.com/gravitational/teleport/issues/64188 has been fixed and
  # deployed.
  KUBE_FEATURE_WatchListClient: "false"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: teleport-actions/setup@b638ff596557cc3959eb6b5287d5e58e0c8ac6a6 # v1.1.1
        with:
          proxy: camunda.teleport.sh:443
          version: auto
      - uses: teleport-actions/auth-k8s@0f46164469ae4fcd4d359d40e06bab17d4be17c9 # v2.0.6
        with:
          proxy: camunda.teleport.sh:443
          token: ${{ env.TELEPORT_JOIN_TOKEN }}
          kubernetes-cluster: ${{ env.CLUSTER }}
      - uses: ./.github/actions/await-load-test
        with:
          namespace: ${{ inputs.namespace }}
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  cleanup:
    name: Cleanup
    needs: verify
    if: always()
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/camunda-delete-load-test.yml
    secrets: inherit
    with:
      namespace: ${{ inputs.namespace }}
