name: C8Run Sign & Notarize

on:
  push:
    branches:
      - main

jobs:
  build-sign-notarize:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      # (Optional) Build your c8run CLI if needed
      #
      # - name: Build c8run
      #   run: go build -o c8run ./cmd/c8run
      #
      # If you already have c8run compiled in the c8run folder, skip this.

      - name: Import Developer ID Certificate for c8run
        # Only needed if you are on GitHub-hosted runners and must import your .p12
        run: |
          echo "$C8RUN_CERT_P12_BASE64" | base64 --decode > c8run_dev_id.p12

          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          security unlock-keychain -p "" build.keychain

          security import c8run_dev_id.p12 -k build.keychain \
            -P "$C8RUN_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign

          security list-keychains -s build.keychain $(security list-keychains | sed 's/\"//g')
          security default-keychain -s build.keychain
          security find-identity -v -p codesigning build.keychain

        env:
          # A base64-encoded Developer ID Application .p12 for c8run:
          C8RUN_CERT_P12_BASE64: ${{ secrets.C8RUN_CERT_P12_BASE64 }}
          C8RUN_CERT_P12_PASSWORD: ${{ secrets.C8RUN_CERT_P12_PASSWORD }}

      - name: Make script executable
        run: chmod +x .github/scripts/sign_all_c8run.sh

      - name: Sign c8run distribution
        run: |
          ./.github/scripts/sign_all_c8run.sh "c8run" "$C8RUN_DEVELOPER_ID_APP"
        env:
          C8RUN_DEVELOPER_ID_APP: "Developer ID Application: Camunda Services GmbH (3JVGD57JQZ)"

      - name: Create c8run zip
        run: |
          ditto -c -k --keepParent c8run c8run_signed.zip

      - name: Notarize c8run zip
        run: |
          xcrun notarytool submit c8run_signed.zip \
            --apple-id "$C8RUN_APPLE_ID" \
            --password "$C8RUN_APP_PASSWORD" \
            --team-id "$C8RUN_TEAM_ID" \
            --wait
        env:
          C8RUN_APPLE_ID: ${{ secrets.C8RUN_APPLE_ID }}
          C8RUN_APP_PASSWORD: ${{ secrets.C8RUN_APP_PASSWORD }}
          C8RUN_TEAM_ID: ${{ secrets.C8RUN_TEAM_ID }}

      - name: Upload signed & notarized artifact
        uses: actions/upload-artifact@v3
        with:
          name: c8run_signed_notarized.zip
          path: c8run_signed.zip
