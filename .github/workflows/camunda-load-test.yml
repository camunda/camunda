# description: Central reusable workflow for deploying load tests. All load test creation
#              routes through this workflow. Builds Docker images (or reuses existing ones),
#              then deploys via newLoadTest.sh + `make install` to a GKE cluster.
# called-by: camunda-daily-load-tests.yml, camunda-weekly-load-tests.yml,
#            camunda-pr-load-test.yaml, camunda-release-load-test.yaml,
#            zeebe-update-long-running-migrating-benchmark.yaml
# also: triggerable manually via workflow_dispatch for ad-hoc load tests
# monitoring: https://dashboard.benchmark.camunda.cloud/
# type: CI
# owner: @camunda/reliability-testing
#
# Infos from Infra:
# - Using the infra benchmark prod cluster requires to use Teleport to authenticate.
# - Camunda images are pushed to registry.camunda.cloud/team-zeebe and pulled from there.
#   To use them in a namespace, the namespace must be labeled with "registry=harbor"
#   You must also set the image pull secret to "harbor-registry" in the helm values.

name: Camunda load test
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Name of the load test (used as the Kubernetes namespace)'
        required: true
      ref:
        description: 'Git ref (branch, tag or commit SHA) to build and test against'
        default: 'main'
        type: string
        required: false
      scenario:
        description: 'Workload scenario to run'
        required: false
        type: choice
        options:
          - latency
          - realistic
          - typical
          - max
          - archiver
        default: max
      secondary-storage-type:
        description: 'Secondary database backend for Camunda Platform'
        type: choice
        options:
        - elasticsearch
        - opensearch
        - postgresql
        - mysql
        - mariadb
        - mssql
        - oracle
        - none
        default: elasticsearch
      reuse-tag:
        description: 'Pre-built image tag from the internal registry (registry.camunda.cloud). Skips the build step. ⚠ Cannot be used with orchestration-tag.'
        type: string
        default: ""
        required: false
      load-test-load:
        description: '── Configuration ─────────────────── Helm args for workload components (e.g. --set starter.rate=100). Ignored when scenario is not "custom".'
        required: false
      platform-helm-values:
        description: 'Additional Helm values for the Camunda platform chart (e.g. --set orchestration.resources.limits.memory=2Gi)'
        type: string
        default: ""
        required: false
      stable-vms:
        description: 'Deploy to non-spot VMs (more stable, higher cost)'
        type: boolean
        required: false
        default: false
      enable-optimize:
        description: 'Enable Optimize for load testing'
        type: boolean
        required: false
        default: true
      build-frontend:
        description: 'Build frontend assets as part of the load test image build'
        type: boolean
        required: false
        default: false
      perform-read-benchmarks:
        description: 'Run continuous read benchmarks on secondary storage (may affect exporter performance)'
        type: boolean
        required: false
        default: false
      ttl:
        description: '── Lifecycle & advanced ──────────── Days before the namespace is auto-deleted'
        type: number
        default: 1
        required: false
      orchestration-tag:
        description: 'Official Docker Hub image tag (docker.io/camunda/camunda). Uses Docker Hub instead of building. ⚠ Cannot be used with reuse-tag.'
        type: string
        default: ""
        required: false
      optimize-tag:
        description: 'Override Optimize image tag (docker.io/camunda/optimize). Overrides build mode defaults.'
        type: string
        default: ""
        required: false
      identity-tag:
        description: 'Override Identity image tag (docker.io/camunda/identity). Defaults to Helm chart default.'
        type: string
        default: ""
        required: false
      connectors-tag:
        description: 'Override Connectors image tag (docker.io/camunda/connectors). Defaults to Helm chart default.'
        type: string
        default: ""
        required: false
  workflow_call:
    inputs:
      ref:
        description: 'Specifies the ref (e.g. branch name, commit sha or tag) from which the docker image is built and used to run the load test against'
        default: 'main'
        type: string
        required: false
      name:
        description: 'Specifies the name of the load test'
        type: string
        required: true
      ttl:
        description: 'Specifies after how many days the load test namespace should be deleted'
        type: number
        default: 1
        required: false
      reuse-tag:
        description: 'Reuse Tag: Pre-built image tag from the internal registry (registry.camunda.cloud). Skips the docker image build step. Cannot be used together with orchestration-tag.'
        type: string
        default: ""
        required: false
      scenario:
        description: 'Choose the variant of workload to use for the load test. Options: custom, latency, realistic, typical, max. If specified, this will override the load-test-load input when not set to "custom".'
        type: string
        required: false
        default: custom
      load-test-load:
        description: 'Specifies which load test components to deploy. For example, `starter` can be assigned with the rate at which they start instances. Allows arbitrary helm arguments, like --set starter.rate=100. This is ignored when scenario is not "custom".'
        type: string
        required: false
      platform-helm-values:
        description: 'Allows to specify additional values/configurations for the Camunda platform Helm chart, which will be deployed. For example, the Orchestration cluster `resources` can be modified. Allows arbitrary helm arguments, like --set orchestration.resources.limits.memory=2Gi'
        type: string
        default: ""
        required: false
      publish:
        description: 'Where to publish the results, can be "slack" or "comment"'
        default: ""
        type: string
        required: false
      perform-read-benchmarks:
        description: 'Perform continuous read benchmarks on secondary storage. This may influence the exporter performance as it puts more load on the secondary database. The metrics are available in the Data-Layer dashboard.'
        type: boolean
        required: false
        default: false
      stable-vms:
        description: 'Deploy to non-spot VMs'
        type: boolean
        required: false
        default: false
      enable-optimize:
        description: 'Enable Optimize for load testing'
        type: boolean
        required: false
        default: true
      build-frontend:
        description: 'Build the frontend as part of the load test image build'
        type: boolean
        required: false
        default: false
      secondary-storage-type:
        description: 'Specifies the type of the secondary database used by Camunda Platform, can be "elasticsearch", "opensearch", "postgresql", "mysql", "mariadb", "mssql", "oracle" or "none"'
        # type choice is invalid here
        type: string
        required: false
        default: elasticsearch
      orchestration-tag:
        description: 'Orchestration Tag: Docker image tag for official Camunda images from Docker Hub (docker.io/camunda/camunda). When set, official Docker Hub images are used instead of building from source. Cannot be used together with reuse-tag.'
        type: string
        default: ""
        required: false
      optimize-tag:
        description: 'Optimize Tag: Docker image tag for Optimize from Docker Hub (docker.io/camunda/optimize). When set, overrides the optimize image regardless of build mode. If not set, custom builds use the built image from the internal registry; official images use Helm chart defaults.'
        type: string
        default: ""
        required: false
      identity-tag:
        description: 'Identity Tag: Docker image tag for Identity from Docker Hub (docker.io/camunda/identity). If not set, defaults to the Helm chart default image.'
        type: string
        default: ""
        required: false
      connectors-tag:
        description: 'Connectors Tag: Docker image tag for Connectors from Docker Hub (docker.io/camunda/connectors). If not set, defaults to the Helm chart default image.'
        type: string
        default: ""
        required: false

env:
  CLUSTER: camunda-benchmark-prod  # change this to "camunda-benchmark-dev" when experimenting
  TELEPORT_JOIN_TOKEN: infra-benchmark-prod-github-action-zeebe  # change this to "infra-benchmark-dev-github-action-zeebe" when experimenting
  HELM_CHART: camunda-platform-8.10
  # Namespaces MUST start with c8 due to access policy
  NAMESPACE: ${{ startsWith(inputs.name, 'c8-') && inputs.name || format('c8-{0}', inputs.name) }}
  IMAGE_REPOSITORY: registry.camunda.cloud/team-zeebe

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

jobs:
  show-summary:
    name: Summarize workflow inputs
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Show summary
        run: |-
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Load test: `${{ env.NAMESPACE }}`

          > 📊 **[Open Grafana Dashboard](https://dashboard.benchmark.camunda.cloud/d/zeebe-dashboard/zeebe?var-namespace=${{ env.NAMESPACE }})**

          | Input | Value |
          |-------|-------|
          | Name | `${{ inputs.name }}` |
          | Ref | `${{ inputs.ref }}` |
          | Scenario | `${{ inputs.scenario }}` |
          | Secondary storage | `${{ inputs.secondary-storage-type }}` |
          | Reuse tag | ${{ inputs.reuse-tag || '—' }} |
          | Orchestration tag | ${{ inputs.orchestration-tag || '—' }} |
          | Load test load | ${{ inputs.load-test-load || '—' }} |
          | Platform helm values | ${{ inputs.platform-helm-values || '—' }} |
          | TTL (days) | `${{ inputs.ttl }}` |
          | Stable VMs | `${{ inputs.stable-vms }}` |
          | Enable Optimize | `${{ inputs.enable-optimize }}` |
          | Build frontend | `${{ inputs.build-frontend }}` |
          | Perform read benchmarks | `${{ inputs.perform-read-benchmarks }}` |
          | Optimize tag | ${{ inputs.optimize-tag || '—' }} |
          | Identity tag | ${{ inputs.identity-tag || '—' }} |
          | Connectors tag | ${{ inputs.connectors-tag || '—' }} |
          EOF

  calculate-image-tag:
    name: Calculate Image Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: { }
    outputs:
      image-tag: ${{ inputs.orchestration-tag != '' && inputs.orchestration-tag || (inputs.reuse-tag != '' && inputs.reuse-tag || steps.image-tag.outputs.image-tag) }}
    steps:
      - name: Validate mutually exclusive inputs
        if: ${{ inputs.orchestration-tag != '' && inputs.reuse-tag != '' }}
        run: |
          echo "::error::Invalid input combination: 'orchestration-tag' and 'reuse-tag' cannot both be provided. Use 'orchestration-tag' for official Docker Hub images or 'reuse-tag' for reusing pre-built images from the internal registry."
          exit 1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - name: Get image tag
        id: image-tag
        run: |
          echo "image-tag=${{ inputs.name }}-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Validate Docker image tags exist
        if: ${{ inputs.orchestration-tag != '' || inputs.optimize-tag != '' || inputs.identity-tag != '' || inputs.connectors-tag != '' }}
        env:
          ORCHESTRATION_TAG: ${{ inputs.orchestration-tag }}
          ENABLE_OPTIMIZE: ${{ inputs.enable-optimize }}
          OPTIMIZE_TAG: ${{ inputs.optimize-tag }}
          IDENTITY_TAG: ${{ inputs.identity-tag }}
          CONNECTORS_TAG: ${{ inputs.connectors-tag }}
        run: |
          validate_image() {
            local image="$1"
            local max_retries=3
            local retry_delay=5
            local attempt=1

            while true; do
              echo "Validating Docker image ${image} (attempt ${attempt}/${max_retries})"
              manifest_output=$(docker manifest inspect "${image}" 2>&1 >/dev/null)
              status=$?

              if [ "${status}" -eq 0 ]; then
                echo "Docker image ${image} exists"
                return 0
              fi

              # Distinguish missing tag from transient errors
              if echo "${manifest_output}" | grep -qiE "manifest unknown|no such manifest|not found"; then
                echo "::error::Docker image ${image} does not exist on Docker Hub"
                return 1
              fi

              if [ "${attempt}" -ge "${max_retries}" ]; then
                echo "::error::Failed to validate Docker image ${image} after ${max_retries} attempts: ${manifest_output}"
                return "${status}"
              fi

              echo "Transient error (attempt ${attempt}/${max_retries}), retrying in ${retry_delay}s..."
              sleep "${retry_delay}"
              attempt=$((attempt + 1))
            done
          }

          if [[ -n "${ORCHESTRATION_TAG}" ]]; then
            validate_image "camunda/camunda:${ORCHESTRATION_TAG}" || exit 1
          fi

          if [[ "${ENABLE_OPTIMIZE}" == "true" && -n "${OPTIMIZE_TAG}" ]]; then
            validate_image "camunda/optimize:${OPTIMIZE_TAG}" || exit 1
          fi

          if [[ -n "${IDENTITY_TAG}" ]]; then
            validate_image "camunda/identity:${IDENTITY_TAG}" || exit 1
          fi

          if [[ -n "${CONNECTORS_TAG}" ]]; then
            validate_image "camunda/connectors:${CONNECTORS_TAG}" || exit 1
          fi

  build-camunda-image:
    name: Build Camunda
    needs: calculate-image-tag
    if: ${{ inputs.reuse-tag == '' && inputs.orchestration-tag == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-build
        with:
          dockerhub-readonly: true
          harbor: true
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          minimus: true
      - uses: ./.github/actions/build-frontend
        name: Build Operate Frontend
        id: build-operate-fe
        if: ${{ inputs.build-frontend }}
        with:
          directory: ./operate/client
          package-manager: "npm"
      - uses: ./.github/actions/build-frontend
        name: Build Tasklist Frontend
        id: build-tasklist-fe
        if: ${{ inputs.build-frontend }}
        with:
          directory: ./tasklist/client
          package-manager: "npm"
      - uses: ./.github/actions/build-frontend
        name: Build Identity Frontend
        id: build-identity-fe
        if: ${{ inputs.build-frontend }}
        with:
          directory: ./identity/client
          package-manager: "npm"
      - uses: ./.github/actions/build-frontend
        name: Build Optimize Frontend
        id: build-optimize-fe
        if: ${{ inputs.build-frontend && inputs.enable-optimize }}
        with:
          directory: ./optimize/client
          package-manager: "yarn"
      - uses: ./.github/actions/build-zeebe
        name: Build Camunda Platform
        id: build-camunda
        with:
          maven-extra-args: -PskipFrontendBuild ${{ inputs.enable-optimize && '-Pinclude-optimize' || '-P\!include-optimize' }}
      - uses: ./.github/actions/build-platform-docker
        name: Build Camunda Docker Image
        with:
          repository: '${{ env.IMAGE_REPOSITORY }}/camunda'
          revision: ${{ inputs.ref }}
          push: true
          version: ${{ needs.calculate-image-tag.outputs.image-tag }}
          distball: ${{ steps.build-camunda.outputs.distball }}
          dockerfile: 'camunda.Dockerfile'
      - uses: ./.github/actions/build-platform-docker
        name: Build Optimize Docker Image
        if: ${{ inputs.enable-optimize }}
        with:
          repository: '${{ env.IMAGE_REPOSITORY }}/optimize'
          revision: ${{ inputs.ref }}
          push: true
          version: ${{ needs.calculate-image-tag.outputs.image-tag }}
          distball: 'optimize-distro/target/camunda-optimize-*.tar.gz'
          dockerfile: 'optimize.Dockerfile'
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  build-load-test-images:
    name: Build Starter and Worker
    if: ${{ inputs.reuse-tag == '' || inputs.orchestration-tag != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: calculate-image-tag
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-build
        with:
          dockerhub-readonly: true
          harbor: true
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
      - run: ./mvnw -B -D skipTests -D skipChecks -P\!include-optimize -pl load-tests/load-tester -am install
      - name: Build Starter Image
        run: ./mvnw -pl load-tests/load-tester jib:build -P starter -P\!include-optimize -D image="${{ env.IMAGE_REPOSITORY }}/starter:${{ needs.calculate-image-tag.outputs.image-tag }}"
      - name: Build Worker Image
        run: ./mvnw -pl load-tests/load-tester jib:build -P worker -P\!include-optimize -D image="${{ env.IMAGE_REPOSITORY }}/worker:${{ needs.calculate-image-tag.outputs.image-tag }}"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  deploy-cluster-under-test:
    name: Deploy cluster under test
    needs:
      - calculate-image-tag
      - build-camunda-image
      - build-load-test-images
    # To have the possibility to re-deploy the tests without rebuilding the images,
    # the deploy will be run, when build is skipped or successful.
    if: |
      always() &&
      needs.calculate-image-tag.result == 'success' &&
      (needs.build-camunda-image.result == 'success' || needs.build-camunda-image.result == 'skipped') &&
      (needs.build-load-test-images.result == 'success' || needs.build-load-test-images.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
      # Authenticate with Teleport
      - name: Set up Teleport
        uses: teleport-actions/setup@b638ff596557cc3959eb6b5287d5e58e0c8ac6a6 # v1.1.1
        with:
            proxy: camunda.teleport.sh:443
            version: auto

      - name: Authenticate to Cluster using Teleport
        uses: teleport-actions/auth-k8s@0f46164469ae4fcd4d359d40e06bab17d4be17c9 # v2.0.6
        with:
            proxy: camunda.teleport.sh:443
            token: ${{ env.TELEPORT_JOIN_TOKEN }}
            kubernetes-cluster: ${{ env.CLUSTER }}

      - name: Create namespace if not exists
        run: |
          cd load-tests/setup
          # The namespace label created-by will not be able resolve the actual user which triggered
          # the GitHub action by default. We need to correctly configure the git user here to make it work
          git config user.name ${{ github.actor }}
          # Create the namespace for the load test
          ./newLoadTest.sh ${{ env.NAMESPACE }} ${{ inputs.secondary-storage-type }} ${{ inputs.ttl }} ${{ inputs.enable-optimize }}
          # Annotate namespace with the workflow run URL for traceability
          kubectl annotate namespace ${{ env.NAMESPACE }} \
            "github.com/workflow-run-url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --overwrite
      - name: Install latest Camunda Platform
        run: |
          cd load-tests/setup/${{ env.NAMESPACE }}

          # Build load test configuration
          load_test_config="--set global.image.tag=${{ needs.calculate-image-tag.outputs.image-tag }} \
                            --set global.image.repository=${{ env.IMAGE_REPOSITORY }} \
                            --set global.image.pullSecrets[0].name=harbor-registry \
                            --set global.extraEnvVars[0].name=CONFIG_FORCE_app_performReadBenchmarks \
                            --set global.extraEnvVars[0].value=${{inputs.perform-read-benchmarks}}"

          # Append custom load test inputs
          load_test_config="$load_test_config ${{ inputs.load-test-load }}"

          # Resolve image registry/repository: Docker Hub when orchestration-tag is set, internal registry otherwise
          # optimize_repo is only consumed in the custom build path where orchestration-tag is empty
          image_registry="${{ inputs.orchestration-tag != '' && 'docker.io' || 'registry.camunda.cloud' }}"
          camunda_repo="${{ inputs.orchestration-tag != '' && 'camunda/camunda' || 'team-zeebe/camunda' }}"
          optimize_repo="${{ inputs.orchestration-tag != '' && 'camunda/optimize' || 'team-zeebe/optimize' }}"
          image_tag="${{ needs.calculate-image-tag.outputs.image-tag }}"

          # Build platform configuration
          additional_platform_config="--set global.image.tag=${image_tag} \
            --set orchestration.image.registry=${image_registry} \
            --set orchestration.image.repository=${camunda_repo} \
            --set orchestration.image.tag=${image_tag}"

          # Append optimize image config: optimize-tag wins if set, otherwise custom builds use internal registry
          if [[ "${{ inputs.enable-optimize }}" == "true" ]]; then
            if [[ -n "${{ inputs.optimize-tag }}" ]]; then
              # Explicit optimize tag provided: use it directly (Docker Hub image)
              additional_platform_config+=" \
                --set optimize.image.tag=${{ inputs.optimize-tag }}"
            elif [[ -z "${{ inputs.orchestration-tag }}" ]]; then
              # Custom build without explicit optimize tag: use the built image from internal registry
              additional_platform_config+=" \
                --set optimize.image.registry=${image_registry} \
                --set optimize.image.repository=${optimize_repo} \
                --set optimize.image.tag=${image_tag}"
            fi
          fi

          # Append identity image config if a dedicated tag is provided
          if [[ -n "${{ inputs.identity-tag }}" ]]; then
            additional_platform_config+=" \
              --set identity.image.tag=${{ inputs.identity-tag }}"
          fi

          # Append connectors image config if a dedicated tag is provided
          if [[ -n "${{ inputs.connectors-tag }}" ]]; then
            additional_platform_config+=" \
              --set connectors.image.tag=${{ inputs.connectors-tag }}"
          fi

          # Append user-provided helm values if present
          if [[ -n "${{ inputs.platform-helm-values }}" ]]; then
            additional_platform_config+=" ${{ inputs.platform-helm-values }}"
          fi

          make ${{ inputs.stable-vms && 'install-stable' || 'install' }} \
            scenario=${{ inputs.scenario }} \
            secondary_storage=${{ inputs.secondary-storage-type }} \
            enable_optimize=${{ inputs.enable-optimize }} \
            additional_platform_configuration="$additional_platform_config" \
            additional_load_test_configuration="$load_test_config"
      - name: Summarize platform deployment
        if: success()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
            ## Camunda platform \`${{ inputs.name }}\` values
            \`\`\`yaml
            $(helm get values ${{ env.NAMESPACE }} -n ${{ env.NAMESPACE }})
            \`\`\`
          EOF
      - name: Summarize load test deployment
        if: success()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
            # Load test
            The test has been set up successfully. You can observe it [here](https://dashboard.benchmark.camunda.cloud/d/zeebe-dashboard/zeebe?var-namespace=${{ env.NAMESPACE }})
            ## Load test \`${{ inputs.name }}\` values
            \`\`\`yaml
            $(helm get values ${{ env.NAMESPACE }}-test -n ${{ env.NAMESPACE }})
            \`\`\`
          EOF
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
