# description: This GitHub workflow deploys a load test with a camunda cluster under test.
# We use this workflow to start ad-hoc load tests or weekly medic load tests.
# The health of the cluster and results of the load tests are monitored by Core team's regularly.
# https://dashboard.benchmark.camunda.cloud/
# called by: zeebe-medic-benchmarks.yml, zeebe-pr-benchmark.yaml
# type: CI
# owner: camunda/orchestration-cluster-team
#
# Infos from Infra:
# - Using the infra benchmark prod cluster requires to use Teleport to authenticate.
# - Camunda images are pushed to registry.camunda.cloud/team-zeebe and pulled from there.
#   To use them in a namespace, the namespace must be labeled with "registry=harbor"
#   You must also set the image pull secret to "harbor-registry" in the helm values.
name: Camunda load test
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Specifies the ref (e.g. branch name, commit sha or tag) from which the docker image is build and used to run the load test against'
        default: 'stable/8.7'
        type: string
        required: false
      name:
        description: 'Specifies the name of the load test'
        required: true
      ttl:
        description: 'Specifies after how many days the load test namespace should be deleted'
        type: number
        default: 7
        required: false
      reuse-tag:
        description: 'Docker image tag, that should be reused for the load test. Allows to skip the docker image build step'
        type: string
        default: ""
        required: false
      load-test-load:
        description: 'Specifies which load test components to deploy. For example, `starter` can be assigned with the rate at which they start instances. Allows arbitrary helm arguments, like --set starter.rate=100'
        required: false
      platform-helm-values:
        description: 'Allows to specify additional values/configurations for the Camunda platform Helm chart, which will be deployed. For example, the Orchestration cluster `resources` can be modified. Allows arbitrary helm arguments, like --set orchestration.resources.limits.memory=2Gi'
        type: string
        default: ""
        required: false
      stable-vms:
        description: 'Deploy to non-spot VMs'
        type: boolean
        required: false
        default: false
      realistic:
        description: 'Should run a realistic load test, with real-world process and load'
        type: boolean
        required: false
        default: false
      operate-included:
        description: 'Enable Operate: Should run a load test, including operate (allows the measurement for data-availability)'
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      ref:
        description: 'Specifies the ref (e.g. branch name, commit sha or tag) from which the docker image is build and used to run the load test against'
        default: 'stable/8.7'
        type: string
        required: false
      name:
        description: 'Specifies the name of the load test'
        type: string
        required: true
      ttl:
        description: 'Specifies after how many days the load test namespace should be deleted'
        type: number
        default: 7
        required: false
      reuse-tag:
        description: 'Docker image tag, that should be reused for the load test. Allows to skip the docker image build step'
        type: string
        default: ""
        required: false
      platform-helm-values:
        description: 'Allows to specify additional values/configurations for the Camunda platform Helm chart, which will be deployed. For example, the Orchestration cluster `resources` can be modified. Allows arbitrary helm arguments, like --set orchestration.resources.limits.memory=2Gi'
        type: string
        default: ""
        required: false
      load-test-load:
        description: 'Specifies which load test components to deploy. For example, `starter` can be assigned with the rate at which they start instances. Allows arbitrary helm arguments, like --set starter.rate=100'
        type: string
        required: false
      publish:
        description: 'Where to publish the results, can be "slack" or "comment"'
        default: ""
        type: string
        required: false
      stable-vms:
        description: 'Deploy to non-spot VMs'
        type: boolean
        required: false
        default: false
      realistic:
        description: 'Should run a realistic load test, with real-world process and load'
        type: boolean
        required: false
        default: false
      operate-included:
        description: 'Enable Operate: Should run a load test, including operate (allows the measurement for data-availability)'
        type: boolean
        required: false
        default: false

env:
  CLUSTER: camunda-benchmark-prod  # change this to "camunda-benchmark-dev" when experimenting
  TELEPORT_JOIN_TOKEN: infra-benchmark-prod-github-action-zeebe  # change this to "infra-benchmark-dev-github-action-zeebe" when experimenting
  HELM_CHART: camunda-platform-8.7
  NAMESPACE: c8-${{ inputs.name }}
  IMAGE_REPOSITORY: registry.camunda.cloud/team-zeebe

defaults:
  run:
    shell: bash

jobs:
  calculate-image-tag:
    name: Calculate Image Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      image-tag: ${{ inputs.reuse-tag != '' && inputs.reuse-tag || steps.image-tag.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Get image tag
        id: image-tag
        run: |
          echo "image-tag=${{ inputs.name }}-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  build-zeebe-image:
    name: Build Zeebe Docker image
    needs: calculate-image-tag
    if: ${{ inputs.reuse-tag == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-build
        with:
          dockerhub-readonly: true
          harbor: true
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          minimus: true
      - uses: ./.github/actions/build-zeebe
        name: Build Zeebe
        id: build-camunda
        with:
          maven-extra-args: -PskipFrontendBuild -P\!include-optimize -Dmaven.test.skip=true
      - uses: ./.github/actions/build-platform-docker
        name: Build Zeebe Docker Image
        with:
          repository: '${{ env.IMAGE_REPOSITORY }}/zeebe'
          revision: ${{ inputs.ref }}
          push: true
          version: ${{ needs.calculate-image-tag.outputs.image-tag }}
          distball: ${{ steps.build-camunda.outputs.distball }}
          dockerfile: 'Dockerfile'
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  build-operate-image:
    name: Build + Push Operate Docker image
    needs: calculate-image-tag
    if: ${{ inputs.operate-included && inputs.reuse-tag == '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-build
        with:
          dockerhub-readonly: true
          harbor: true
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@v3.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/github.com/organizations/camunda NEXUS_USR;
            secret/data/github.com/organizations/camunda NEXUS_PSW;
            secret/data/products/camunda/ci/github-actions REGISTRY_MINIMUS_PSW | minimus-token
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: "21"
      - name: Setup Maven
        uses: ./.github/actions/setup-maven-dist
        with:
          maven-version: 3.8.8
          set-mvnw: true
      - name: Configure Maven
        uses: ./.github/actions/setup-maven-cache
        with:
          maven-cache-key-modifier: operate
      # Use CI Nexus as co-located pull-through cache for Maven artifacts via ~/.m2/settings.xml
      - name: 'Create settings.xml'
        uses: s4u/maven-settings-action@v3.0.0
        with:
          githubServer: false
          servers: |
            [{
               "id": "camunda-nexus",
               "username": "${{ steps.secrets.outputs.NEXUS_USR }}",
               "password": "${{ steps.secrets.outputs.NEXUS_PSW }}"
             }]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "*", "name": "camunda Nexus"}]'
      - name: Build backend
        run: ./mvnw clean install -DskipChecks -P -docker -DskipTests=true -B -DskipRemoteStaging=true -Dmaven.deploy.skip=true
      - name: Login to Minimus
        uses: docker/login-action@v3
        with:
          registry: reg.mini.dev
          username: minimus
          password: ${{ steps.secrets.outputs.minimus-token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push to Harbor registry
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}/operate:${{ needs.calculate-image-tag.outputs.image-tag }}
          file: operate.Dockerfile

  build-load-test-images:
    name: Build Starter and Worker
    if: ${{ inputs.reuse-tag == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: calculate-image-tag
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-build
        with:
          dockerhub-readonly: true
          harbor: true
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
      - run: ./mvnw -B -D skipTests -D skipChecks -P\!include-optimize -pl zeebe/benchmarks/project -am install
      - name: Build Starter Image
        run: ./mvnw -pl zeebe/benchmarks/project jib:build -P starter -P\!include-optimize -D image="${{ env.IMAGE_REPOSITORY }}/starter:${{ needs.calculate-image-tag.outputs.image-tag }}"
      - name: Build Worker Image
        run: ./mvnw -pl zeebe/benchmarks/project jib:build -P worker -P\!include-optimize -D image="${{ env.IMAGE_REPOSITORY }}/worker:${{ needs.calculate-image-tag.outputs.image-tag }}"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  deploy-cluster-under-test:
    name: Deploy cluster under test
    needs:
      - calculate-image-tag
      - build-zeebe-image
      - build-operate-image
      - build-load-test-images
    # To have the possibility to re-deploy the tests without rebuilding the images,
    # the deploy will be run, when build is skipped or successful.
    if: |
      always() &&
      (needs.build-zeebe-image.result == 'success' || needs.build-zeebe-image.result == 'skipped') &&
      (needs.build-operate-image.result == 'success' || needs.build-operate-image.result == 'skipped') &&
      (needs.build-load-test-images.result == 'success' || needs.build-load-test-images.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 'camunda/camunda-platform-helm'
          ref: 'main'
      # Authenticate with Teleport
      - name: Set up Teleport
        uses: teleport-actions/setup@v1
        with:
          version: 17.2.2
      - name: Authenticate to Cluster using Teleport
        uses: teleport-actions/auth-k8s@v2
        with:
          proxy: camunda.teleport.sh:443
          token: ${{ env.TELEPORT_JOIN_TOKEN }}
          kubernetes-cluster: ${{ env.CLUSTER }}
      - name: Create namespace if not exists
        run: |
          if ! kubectl get namespace ${{ env.NAMESPACE }} >/dev/null 2>&1; then
            kubectl create namespace ${{ env.NAMESPACE }}
          else
            echo "Namespace '${{ env.NAMESPACE }}' already exists"
          fi
      - name: Label namespace with creator
        run: >
          kubectl label namespace ${{ env.NAMESPACE }} created-by=${{ github.actor }} --overwrite
      - name: Label namespace with deadline
        run: |
          # Calculate deadline date with the TTL days from now
          # Use basic ISO date format (YYYY-MM-DD), as it is compatible with kubectl label values
          # Must use minus (-) instead of / to be compatible with kubectl label value restrictions
          deadlineDate=$(date -d "+${{ inputs.ttl }} days" +%Y-%m-%d)
          kubectl label namespace ${{ env.NAMESPACE }} deadline-date="$deadlineDate" --overwrite
      - name: Label namespace with registry
        run: >
          kubectl label namespace ${{ env.NAMESPACE }} registry=harbor --overwrite
      - name: Annotate namespace with workflow run URL
        run: >
          kubectl annotate namespace ${{ env.NAMESPACE }}
          "github.com/workflow-run-url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          --overwrite
      - name: Add Camunda Helm repo
        run: |
          helm repo add camunda https://helm.camunda.io/
          helm repo update
      - name: Find previous Helm chart release version
        id: find-chart-release
        run: |
          echo "chart-release=$(helm get metadata -o json --namespace ${{ env.NAMESPACE }} ${{ env.NAMESPACE }} | jq --raw-output .version)" >> "$GITHUB_OUTPUT"
      - name: Build dependencies of Camunda Platform
        run: helm dependency build charts/${{ env.HELM_CHART }}/
      - name: Install latest Camunda Platform
        run: >
          helm upgrade --install ${{ env.NAMESPACE }} charts/${{ env.HELM_CHART }}/ --wait --timeout 35m0s
          --namespace ${{ env.NAMESPACE }}
          --reset-then-reuse-values
          --render-subchart-notes
          --set global.image.tag=${{ needs.calculate-image-tag.outputs.image-tag }}
          --set global.image.pullSecrets[0].name=harbor-registry
          --set zeebe.image.repository=${{ env.IMAGE_REPOSITORY }}/zeebe
          --set zeebe.image.tag=${{ needs.calculate-image-tag.outputs.image-tag }}
          --set zeebeGateway.image.repository=${{ env.IMAGE_REPOSITORY }}/zeebe
          --set zeebeGateway.image.tag=${{ needs.calculate-image-tag.outputs.image-tag }}
          -f https://raw.githubusercontent.com/camunda/camunda/${{ github.ref }}/zeebe/benchmarks/camunda-platform-values.yaml
          ${{ steps.find-chart-release.outputs.chart-release != '' && format('--version {0}', steps.find-chart-release.outputs.chart-release) || '' }}
          ${{ inputs.stable-vms && format('-f https://raw.githubusercontent.com/camunda/camunda/{0}/zeebe/benchmarks/setup/default/values-stable.yaml', github.ref) || '' }}
          ${{ inputs.operate-included && format('-f https://raw.githubusercontent.com/camunda/camunda/{0}/zeebe/benchmarks/camunda-platform-operate-values.yaml', github.ref) || '' }}
          ${{ inputs.operate-included && format('--set operate.image.tag={0}', needs.calculate-image-tag.outputs.image-tag) || '' }}
          ${{ inputs.operate-included && '--set zeebe.retention.minimumAge=1d' || '' }}
          ${{ inputs.platform-helm-values }}

      - name: Summarize deployment
        if: success()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
            ## Camunda platform \`${{ inputs.name }}\` values
            \`\`\`yaml
            $(helm get values ${{ env.NAMESPACE }} -n ${{ env.NAMESPACE }})
            \`\`\`
          EOF
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  deploy-load-test:
    name: Deploy load test
    needs:
      # We need to depend on calculate-image-tag, so that we can use the output in the job
      - calculate-image-tag
      - deploy-cluster-under-test
      - build-zeebe-image
      - build-operate-image
      - build-load-test-images
      # To have the possibility to re-deploy the tests without rebuilding the images,
      # the deploy will be run, when build is skipped or successful.
    if: |
      always() &&
      (needs.build-zeebe-image.result == 'success' || needs.build-zeebe-image.result == 'skipped') &&
      (needs.build-operate-image.result == 'success' || needs.build-operate-image.result == 'skipped') &&
      (needs.build-load-test-images.result == 'success' || needs.build-load-test-images.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      # Authenticate with Teleport
      - name: Set up Teleport
        uses: teleport-actions/setup@v1
        with:
          version: 17.2.2
      - name: Authenticate to Cluster using Teleport
        uses: teleport-actions/auth-k8s@v2
        with:
          proxy: camunda.teleport.sh:443
          token: ${{ env.TELEPORT_JOIN_TOKEN }}
          kubernetes-cluster: ${{ env.CLUSTER }}
      - name: Add Load test Helm repo
        run: |
          helm repo add camunda-load-tests https://camunda.github.io/camunda-load-tests-helm/
          helm repo update
      - name: Find previous Helm chart release version
        id: find-chart-release
        run: |
          echo "chart-release=$(helm get metadata -o json --namespace ${{ env.NAMESPACE }} ${{ env.NAMESPACE }}-test | jq --raw-output .version)" >> "$GITHUB_OUTPUT"
      - name: Install load test
        run: >
          helm upgrade --install ${{ env.NAMESPACE }}-test camunda-load-tests/camunda-load-tests
          --wait --timeout 35m0s
          --namespace ${{ env.NAMESPACE }}
          --reuse-values
          --render-subchart-notes
          --set global.connect.serviceName=zeebe-gateway
          --set global.image.tag=${{ needs.calculate-image-tag.outputs.image-tag }}
          --set global.image.repository=${{ env.IMAGE_REPOSITORY }}
          --set global.image.pullSecrets[0].name=harbor-registry
          ${{ steps.find-chart-release.outputs.chart-release != '' && format('--version {0}', steps.find-chart-release.outputs.chart-release) || '' }}
          ${{ inputs.realistic && '-f https://raw.githubusercontent.com/camunda/camunda-load-tests-helm/refs/heads/main/charts/camunda-load-tests/values-realistic-benchmark.yaml' || '' }}
          ${{ inputs.operate-included && '--set global.extraEnvVars[0].name="CONFIG_FORCE_app_monitorDataAvailability" --set global.extraEnvVars[0].value="true"' || '' }}
          ${{ inputs.load-test-load }}
      - name: Setup leader balancing
        run: |
          if ! kubectl get cronjob leader-balancer --namespace ${{ env.NAMESPACE }} &>/dev/null; then
            kubectl create cronjob leader-balancer \
              --namespace ${{ env.NAMESPACE }} \
              --image=curlimages/curl:7.87.0 \
              --schedule="*/10 * * * *" \
              -- curl -L -v -X POST http://zeebe-gateway:9600/actuator/rebalance
          else
            echo "Leader balancer cronjob already exists"
          fi
      - name: Summarize deployment
        if: success()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
            # Load test
            The test has been set up successfully. You can observe it [here](https://dashboard.benchmark.camunda.cloud/d/zeebe-dashboard/zeebe?var-namespace=${{ env.NAMESPACE }})
            ## Load test \`${{ inputs.name }}\` values
            \`\`\`yaml
            $(helm get values ${{ env.NAMESPACE }}-test -n ${{ env.NAMESPACE }})
            \`\`\`
          EOF
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
