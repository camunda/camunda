# description: Runs a daily max-load stress test against main.
#              After a 15-minute warmup, profiles the next 30 minutes of both
#              runs via async-profiler.
#              After a 3-hour soak: snapshots metrics as a GitHub artifact,
#              posts a side-by-side summary table (with flamegraph links) to
#              Slack, then immediately deletes both namespaces to reduce cost.
#              Naming pattern: medic-daily-YYYY-MM-DD-<sha>
# calls: camunda-load-test.yml (scenario: max),
#        profile-load-test.yml,
#        camunda-load-test-metrics.yaml,
#        camunda-delete-load-test.yml
# type: CI
# owner: @camunda/reliability-testing
name: Daily Camunda Platform Load Tests
on:
  workflow_dispatch:
     inputs:
      reuse-tag:
        description: 'Docker image tag, that should be reused for the load tests. Allows to skip the docker image build step, can be used for recreating previous tests.'
        type: string
        default: ""
        required: false
  schedule:
    # Runs at 2 am Monday-Friday https://crontab.guru/#0_2_*_*_1-5
    - cron: 0 2 * * 1-5

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

env:
  TEST_OWNER: '@camunda/reliability-testing'
  REUSE_TAG: ${{ inputs.reuse-tag }}

jobs:
  benchmark-data:
    name: Collect benchmark data
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: { }
    outputs:
      benchmark: ${{ steps.data.outputs.benchmark }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Collect benchmark data
        id: data
        run: |
          if [[ -z "${REUSE_TAG}" ]]; then
            echo "Creating new daily load test benchmark"
            echo "benchmark=medic-daily-$(date --utc "+%Y-%m-%d")-$(git rev-parse --short HEAD)-test" >> "$GITHUB_OUTPUT"
          else
            # Example:
            # $ echo ${tag%?}
            # medic-daily-2025-12-18-b1bd4006-test-b1bd400
            # $ echo ${tag%-*}
            # medic-daily-2025-12-18-b1bd4006-test
            var=${REUSE_TAG%-*}
            echo "Re-creating daily load test, with name: $var and tag: $REUSE_TAG"
            echo "benchmark=$var" >> "$GITHUB_OUTPUT"
          fi
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}


  setup-max-load-test:
    name: Setup max load test
    needs:
      - benchmark-data
    uses: ./.github/workflows/camunda-load-test.yml
    secrets: inherit
    with:
      name: ${{ needs.benchmark-data.outputs.benchmark }}
      ttl: 1
      scenario: max
      build-frontend: true

  setup-max-rest-load-test:
    name: Setup max REST load test
    needs:
      - benchmark-data
    uses: ./.github/workflows/camunda-load-test.yml
    secrets: inherit
    with:
      name: ${{ needs.benchmark-data.outputs.benchmark }}-rest
      ttl: 1
      scenario: max
      build-frontend: true
      load-test-load: --set global.preferRest.enabled=true

  # Wait 15 minutes after setup succeeds before profiling starts, mirroring the
  # warmup convention the rest of the load-test flow already uses (see
  # WARMUP_SECONDS in resolve-daily.py and await-benchmark's `sleep 900` in
  # camunda-pr-load-test.yaml): profiling from t=0 would capture pod startup
  # and ramp-up noise instead of steady-state behavior.
  warmup-grpc:
    name: Warmup before profiling (gRPC)
    runs-on: ubuntu-latest
    needs: setup-max-load-test
    if: needs.setup-max-load-test.result == 'success'
    timeout-minutes: 20
    permissions: { }
    steps:
      - name: Wait 15 minutes for warmup period
        run: sleep 900

  warmup-rest:
    name: Warmup before profiling (REST)
    runs-on: ubuntu-latest
    needs: setup-max-rest-load-test
    if: needs.setup-max-rest-load-test.result == 'success'
    timeout-minutes: 20
    permissions: { }
    steps:
      - name: Wait 15 minutes for warmup period
        run: sleep 900

  # Profile the first 30 minutes post-warmup of each run via async-profiler.
  # Runs concurrently with soak (not on its critical path).
  profile-grpc:
    name: Profile gRPC pods
    needs: [ benchmark-data, setup-max-load-test, warmup-grpc ]
    if: needs.warmup-grpc.result == 'success'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/profile-load-test.yml
    secrets: inherit
    with:
      name: c8-${{ needs.benchmark-data.outputs.benchmark }}
      pod: ''
      test-type: grpc
      duration-seconds: '1800'

  profile-rest:
    name: Profile REST pods
    needs: [ benchmark-data, setup-max-rest-load-test, warmup-rest ]
    if: needs.warmup-rest.result == 'success'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/profile-load-test.yml
    secrets: inherit
    with:
      name: c8-${{ needs.benchmark-data.outputs.benchmark }}-rest
      pod: ''
      test-type: rest
      duration-seconds: '1800'

  # Wait 3 hours per variant, anchored to that variant's own setup completion,
  # before taking its metrics snapshot. gRPC and REST setups build+deploy
  # independently and don't reliably finish at the same time, so a single
  # shared soak job (anchored to whichever setup finished last) would shift
  # the metrics window for the earlier-finishing variant later than its
  # actual start, cutting off the beginning of its run. Mirrors the
  # per-variant warmup-grpc/warmup-rest pattern above.
  # `Soak`'s name is intentionally unchanged (kept for gRPC): soak.started_at
  # is read by the PR load-test resolver (SOAK_JOB_NAME in resolve-daily.py)
  # to anchor the daily-vs-PR comparison window, which is always the gRPC
  # namespace; the resolver adds WARMUP_SECONDS + METRICS_WINDOW_SECONDS as
  # an offset. `REST soak`'s name deliberately does not start with "Soak" so
  # that lookup keeps resolving to the gRPC job only.
  soak-grpc:
    name: Soak
    runs-on: ubuntu-latest
    needs: setup-max-load-test
    if: needs.setup-max-load-test.result == 'success'
    timeout-minutes: 195
    permissions: { }
    outputs:
      soak_end_epoch: ${{ steps.timing.outputs.soak_end_epoch }}
    steps:
      - name: Wait 3 hours for soak period
        run: sleep 10800
      - name: Record soak end time
        id: timing
        run: echo "soak_end_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

  soak-rest:
    name: REST soak
    runs-on: ubuntu-latest
    needs: setup-max-rest-load-test
    if: needs.setup-max-rest-load-test.result == 'success'
    timeout-minutes: 195
    permissions: { }
    outputs:
      soak_end_epoch: ${{ steps.timing.outputs.soak_end_epoch }}
    steps:
      - name: Wait 3 hours for soak period
        run: sleep 10800
      - name: Record soak end time
        id: timing
        run: echo "soak_end_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

  # Gated on its own setup: if the gRPC setup failed, its namespace was never
  # created, so skip metrics collection rather than query a missing namespace.
  collect-metrics-grpc:
    name: Collect metrics (gRPC)
    needs: [ benchmark-data, setup-max-load-test, soak-grpc ]
    if: needs.soak-grpc.result == 'success' && needs.setup-max-load-test.result == 'success'
    uses: ./.github/workflows/camunda-load-test-metrics.yaml
    secrets: inherit
    with:
      namespace: c8-${{ needs.benchmark-data.outputs.benchmark }}
      duration-seconds: '10800'
      at: ${{ needs.soak-grpc.outputs.soak_end_epoch }}

  collect-metrics-rest:
    name: Collect metrics (REST)
    needs: [ benchmark-data, setup-max-rest-load-test, soak-rest ]
    if: needs.soak-rest.result == 'success' && needs.setup-max-rest-load-test.result == 'success'
    uses: ./.github/workflows/camunda-load-test-metrics.yaml
    secrets: inherit
    with:
      namespace: c8-${{ needs.benchmark-data.outputs.benchmark }}-rest
      duration-seconds: '10800'
      at: ${{ needs.soak-rest.outputs.soak_end_epoch }}

  # Upload both metrics JSON files as a workflow artifact (90-day retention).
  upload-metrics:
    name: Upload metrics artifacts
    runs-on: ubuntu-latest
    needs: [ benchmark-data, collect-metrics-grpc, collect-metrics-rest ]
    # Run if at least one side collected metrics; a skipped side just yields an empty file.
    if: always() && (needs.collect-metrics-grpc.result == 'success' || needs.collect-metrics-rest.result == 'success')
    timeout-minutes: 5
    permissions: { }
    steps:
      - name: Write metrics JSON files
        env:
          GRPC_JSON: ${{ needs.collect-metrics-grpc.outputs.results-json }}
          REST_JSON: ${{ needs.collect-metrics-rest.outputs.results-json }}
        run: |
          printf '%s' "$GRPC_JSON" > metrics-grpc.json
          printf '%s' "$REST_JSON" > metrics-rest.json
      - name: Upload metrics artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: daily-load-test-metrics-${{ needs.benchmark-data.outputs.benchmark }}
          path: |
            metrics-grpc.json
            metrics-rest.json
          retention-days: 90
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github
          persist-credentials: false
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  # Post a side-by-side gRPC vs REST metrics table to Slack.
  notify-results:
    name: Notify Slack with results
    runs-on: ubuntu-latest
    needs: [ benchmark-data, soak-grpc, collect-metrics-grpc, collect-metrics-rest, profile-grpc, profile-rest ]
    # Post if at least one side collected metrics; the skipped side renders as n/a.
    # `always()` means a profile-grpc/profile-rest failure never blocks this job -
    # profiling is supplementary and just yields no flamegraph links below.
    if: always() && (needs.collect-metrics-grpc.result == 'success' || needs.collect-metrics-rest.result == 'success')
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: List flamegraph artifacts
        id: flamegraph-artifacts
        # Best-effort enhancement: a failure here shouldn't block the Slack results
        # notification, it just means the Slack message omits flamegraph links.
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const runURL = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const links = data.artifacts
              .filter(a => a.name.startsWith('flamegraph-'))
              .map(a => `<${runURL}/artifacts/${a.id}|${a.name}>`)
              .join(' · ');
            core.setOutput('links', links);
      - name: Import Slack webhook from Vault
        id: slack-secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/camunda/ci/github-actions SLACK_ZEEBOT_RELIABILITY_TESTING_ALERTS_WEBHOOK_URL;
      - name: Build and post Slack results table
        # queries.yaml is the canonical source of metric names/labels/formats;
        # the script reads it directly so the Slack table stays in sync.
        env:
          GRPC_RESULTS_JSON: ${{ needs.collect-metrics-grpc.outputs.results-json }}
          REST_RESULTS_JSON: ${{ needs.collect-metrics-rest.outputs.results-json }}
          BENCHMARK: ${{ needs.benchmark-data.outputs.benchmark }}
          SLACK_WEBHOOK_URL: ${{ steps.slack-secrets.outputs.SLACK_ZEEBOT_RELIABILITY_TESTING_ALERTS_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          # gRPC's own soak end; used only to build the Grafana deep-link time
          # range for both dashboards, not for metrics query correctness (each
          # collect-metrics-* job already queried its own variant's window).
          SOAK_END_EPOCH: ${{ needs.soak-grpc.outputs.soak_end_epoch }}
          FLAMEGRAPH_LINKS: ${{ steps.flamegraph-artifacts.outputs.links }}
        run: python3 .github/scripts/post-load-test-results-to-slack.py
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  # Delete namespaces immediately after metrics are collected to reduce cluster cost.
  # Runs regardless of whether metrics collection succeeded or was skipped, as long
  # as we have a valid namespace name (benchmark-data succeeded).
  cleanup-grpc:
    name: Cleanup gRPC namespace
    needs: [ benchmark-data, collect-metrics-grpc ]
    if: always() && needs.benchmark-data.result == 'success'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/camunda-delete-load-test.yml
    secrets: inherit
    with:
      namespace: c8-${{ needs.benchmark-data.outputs.benchmark }}

  cleanup-rest:
    name: Cleanup REST namespace
    needs: [ benchmark-data, collect-metrics-rest ]
    if: always() && needs.benchmark-data.result == 'success'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/camunda-delete-load-test.yml
    secrets: inherit
    with:
      namespace: c8-${{ needs.benchmark-data.outputs.benchmark }}-rest

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [ setup-max-load-test, setup-max-rest-load-test, soak-grpc, soak-rest, collect-metrics-grpc, collect-metrics-rest, upload-metrics, notify-results ]
    if: failure()
    timeout-minutes: 5
    permissions: { }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Import Slack webhook from Vault
        id: slack-secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/camunda/ci/github-actions SLACK_ZEEBOT_RELIABILITY_TESTING_ALERTS_WEBHOOK_URL;
      - id: slack-notify
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          webhook: ${{ steps.slack-secrets.outputs.SLACK_ZEEBOT_RELIABILITY_TESTING_ALERTS_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":warning: *Daily load test creation failed:*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "@reliability-testing-team Please check the related workflow execution: https://github.com/camunda/camunda/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
