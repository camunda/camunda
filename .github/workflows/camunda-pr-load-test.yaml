# description: Creates a load test when a PR is labeled with 'benchmark'. Deploys with
#              scenario 'max', then runs two independent post-deploy paths:
#                - profile path: wait 15 min, run async-profiler, post flamegraph comment
#                - metrics path: wait 1 h, scrape PR + daily metrics over a 1 h window,
#                                post the comparison comment, then tear the namespace down
#              On unlabel or PR close, fires an explicit cleanup. New commits on the PR
#              cancel the in-flight run (via dispatch-level concurrency) and redeploy fresh.
# called by: pr-load-test-dispatch.yml
# calls: camunda-load-test.yml (scenario: max), profile-load-test.yml,
#        camunda-load-test-metrics.yaml, camunda-delete-load-test.yml
# type: CI
# owner: @camunda/reliability-testing
name: Camunda Pull Request Benchmark
on:
  workflow_call:
    inputs:
      label:
        description: 'PR label that triggered this benchmark (e.g., benchmark, benchmark-postgresql)'
        required: true
        type: string
      ref:
        description: 'Branch ref to sanitize, deploy, and profile'
        required: true
        type: string
      secondary-storage-type:
        description: 'Storage backend (elasticsearch, opensearch, postgresql, mysql, mariadb, mssql, oracle, none)'
        required: true
        type: string
      reuse-tag:
        description: 'Pre-built image tag from the internal registry. When set, skips the image build step.'
        required: false
        type: string
        default: ''

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

env:
  CLUSTER: camunda-benchmark-prod
  TELEPORT_JOIN_TOKEN: infra-benchmark-prod-github-action-zeebe

jobs:
  sanitize-branch-name:
    name: Sanitize Branch Name
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      sanitized-name: ${{ steps.compute-namespace.outputs.namespace }}
      storage-type: ${{ inputs.secondary-storage-type }}
    steps:
      - id: sanitize-author
        name: Sanitize author name
        uses: camunda/infra-global-github-actions/sanitize-branch-name@main
        with:
          branch: ${{ github.event.pull_request.user.login }}
          max_length: 10

      - id: sanitize-db-type
        name: Sanitize db type
        uses: camunda/infra-global-github-actions/sanitize-branch-name@main
        with:
          branch: ${{ inputs.secondary-storage-type }}
          max_length: 15

      - id: compute-namespace
        name: Compute safe namespace from PR author, number and the database type
        run: |
          author="${{ steps.sanitize-author.outputs.branch_name }}"
          db_type="${{ steps.sanitize-db-type.outputs.branch_name }}"
          pr_number="${{ github.event.pull_request.number }}"
          echo "namespace=c8-${author}-pr-${pr_number}-${db_type}" >> "$GITHUB_OUTPUT"

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  create-benchmark:
    name: Benchmark
    needs: sanitize-branch-name
    if: >
      (github.event.action == 'labeled' && github.event.label.name == inputs.label) ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, inputs.label))
    uses: ./.github/workflows/camunda-load-test.yml
    secrets: inherit
    with:
      name: ${{ needs.sanitize-branch-name.outputs.sanitized-name }}
      ref: ${{ inputs.ref }}
      scenario: 'max'
      secondary-storage-type: ${{ needs.sanitize-branch-name.outputs.storage-type }}
      reuse-tag: ${{ inputs.reuse-tag }}

  await-benchmark:
    name: Await Benchmark
    needs: create-benchmark
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Wait for load test to stabilize
        run: sleep 900  # 15 minutes
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  await-metrics-window:
    name: Await 1h metrics window
    needs: create-benchmark
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 70
    steps:
      - name: Wait for 1h of benchmark traffic
        run: sleep 3600  # 1 hour
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  run-profiling:
    name: Run Profiling
    needs: [sanitize-branch-name, await-benchmark]
    uses: ./.github/workflows/profile-load-test.yml
    secrets: inherit
    with:
      name: ${{ needs.sanitize-branch-name.outputs.sanitized-name }}
      pod: ''
      database: ${{ needs.sanitize-branch-name.outputs.storage-type }}

  resolve-daily-namespace:
    name: Resolve latest daily-on-main namespace
    needs: await-metrics-window
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: 'read'
      id-token: 'write'
    outputs:
      daily-namespace: ${{ steps.find.outputs.namespace }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Teleport
        uses: teleport-actions/setup@b638ff596557cc3959eb6b5287d5e58e0c8ac6a6 # v1.1.1
        with:
          proxy: camunda.teleport.sh:443
          version: auto
      - name: Authenticate to Cluster using Teleport
        uses: teleport-actions/auth-k8s@0f46164469ae4fcd4d359d40e06bab17d4be17c9 # v2.0.6
        with:
          proxy: camunda.teleport.sh:443
          token: ${{ env.TELEPORT_JOIN_TOKEN }}
          kubernetes-cluster: ${{ env.CLUSTER }}
      - id: find
        name: Find most recent c8-medic-daily-*-test namespace
        run: |
          # Pick the most recently created namespace matching the daily-on-main
          # naming pattern. Empty string when no daily run is currently live;
          # the get-daily-metrics job is gated on this output so we skip the
          # comparison cleanly rather than failing.
          ns=$(kubectl get ns -o json \
            | jq -r '.items[]
                | select(.metadata.name | test("^c8-medic-daily-.*-test$"))
                | "\(.metadata.creationTimestamp) \(.metadata.name)"' \
            | sort -r | head -n1 | awk '{print $2}')
          if [[ -z "$ns" ]]; then
            echo "::warning::No active c8-medic-daily-*-test namespace found; daily comparison will be skipped"
          else
            echo "Resolved daily namespace: $ns"
          fi
          echo "namespace=${ns}" >> "$GITHUB_OUTPUT"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  get-pr-metrics:
    name: Collect PR namespace metrics
    needs: [sanitize-branch-name, await-metrics-window]
    uses: ./.github/workflows/camunda-load-test-metrics.yaml
    secrets: inherit
    with:
      namespace: ${{ needs.sanitize-branch-name.outputs.sanitized-name }}
      duration-seconds: '3600'

  get-daily-metrics:
    name: Collect daily-on-main metrics
    needs: resolve-daily-namespace
    if: needs.resolve-daily-namespace.outputs.daily-namespace != ''
    uses: ./.github/workflows/camunda-load-test-metrics.yaml
    secrets: inherit
    with:
      namespace: ${{ needs.resolve-daily-namespace.outputs.daily-namespace }}
      duration-seconds: '3600'

  render-comparison:
    name: Render PR vs Daily comparison
    needs: [sanitize-branch-name, resolve-daily-namespace, get-pr-metrics, get-daily-metrics]
    # Run when get-pr-metrics actually executed (success or failure) so a
    # partial metrics fetch still posts a comment with `n/a` / `-` placeholders.
    # Skips naturally on unlabel / close events because get-pr-metrics is then
    # skipped via upstream propagation.
    if: ${{ !cancelled() && needs.get-pr-metrics.result != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: 'read'
    outputs:
      comparison-md: ${{ steps.render.outputs.comparison-md }}
    env:
      NAMESPACE: ${{ needs.sanitize-branch-name.outputs.sanitized-name }}
      DAILY_NAMESPACE: ${{ needs.resolve-daily-namespace.outputs.daily-namespace }}
      DURATION_SECONDS: '3600'
      STORAGE_TYPE: ${{ needs.sanitize-branch-name.outputs.storage-type }}
      PR_RESULTS_JSON: ${{ needs.get-pr-metrics.outputs.results-json }}
      DAILY_RESULTS_JSON: ${{ needs.get-daily-metrics.outputs.results-json }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Convert queries.yaml to JSON for render step
        run: yq -o=json '.' load-tests/docs/scripts/queries.yaml > /tmp/queries.json
      - name: Build comparison markdown
        id: render
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');

            const namespace = process.env.NAMESPACE;
            const dailyNamespace = process.env.DAILY_NAMESPACE || '';
            const durationSeconds = parseInt(process.env.DURATION_SECONDS, 10);
            const storageType = process.env.STORAGE_TYPE || '';

            // Three sources of truth, all data-driven:
            //   queries.yaml      → which metrics to display + how to format them
            //   optimal.json      → aspirational target + tolerance per metric
            //   *_RESULTS_JSON    → scraped values from the two metrics jobs (env vars)
            const queriesDoc = JSON.parse(
              fs.readFileSync('/tmp/queries.json', 'utf8'),
            );
            const optimal = JSON.parse(
              fs.readFileSync('load-tests/docs/scripts/optimal.json', 'utf8'),
            );
            const optimalMetrics = optimal.metrics || {};

            // Upstream job outputs are empty strings when the job failed or was
            // skipped (e.g. no daily namespace found). Parse defensively so we
            // still post a comment.
            const safeJsonParse = (raw, label) => {
              if (!raw || !raw.trim()) {
                core.warning(`${label} JSON is empty — column will render as n/a / '-'`);
                return {};
              }
              try { return JSON.parse(raw); }
              catch (e) {
                core.warning(`${label} JSON failed to parse — ${e.message}`);
                return {};
              }
            };
            const results = safeJsonParse(process.env.PR_RESULTS_JSON, 'Current');
            const dailyResults = safeJsonParse(process.env.DAILY_RESULTS_JSON, 'Daily');

            // Some metrics (counts) scale linearly with run duration; others (rates,
            // percentages) are duration-invariant. optimal.json encodes the difference:
            // counts use `per-second`, everything else uses `expected`.
            const optimalFor = (spec) => {
              if (spec.expected != null) return spec.expected;
              if (spec['per-second'] != null) return spec['per-second'] * durationSeconds;
              return null;
            };

            const numericOrNull = (v) =>
              (typeof v === 'number' && Number.isFinite(v)) ? v : null;

            const formatValue = (n, q) => {
              if (n == null || !Number.isFinite(n)) return 'n/a';
              const decimals = q.decimals ?? 2;
              const unit = q.unit ?? '';
              switch (q.format) {
                case 'integer':
                  return Math.round(n).toLocaleString();
                case 'percent':
                  return n.toFixed(decimals) + (unit || '%');
                case 'float':
                  return n.toFixed(decimals) + (unit ? ' ' + unit : '');
                default:
                  return String(n);
              }
            };

            // Daily column is allowed to be empty (no active daily run, or no
            // metric in this Prometheus window). Render a literal '-' rather than
            // 'n/a' to make it visually distinct from "the query ran and got null."
            const formatOrDash = (n, q) =>
              (n == null || !Number.isFinite(n)) ? '-' : formatValue(n, q);

            const verdict = (current, baseline, tolerance, higherIsBetter) => {
              if (current == null || !Number.isFinite(current) || baseline == null) return '❔';
              if (baseline === 0) {
                if (!higherIsBetter && current === 0) return '✅';
                if (!higherIsBetter && current > 0) return '⚠️';
                return current > 0 ? '✅' : '❔';
              }
              const diff = ((current - baseline) / baseline) * 100;
              if (Math.abs(diff) <= (tolerance ?? 10)) return '✅';
              return (higherIsBetter ? diff > 0 : diff < 0) ? '✅' : '⚠️';
            };

            const delta = (current, baseline) => {
              if (current == null || !Number.isFinite(current) || baseline == null) return 'n/a';
              if (baseline === 0) return current === 0 ? '0' : '+∞';
              const diff = ((current - baseline) / baseline) * 100;
              const sign = diff >= 0 ? '+' : '';
              return `${sign}${diff.toFixed(1)}%`;
            };

            const tableLines = [
              '| Metric | Current | Daily | Optimal | Δ vs Daily | |',
              '|---|---:|---:|---:|---:|:---:|',
            ];
            for (const q of queriesDoc.queries) {
              const current = numericOrNull(results[q.name]);
              const daily = numericOrNull(dailyResults[q.name]);
              const spec = optimalMetrics[q.name] || {};
              const optimalVal = optimalFor(spec);
              const tolerance = spec['tolerance-percent'];
              tableLines.push(
                `| ${q.description} | ${formatValue(current, q)} | ${formatOrDash(daily, q)} | ${formatValue(optimalVal, q)} | ${delta(current, daily)} | ${verdict(current, daily, tolerance, q.higher_is_better)} |`,
              );
            }

            const dailyLine = dailyNamespace
              ? `Daily reference: \`${dailyNamespace}\``
              : '_No active daily-on-main namespace found; Daily column shows \`-\`._';

            const dashboard = `https://dashboard.benchmark.camunda.cloud/d/zeebe-dashboard/zeebe?var-namespace=${namespace}`;
            const heading = storageType
              ? `## 📈 Load Test Metrics - ${storageType}`
              : `## 📈 Load Test Metrics`;
            const body = [
              heading,
              '',
              `Window: ${durationSeconds}s · Namespace: \`${namespace}\``,
              dailyLine,
              '',
              ...tableLines,
              '',
              `📊 [Grafana dashboard](${dashboard}) · 🔁 [Workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              `_Metrics defined in \`load-tests/docs/scripts/queries.yaml\`. Daily reference is the most recent active \`c8-medic-daily-*-test\` namespace on main. Optimal target at \`load-tests/docs/scripts/optimal.json\`. Verdict compares Current to Daily; tolerance from Optimal. ⚠️ only fires on the regression side — improvements outside tolerance still show ✅._`,
            ].join('\n');

            await core.summary.addRaw(body).write();
            core.setOutput('comparison-md', body);
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  comment-comparison-pr:
    name: Post PR vs Daily comparison comment
    needs: render-comparison
    # Skip when render was cancelled or skipped upstream so we never post a half-finished comment.
    if: ${{ !cancelled() && needs.render-comparison.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: 'read'
      pull-requests: 'write'
    env:
      COMPARISON_MD: ${{ needs.render-comparison.outputs.comparison-md }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Post comparison comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const body = process.env.COMPARISON_MD;
            const prNumber = parseInt(process.env.PR_NUMBER || '0', 10);
            if (!body || prNumber <= 0) {
              core.info('No comparison body or PR number — skipping comment.');
              return;
            }
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  auto-delete-benchmark:
    name: Auto cleanup after metrics
    needs: [sanitize-branch-name, comment-comparison-pr]
    # Mirror the cancellation guard so a cancelled run never tears down a
    # namespace another run will need. Only fires once metrics actually posted.
    if: ${{ !cancelled() && needs.comment-comparison-pr.result == 'success' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/camunda-delete-load-test.yml
    secrets: inherit
    with:
      namespace: ${{ needs.sanitize-branch-name.outputs.sanitized-name }}

  comment-pr:
    name: Comment on PR with profiling results
    needs: [run-profiling, sanitize-branch-name]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: 'read'
      pull-requests: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Comment PR with profiling results
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // List all downloaded artifacts
            const artifactPath = 'artifacts';
            const artifacts = fs.readdirSync(artifactPath);

            // Get artifact IDs from GitHub API
            const { data: workflowArtifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            let comment = '## Profiling Results - ${{ needs.sanitize-branch-name.outputs.storage-type }}\n\n';
            comment += 'The benchmark has been profiled with the following events:\n\n';
            comment += '| Event | Pod | Artifact |\n';
            comment += '|-------|-----|----------|\n';

            const artifactPrefix = 'flamegraph-${{ needs.sanitize-branch-name.outputs.storage-type }}';
            const regex = new RegExp(artifactPrefix + '-(\\w+)-(\\w+-\\d+)');
            artifacts.forEach(artifact => {
              const match = artifact.match(regex);
              if (match) {
                const event = match[1];
                const pod = match[2];

                // Find the artifact ID for this artifact name
                const artifactInfo = workflowArtifacts.artifacts.find(a => a.name === artifact);
                if (artifactInfo) {
                  const downloadUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${artifactInfo.id}`;
                  comment += `| ${event} | ${pod} | [Download](${downloadUrl}) |\n`;
                } else {
                  comment += `| ${event} | ${pod} | N/A |\n`;
                }
              }
            });

            comment += '\n📊 [View all artifacts and workflow summary](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  delete-benchmark:
    name: Benchmark Cleanup
    needs: sanitize-branch-name
    if: >
      (github.event.action == 'unlabeled' && github.event.label.name == inputs.label) ||
      (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, inputs.label))
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/camunda-delete-load-test.yml
    secrets: inherit
    with:
      namespace: ${{ needs.sanitize-branch-name.outputs.sanitized-name }}
