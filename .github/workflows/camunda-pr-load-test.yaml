# description: Creates a load test when a PR is labeled with 'benchmark'. Deploys with
#              scenario 'max', waits 15 minutes, then profiles via async-profiler and
#              posts flamegraph results as a PR comment. Cleans up on label removal or PR close.
# called by: pr-load-test-dispatch.yml
# calls: camunda-load-test.yml (scenario: max), profile-load-test.yml
# type: CI
# owner: @camunda/reliability-testing
name: Camunda Pull Request Benchmark
on:
  workflow_call:
    inputs:
      label:
        description: 'PR label that triggered this benchmark (e.g., benchmark, benchmark-postgresql)'
        required: true
        type: string
      ref:
        description: 'Branch ref to sanitize, deploy, and profile'
        required: true
        type: string
      secondary-storage-type:
        description: 'Storage backend (elasticsearch, opensearch, postgresql, mysql, mariadb, mssql, oracle, none)'
        required: true
        type: string
      reuse-tag:
        description: 'Pre-built image tag from the internal registry. When set, skips the image build step.'
        required: false
        type: string
        default: ''

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

env:
  CLUSTER: camunda-benchmark-prod
  TELEPORT_JOIN_TOKEN: infra-benchmark-prod-github-action-zeebe

jobs:
  sanitize-branch-name:
    name: Sanitize Branch Name
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      sanitized-name: ${{ steps.compute-namespace.outputs.namespace }}
      storage-type: ${{ inputs.secondary-storage-type }}
    steps:
      - id: sanitize-author
        name: Sanitize author name
        uses: camunda/infra-global-github-actions/sanitize-branch-name@main
        with:
          branch: ${{ github.event.pull_request.user.login }}
          max_length: 10

      - id: sanitize-db-type
        name: Sanitize db type
        uses: camunda/infra-global-github-actions/sanitize-branch-name@main
        with:
          branch: ${{ inputs.secondary-storage-type }}
          max_length: 15

      - id: compute-namespace
        name: Compute safe namespace from PR author, number and the database type
        run: |
          author="${{ steps.sanitize-author.outputs.branch_name }}"
          db_type="${{ steps.sanitize-db-type.outputs.branch_name }}"
          pr_number="${{ github.event.pull_request.number }}"
          echo "namespace=c8-${author}-pr-${pr_number}-${db_type}" >> "$GITHUB_OUTPUT"

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  create-benchmark:
    name: Benchmark
    needs: sanitize-branch-name
    if: >
      (github.event.action == 'labeled' && github.event.label.name == inputs.label) ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, inputs.label))
    uses: ./.github/workflows/camunda-load-test.yml
    secrets: inherit
    with:
      name: ${{ needs.sanitize-branch-name.outputs.sanitized-name }}
      ref: ${{ inputs.ref }}
      scenario: 'max'
      secondary-storage-type: ${{ needs.sanitize-branch-name.outputs.storage-type }}
      reuse-tag: ${{ inputs.reuse-tag }}

  await-benchmark:
    name: Await Benchmark
    needs: create-benchmark
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Wait for load test to stabilize
        run: sleep 900  # 15 minutes
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  run-profiling:
    name: Run Profiling
    needs: [sanitize-branch-name, await-benchmark]
    uses: ./.github/workflows/profile-load-test.yml
    secrets: inherit
    with:
      name: ${{ needs.sanitize-branch-name.outputs.sanitized-name }}
      pod: ''
      database: ${{ needs.sanitize-branch-name.outputs.storage-type }}

  comment-pr:
    name: Comment on PR with profiling results
    needs: [run-profiling, sanitize-branch-name]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: 'read'
      pull-requests: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Comment PR with profiling results
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // List all downloaded artifacts
            const artifactPath = 'artifacts';
            const artifacts = fs.readdirSync(artifactPath);

            // Get artifact IDs from GitHub API
            const { data: workflowArtifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            let comment = '## Profiling Results - ${{ needs.sanitize-branch-name.outputs.storage-type }}\n\n';
            comment += 'The benchmark has been profiled with the following events:\n\n';
            comment += '| Event | Pod | Artifact |\n';
            comment += '|-------|-----|----------|\n';

            const artifactPrefix = 'flamegraph-${{ needs.sanitize-branch-name.outputs.storage-type }}';
            const regex = new RegExp(artifactPrefix + '-(\\w+)-(\\w+-\\d+)');
            artifacts.forEach(artifact => {
              const match = artifact.match(regex);
              if (match) {
                const event = match[1];
                const pod = match[2];

                // Find the artifact ID for this artifact name
                const artifactInfo = workflowArtifacts.artifacts.find(a => a.name === artifact);
                if (artifactInfo) {
                  const downloadUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${artifactInfo.id}`;
                  comment += `| ${event} | ${pod} | [Download](${downloadUrl}) |\n`;
                } else {
                  comment += `| ${event} | ${pod} | N/A |\n`;
                }
              }
            });

            comment += '\n📊 [View all artifacts and workflow summary](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  delete-benchmark:
    name: Benchmark Cleanup
    needs: sanitize-branch-name
    if: >
      (github.event.action == 'unlabeled' && github.event.label.name == inputs.label) ||
      (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, inputs.label))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Teleport
        uses: teleport-actions/setup@b638ff596557cc3959eb6b5287d5e58e0c8ac6a6 # v1.1.1
        with:
          proxy: camunda.teleport.sh:443
          version: auto

      - name: Authenticate to Cluster using Teleport
        uses: teleport-actions/auth-k8s@0f46164469ae4fcd4d359d40e06bab17d4be17c9 # v2.0.6
        with:
          proxy: camunda.teleport.sh:443
          token: ${{ env.TELEPORT_JOIN_TOKEN }}
          kubernetes-cluster: ${{ env.CLUSTER }}

      - name: Delete benchmarks
        run: |
          kubectl delete ns "${{ needs.sanitize-branch-name.outputs.sanitized-name }}" --ignore-not-found
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
