# description: Creates a load test for official release images. Abstraction layer between
#              the release process and the load test infrastructure, with a simple public API
#              accepting required name and tag inputs plus optional per-component
#              tag overrides: optimize-tag, identity-tag, and connectors-tag.
#              Uses official Docker images with scenario: realistic.
# called-by: camunda-scheduled-release-load-tests.yml (daily schedule),
#            release BPMN process (workflow_dispatch via GitHub API)
# calls: camunda-load-test.yml (orchestration-tag: <tag>, scenario: realistic)
# note: Verification and namespace cleanup are handled externally by the scheduled workflow
#       via camunda-verify-and-cleanup-load-test.yml, not by this workflow.
# type: CI
# owner @camunda/reliability-testing
name: Camunda Release load test workflow
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Specifies the name of the load test'
        type: string
        required: true
      tag:
        description: 'Specifies the tag that should be used for the release load test'
        type: string
        required: true
      optimize-tag:
        description: 'Docker image tag for Optimize. If not set, defaults to the Helm chart default image.'
        type: string
        default: ""
        required: false
      identity-tag:
        description: 'Docker image tag for Identity. If not set, defaults to the Helm chart default image.'
        type: string
        default: ""
        required: false
      connectors-tag:
        description: 'Docker image tag for Connectors. If not set, defaults to the Helm chart default image.'
        type: string
        default: ""
        required: false
  workflow_call:
    inputs:
      name:
        description: 'Specifies the name of the load test'
        type: string
        required: true
      tag:
        description: 'Specifies the tag that should be used for the release load test'
        type: string
        required: true
      optimize-tag:
        description: 'Docker image tag for Optimize. If not set, defaults to the Helm chart default image.'
        type: string
        default: ""
        required: false
      identity-tag:
        description: 'Docker image tag for Identity. If not set, defaults to the Helm chart default image.'
        type: string
        default: ""
        required: false
      connectors-tag:
        description: 'Docker image tag for Connectors. If not set, defaults to the Helm chart default image.'
        type: string
        default: ""
        required: false

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

env:
  CLUSTER: camunda-benchmark-prod
  TELEPORT_JOIN_TOKEN: infra-benchmark-prod-github-action-zeebe

jobs:
  sanitize-inputs:
    name: Sanitize test inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      sanitized-name: c8-${{ steps.sanitize.outputs.branch_name }}
      test-tag: ${{ steps.prepare_tag.outputs.test-tag }}
    steps:
      - id: sanitize
        uses: camunda/infra-global-github-actions/sanitize-branch-name@main
        with:
          branch: ${{ inputs.name }}
          max_length: 50  # reduced to account for load-test prefix "c8-" and potential suffixes for uniqueness
      - id: prepare_tag
        run: echo "test-tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  create-load-test:
    name: Create release load test
    needs: sanitize-inputs
    uses: ./.github/workflows/camunda-load-test.yml
    secrets: inherit
    with:
      name: ${{ needs.sanitize-inputs.outputs.sanitized-name }}
      ref: stable/8.8
      orchestration-tag: ${{ inputs.tag }}
      ttl: 60
      scenario: 'realistic'
      optimize-tag: ${{ inputs.optimize-tag }}
      identity-tag: ${{ inputs.identity-tag }}
      connectors-tag: ${{ inputs.connectors-tag }}

  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [sanitize-inputs, create-load-test]
    if: failure()
    permissions: {}
    steps:
      - uses: actions/checkout@v6
      - id: slack-notify
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_RELIABILITY_TESTING_CH }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":alarm: *Release load test creation failed:*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "@reliability-testing-team Please check the related workflow execution: https://github.com/camunda/camunda/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
