# type: CI
# owner: @camunda/monorepo-devops-team

# Description: 
# This GitHub Actions workflow creates Docker images for urgent hotfixes. It is triggered manually via workflow dispatch
# and allows building specific components with versions from either a branch or a specific commit SHA.
# 
# Usage:
# - Input format for components: "component:version,component:version" (e.g., "camunda:8.6.1,operate:8.6.1")
# - Either branch OR commit must be specified (commit takes precedence)
# - Support ticket ID is required for proper tagging (e.g. SUPPORT-12345, JIRA-123, ticket-456)
# - Registry is fixed to: registry.camunda.cloud/hotfixes (not configurable)
# - Platforms option to choose from: linux/amd64, linux/arm64, or both (linux/amd64,linux/arm64)
# 
# The workflow validates inputs, builds the requested images, and pushes them to the Camunda hotfix registry following 
# the naming convention: registry.camunda.cloud/hotfixes/<image>:<application-version>-<support-issue-id>
# Example: registry.camunda.cloud/hotfixes/camunda:8.6.1-support-12345
name: Create Urgent Hotfix Image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'The branch to create hotfix images from (ignored if commit is specified)'
        required: false
        type: string
      commit:
        description: 'The specific commit SHA to create hotfix images from (accepts both short and full SHA - takes precedence over branch)'
        required: false
        type: string
      support-ticket-id:
        description: 'The support ticket ID (e.g. SUPPORT-12345, JIRA-123, ticket-456)'
        required: true
        type: string
      components_with_versions:
        description: 'Components to build with versions (e.g. camunda:8.6.1,operate:8.6.1)'
        required: true
        type: string
      architecture:
        type: choice
        description: 'The target architecture for the Docker image(s)'
        required: true
        options:
            - linux/amd64
            - linux/arm64
            - linux/amd64,linux/arm64

defaults:
  run:
    shell: bash

env:
  HOTFIX_REGISTRY: "registry.camunda.cloud/hotfixes"

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.determine-ref.outputs.ref }}
      short-sha: ${{ steps.determine-ref.outputs.short-sha }}
      components-matrix: ${{ steps.parse-components.outputs.matrix }}
      support-ticket-id: ${{ github.event.inputs.support-ticket-id }}
      components-with-versions: ${{ github.event.inputs.components_with_versions }}
    steps:
      - name: Validate inputs
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          COMMIT="${{ github.event.inputs.commit }}"
          TICKET_ID="${{ github.event.inputs.support-ticket-id }}"
          COMPONENTS="${{ github.event.inputs.components_with_versions }}"
                  
          if [[ -z "$BRANCH" && -z "$COMMIT" ]]; then
            echo "❌ Error: Either branch or commit must be specified"
            exit 1
          fi
          
          if [[ -z "$TICKET_ID" ]]; then
            echo "❌ Error: Support ticket ID is required for proper image tagging"
            exit 1
          fi
          
          # Validate ticket ID format (should be alphanumeric with hyphens/underscores)
          if [[ ! "$TICKET_ID" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Error: Support ticket ID contains invalid characters. Use only alphanumeric, hyphens, and underscores"
            echo "❌ Current format: '$TICKET_ID'"
            exit 1
          fi

          if [[ -z "$COMPONENTS" ]]; then
              echo "❌ Error: Components with versions input is required"
              exit 1
          fi
      - name: Parse components
        id: parse-components
        run: |
          COMPONENTS_WITH_VERSIONS="${{ github.event.inputs.components_with_versions }}"
          echo "Raw input: $COMPONENTS_WITH_VERSIONS"
          
          # Parse components with versions using jq for robust JSON handling
          # Example: camunda:7.15.0,operate:7.15.0
          
          # Create temporary array to collect valid components
          VALID_COMPONENTS=()
          
          IFS=',' read -ra COMPONENT_ARRAY <<< "$COMPONENTS_WITH_VERSIONS"
          for COMPONENT_WITH_VERSION in "${COMPONENT_ARRAY[@]}"; do
            # Trim whitespace
            COMPONENT_WITH_VERSION=$(echo "$COMPONENT_WITH_VERSION" | xargs)
            
            # Split component and version
            if [[ "$COMPONENT_WITH_VERSION" =~ ^([^:]+):(.+)$ ]]; then
              COMPONENT="${BASH_REMATCH[1]}"
              VERSION="${BASH_REMATCH[2]}"
              
              # Validate component is supported (components with independent Dockerfiles)
              case "$COMPONENT" in
                "camunda"|"optimize"|"operate"|"tasklist")
                  echo "✅ Valid component: $COMPONENT"
                  ;;
                *)
                  echo "❌ Error: Unsupported component '$COMPONENT'"
                  echo "❌ Supported components: camunda, optimize, operate, tasklist"
                  echo "❌ Note: zeebe is part of the camunda distribution"
                  echo "❌ If you need to add a new component, update both input validation and Maven build configuration"
                  exit 1
                  ;;
              esac
              
              # Validate version format - only proper version numbers allowed
              # Examples: 8.6.1, 8.9, SNAPSHOT, 1.0.0-alpha, 2.1-SNAPSHOT
              if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+)*(-[a-zA-Z0-9]+)*$|^[A-Z]+(-[a-zA-Z0-9]+)*$ ]]; then
                echo "❌ Error: Invalid version format '$VERSION' for component '$COMPONENT'"
                echo "❌ Version must be a proper version number (semver or snapshot)"
                echo "❌ Examples: 8.6.1, 8.9, 1.0.0-alpha, SNAPSHOT, SNAPSHOT-fix1"
                exit 1
              fi
              
              # Add to valid components array
              VALID_COMPONENTS+=("$COMPONENT:$VERSION")
              echo "✅ Parsed: $COMPONENT -> $VERSION"
            else
              echo "❌ Error: Invalid format '$COMPONENT_WITH_VERSION'. Expected format: component:version"
              exit 1
            fi
          done
          
          # Generate JSON matrix using jq for proper JSON handling (compact format for GitHub Actions)
          MATRIX_JSON=$(printf '%s\n' "${VALID_COMPONENTS[@]}" | \
            jq -R -s -c 'split("\n") | map(select(length > 0)) | map(split(":") | {component: .[0], version: .[1]})')
          
          echo "Components to build: $COMPONENTS_WITH_VERSIONS"
          echo "Matrix JSON: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
      - name: Checkout repository to determine ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}      
      - name: Fetch all branches and tags
        run: |
          git fetch --all --tags --force
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --force
      - name: Determine reference and SHA
        id: determine-ref
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          COMMIT="${{ github.event.inputs.commit }}"
          
          if [[ -n "$COMMIT" ]]; then
            # Validate commit exists and get full SHA (handles both short and full SHAs)
            echo "🔍 Looking for commit: $COMMIT"
            
            if FULL_SHA=$(git rev-parse "$COMMIT^{commit}" 2>/dev/null); then
              echo "✅ Found commit directly: $COMMIT -> $FULL_SHA"
            else
              echo "❌ Error: Commit not found"
              error 1
            fi
            REF="$FULL_SHA"  # Use full SHA for checkout action
          else
            # Validate branch exists - must find the exact branch specified
            echo "🔍 Looking for branch: $BRANCH"
            
            if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
              echo "✅ Found remote branch: $BRANCH"
              REF="$BRANCH"  # Use just the branch name for checkout
              FULL_SHA=$(git rev-parse "origin/$BRANCH")
            else
              echo "❌ Error: Branch '$BRANCH' does not exist"
              echo "🔍 Available remote branches:"
              git branch -r | head -20
              exit 1
            fi
          fi
          
          SHORT_SHA="${FULL_SHA:0:8}"
          
          echo "✅ Using reference: $REF"
          echo "✅ Full SHA: $FULL_SHA"
          echo "✅ Short SHA: $SHORT_SHA"
          
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

  build-images:
    name: Build `${{ matrix.component }}:${{ matrix.version }}` Image
    runs-on: gcp-perf-core-8-default
    needs: validate-inputs
    timeout-minutes: 45
    permissions:
      contents: 'read'
      id-token: 'write'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.validate-inputs.outputs.components-matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-inputs.outputs.ref }}
          fetch-depth: 0
          
      - name: Checkout specific ref
        run: |
          REF="${{ needs.validate-inputs.outputs.ref }}"
          echo "Checking out ref: $REF"
          
          # Fetch all branches and tags to ensure we have the ref
          git fetch --all --tags --force
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --force
          
          # Check if this is a commit hash (7-40 hex characters)
          if [[ "$REF" =~ ^[a-f0-9]{7,40}$ ]]; then
            echo "📝 Detected commit hash: $REF"
            
            # Verify commit exists
            if git rev-parse "$REF^{commit}" >/dev/null 2>&1; then
              echo "✅ Commit exists, checking out..."
              git checkout "$REF"
              echo "✅ Successfully checked out commit: $REF"
            else
              echo "❌ Error: Commit '$REF' not found"
              echo "🔍 Available recent commits:"
              git log --oneline -10 --all
              exit 1
            fi
          else
            echo "📝 Detected branch: $REF"
            # For branches, checkout the remote branch
            if git show-ref --verify --quiet "refs/remotes/origin/$REF"; then
              echo "✅ Branch exists, checking out..."
              git checkout -b "local-$REF" "origin/$REF"
              echo "✅ Successfully checked out branch: $REF"
            else
              echo "❌ Error: Branch '$REF' not found"
              echo "🔍 Available branches:"
              git branch -r | head -10
              exit 1
            fi
          fi
      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/github.com/organizations/camunda NEXUS_PSW | ci-account-password;
            secret/data/github.com/organizations/camunda NEXUS_USR | ci-account-username; 

      - name: Log into Harbor
        uses: docker/login-action@v3
        with:
            registry: registry.camunda.cloud
            username: ${{ steps.secrets.outputs.ci-account-username }}
            password: ${{ steps.secrets.outputs.ci-account-password }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Maven cache
        uses: ./.github/actions/setup-maven-cache
        with:
          maven-cache-key-modifier: hotfix

      - name: Determine Dockerfile and build context
        id: docker-config
        run: |
          COMPONENT="${{ matrix.component }}"
          CONTEXT="."
          
          # Check for component-specific Dockerfile first
          if [[ -f "${COMPONENT}.Dockerfile" ]]; then
            DOCKERFILE="${COMPONENT}.Dockerfile"
            echo "✅ Found component-specific Dockerfile: $DOCKERFILE"
          else
            echo "❌ Error: No Dockerfile found for component '$COMPONENT'"
            echo "❌ Expected: '${COMPONENT}.Dockerfile'"
            echo "❌ Available Dockerfiles:"
            ls -la ./*.Dockerfile ./Dockerfile 2>/dev/null || echo "❌ No Dockerfiles found"
            exit 1
          fi
          
          echo "dockerfile=$DOCKERFILE" >> "$GITHUB_OUTPUT"
          echo "context=$CONTEXT" >> "$GITHUB_OUTPUT"
          echo "✅ Using Dockerfile: $DOCKERFILE"

      - name: Set project version
        run: |
          echo "🔧 Setting project version to ${{ matrix.version }}..."
          
          # Set version in the BOM only - parent and root inherit from BOM through Maven inheritance
          # Maven inheritance hierarchy: BOM -> Parent -> Root
          # The parent/pom.xml and pom.xml inherit their versions and cannot be set directly
          echo "🔧 Updating version in BOM (parent and root will inherit automatically)..."
          ./mvnw versions:set -DnewVersion=${{ matrix.version }} -DgenerateBackupPoms=false -f bom/pom.xml
          
          echo "✅ Project version updated to ${{ matrix.version }}"
          echo "🔍 Verifying version change..."
          ./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout

      - name: Build Maven artifacts
        run: |
          echo "🔨 Building Maven artifacts for ${{ matrix.component }} with version ${{ matrix.version }}..."
          
          # Build the necessary distribution artifacts based on component
          # Each component has specific build requirements based on their Dockerfile expectations
          case "${{ matrix.component }}" in
            "camunda")
              echo "📦 Building camunda (includes zeebe, operate, tasklist) distribution tarball..."
              ./mvnw clean package -T1C -DskipTests -DskipChecks -am -pl dist
              echo "✅ Built: dist/target/camunda-zeebe-*.tar.gz"
              ;;
            "optimize")
              echo "📦 Building optimize distribution tarball..."
              ./mvnw clean package -T1C -DskipTests -DskipChecks -am -pl optimize-distro
              echo "✅ Built: optimize-distro/target/camunda-optimize-*-*.tar.gz"
              ;;
            "operate")
              echo "📦 Building operate distribution tarball..."
              ./mvnw clean package -T1C -DskipTests -DskipChecks -am -pl dist
              echo "✅ Built: dist/target/camunda-zeebe-*.tar.gz (contains operate)"
              ;;
            "tasklist")
              echo "📦 Building tasklist distribution tarball..."
              ./mvnw clean package -T1C -DskipTests -DskipChecks -am -pl dist
              echo "✅ Built: dist/target/camunda-zeebe-*.tar.gz (contains tasklist)"
              ;;
            *)
              echo "❌ INTERNAL ERROR: Unknown component '${{ matrix.component }}' reached Maven build step"
              echo "❌ This should not happen since input validation should catch invalid components"
              echo "❌ Please report this as a workflow bug"
              exit 1
              ;;
          esac

      - name: Verify build artifacts
        run: |
          echo "🔍 Verifying that required artifacts were built..."
          case "${{ matrix.component }}" in
            "camunda"|"operate"|"tasklist")
              if find dist/target -name "camunda-zeebe-*.tar.gz" -type f | head -1 | grep -q .; then
                FOUND_FILE=$(find dist/target -name "camunda-zeebe-*.tar.gz" -type f | head -1)
                echo "✅ Found camunda distribution: $FOUND_FILE"
              else
                echo "❌ Missing camunda distribution tarball in dist/target/"
                exit 1
              fi
              ;;
            "optimize")
              echo "🔍 Looking for optimize distribution files..."
              
              if find optimize-distro/target -name "camunda-optimize-*-production.tar.gz" -type f | head -1 | grep -q .; then
                FOUND_FILE=$(find optimize-distro/target -name "camunda-optimize-*-production.tar.gz" -type f | head -1)
                echo "✅ Found optimize distribution: $FOUND_FILE"
                echo "✅ Ready for Docker build"
              else
                echo "❌ Missing optimize distribution tarball"
                ls -la optimize-distro/target/ 2>/dev/null || echo "No target directory"
                exit 1
              fi
              ;;
            *)
              echo "❌ Error: Unknown component '${{ matrix.component }}' in verification step"
              echo "❌ This should not happen if the Maven build step completed successfully"
              exit 1
              ;;
          esac

      - name: Set build metadata
        id: build-metadata
        run: |
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "build-date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "✅ Build date: $BUILD_DATE"

      - name: Generate image tags
        id: image-tags
        run: |
          REGISTRY="${{ env.HOTFIX_REGISTRY }}"
          COMPONENT="${{ matrix.component }}"
          VERSION="${{ matrix.version }}"
          TICKET_ID="${{ needs.validate-inputs.outputs.support-ticket-id }}"
          SHORT_SHA="${{ needs.validate-inputs.outputs.short-sha }}"
          
          # Validate that ticket ID is safe for Docker tagging (already validated earlier)
          if [[ ! "$TICKET_ID" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "⚠️  Warning: Support ticket ID contains characters that may not be safe for Docker tags"
            echo "⚠️  Current format: '$TICKET_ID'"
          fi
          
          # Convert ticket ID to lowercase for consistency
          TICKET_LOWER=$(echo "$TICKET_ID" | tr '[:upper:]' '[:lower:]')
          
          # Primary hotfix tag following Camunda convention: <registry>/<image>:<application-version>-<support-issue-id>
          PRIMARY_TAG="${REGISTRY}/${COMPONENT}:${VERSION}-${TICKET_LOWER}"
          
          # Additional tag with SHA for exact reproducibility
          SHA_TAG="${REGISTRY}/${COMPONENT}:${VERSION}-${TICKET_LOWER}-${SHORT_SHA}"
          
          echo "primary-tag=$PRIMARY_TAG" >> "$GITHUB_OUTPUT"
          echo "sha-tag=$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "✅ Primary tag: $PRIMARY_TAG"
          echo "✅ SHA tag: $SHA_TAG"

      - name: Configure Docker build args
        id: build-args
        run: |
          if [[ "${{ matrix.component }}" == "optimize" ]]; then
            # Optimize uses DISTRO=production and expects artifacts in optimize-distro/target
            BUILD_ARGS="VERSION=${{ matrix.version }}
            DATE=${{ steps.build-metadata.outputs.build-date }}
            REVISION=${{ needs.validate-inputs.outputs.ref }}
            DISTRO=production
            ARTIFACT_PATH=./optimize-distro/target"
          else
            # Camunda, operate, and tasklist all use DISTBALL from dist/target
            BUILD_ARGS="VERSION=${{ matrix.version }}
            DATE=${{ steps.build-metadata.outputs.build-date }}
            REVISION=${{ needs.validate-inputs.outputs.ref }}
            DISTBALL=dist/target/camunda-zeebe-${{ matrix.version }}.tar.gz"
          fi
          
          # Use printf to preserve multiline format and escape newlines for output
          {
            echo "args<<EOF"
            echo "$BUILD_ARGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.docker-config.outputs.context }}
          file: ${{ steps.docker-config.outputs.dockerfile }}
          platforms: ${{ inputs.architecture }}
          push: true
          build-args: ${{ steps.build-args.outputs.args }}
          tags: |
            ${{ steps.image-tags.outputs.primary-tag }}
            ${{ steps.image-tags.outputs.sha-tag }}
          labels: |
            org.opencontainers.image.title=Camunda ${{ matrix.component }} ${{ matrix.version }} Hotfix
            org.opencontainers.image.description=Hotfix image for ${{ matrix.component }} ${{ matrix.version }} - Ticket: ${{ needs.validate-inputs.outputs.support-ticket-id }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.validate-inputs.outputs.ref }}
            org.opencontainers.image.version=${{ matrix.version }}
            camunda.hotfix.ticket-id=${{ needs.validate-inputs.outputs.support-ticket-id }}
            camunda.hotfix.component=${{ matrix.component }}
            camunda.hotfix.version=${{ matrix.version }}
            camunda.hotfix.sha=${{ needs.validate-inputs.outputs.short-sha }}

      - name: Image build summary
        run: |
          echo "🎉 Successfully built and pushed hotfix image for ${{ matrix.component }}:${{ matrix.version }}"
          echo "📦 Primary image: ${{ steps.image-tags.outputs.primary-tag }}"
          echo "📦 SHA image: ${{ steps.image-tags.outputs.sha-tag }}"
          echo "🎫 Ticket: ${{ needs.validate-inputs.outputs.support-ticket-id }}"
          echo "📝 SHA: ${{ needs.validate-inputs.outputs.short-sha }}"

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [validate-inputs, build-images]
    if: always()
    steps:
      - name: Generate summary
        run: |
          {
            echo "# 🔥 Urgent Hotfix Image Build Summary"
            echo ""
            echo "**Support Ticket:** \`${{ needs.validate-inputs.outputs.support-ticket-id }}\`"
            echo "**Reference:** \`${{ needs.validate-inputs.outputs.ref }}\`"  
            echo "**SHA:** \`${{ needs.validate-inputs.outputs.short-sha }}\`"
            echo "**Components Built:** \`${{ needs.validate-inputs.outputs.components-with-versions }}\`"
            echo "**Architecture:** \`${{ inputs.architecture }}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          
          if [[ "${{ needs.build-images.result }}" == "success" ]]; then
            {
              echo "## ✅ Images Successfully Built"
              echo ""
              echo "The following hotfix images are available:"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            
            COMPONENTS_WITH_VERSIONS="${{ needs.validate-inputs.outputs.components-with-versions }}"
            
            TICKET_LOWER=$(echo "${{ needs.validate-inputs.outputs.support-ticket-id }}" | tr '[:upper:]' '[:lower:]')
            
            IFS=',' read -ra COMP_ARRAY <<< "$COMPONENTS_WITH_VERSIONS"
            for COMPONENT_WITH_VERSION in "${COMP_ARRAY[@]}"; do
              COMPONENT_WITH_VERSION=$(echo "$COMPONENT_WITH_VERSION" | xargs)  # trim whitespace
              if [[ "$COMPONENT_WITH_VERSION" =~ ^([^:]+):(.+)$ ]]; then
                COMP="${BASH_REMATCH[1]}"
                VERSION="${BASH_REMATCH[2]}"
                {
                  echo "- **Primary**: \`${{ env.HOTFIX_REGISTRY }}/${COMP}:${VERSION}-${TICKET_LOWER}\`"
                  echo "- **With SHA**: \`${{ env.HOTFIX_REGISTRY }}/${COMP}:${VERSION}-${TICKET_LOWER}-${{ needs.validate-inputs.outputs.short-sha }}\`"
                  echo ""

                  echo ""
                  echo "### 🚀 Usage"
                  echo ""
                  echo "\`\`\`bash"
                  echo "# You can now pull the hotfix image (primary tag)"
                  echo "docker pull ${{ env.HOTFIX_REGISTRY }}/${COMP}:${VERSION}-${TICKET_LOWER}"
                  echo ""
                  echo "# Or use the SHA tag for exact reproducibility:"
                  echo "docker pull ${{ env.HOTFIX_REGISTRY }}/${COMP}:${VERSION}-${TICKET_LOWER}-${{ needs.validate-inputs.outputs.short-sha }}"
                  echo "\`\`\`"
                } >> "$GITHUB_STEP_SUMMARY"
              fi
            done            
          else
            {
              echo "## ❌ Build Failed"
              echo ""
              echo "The hotfix image build failed. Please check the above for details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}  