# description: Builds an Optimize Docker image on pull requests to validate the Dockerfile
# test location: /optimize, optimize.Dockerfile
# type: CI
# owner: @camunda/core-features
#
# Note: The ccsm-test integration tests (ES + OS) have been moved to
# optimize-ci-ccsm-test-nightly.yml.  Docker SNAPSHOT push and artifact
# deployment are handled by ci.yml (deploy-optimize-docker-snapshot and
# optimize-deploy-artifacts jobs).
name: "[Legacy] Optimize / Core Features"

on:
  pull_request:
    paths:
      - ".github/actions/**"
      - ".github/workflows/optimize-*"
      - "bom/*"
      - "parent/*"
      - "pom.xml"
      - "optimize/**"
      - "optimize.Dockerfile"
  workflow_dispatch:

# Will limit the workflow to 1 concurrent run per ref (branch / PR)
# If a new commits occurs, the current run will be canceled
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  GHA_BEST_PRACTICES_LINTER: enabled

permissions:
  contents: read

jobs:
  docker:
    name: "Docker Build"
    uses: ./.github/workflows/optimize-ci-build-reusable.yml
    secrets: inherit
    permissions: { }
    with:
      branch: ${{ github.head_ref }}
