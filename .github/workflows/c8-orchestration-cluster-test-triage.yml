# description: Triage agent for the C8 Orchestration Cluster nightly test suite.
#              Downloads JSON reports from the latest nightly runs (8.7–main, API + E2E),
#              classifies failures as flaky or product bugs, auto-fixes timeout-related
#              flaky tests, and posts a structured triage summary to Slack.
# type: CI
# owner: @camunda/test-automation-team
---
name: C8 Orchestration Cluster Test Triage Agent

on:
  schedule:
    - cron: "0 5 * * *" # 5:00 AM UTC — after the 4:00 AM metrics report
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip the PR creation and Slack post (analysis only)"
        required: false
        default: "false"
        type: string

defaults:
  run:
    shell: bash

permissions:
  actions: read
  contents: read

jobs:
  triage:
    name: Triage nightly test failures
    permissions:
      actions: read
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need a full clone so we can push a fix branch
          fetch-depth: 0

      # ── Secrets ─────────────────────────────────────────────────────────────
      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/camunda/ci/github-actions SLACK_CORE_DOMAIN_BOT_TOKEN;

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      # ── Download artifacts ───────────────────────────────────────────────────
      # For each nightly workflow we fetch the most recent completed run, then
      # download its JSON-report artifact into a labelled subdirectory so the
      # analysis script can identify which version/test-type it came from.
      - name: Download nightly JSON reports
        id: download
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p artifacts

          # format: "label|workflow_file|artifact_name"
          RUNS=(
            "api-stable-8.7|c8-orchestration-cluster-nightly-8.7-api-es.yml|json-report-nightly-api-stable-8.7"
            "api-stable-8.8|c8-orchestration-cluster-nightly-8.8-api-es.yml|json-report-nightly-api-stable-8.8"
            "api-stable-8.9|c8-orchestration-cluster-nightly-8.9-api-es.yml|json-report-nightly-api-stable-8.9"
            "api-main|c8-orchestration-cluster-nightly-main-api-es.yml|json-report-nightly-api-main"
            "e2e-stable-8.7-v1|c8-orchestration-cluster-nightly-8.7-e2e.yml|json-report-nightly-e2e-stable-8.7-v1"
            "e2e-stable-8.8-v1|c8-orchestration-cluster-nightly-8.8-e2e.yml|json-report-nightly-e2e-stable-8.8-v1"
            "e2e-stable-8.8-v2|c8-orchestration-cluster-nightly-8.8-e2e.yml|json-report-nightly-e2e-stable-8.8-v2"
            "e2e-stable-8.9-v1|c8-orchestration-cluster-nightly-8.9-e2e.yml|json-report-nightly-e2e-stable-8.9-v1"
            "e2e-stable-8.9-v2|c8-orchestration-cluster-nightly-8.9-e2e.yml|json-report-nightly-e2e-stable-8.9-v2"
            "e2e-main-v2|c8-orchestration-cluster-nightly-main-e2e.yml|json-report-nightly-e2e-main-v2"
          )

          downloaded=0
          for entry in "${RUNS[@]}"; do
            IFS='|' read -r label workflow artifact_name <<< "$entry"
            dest="artifacts/${label}"

            run_id=$(gh api \
              "/repos/${REPO}/actions/workflows/${workflow}/runs?per_page=1&status=completed&event=schedule" \
              --jq '.workflow_runs[0].id // empty' 2>/dev/null) || true

            if [[ -z "$run_id" ]]; then
              echo "::warning::No completed run found for ${workflow} – skipping."
              continue
            fi

            artifact_id=$(gh api \
              "/repos/${REPO}/actions/runs/${run_id}/artifacts" \
              --jq ".artifacts[] | select(.name == \"${artifact_name}\") | .id" 2>/dev/null \
              | head -1) || true

            if [[ -z "$artifact_id" ]]; then
              echo "::warning::Artifact '${artifact_name}' not found in run ${run_id} – skipping."
              continue
            fi

            mkdir -p "$dest"
            if ! gh api "/repos/${REPO}/actions/artifacts/${artifact_id}/zip" \
                > "${dest}/artifact.zip" 2>/dev/null; then
              echo "::warning::Failed to download artifact zip for ${label} – skipping."
              rm -f "${dest}/artifact.zip"
              continue
            fi
            if ! unzip -q "${dest}/artifact.zip" -d "$dest/" 2>/dev/null; then
              echo "::warning::Failed to extract artifact for ${label} – skipping."
              rm -f "${dest}/artifact.zip"
              continue
            fi
            rm "${dest}/artifact.zip"
            echo "Downloaded: ${label} (run ${run_id}, artifact ${artifact_id})"
            downloaded=$((downloaded + 1))
          done

          echo "downloaded=${downloaded}" >> "$GITHUB_OUTPUT"

      # ── Gate: skip analysis when no data is available ───────────────────────
      - name: Check artifact downloads
        id: check
        run: |
          downloaded="${{ steps.download.outputs.downloaded }}"
          if [[ -z "$downloaded" || "$downloaded" == "0" ]]; then
            echo "::notice::No nightly artifacts downloaded — skipping triage (nightly runs may not have completed yet)."
            echo "has_data=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_data=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Analyse ─────────────────────────────────────────────────────────────
      - name: Analyse test results
        id: analyse
        if: steps.check.outputs.has_data == 'true'
        run: |
          set -euo pipefail
          python3 .ci/scripts/ci/triage-tests/analyze-playwright-results.py artifacts \
            --spec qa/c8-orchestration-cluster-e2e-test-suite/v2-stateless-tests/request-validation-test-generator/cache/rest-api.yaml \
            --suite-dir qa/c8-orchestration-cluster-e2e-test-suite \
            > triage-report.json

          echo "---- triage-report.json ----"
          cat triage-report.json

          # Expose counts for later steps
          total=$(jq '.summary.total_unique_failures // 0' triage-report.json)
          test_code=$(jq '.summary.test_code // 0'          triage-report.json)
          product=$(jq  '.summary.product_regression // 0'  triage-report.json)
          timing=$(jq   '.summary.timing // 0'              triage-report.json)
          unknown=$(jq  '.summary.needs_investigation // 0' triage-report.json)
          flaky=$(jq    '(.flaky_tests // []) | length'     triage-report.json)

          {
            echo "total=${total}"
            echo "test_code=${test_code}"
            echo "product=${product}"
            echo "timing=${timing}"
            echo "unknown=${unknown}"
            echo "flaky=${flaky}"
          } >> "$GITHUB_OUTPUT"

      # ── Auto-fix flaky tests (per branch) ──────────────────────────────────
      # Each stable branch and main is checked out in turn.  Only tests that
      # were actually observed as flaky on that branch's nightly run are fixed,
      # so a fix that belongs on stable/8.9 is not incorrectly applied to main.
      #
      # Version-label prefixes used in the triage report (set in the download
      # step above):
      #   api-stable-8.7 / e2e-stable-8.7-v1
      #   api-stable-8.8 / e2e-stable-8.8-v1 / e2e-stable-8.8-v2
      #   api-stable-8.9 / e2e-stable-8.9-v1 / e2e-stable-8.9-v2
      #   api-main       / e2e-main-v2
      #
      # For each git branch we supply a label prefix so the fix script can
      # match "any label that starts with *-stable-8.9" etc.

      - name: Apply flaky-test fixes per branch and open PRs
        id: fix
        if: steps.check.outputs.has_data == 'true' && steps.analyse.outputs.flaky != '0' && steps.analyse.outputs.flaky != ''
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN:  ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          TODAY=$(date -u +"%Y%m%d")

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remember the branch we started on so we can restore it after the
          # loop (which checks out stable/* branches and would otherwise leave
          # the worktree on main, where the triage scripts don't exist yet).
          ORIGINAL_BRANCH=$(git rev-parse --abbrev-ref HEAD)

          # The triage scripts live on this branch (main after merge) but not on
          # stable/* branches. Copy them to a temp dir so they remain available
          # after each git checkout below.
          TRIAGE_SCRIPTS=$(mktemp -d)
          cp -r .ci/scripts/ci/triage-tests/. "$TRIAGE_SCRIPTS/"
          APPLY_FIXES="${TRIAGE_SCRIPTS}/apply-timeout-fixes.py"

          total_fixed=0
          all_pr_urls=""

          # format: "git_branch|label_prefix"
          # label_prefix is matched as a substring against the versions[] entries
          # in the triage report, so "stable-8.9" catches both api-stable-8.9
          # and e2e-stable-8.9-v1/v2.
          BRANCHES=(
            "stable/8.7|stable-8.7"
            "stable/8.8|stable-8.8"
            "stable/8.9|stable-8.9"
            "main|main"
          )

          for entry in "${BRANCHES[@]}"; do
            IFS='|' read -r git_branch label_prefix <<< "$entry"

            # Check how many flaky tests affect this branch
            affected=$(jq --arg lp "$label_prefix" \
              '[.flaky_tests[] | select(.versions[] | contains($lp))] | length' \
              triage-report.json)

            if [[ "$affected" == "0" ]]; then
              echo "No flaky tests for ${git_branch} – skipping."
              continue
            fi

            echo "──────────────────────────────────────────"
            echo "Processing ${git_branch} (${affected} flaky tests)"

            # Checkout the target branch cleanly
            git fetch origin "${git_branch}" --depth=1
            git checkout -B "tmp-base-${label_prefix}" "origin/${git_branch}"

            # Apply fixes scoped to this branch's label prefix.
            # Pass each distinct label that matches the prefix.
            labels=$(jq -r --arg lp "$label_prefix" \
              '[.flaky_tests[].versions[]] | unique | map(select(contains($lp))) | .[]' \
              triage-report.json | sort -u)

            : > "fix-report-${label_prefix}.json"
            combined_fixed="[]"
            combined_skipped="[]"

            for label in $labels; do
              python3 "$APPLY_FIXES" \
                triage-report.json \
                qa/c8-orchestration-cluster-e2e-test-suite \
                --version-label "$label" \
                > "fix-single-${label}.json"

              combined_fixed=$(jq -s '.[0] + .[1]' \
                <(echo "$combined_fixed") \
                <(jq '.fixed' "fix-single-${label}.json"))
              combined_skipped=$(jq -s '.[0] + .[1]' \
                <(echo "$combined_skipped") \
                <(jq '.skipped' "fix-single-${label}.json"))
            done

            jq -n --argjson f "$combined_fixed" --argjson s "$combined_skipped" \
              '{fixed: $f, skipped: $s}' > "fix-report-${label_prefix}.json"

            fixed_count=$(jq '.fixed | length' "fix-report-${label_prefix}.json")
            echo "Fixed ${fixed_count} test(s) on ${git_branch}"

            if [[ "$fixed_count" == "0" ]]; then
              git checkout "$ORIGINAL_BRANCH" 2>/dev/null || git checkout -
              continue
            fi

            total_fixed=$((total_fixed + fixed_count))

            fixed_list=$(jq -r \
              '.fixed[] | "- `\(.file)`: \(.test) (\(.fix_type))"' \
              "fix-report-${label_prefix}.json")

            # Include the run ID so reruns on the same day don't collide
            FIX_BRANCH="fix/flaky-tests-${label_prefix}-${TODAY}-${{ github.run_id }}"

            git checkout -b "$FIX_BRANCH"
            git add qa/c8-orchestration-cluster-e2e-test-suite/
            git commit \
              -m "test: auto-fix flaky nightly tests on ${git_branch} (${TODAY})" \
              -m "$(printf 'Applied by the triage agent based on nightly run failures:\n%s' "${fixed_list}")"

            if [[ "$DRY_RUN" != "true" ]]; then
              # Push with retry — GitHub sometimes times out validating workflow-adjacent pushes
              pushed=false
              for attempt in 1 2 3 4; do
                if git push -u origin "$FIX_BRANCH"; then
                  pushed=true
                  break
                fi
                if [[ $attempt -lt 4 ]]; then
                  wait=$((attempt * 2))
                  echo "::warning::Push attempt ${attempt} failed, retrying in ${wait}s..."
                  sleep "$wait"
                fi
              done
              if [[ "$pushed" != "true" ]]; then
                echo "::error::Failed to push ${FIX_BRANCH} after 4 attempts — skipping PR for ${git_branch}"
                git checkout "$ORIGINAL_BRANCH" 2>/dev/null || git checkout -
                continue
              fi

              PR_BODY_FILE=$(mktemp)
              {
                echo "## Summary"
                echo ""
                echo "Auto-generated by the [C8 Orchestration Cluster Test Triage Agent](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
                echo ""
                echo "**Target branch:** \`${git_branch}\`"
                echo "These fixes were scoped to tests that were observed as flaky specifically on the \`${git_branch}\` nightly run — tests only failing on other branches are handled in separate PRs."
                echo ""
                echo "### Changes applied"
                echo ""
                echo "${fixed_list}"
                echo ""
                echo "### How to review"
                echo ""
                echo "- \`test.slow()\` triples the Playwright timeout for the affected test."
                echo "- \`// TODO(triage-agent)\` flags non-timeout flakes that need deeper investigation."
                echo ""
                echo "Closes no issue — maintenance fix. Link any follow-up issues in a comment."
              } > "${PR_BODY_FILE}"

              PR_URL=$(gh pr create \
                --title "test: auto-fix flaky nightly tests on ${git_branch} ($(date -u +%Y-%m-%d))" \
                --base "$git_branch" \
                --body-file "${PR_BODY_FILE}")
              rm -f "${PR_BODY_FILE}"

              echo "Created PR for ${git_branch}: ${PR_URL}"
              all_pr_urls="${all_pr_urls}${PR_URL} "
            else
              echo "Dry-run: would have created PR for ${git_branch} from branch ${FIX_BRANCH}"
            fi

            # Return to a neutral state for the next iteration
            git checkout "$ORIGINAL_BRANCH" 2>/dev/null || git checkout -
          done

          # Restore the original branch so subsequent steps find their scripts
          git checkout "$ORIGINAL_BRANCH" 2>/dev/null || git checkout -

          {
            echo "total_fixed=${total_fixed}"
            echo "pr_urls<<EOF"
            echo "$all_pr_urls"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Build Slack payload ──────────────────────────────────────────────────
      - name: Build Slack triage payload
        id: slack_payload
        if: steps.check.outputs.has_data == 'true'
        env:
          TOTAL:      ${{ steps.analyse.outputs.total }}
          TEST_CODE:  ${{ steps.analyse.outputs.test_code }}
          PRODUCT:    ${{ steps.analyse.outputs.product }}
          TIMING:     ${{ steps.analyse.outputs.timing }}
          UNKNOWN:    ${{ steps.analyse.outputs.unknown }}
          FIXED:      ${{ steps.fix.outputs.total_fixed || '0' }}
          PR_URLS:    ${{ steps.fix.outputs.pr_urls || '' }}
          RUN_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TODAY=$(date -u +"%d.%m.%Y")

          # Build fix-text (only safe scalar values — no backticks)
          if [[ "$FIXED" != "0" && -n "$PR_URLS" ]]; then
            pr_links=""
            for url in $PR_URLS; do
              pr_links="${pr_links}<${url}|view PR> "
            done
            FIX_TEXT=":wrench: $FIXED test(s) auto-fixed — ${pr_links}"
          elif [[ "$FIXED" != "0" ]]; then
            FIX_TEXT=":wrench: $FIXED test(s) auto-fixed (dry-run)"
          else
            FIX_TEXT=":information_source: No automated fixes applied"
          fi

          export TODAY FIX_TEXT

          python3 .ci/scripts/ci/triage-tests/build-slack-payload.py > slack-payload.json

          echo "payload_file=slack-payload.json" >> "$GITHUB_OUTPUT"

      # ── Post to Slack ────────────────────────────────────────────────────────
      - name: Post triage report to Slack
        if: steps.check.outputs.has_data == 'true' && github.event.inputs.dry_run != 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ steps.secrets.outputs.SLACK_CORE_DOMAIN_BOT_TOKEN }}
          payload-file-path: slack-payload.json

      # ── Build status ─────────────────────────────────────────────────────────
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
