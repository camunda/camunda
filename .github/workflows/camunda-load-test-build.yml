# description: Reusable workflow that builds and pushes Docker images for Camunda load tests.
# Builds the Camunda platform image, Optimize image, and load-test starter/worker images.
# called by: camunda-load-test.yml, camunda-pr-load-test.yaml
# type: CI
# owner: camunda/orchestration-cluster-team

name: Build Camunda Load Test Images
on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to build from'
        type: string
        required: true
      image-tag:
        description: 'Docker image tag to apply to all built images'
        type: string
        required: true
      build-frontend:
        description: 'Build frontend assets as part of the image build'
        type: boolean
        required: false
        default: false
      enable-optimize:
        description: 'Include Optimize in the build'
        type: boolean
        required: false
        default: true
      skip-camunda-image:
        description: 'Skip building the Camunda platform Docker image (e.g. when using official images and only load-test images are needed)'
        type: boolean
        required: false
        default: false

env:
  IMAGE_REPOSITORY: registry.camunda.cloud/team-zeebe

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

jobs:
  build-camunda-image:
    name: Build Camunda
    if: ${{ !inputs.skip-camunda-image }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-build
        with:
          dockerhub-readonly: true
          harbor: true
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          minimus: true
      - uses: ./.github/actions/build-frontend
        name: Build Operate Frontend
        id: build-operate-fe
        if: ${{ inputs.build-frontend }}
        with:
          directory: ./operate/client
          package-manager: "npm"
      - uses: ./.github/actions/build-frontend
        name: Build Tasklist Frontend
        id: build-tasklist-fe
        if: ${{ inputs.build-frontend }}
        with:
          directory: ./tasklist/client
          package-manager: "npm"
      - uses: ./.github/actions/build-frontend
        name: Build Identity Frontend
        id: build-identity-fe
        if: ${{ inputs.build-frontend }}
        with:
          directory: ./identity/client
          package-manager: "npm"
      - uses: ./.github/actions/build-frontend
        name: Build Optimize Frontend
        id: build-optimize-fe
        if: ${{ inputs.build-frontend && inputs.enable-optimize }}
        with:
          directory: ./optimize/client
          package-manager: "yarn"
      - uses: ./.github/actions/build-zeebe
        name: Build Camunda Platform
        id: build-camunda
        with:
          maven-extra-args: -PskipFrontendBuild ${{ inputs.enable-optimize && '-Pinclude-optimize' || '-P\!include-optimize' }}
      - uses: ./.github/actions/build-platform-docker
        name: Build Camunda Docker Image
        with:
          repository: '${{ env.IMAGE_REPOSITORY }}/camunda'
          revision: ${{ inputs.ref }}
          push: true
          version: ${{ inputs.image-tag }}
          distball: ${{ steps.build-camunda.outputs.distball }}
          dockerfile: 'camunda.Dockerfile'
      - uses: ./.github/actions/build-platform-docker
        name: Build Optimize Docker Image
        if: ${{ inputs.enable-optimize }}
        with:
          repository: '${{ env.IMAGE_REPOSITORY }}/optimize'
          revision: ${{ inputs.ref }}
          push: true
          version: ${{ inputs.image-tag }}
          distball: 'optimize-distro/target/camunda-optimize-*.tar.gz'
          dockerfile: 'optimize.Dockerfile'
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  build-load-test-images:
    name: Build Starter and Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-build
        with:
          dockerhub-readonly: true
          harbor: true
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
      - run: ./mvnw -B -D skipTests -D skipChecks -P\!include-optimize -pl load-tests/load-tester -am install
      - name: Build Starter Image
        run: ./mvnw -pl load-tests/load-tester jib:build -P starter -P\!include-optimize -D image="${{ env.IMAGE_REPOSITORY }}/starter:${{ inputs.image-tag }}"
      - name: Build Worker Image
        run: ./mvnw -pl load-tests/load-tester jib:build -P worker -P\!include-optimize -D image="${{ env.IMAGE_REPOSITORY }}/worker:${{ inputs.image-tag }}"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

