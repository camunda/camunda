# description: Generate Docker snapshot tags based on branch and project version.
#
# Produces two Docker tag outputs so that images built from `main` are
# discoverable in two complementary ways:
#
#   version_tag  – A versioned snapshot tag derived from the project's
#                  major.minor version (e.g. "8.10-SNAPSHOT").  Always set
#                  for both `main` and `stable/*` branches.
#
#   snapshot_tag – A generic, un-versioned "SNAPSHOT" tag.  Only set when
#                  building from `main`; empty for stable branches.
#
# Why dual tagging on main?
#   • `SNAPSHOT` (snapshot_tag) provides a stable, version-agnostic pointer
#     so consumers that always want "the latest development build" never need
#     to update references when the project bumps its minor version.
#   • `8.10-SNAPSHOT` (version_tag) lets consumers pin to a specific version
#     stream, which matters when main and a recent stable branch coexist and
#     images for each must be independently addressable.
#
# On stable branches only version_tag is produced (e.g. "8.8-SNAPSHOT")
# because each stable branch maps to exactly one version.
#
# type: CI
# owner: @camunda/monorepo-devops-team
name: Generate Docker Snapshot Tag

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      target_branch:
        description: "Optional branch to resolve tags from (e.g. main or stable/8.9)"
        required: false
        default: ''
        type: string
    outputs:
      version_tag:
        description: >-
          Versioned snapshot tag (e.g. "8.10-SNAPSHOT" on main, "8.8-SNAPSHOT"
          on stable/8.8). Always set when the job runs.
        value: ${{ jobs.get-snapshot-docker-version-tag.outputs.tag }}
      snapshot_tag:
        description: >-
          Generic un-versioned "SNAPSHOT" tag. Only set on main so that
          consumers can reference the latest development build without
          hard-coding a version number. Empty on stable branches.
        value: ${{ jobs.get-snapshot-docker-version-tag.outputs.snapshot_tag }}

env:
  GHA_BEST_PRACTICES_LINTER: enabled

jobs:
  get-snapshot-docker-version-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions: {}
    if: >-
      github.repository == 'camunda/camunda' &&
      (
        inputs.target_branch == 'main' ||
        startsWith(inputs.target_branch, 'stable/') ||
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/heads/stable/') ||
        startsWith(github.ref, 'refs/heads/gh-readonly-queue/main/') ||
        startsWith(github.ref, 'refs/heads/gh-readonly-queue/stable/') ||
        (
          github.event_name == 'pull_request' &&
          (github.base_ref == 'main' || startsWith(github.base_ref, 'stable/'))
        )
      )
    outputs:
      tag: ${{ steps.set_docker_snapshot_version_tag.outputs.tag }}
      snapshot_tag: ${{ steps.set_docker_snapshot_version_tag.outputs.snapshot_tag }}
    steps:
      - name: Checkout repository
        if: >-
          inputs.target_branch == 'main' ||
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/heads/gh-readonly-queue/main/') ||
          (github.event_name == 'pull_request' && github.base_ref == 'main')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            pom.xml
      - name: Determine Snapshot Docker Version Tag
        id: set_docker_snapshot_version_tag
        env:
          REQUESTED_BRANCH: ${{ inputs.target_branch }}
        run: |
          if [[ -n "${REQUESTED_BRANCH}" ]]; then
            BRANCH="${REQUESTED_BRANCH}"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BRANCH="${GITHUB_BASE_REF}"
          elif [[ "${GITHUB_REF}" == refs/heads/gh-readonly-queue/* ]]; then
            BRANCH="$(echo "${GITHUB_REF}" | sed -E 's|refs/heads/gh-readonly-queue/(.+)/pr-.*|\1|')"
          elif [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
          else
            echo "Unsupported context for tag resolution: event=${GITHUB_EVENT_NAME}, ref=${GITHUB_REF}"
            echo "Consider setting the target_branch workflow input to main or stable/<minor>."
            exit 1
          fi

          if [[ "$BRANCH" == "main" ]]; then
            TAG="SNAPSHOT"
          elif [[ "$BRANCH" == stable/* ]]; then
            TAG="${BRANCH#stable/}-SNAPSHOT"
          else
            echo "Unsupported branch: $BRANCH"
            exit 1
          fi
          echo "Resolved snapshot tag context: event=${GITHUB_EVENT_NAME}, ref=${GITHUB_REF}, base_ref=${GITHUB_BASE_REF:-}, branch=${BRANCH}, tag=${TAG}, snapshot_tag=${SNAPSHOT_TAG}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "snapshot_tag=$SNAPSHOT_TAG" >> "$GITHUB_OUTPUT"
