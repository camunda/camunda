# description: Generate Docker snapshot tags based on branch and project version.
# type: CI
# owner: @camunda/monorepo-devops-team
name: Generate Docker Snapshot Tag

permissions:
  contents: read

on:
  workflow_call:
    outputs:
      version_tag:
        description: "Generated Docker version tag"
        value: ${{ jobs.get-snapshot-docker-version-tag.outputs.tag }}
      snapshot_tag:
        description: "Generated Docker SNAPSHOT tag for main branch"
        value: ${{ jobs.get-snapshot-docker-version-tag.outputs.snapshot_tag }}

env:
  GHA_BEST_PRACTICES_LINTER: enabled

jobs:
  get-snapshot-docker-version-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions: {}
    if: >-
      github.repository == 'camunda/camunda' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/stable/'))
    outputs:
      tag: ${{ steps.set_docker_snapshot_version_tag.outputs.tag }}
    steps:
      - name: Determine Snapshot Docker Version Tag
        id: set_docker_snapshot_version_tag
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" == "main" ]]; then
            TAG="SNAPSHOT"
          elif [[ "$BRANCH" == stable/* ]]; then
            TAG="${BRANCH#stable/}-SNAPSHOT"
          else
            echo "Unsupported branch: $BRANCH"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
