# type: CI Helper
# owner: @camunda/engineering-operations
---
name: Backport labeled merged pull requests

on:
  pull_request:
    types: [closed]
  issue_comment:
    types: [created]

jobs:
  backport:
    name: Create backport PRs
    runs-on: ubuntu-latest
    # Only run when pull request is merged and carries at least one `backport ` label
    # or when a comment starting with `/backport` is created by someone other than a bot:
    # - https://github.com/backport-action bot user (user id: 97796249)
    # - Monorepo DevOps Automation GitHub App bot user (user id: 248077375)
    # The label check uses toJSON + contains to match any label whose name starts with
    # `backport ` (the leading `"` anchors the match to the start of a label name).
    if: >
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.merged &&
        contains(toJSON(github.event.pull_request.labels.*.name), '"backport ')
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.id != 97796249 &&
        github.event.comment.user.id != 248077375 &&
        startsWith(github.event.comment.body, '/backport')
      )
    # No GITHUB_TOKEN permissions needed; all GitHub operations use the
    # Monorepo DevOps Automation GitHub App token generated in the first step.
    permissions: {}
    steps:
      - name: Generate GitHub token
        id: github-token
        uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@6c85c5de572dbc1790e5e7b4636c2ad9f5b614d8 # generate-github-app-token-from-vault-secrets: v1.1.0
        with:
          github-app-id-vault-key: MONOREPO_DEVOPS_AUTOMATION_APP_ID
          github-app-id-vault-path: secret/data/products/camunda/ci/camunda
          github-app-private-key-vault-key: MONOREPO_DEVOPS_AUTOMATION_APP_PRIVATE_KEY
          github-app-private-key-vault-path: secret/data/products/camunda/ci/camunda
          vault-auth-method: approle
          vault-auth-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-auth-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          vault-url: ${{ secrets.VAULT_ADDR }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Token for git actions, e.g. git push
          token: ${{ steps.github-token.outputs.token }}
      - name: Create backport PRs
        uses: korthout/backport-action@66065406958f46e82238fd59546f5a99e69e22aa # v4.5.2
        with:
          # Token to authenticate requests to GitHub
          github_token: ${{ steps.github-token.outputs.token }}

          # Template used as description in the pull requests created by this action.
          # Placeholders can be used to define variable values.
          # These are indicated by a dollar sign and curly braces (`${placeholder}`).
          # Please refer to this action's README for all available placeholders.
          #
          # WARNING: The stale backport tracker depends on two things:
          #   1. PR author being "backport-action" or "monorepo-devops-automation[bot]"
          #   2. Body containing "Backport of #NNNN" (parsed to link to parent PR)
          # Changing either will break tracking.
          # See: .ci/scripts/stale-backport-scripts/collect-stale-backports.sh
          pull_description: |-
            # Description
            Backport of #${pull_number} to `${target_branch}`.

            relates to ${issue_refs}

          add_author_as_assignee: true
          add_author_as_reviewer: true
          comment_style: summary
          experimental: >
            {
              "conflict_resolution": "draft_commit_conflicts"
            }
