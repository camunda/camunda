# type: CI Helper
# owner: @camunda/monorepo-devops-team
---
name: Backport labeled merged pull requests

on:
  pull_request_target:
    types: [closed]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    name: Create backport PRs
    runs-on: ubuntu-latest
    # Only run when pull request is merged
    # or when a comment starting with `/backport` is created by someone other than the
    # https://github.com/backport-action bot user (user id: 97796249). Note that if you use your
    # own PAT as `github_token`, that you should replace this id with yours.
    if: >
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.merged
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.id != 97796249 &&
        startsWith(github.event.comment.body, '/backport')
      )
    steps:
      - name: Import Secrets
        id: vault-secrets
        uses: hashicorp/vault-action@v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/github.com/organizations/camunda BACKPORT_GH_APP_ID;
            secret/data/github.com/organizations/camunda BACKPORT_GH_APP_KEY;
      - name: Generate a GitHub token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ steps.vault-secrets.outputs.BACKPORT_GH_APP_ID }}
          private-key: ${{ steps.vault-secrets.outputs.BACKPORT_GH_APP_KEY }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Create backport PRs
        uses: korthout/backport-action@v4
        with:
          # Token to authenticate requests to GitHub
          github_token: ${{ steps.app-token.outputs.token }}

          # Template used as description in the pull requests created by this action.
          # Placeholders can be used to define variable values.
          # These are indicated by a dollar sign and curly braces (`${placeholder}`).
          # Please refer to this action's README for all available placeholders.
          pull_description: |-
            # Description
            Backport of #${pull_number} to `${target_branch}`.

            relates to ${issue_refs}

          add_author_as_assignee: true
          add_author_as_reviewer: true
          experimental: >
            {
              "conflict_resolution": "draft_commit_conflicts"
            }
