# description: Runs Integration tests on different versions of AWS OS
# test location: /zeebe/exporters/opensearch-exporter, /search/search-client-connect, /zeebe/exporters/camunda-exporter, /qa/acceptance-tests
# type: CI
# owner: @camunda/core-features, @camunda/data-layer
name: AWS OpenSearch Manual/Scheduled Run Integration Tests

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: Version of AWS OS
        type: choice
        options:
          - "2.19"
          - "3.3"
  schedule:
    - cron: "0 4 * * Mon-Fri"

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

jobs:
  integration-tests:
    name: "[IT] ${{ matrix.name }}. OS ver.${{ matrix.os_version }}"
    permissions:
      contents: read
      actions: write
    timeout-minutes: 60
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        os_version: ${{ fromJSON(format('[{0}]', inputs.os_version || '"2.19", "3.3"')) }}
        group:
        - os-exporter
        - search-client-os
        - camunda-exporter
        - camunda-qa-acceptance-tests-client
        - camunda-qa-acceptance-tests-non-client
        include:
          - group: os-exporter
            name: "Zeebe OS Exporter Integration Tests"
            maven-modules: "'io.camunda:zeebe-opensearch-exporter'"
            maven-build-threads: 2
            maven-test-fork-count: 7
            maven-test-profiles: multi-db-test
            runs-on: aws-core-8-default
            owner: "Data Layer"
          - group: search-client-os
            name: "Search Client AWS OS Integration Tests"
            maven-modules: "'io.camunda:camunda-search-client-connect'"
            maven-build-threads: 2
            maven-test-fork-count: 7
            maven-test-profiles: multi-db-test
            runs-on: aws-core-8-default
            owner: "Core Features"
          - group: camunda-exporter
            name: "Camunda Exporter AWS OS Integration Tests"
            maven-modules: "'io.camunda:camunda-exporter'"
            maven-build-threads: 2
            maven-test-fork-count: 7
            maven-test-profiles: multi-db-test
            runs-on: aws-core-8-default
            owner: "Data Layer"
          - group: camunda-qa-acceptance-tests-client
            name: "Camunda QA IT Client Tests"
            maven-modules: "'io.camunda:camunda-qa-acceptance-tests'"
            maven-build-threads: 2
            maven-test-fork-count: 7
            maven-test-profiles: multi-db-test-client
            runs-on: aws-core-8-default
            owner: "General"
          - group: camunda-qa-acceptance-tests-non-client
            name: "Camunda QA IT Non-Client Tests"
            maven-modules: "'io.camunda:camunda-qa-acceptance-tests'"
            maven-build-threads: 2
            maven-test-fork-count: 7
            maven-test-profiles: multi-db-test-non-client
            runs-on: aws-core-8-default
            owner: "General"
    steps:
      - uses: actions/checkout@v6
      - name: Import secrets from Vault
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/camunda/ci/github-actions CAMUNDA_CI_OPENSEARCH_2_19_URL;
            secret/data/products/camunda/ci/github-actions CAMUNDA_CI_OPENSEARCH_3_3_URL;
      - name: Set temp GH envs
        id: temp-vars
        run: |
          {
            echo "AWS_REGION=$AWS_REGION"
            echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"
            echo "AWS_ROLE_ARN=$AWS_ROLE_ARN"
            echo "AWS_WEB_IDENTITY_TOKEN_FILE=$AWS_WEB_IDENTITY_TOKEN_FILE"
            echo "AWS_STS_REGIONAL_ENDPOINTS=$AWS_STS_REGIONAL_ENDPOINTS"
          } >> "$GITHUB_ENV"

          if [[ "${{ matrix.os_version }}" = "2.19" ]]
          then
            echo "Using OS 2.19"
            OS_URL="https://"${{ steps.secrets.outputs.CAMUNDA_CI_OPENSEARCH_2_19_URL }};
          elif [[ "${{ matrix.os_version }}" = "3.3" ]]
          then
            echo "Using OS 3.3"
            OS_URL="https://"${{ steps.secrets.outputs.CAMUNDA_CI_OPENSEARCH_3_3_URL }};
          else
            echo "Incorrect on usupported version of OpenSearch"
            exit 1
          fi
          echo "OS_URL=$OS_URL" >> "$GITHUB_ENV"
      - uses: aws-actions/configure-aws-credentials@v6
        name: Pre-login to AWS
        with:
          aws-region: ${{ env.AWS_REGION }}
          web-identity-token-file: ${{ env.AWS_WEB_IDENTITY_TOKEN_FILE }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
      - uses: ./.github/actions/setup-build
        with:
          maven-cache-key-modifier: it-${{ matrix.group }}
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
      - uses: ./.github/actions/build-zeebe
        id: build-zeebe
        with:
          maven-extra-args: -T1C -D skip.fe.build -D skip.yarn -D skip.docker
      - name: Create build output log file
        run: echo "BUILD_OUTPUT_FILE_PATH=$(mktemp)" >> "$GITHUB_ENV"
      - name: Maven Test Build
        shell: bash
        # leaves headroom in the 60-minute job timeout so diagnostics and artifact upload can still run
        timeout-minutes: 55
        run: |
          {
            while true; do
              echo "[INFO] Maven Test Build still running for group=${{ matrix.group }} at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              sleep 60
            done
          } &
          heartbeat_pid=$!
          trap 'kill "${heartbeat_pid}" || true' EXIT

          ./mvnw -B -T ${{ matrix.maven-build-threads }} --no-snapshot-updates \
            -D forkCount=${{ matrix.maven-test-fork-count }} \
            -D maven.javadoc.skip=true \
            -D skipUTs -D skipChecks \
            -D flaky.test.reportDir=failsafe-reports \
            -D test.integration.opensearch.aws.url="${{ env.OS_URL }}" \
            -D test.integration.camunda.database.type=AWS_OS \
            -D test.integration.opensearch.aws.timeout.seconds=180 \
            -P parallel-tests,extract-flaky-tests,${{ matrix.maven-test-profiles }} \
            -pl ${{ matrix.maven-modules }} \
            verify \
            | tee "${BUILD_OUTPUT_FILE_PATH}"
      - name: Collect Maven fork diagnostics
        if: ${{ failure() || cancelled() }}
        continue-on-error: true
        run: |
          mkdir -p .ci-diagnostics
          diagnostics_file=".ci-diagnostics/maven-fork-diagnostics-${{ matrix.group }}.log"
          {
            echo "timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "group: ${{ matrix.group }}"
            echo "job: ${{ matrix.name }}"
            echo
            echo "== Latest surefire/failsafe report files =="
            find . -type f \( -path "*/target/failsafe-reports/*" -o -path "*/target/surefire-reports/*" \) \
              -printf "%T@ %p\n" | sort -n | tail -n 60
            echo
            echo "== Report files missing 'Tests run:' summary =="
            find . -type f \( -path "*/target/failsafe-reports/*.txt" -o -path "*/target/surefire-reports/*.txt" \) -print0 \
              | while IFS= read -r -d '' report_file; do
                  grep -q "Tests run:" "${report_file}" || echo "${report_file}"
                done || true
            echo
            echo "== Fork/jvm dump files =="
            find . -type f \( -name "*.dumpstream" -o -name "*jvmRun*.dump" \) -print || true
            echo
            echo "== Failure markers in surefire/failsafe txt reports =="
            find . -type f \( -path "*/target/failsafe-reports/*.txt" -o -path "*/target/surefire-reports/*.txt" \) -print0 \
              | xargs -0 grep -HnE "<<< FAILURE!|<<< ERROR!|The forked VM terminated without properly saying goodbye|Crashed tests:" || true
          } | tee "${diagnostics_file}"
      - name: Analyze Test Runs
        id: analyze-test-run
        if: always()
        uses: ./.github/actions/analyze-test-runs
        with:
          buildOutputFilePath: ${{ env.BUILD_OUTPUT_FILE_PATH }}
      - name: Upload test artifacts
        uses: ./.github/actions/collect-test-artifacts
        if: ${{ failure() || cancelled() || steps.analyze-test-run.outputs.flakyTests != '' }}
        with:
          name: "[IT] ${{ matrix.name }}"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          job_name: "integration-tests/${{ matrix.group }}"
          build_status: ${{ job.status }}
          user_reason: ${{ (steps.analyze-test-run.outputs.flakyTests != '') && 'flaky-tests' || '' }}
          user_description: ${{ matrix.owner }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  send-slack-notificaion:
    name: "Send slack notification on fail"
    runs-on: ubuntu-latest
    needs: integration-tests
    if: (failure() || cancelled()) && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/stable/'))
    permissions:
      contents: read
      actions: write
    steps:
    - name: Import secrets from Vault
      id: secrets
      uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
      with:
        url: ${{ secrets.VAULT_ADDR }}
        method: approle
        roleId: ${{ secrets.VAULT_ROLE_ID }}
        secretId: ${{ secrets.VAULT_SECRET_ID }}
        secrets: |
          secret/data/products/camunda/ci/github-actions DATA_ENGINE_CI_ALERT_WEBHOOK_URL;
    - name: Send notification
      uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
      with:
        webhook: ${{ steps.secrets.outputs.DATA_ENGINE_CI_ALERT_WEBHOOK_URL }}
        webhook-type: webhook-trigger
        # For posting a rich message using Block Kit
        payload: |
          text: "AWS OpenSearch Manual/Scheduled Run Integration Tests failed or were cancelled"
          blocks:
            - type: "section"
              text:
                type: "mrkdwn"
                text: "AWS OpenSearch Manual/Scheduled Run Integration Tests FAILED or WERE CANCELLED\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
