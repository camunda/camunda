# description: Runs Integration tests on different versions of AWS OS
# test locations:
#  - /qa/acceptance-tests
#  - /search/search-client-opensearch,
#  - /zeebe/exporters/camunda-exporter,
#  - /zeebe/exporters/opensearch-exporter,
# type: CI
# owner: @camunda/core-features, @camunda/data-layer
name: AWS OpenSearch Manual/Scheduled Run Integration Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or commit to test against
        type: string
        default: "main"
      opensearch-version:
        description: Version of AWS OpenSearch ("all" runs every supported version)
        type: choice
        default: "all"
        options:
          - "all"
          - "2.19"
          - "3.5"
  schedule:
    - cron: "0 4 * * Mon-Fri"

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

# Prevent concurrent runs of this workflow from stacking additional load on the
# shared AWS OpenSearch clusters used by the integration-tests matrix below.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  TEST_OWNER: '@camunda/core-features'

jobs:
  # Resolves the opensearch-version input into the JSON array of versions the
  # integration-tests matrix below runs. Both the "all" choice and the
  # schedule trigger (which carries no inputs at all) fall back to running
  # every supported version.
  resolve-opensearch-versions:
    name: "Resolve OpenSearch version matrix"
    permissions: {}
    timeout-minutes: 5
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - name: Resolve versions
        id: resolve
        env:
          SELECTED_VERSION: ${{ github.event.inputs.opensearch-version }}
        run: |
          if [[ -z "${SELECTED_VERSION}" || "${SELECTED_VERSION}" == "all" ]]; then
            echo 'versions=["2.19", "3.5"]' >> "$GITHUB_OUTPUT"
          else
            echo "versions=[\"${SELECTED_VERSION}\"]" >> "$GITHUB_OUTPUT"
          fi

  # Each OpenSearch version is instantiated as its own call into the reusable
  # workflow (cleanup + version-check + integration-tests), so the versions run
  # in parallel against their own clusters without duplicating any job body.
  integration-tests:
    name: "OS ver.${{ matrix.opensearch-version }}"
    needs: resolve-opensearch-versions
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        opensearch-version: ${{ fromJSON(needs.resolve-opensearch-versions.outputs.versions) }}
    uses: ./.github/workflows/zeebe-aws-os-integration-tests-reusable.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}
      opensearch-version: ${{ matrix.opensearch-version }}

  send-slack-notificaion:
    name: "Send slack notification on fail"
    runs-on: ubuntu-latest
    needs: integration-tests

    # TODO: Re-enable this once the pipeline is in a healthy and meaningful state
    # currently tracked in https://github.com/camunda/camunda/issues/52892
    # if: (failure() || cancelled()) && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/stable/'))
    if: ${{ false }}

    permissions:
      contents: read
      actions: write
    steps:
    - name: Import secrets from Vault
      id: secrets
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
      with:
        url: ${{ secrets.VAULT_ADDR }}
        method: approle
        roleId: ${{ secrets.VAULT_ROLE_ID }}
        secretId: ${{ secrets.VAULT_SECRET_ID }}
        secrets: |
          secret/data/products/camunda/ci/github-actions DATA_ENGINE_CI_ALERT_WEBHOOK_URL;
    - name: Send notification
      uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc # v3.0.5
      with:
        webhook: ${{ steps.secrets.outputs.DATA_ENGINE_CI_ALERT_WEBHOOK_URL }}
        webhook-type: webhook-trigger
        # For posting a rich message using Block Kit
        payload: |
          text: "AWS OpenSearch Manual/Scheduled Run Integration Tests failed or were cancelled"
          blocks:
            - type: "section"
              text:
                type: "mrkdwn"
                text: "AWS OpenSearch Manual/Scheduled Run Integration Tests FAILED or WERE CANCELLED\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        sparse-checkout: .github
    - name: Observe build status
      if: always()
      continue-on-error: true
      uses: ./.github/actions/observe-build-status
      with:
        build_status: ${{ job.status }}
        secret_vault_address: ${{ secrets.VAULT_ADDR }}
        secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
        secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
