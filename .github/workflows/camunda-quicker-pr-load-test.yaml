# description: Creates a finite (default 10min) load test when a PR is labeled with
#              'quicker-benchmark'. Deploys with scenario 'quicker', awaits the starter
#              run-finished gauge in Prometheus, scrapes throughput + latency + engine
#              metrics, compares against a static baseline, and posts a results table as
#              a PR comment. Auto-cleans up the namespace once results are posted (or on
#              label removal / PR close).
# calls: camunda-load-test.yml (scenario: quicker)
# type: CI
# owner: @camunda/reliability-testing
name: Camunda Pull Request Quicker Benchmark
on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - closed
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag or commit SHA) to benchmark'
        required: true
        type: string
      duration-seconds:
        description: 'Test duration in seconds (overrides the default 600)'
        required: false
        type: string
        default: '600'
      pr-number:
        description: 'PR number to comment on (optional). When empty, only writes a job summary.'
        required: false
        type: string
        default: ''

defaults:
  run:
    # use bash shell by default to ensure pipefail behavior is the default
    # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

env:
  CLUSTER: camunda-benchmark-prod
  TELEPORT_JOIN_TOKEN: infra-benchmark-prod-github-action-zeebe
  # Default test duration in seconds. The platform takes ~7min to come up; 10min leaves a
  # short but usable load window. Override per-run via workflow_dispatch input.
  DEFAULT_DURATION_SECONDS: '600'
  LABEL_NAME: 'quicker-benchmark'

jobs:
  sanitize-branch-name:
    name: Sanitize Branch Name
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'labeled' && github.event.label.name == 'quicker-benchmark') ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'quicker-benchmark') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'quicker-benchmark')) ||
      (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'quicker-benchmark'))
    outputs:
      sanitized-name: ${{ steps.compute-namespace.outputs.namespace }}
      pr-number: ${{ steps.compute-namespace.outputs.pr-number }}
      duration-seconds: ${{ steps.compute-namespace.outputs.duration-seconds }}
      ref: ${{ steps.compute-namespace.outputs.ref }}
    steps:
      - id: sanitize-author
        uses: camunda/infra-global-github-actions/sanitize-branch-name@main
        with:
          branch: ${{ github.event_name == 'workflow_dispatch' && github.actor || github.event.pull_request.user.login }}
          max_length: 10
      - id: compute-namespace
        name: Compute namespace, PR number, duration, and ref
        run: |
          # Namespace is distinct from the existing 'benchmark' label (c8-...-pr-...) so both
          # labels can coexist on the same PR if ever needed.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            pr_number="${{ inputs.pr-number }}"
            ref="${{ inputs.ref }}"
            duration="${{ inputs.duration-seconds }}"
            id_suffix="${pr_number:-run-${{ github.run_id }}}"
          else
            pr_number="${{ github.event.pull_request.number }}"
            ref="${{ github.event.pull_request.head.ref }}"
            duration="${DEFAULT_DURATION_SECONDS}"
            id_suffix="$pr_number"
          fi
          echo "namespace=c8-${{ steps.sanitize-author.outputs.branch_name }}-quicker-pr-${id_suffix}" >> "$GITHUB_OUTPUT"
          echo "pr-number=${pr_number}" >> "$GITHUB_OUTPUT"
          echo "duration-seconds=${duration:-${DEFAULT_DURATION_SECONDS}}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  create-benchmark:
    name: Quicker Benchmark
    needs: sanitize-branch-name
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'labeled' && github.event.label.name == 'quicker-benchmark') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'quicker-benchmark'))
    uses: ./.github/workflows/camunda-load-test.yml
    secrets: inherit
    with:
      name: ${{ needs.sanitize-branch-name.outputs.sanitized-name }}
      ref: ${{ needs.sanitize-branch-name.outputs.ref }}
      scenario: 'quicker'
      # Override the Makefile default. Helm honours the last `--set` for a given key, so this
      # wins over the scenario default in load-tests/setup/default/Makefile.
      load-test-load: --set starter.durationLimit=${{ needs.sanitize-branch-name.outputs.duration-seconds }}

  collect-metrics:
    name: Collect metrics & post results
    needs: [sanitize-branch-name, create-benchmark]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'labeled' && github.event.label.name == 'quicker-benchmark') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'quicker-benchmark'))
    runs-on: ubuntu-latest
    # Test runs for `duration-seconds` and we want headroom for platform bring-up + scrape.
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: 'write'
    env:
      NAMESPACE: ${{ needs.sanitize-branch-name.outputs.sanitized-name }}
      DURATION_SECONDS: ${{ needs.sanitize-branch-name.outputs.duration-seconds }}
      PR_NUMBER: ${{ needs.sanitize-branch-name.outputs.pr-number }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Teleport
        uses: teleport-actions/setup@b638ff596557cc3959eb6b5287d5e58e0c8ac6a6 # v1.1.1
        with:
          proxy: camunda.teleport.sh:443
          version: auto
      - name: Authenticate to Cluster using Teleport
        uses: teleport-actions/auth-k8s@0f46164469ae4fcd4d359d40e06bab17d4be17c9 # v2.0.6
        with:
          proxy: camunda.teleport.sh:443
          token: ${{ env.TELEPORT_JOIN_TOKEN }}
          kubernetes-cluster: ${{ env.CLUSTER }}

      # The CI Teleport role grants pods/portforward in test namespaces but NOT in the
      # `monitoring` namespace, so we cannot tunnel to the cluster Prometheus. Instead we
      # scrape each pod's own metrics endpoint directly from the runner.

      - name: Wait for starter run-finished
        id: wait-starter
        run: |
          # Open a long-lived port-forward to the starter pod. kubectl port-forward will
          # itself wait for the pod to become Ready, so the platform's ~7min boot is
          # absorbed here. Once running, poll /metrics for `starter_run_finished == 1`.
          #
          # The starter exposes /metrics (the load-tester remaps /actuator/prometheus to
          # /metrics so Grafana scrape configs match Zeebe's convention).
          starter_pod=$(kubectl -n "$NAMESPACE" get pod -l app=starter \
            -o jsonpath='{.items[0].metadata.name}')
          if [[ -z "$starter_pod" ]]; then
            echo "::error::No starter pod found in $NAMESPACE"
            exit 1
          fi
          echo "starter-pod=${starter_pod}" >> "$GITHUB_OUTPUT"

          kubectl -n "$NAMESPACE" port-forward "pod/$starter_pod" 9601:9600 \
            >/tmp/pf-starter.log 2>&1 &
          echo $! > /tmp/pf-starter.pid

          # Wait for the port-forward to bind (gives the pod time to become Ready).
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9601/metrics >/dev/null 2>&1; then break; fi
            sleep 5
          done

          deadline_seconds=$((DURATION_SECONDS + 600))
          end=$(( $(date +%s) + deadline_seconds ))
          finished=0
          while [[ $(date +%s) -lt $end ]]; do
            val=$(curl -sf http://localhost:9601/metrics 2>/dev/null \
              | awk '/^starter_run_finished[ {]/ {print $NF; exit}')
            if [[ "$val" == "1.0" || "$val" == "1" ]]; then
              finished=1
              break
            fi
            sleep 30
          done
          echo "finished=${finished}" >> "$GITHUB_OUTPUT"
          if [[ "$finished" != "1" ]]; then
            echo "::warning::Starter did not flip starter_run_finished=1 within ${deadline_seconds}s. Continuing to scrape what's available."
          fi

      - name: Read starter pod restart count
        id: restarts
        run: |
          # If the starter was restarted by k8s mid-run, the actual elapsed wall-clock time
          # exceeds DURATION_SECONDS (the new pod runs another full duration_limit). Surface
          # the count so the comment can warn — we don't try to recover.
          rc=$(kubectl -n "$NAMESPACE" get pod -l app=starter \
            -o jsonpath='{.items[*].status.containerStatuses[*].restartCount}' 2>/dev/null \
            | tr ' ' '\n' | awk '{s+=$1} END {print s+0}')
          echo "count=${rc:-0}" >> "$GITHUB_OUTPUT"

      - name: Scrape starter metrics
        run: |
          # The starter port-forward from the wait step is still alive on :9601.
          curl -sf http://localhost:9601/metrics > /tmp/starter.prom

      - name: Stop starter port-forward
        if: always()
        run: |
          if [[ -f /tmp/pf-starter.pid ]]; then
            kill "$(cat /tmp/pf-starter.pid)" 2>/dev/null || true
          fi

      - name: Scrape camunda broker metrics (all 3)
        run: |
          # Each broker pod exposes /actuator/prometheus on port 9600. Per-broker counters
          # only count their own partitions, so we scrape all three and aggregate later.
          mkdir -p /tmp/camunda-prom
          # Selector verified against the camunda-platform Helm chart: the broker pods
          # carry app.kubernetes.io/component=zeebe-broker. Older charts may use
          # `app.kubernetes.io/component=orchestration`; we fall back if the primary
          # selector returns nothing.
          mapfile -t pods < <(kubectl -n "$NAMESPACE" get pods \
            -l app.kubernetes.io/component=zeebe-broker \
            -o jsonpath='{.items[*].metadata.name}' | tr ' ' '\n')
          if [[ ${#pods[@]} -eq 0 ]]; then
            mapfile -t pods < <(kubectl -n "$NAMESPACE" get pods \
              -l app.kubernetes.io/component=orchestration \
              -o jsonpath='{.items[*].metadata.name}' | tr ' ' '\n')
          fi
          echo "Scraping ${#pods[@]} broker pod(s): ${pods[*]}"
          local_port=9700
          for p in "${pods[@]}"; do
            [[ -z "$p" ]] && continue
            kubectl -n "$NAMESPACE" port-forward "pod/$p" "$local_port:9600" >/tmp/pf-$p.log 2>&1 &
            pid=$!
            for i in $(seq 1 15); do
              if curl -sf "http://localhost:$local_port/actuator/prometheus" >/dev/null 2>&1; then break; fi
              sleep 2
            done
            curl -sf "http://localhost:$local_port/actuator/prometheus" > "/tmp/camunda-prom/$p.prom" \
              || echo "::warning::Failed to scrape $p"
            kill $pid 2>/dev/null || true
            wait $pid 2>/dev/null || true
            local_port=$((local_port + 1))
          done

      - name: Aggregate metrics
        id: scrape
        run: |
          python3 .github/scripts/aggregate-quicker-metrics.py \
            --starter /tmp/starter.prom \
            --camunda-dir /tmp/camunda-prom \
            --duration "${DURATION_SECONDS}" \
            >> "$GITHUB_OUTPUT"

      - name: Install js-yaml
        if: always()
        run: npm install --no-save js-yaml@4.1.0

      - name: Render and post results
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          INSTANCES_STARTED: ${{ steps.scrape.outputs.instances-started }}
          RESPONSE_P50: ${{ steps.scrape.outputs.response-p50-seconds }}
          RESPONSE_P99: ${{ steps.scrape.outputs.response-p99-seconds }}
          DATAAVAIL_P50: ${{ steps.scrape.outputs.dataavail-p50-seconds }}
          DATAAVAIL_P99: ${{ steps.scrape.outputs.dataavail-p99-seconds }}
          COMPLETED_PI_RATE: ${{ steps.scrape.outputs.completed-pi-rate }}
          COMPLETED_PI_TOTAL: ${{ steps.scrape.outputs.completed-pi-total }}
          BACKPRESSURE_PCT: ${{ steps.scrape.outputs.backpressure-pct }}
          STARTER_FINISHED: ${{ steps.wait-starter.outputs.finished }}
          RESTART_COUNT: ${{ steps.restarts.outputs.count }}
          PR_NUMBER: ${{ needs.sanitize-branch-name.outputs.pr-number }}
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');

            const baseline = yaml.load(
              fs.readFileSync('load-tests/quicker-benchmark/baseline.yaml', 'utf8')
            );
            const m = baseline.metrics || {};

            const num = (v) => {
              const n = Number(v);
              return Number.isFinite(n) ? n : null;
            };
            const fmt = (v, digits = 2) => v == null ? 'n/a' : v.toFixed(digits);
            const sToMs = (v) => v == null ? null : v * 1000;

            const instances = num(process.env.INSTANCES_STARTED);
            const responseP50Ms = sToMs(num(process.env.RESPONSE_P50));
            const responseP99Ms = sToMs(num(process.env.RESPONSE_P99));
            const dataP50Ms = sToMs(num(process.env.DATAAVAIL_P50));
            const dataP99Ms = sToMs(num(process.env.DATAAVAIL_P99));
            const completedPiRate = num(process.env.COMPLETED_PI_RATE);
            const completedPiTotal = num(process.env.COMPLETED_PI_TOTAL);
            const backpressurePct = num(process.env.BACKPRESSURE_PCT);
            const restartCount = num(process.env.RESTART_COUNT) || 0;
            const finishedFlag = process.env.STARTER_FINISHED === '1';
            const durationSeconds = ${{ needs.sanitize-branch-name.outputs.duration-seconds }};
            const throughput = instances != null && durationSeconds > 0
              ? instances / durationSeconds
              : null;

            // For each metric: lower-is-better unless higher-is-better is true.
            const verdict = (current, expected, tolerance, higherIsBetter) => {
              if (current == null || expected == null) return '❔';
              if (expected === 0) {
                // baseline of 0 => any nonzero is a regression for lower-is-better metrics
                if (!higherIsBetter && current === 0) return '✅';
                if (!higherIsBetter && current > 0) return '⚠️';
                return current > 0 ? '✅' : '❔';
              }
              const diff = ((current - expected) / expected) * 100;
              const within = Math.abs(diff) <= (tolerance ?? 10);
              if (within) return '✅';
              const better = higherIsBetter ? diff > 0 : diff < 0;
              return better ? '✅' : '⚠️';
            };
            const delta = (current, expected) => {
              if (current == null || expected == null) return 'n/a';
              if (expected === 0) return current === 0 ? '0' : '+∞';
              const diff = ((current - expected) / expected) * 100;
              const sign = diff >= 0 ? '+' : '';
              return `${sign}${diff.toFixed(1)}%`;
            };

            const rows = [
              {
                label: 'Process instances started (starter)',
                current: instances == null ? 'n/a' : Math.round(instances).toLocaleString(),
                spec: m['process-instances-started'],
                value: instances,
                higherIsBetter: true,
              },
              {
                label: 'Process instances completed (engine)',
                current: completedPiTotal == null ? 'n/a' : Math.round(completedPiTotal).toLocaleString(),
                spec: m['process-instances-completed'],
                value: completedPiTotal,
                higherIsBetter: true,
              },
              {
                label: 'Throughput, avg (PI/s)',
                current: throughput == null ? 'n/a' : fmt(throughput, 1),
                spec: m['throughput-per-second'],
                value: throughput,
                higherIsBetter: true,
              },
              {
                label: 'Completed PI rate, avg (PI/s)',
                current: fmt(completedPiRate, 1),
                spec: m['completed-pi-rate-per-second'],
                value: completedPiRate,
                higherIsBetter: true,
              },
              {
                label: 'Starter response p50 (ms)',
                current: fmt(responseP50Ms, 1),
                spec: m['starter-response-latency-p50-ms'],
                value: responseP50Ms,
                higherIsBetter: false,
              },
              {
                label: 'Starter response p99 (ms)',
                current: fmt(responseP99Ms, 1),
                spec: m['starter-response-latency-p99-ms'],
                value: responseP99Ms,
                higherIsBetter: false,
              },
              {
                label: 'Data availability p50 (ms)',
                current: fmt(dataP50Ms, 0),
                spec: m['starter-data-availability-latency-p50-ms'],
                value: dataP50Ms,
                higherIsBetter: false,
              },
              {
                label: 'Data availability p99 (ms)',
                current: fmt(dataP99Ms, 0),
                spec: m['starter-data-availability-latency-p99-ms'],
                value: dataP99Ms,
                higherIsBetter: false,
              },
              {
                label: 'Backpressure (% of received requests)',
                current: backpressurePct == null ? 'n/a' : fmt(backpressurePct, 2) + '%',
                spec: m['backpressure-percent'],
                value: backpressurePct,
                higherIsBetter: false,
              },
            ];

            const tableLines = [
              '| Metric | Current | Baseline | Tolerance | Δ | |',
              '|---|---:|---:|---:|---:|:---:|',
            ];
            for (const r of rows) {
              const expected = r.spec?.expected;
              const tolerance = r.spec?.['tolerance-percent'];
              const expectedStr = expected == null ? 'n/a' : expected.toLocaleString();
              const tolStr = tolerance == null ? 'n/a' : `±${tolerance}%`;
              tableLines.push(
                `| ${r.label} | ${r.current} | ${expectedStr} | ${tolStr} | ${delta(r.value, expected)} | ${verdict(r.value, expected, tolerance, r.higherIsBetter)} |`
              );
            }

            const warnings = [];
            if (!finishedFlag) {
              warnings.push('⚠️ Starter never reported `starter_run_finished=1`. Numbers may reflect a partial run.');
            }
            if (restartCount > 0) {
              warnings.push(`⚠️ Starter pod restarted **${restartCount}** time(s). Wall-clock runtime exceeds the configured ${durationSeconds}s — the comparison against the baseline is no longer apples-to-apples.`);
            }

            const dashboard = `https://dashboard.benchmark.camunda.cloud/d/zeebe-dashboard/zeebe?var-namespace=${{ env.NAMESPACE }}`;
            const body = [
              '## ⏱️ Quicker Benchmark Results',
              '',
              `Scenario: \`quicker\` · Duration: ${durationSeconds}s · Namespace: \`${{ env.NAMESPACE }}\``,
              ...(warnings.length ? ['', ...warnings] : []),
              '',
              ...tableLines,
              '',
              `📊 [Grafana dashboard](${dashboard}) · 🔁 [Workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              '_Baseline lives at `load-tests/quicker-benchmark/baseline.yaml`. ⚠️ flags only fire on the regression side — improvements outside tolerance still show ✅._',
            ].join('\n');

            await core.summary.addRaw(body).write();

            const prNumber = parseInt(process.env.PR_NUMBER || '0', 10);
            if (prNumber > 0) {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  delete-benchmark:
    name: Quicker Benchmark Cleanup
    needs: [sanitize-branch-name, collect-metrics]
    # Run after results are posted (success or failure), and also on label-removal / PR-close
    # so abandoned tests don't leak namespaces. `if: always()` lets it fire when collect-metrics
    # fails too.
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event.action == 'labeled' && github.event.label.name == 'quicker-benchmark') ||
        (github.event.action == 'unlabeled' && github.event.label.name == 'quicker-benchmark') ||
        (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'quicker-benchmark')) ||
        (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'quicker-benchmark'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Teleport
        uses: teleport-actions/setup@b638ff596557cc3959eb6b5287d5e58e0c8ac6a6 # v1.1.1
        with:
          proxy: camunda.teleport.sh:443
          version: auto
      - name: Authenticate to Cluster using Teleport
        uses: teleport-actions/auth-k8s@0f46164469ae4fcd4d359d40e06bab17d4be17c9 # v2.0.6
        with:
          proxy: camunda.teleport.sh:443
          token: ${{ env.TELEPORT_JOIN_TOKEN }}
          kubernetes-cluster: ${{ env.CLUSTER }}

      - name: Delete benchmark namespace
        run: |
          kubectl delete ns "${{ needs.sanitize-branch-name.outputs.sanitized-name }}" --ignore-not-found=true
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
