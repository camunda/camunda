name: Camunda Platform Release Dry Run from main

# owner: @camunda/monorepo-devops-team

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Specifies the branch, for which the Release Dry Run should be executed'
        default: 'main'
        required: false
        type: string
  schedule:
    # Runs at 01:00 every week day; see this link for more: https://crontab.guru/#0_1_*_*_1-5
    - cron: '0 1 * * 1-5'

jobs:
  setup:
    name: Resolve release branch
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      branch: ${{ steps.resolve-branch.outputs.branch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch || 'main' }}
      - name: Resolve release branch
        id: resolve-branch
        run: |
          # Create a temporary unprotected branch for dry-run push testing.
          # Any input branch (or main) may be protected, so we always branch off it.
          SOURCE_BRANCH="${{ inputs.branch || 'main' }}"
          BRANCH="tmp/dryrun-${SOURCE_BRANCH}-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Created temporary branch: ${BRANCH} from ${{ inputs.branch || 'main' }}"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  dry-run-release:
    needs: setup
    name: "${{ matrix.version }} from ${{ inputs.branch || 'main' }}"
    uses: ./.github/workflows/camunda-platform-release.yml
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        version: [ 0.8.2, 0.8.2-alpha1 ]
        include:
          - version: 0.8.2
            latest: true
          - version: 0.8.2-alpha1
            latest: false
    with:
      releaseBranch: ${{ needs.setup.outputs.branch }}
      releaseVersion: ${{ matrix.version }}
      nextDevelopmentVersion: 0.0.0-SNAPSHOT
      isLatest: ${{ matrix.latest }}
      dryRun: true
  cleanup:
    name: Delete temporary release branch
    needs: [setup, dry-run-release]
    if: always()
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Delete temporary release branch
        run: git push origin --delete "${{ needs.setup.outputs.branch }}" 2>/dev/null || true
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  notify:
    name: Send slack notification
    runs-on: ubuntu-latest
    needs: [ dry-run-release ]
    if: ${{ github.event_name == 'schedule' }}
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
    steps:
      - id: slack-notify-failure
        name: Send failure slack notification
        uses: slackapi/slack-github-action@v1.27.1
        if: ${{ always() && needs.dry-run-release.result != 'success' }}
        with:
          # For posting a rich message using Block Kit
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":alarm: *Release Dry Run* from `main` failed! :alarm:\n"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Please check the related workflow execution: https://github.com/camunda/camunda/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
      - id: slack-notify-success
        name: Send success slack notification
        uses: slackapi/slack-github-action@v1.27.1
        if: ${{ always() && needs.dry-run-release.result == 'success' }}
        with:
          # For posting a rich message using Block Kit
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":tada: *Release Dry Run* from `main` succeeded! :tada:\n"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Nothing to check today. Good job! :clap:\n"
                  }
                }
              ]
            }

