# description: AI-assisted code quality pipeline. Runs CodeQL on hotspot modules,
#              then (in later phases) feeds findings to an AI agent that classifies
#              them and either opens a PR with a fix (PR track) or a GitHub issue
#              for human triage (issue track). All AI-generated PRs require a
#              human reviewer before merge.
# type: CI / Quality
# owner: @camunda/monorepo-devops-team

name: Code Quality AI Pipeline

on:
  workflow_dispatch:
  # Nightly schedule disabled while the pipeline is under team review.
  # Re-enable by uncommenting the block below once the scaffold is approved.
  # schedule:
  #   - cron: "0 3 * * *"

defaults:
  run:
    shell: bash

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: code-quality-ai-${{ github.ref }}
  cancel-in-progress: false

env:
  CODE_MAAT_VERSION: "1.0.4"

jobs:
  hotspots:
    name: Stage 1 — hotspot identification (code-maat)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      paths_count: ${{ steps.generate.outputs.paths_count }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: .github/scripts/code-quality-ai/package-lock.json

      - name: Install hotspot dependencies
        working-directory: .github/scripts/code-quality-ai
        run: npm ci --no-audit --no-fund

      - name: Download code-maat JAR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p code-maat
          gh release download "v${CODE_MAAT_VERSION}" \
            --repo adamtornhill/code-maat \
            --pattern "code-maat-${CODE_MAAT_VERSION}-standalone.jar" \
            --dir code-maat
          echo "CODE_MAAT_JAR=$GITHUB_WORKSPACE/code-maat/code-maat-${CODE_MAAT_VERSION}-standalone.jar" >> "$GITHUB_ENV"

      - name: Run hotspot analysis
        run: |
          node .github/scripts/code-quality-ai/hotspots.js \
            --jar "$CODE_MAAT_JAR" \
            --since "90 days ago" \
            --path-prefix "^zeebe/engine/" \
            --top 50 \
            --format tsv \
            > hotspots.tsv
          echo "Hotspot summary:"
          cat hotspots.tsv

      - name: Generate dynamic CodeQL config
        id: generate
        run: |
          PATHS=$(node .github/scripts/code-quality-ai/hotspots.js \
            --jar "$CODE_MAAT_JAR" \
            --since "90 days ago" \
            --path-prefix "^zeebe/engine/" \
            --top 50 \
            --format lines)

          if [ -z "$PATHS" ]; then
            echo "No hotspots produced; falling back to module path." >&2
            PATHS="zeebe/engine"
          fi

          {
            echo 'name: "Code Quality AI Pipeline — dynamic CodeQL config"'
            echo "queries:"
            echo "  - uses: security-and-quality"
            echo "paths-ignore:"
            echo '  - "**/target/**"'
            echo '  - "**/generated-sources/**"'
            echo "paths:"
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              echo "  - \"$path\""
            done <<< "$PATHS"
          } > codeql-config-dynamic.yml

          echo "Generated config:"
          cat codeql-config-dynamic.yml
          echo "paths_count=$(wc -l < <(echo "$PATHS"))" >> "$GITHUB_OUTPUT"

      - name: Upload hotspot artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: hotspots
          path: |
            hotspots.tsv
            codeql-config-dynamic.yml
          retention-days: 30

  codeql-scan:
    name: CodeQL scan (Java)
    needs: hotspots
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-build
        with:
          maven-cache-key-modifier: code-quality-ai
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

      - name: Download dynamic CodeQL config
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: hotspots
          path: hotspots

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: java-kotlin
          build-mode: manual
          config-file: ./hotspots/codeql-config-dynamic.yml

      # Build only the target module (and its dependencies via -am).
      # CodeQL observes the compile step to build its database.
      - name: Build target module
        run: ./mvnw install -pl zeebe/engine -am -Dquickly -T1C

      - name: Perform CodeQL analysis
        id: analyze
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:java-kotlin"
          output: codeql-results
          # Default upload to GitHub Security tab is on; we also keep a SARIF
          # artifact for the AI triage stage to consume in later phases.
          upload: always

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codeql-sarif
          path: codeql-results/
          retention-days: 30

  ai-triage:
    name: AI triage of CodeQL findings
    needs: codeql-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: .github/scripts/code-quality-ai/package-lock.json

      - name: Install triage dependencies
        working-directory: .github/scripts/code-quality-ai
        run: npm ci --no-audit --no-fund

      - name: Download CodeQL SARIF
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codeql-sarif
          path: codeql-results

      - name: Locate SARIF file
        id: locate
        run: |
          SARIF_PATH=$(find codeql-results -name '*.sarif' -print -quit)
          if [ -z "$SARIF_PATH" ]; then
            echo "No SARIF file found in codeql-results/" >&2
            exit 1
          fi
          echo "sarif=$GITHUB_WORKSPACE/$SARIF_PATH" >> "$GITHUB_OUTPUT"

      - name: Run AI triage
        working-directory: .github/scripts/code-quality-ai
        env:
          ENABLE_AI_TRIAGE: "true"
          AWS_REGION: eu-north-1
          AWS_ACCESS_KEY_ID: ${{ secrets.HACKDAY_NK_DK_BEDROCK_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HACKDAY_NK_DK_BEDROCK_ACCESS_SECRET }}
          BEDROCK_INFERENCE_PROFILE_ARN: ${{ secrets.HACKDAY_NK_DK_BEDROCK_ACCESS_ARN }}
        run: node triage.js --input "${{ steps.locate.outputs.sarif }}" --output triaged.json

      - name: Upload triage output
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: triaged-findings
          path: .github/scripts/code-quality-ai/triaged.json
          retention-days: 30

  pr-track:
    name: Open auto-fix PRs
    needs: ai-triage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-build
        with:
          maven-cache-key-modifier: code-quality-ai-pr
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: .github/scripts/code-quality-ai/package-lock.json

      - name: Install runner dependencies
        working-directory: .github/scripts/code-quality-ai
        run: npm ci --no-audit --no-fund

      - name: Download triaged findings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: triaged-findings
          path: .github/scripts/code-quality-ai

      - name: Configure git identity
        run: |
          git config user.name "camunda-ci-bot"
          git config user.email "camunda-ci-bot@users.noreply.github.com"

      - name: Run PR-track runner
        working-directory: .github/scripts/code-quality-ai
        env:
          AWS_REGION: eu-north-1
          AWS_ACCESS_KEY_ID: ${{ secrets.HACKDAY_NK_DK_BEDROCK_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HACKDAY_NK_DK_BEDROCK_ACCESS_SECRET }}
          BEDROCK_INFERENCE_PROFILE_ARN: ${{ secrets.HACKDAY_NK_DK_BEDROCK_ACCESS_ARN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node pr_runner.js --triaged triaged.json --repo-root "$GITHUB_WORKSPACE" --max-prs 5 --output pr-summary.json

      - name: Upload PR-track summary
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pr-track-summary
          path: .github/scripts/code-quality-ai/pr-summary.json
          retention-days: 30

  issue-track:
    name: Open auto-triage issues
    needs: ai-triage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: .github/scripts/code-quality-ai/package-lock.json

      - name: Install runner dependencies
        working-directory: .github/scripts/code-quality-ai
        run: npm ci --no-audit --no-fund

      - name: Download triaged findings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: triaged-findings
          path: .github/scripts/code-quality-ai

      - name: Run issue-track runner
        working-directory: .github/scripts/code-quality-ai
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node issue_runner.js --triaged triaged.json --repo-root "$GITHUB_WORKSPACE" --max-issues 10 --output issue-summary.json

      - name: Upload issue-track summary
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: issue-track-summary
          path: .github/scripts/code-quality-ai/issue-summary.json
          retention-days: 30
