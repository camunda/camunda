# description: Nightly E2E tests for C8 Orchestration Cluster on stable/8.9
# type: CI
# owner: @camunda/test-automation-team
---
name: "C8 Orchestration Cluster Nightly: 8.9 E2E Tests"

on:
  schedule:
    - cron: "0 0 * * *" # Run at midnight UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-e2e-v1:
    uses: ./.github/workflows/c8-orchestration-cluster-e2e-tests-reusable-e2e.yml
    with:
      branch: stable/8.9
      camunda_docker_image: "camunda/camunda:8.9-SNAPSHOT"
      is_standalone: true
      tasklist_mode: v1
      test_args: "--project=chromium tests/common-flows/v1/ tests/tasklist/v1/"
      observe_job_name: "c8-orchestration-cluster-e2e-nightly-tests/stable-8.9/v1"
    secrets: inherit

  nightly-e2e-v2:
    uses: ./.github/workflows/c8-orchestration-cluster-e2e-tests-reusable-e2e.yml
    with:
      branch: stable/8.9
      camunda_docker_image: "camunda/camunda:8.9-SNAPSHOT"
      is_standalone: true
      tasklist_mode: v2
      test_args: '--project=chromium --grep-invert "tests/(common-flows/v1|tasklist/v1)/"'
      observe_job_name: "c8-orchestration-cluster-e2e-nightly-tests/stable-8.9/v2"
    secrets: inherit
