# description: Nightly API tests for C8 Orchestration Cluster on stable/8.8
# type: CI
# owner: @camunda/qa-engineering
---
name: "C8 Orchestration Cluster Nightly: 8.8 API Tests"

on:
  pull_request:
    types: [opened, edited, synchronize]
  # schedule:
  #   - cron: "0 0 * * *" # Run at midnight UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-tests:
    uses: ./.github/workflows/c8-orchestration-cluster-e2e-tests-reusable-api.yml
    with:
      branch: stable/8.8
      camunda_docker_image: "camunda/camunda:8.8-SNAPSHOT"
      is_standalone: true
      observe_job_name: "c8-orchestration-cluster-e2e-nightly-api-tests/stable/8.8"
    secrets: inherit
