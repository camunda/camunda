# description: This workflow builds the Camunda Docker image, pushes it to Harbor, and runs Helm integration tests. This is part of the AlwaysGreen project where every PR is deployed via helm to confirm no breaking changes.
# type: CI
# owner: @camunda/distribution
---
name: Docker Build and Helm Integration Test

on:
  push:
    branches:
      - stable/8.7
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker image version tag (defaults to ...-mq<PR_NUMBER>-run<run_id>-a<attempt> for merge queue, ...-dispatch-run<run_id>-a<attempt> for manual dispatch, or ...-mq<PR_NUMBER|SHA>-run<run_id>-a<attempt> for push to stable/8.7 — the mq prefix is required by the Harbor replication filter `**-mq**-run**`)'
        type: string
        required: false
      helmRepositoryBranchName:
        description: 'Helm repository branch name'
        type: string
        default: 'main'
      helmRepositoryDirName:
        description: 'Helm chart directory name'
        type: string
        default: 'camunda-platform-8.7'
      scenario:
        description: 'Test scenario'
        type: string
        default: 'alwaysgreen'
      deployment-ttl:
        description: 'Deployment TTL'
        type: string
        default: ''
      shortname:
        description: 'Short name for the deployment'
        type: string
        default: 'agrn'
  merge_group:
    types:
      - checks_requested

env:
  GHA_BEST_PRACTICES_LINTER: enabled
  HARBOR_REGISTRY: registry.camunda.cloud
  HARBOR_ZEEBE_REPOSITORY: registry.camunda.cloud/team-camunda/zeebe
  HARBOR_OPERATE_REPOSITORY: registry.camunda.cloud/team-camunda/operate
  HARBOR_TASKLIST_REPOSITORY: registry.camunda.cloud/team-camunda/tasklist

defaults:
  run:
    shell: bash

jobs:
  # Gate job - checks conditions once, all other jobs depend on this
  should-run:
    name: Check Run Conditions
    runs-on: ubuntu-latest
    timeout-minutes: 1
    continue-on-error: ${{ github.event_name == 'merge_group' }}
    permissions: { }
    outputs:
      concurrency-group: ${{ steps.concurrency-group.outputs.group }}
      merge-group-pr-numbers: ${{ steps.concurrency-group.outputs.pr-numbers }}
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'merge_group'
    steps:
      - name: Compute concurrency group
        id: concurrency-group
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "merge_group" ]]; then
            REF_SOURCE="${{ github.event.merge_group.head_ref || github.ref }}"
            # Expected merge queue ref shape includes pr-<number> segments, e.g.
            # refs/heads/gh-readonly-queue/stable/8.7/pr-123-<suffix>
            PR_MATCHES=$(grep -oE 'pr-[0-9]+' <<< "${REF_SOURCE}" | paste -sd '-' - || true)
            if [[ -n "${PR_MATCHES}" ]]; then
              echo "pr-numbers=${PR_MATCHES//pr-/pr}" >> "$GITHUB_OUTPUT"
              echo "group=${{ github.workflow }}-${PR_MATCHES}" >> "$GITHUB_OUTPUT"
            else
              echo "pr-numbers=" >> "$GITHUB_OUTPUT"
              echo "::warning::Could not derive stable merge_group PR key from ref '${REF_SOURCE}'; using ref as fallback."
              echo "group=${{ github.workflow }}-${{ github.ref }}" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # For push to main/stable/*, every commit must run its own build (no cancellation),
            # so use the SHA in the concurrency group. Other branches keep ref-based grouping.
            echo "pr-numbers=" >> "$GITHUB_OUTPUT"
            echo "group=${{ github.workflow }}-push-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr-numbers=" >> "$GITHUB_OUTPUT"
            echo "group=${{ github.workflow }}-${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi
      - run: echo "Workflow conditions met, proceeding with build"
      - name: Emit AlwaysGreen failure context
        if: ${{ always() && (failure() || cancelled()) }}
        run: |
          CONTEXT_FILE="${RUNNER_TEMP}/alwaysgreen-context-${{ github.job }}.json"
          OWNER_TEAM="none"
          FAILURE_CATEGORY="none"
          if [[ "${{ job.status }}" == "failure" || "${{ job.status }}" == "cancelled" ]]; then
            OWNER_TEAM="@camunda/monorepo-devops-team"
            FAILURE_CATEGORY="orchestration_should_run"
          fi
          jq -n \
            --arg stage "${{ github.job }}" \
            --arg failure_category "$FAILURE_CATEGORY" \
            --arg owner_team "$OWNER_TEAM" \
            --arg escalation_team "$OWNER_TEAM" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg status "${{ job.status }}" \
            '{stage:$stage,failure_category:$failure_category,owner_team:$owner_team,escalation_team:$escalation_team,run_url:$run_url,status:$status}' > "$CONTEXT_FILE"
          {
            echo "### AlwaysGreen Failure Context"
            echo ""
            echo "- stage: ${{ github.job }}"
            echo "- status: ${{ job.status }}"
            echo "- failure_category: ${FAILURE_CATEGORY}"
            echo "- owner_team: ${OWNER_TEAM}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload AlwaysGreen failure context artifact
        if: ${{ always() && (failure() || cancelled()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysgreen-failure-context-${{ github.job }}
          path: ${{ runner.temp }}/alwaysgreen-context-${{ github.job }}.json
          retention-days: 5
  # Parallel frontend builds
  build-operate-frontend:
    name: Build Operate Frontend
    needs: should-run
    permissions: { }
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: ${{ github.event_name == 'merge_group' }}
    concurrency:
      group: ${{ needs.should-run.outputs.concurrency-group }}-build-operate-frontend
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/build-frontend
        with:
          directory: ./operate/client
      - name: Upload Operate frontend artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: operate-frontend
          path: operate/client/build
          retention-days: 1
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          job_name: docker-build-helm-integration-operate-frontend
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
      - name: Emit AlwaysGreen failure context
        if: ${{ always() && (failure() || cancelled()) }}
        run: |
          CONTEXT_FILE="${RUNNER_TEMP}/alwaysgreen-context-${{ github.job }}.json"
          OWNER_TEAM="none"
          FAILURE_CATEGORY="none"
          if [[ "${{ job.status }}" == "failure" || "${{ job.status }}" == "cancelled" ]]; then
            OWNER_TEAM="@camunda/monorepo-devops-team"
            FAILURE_CATEGORY="orchestration_frontend_build"
          fi
          jq -n \
            --arg stage "${{ github.job }}" \
            --arg failure_category "$FAILURE_CATEGORY" \
            --arg owner_team "$OWNER_TEAM" \
            --arg escalation_team "$OWNER_TEAM" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg status "${{ job.status }}" \
            '{stage:$stage,failure_category:$failure_category,owner_team:$owner_team,escalation_team:$escalation_team,run_url:$run_url,status:$status}' > "$CONTEXT_FILE"
      - name: Upload AlwaysGreen failure context artifact
        if: ${{ always() && (failure() || cancelled()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysgreen-failure-context-${{ github.job }}
          path: ${{ runner.temp }}/alwaysgreen-context-${{ github.job }}.json
          retention-days: 5
  build-tasklist-frontend:
    name: Build Tasklist Frontend
    needs: should-run
    permissions: { }
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: ${{ github.event_name == 'merge_group' }}
    concurrency:
      group: ${{ needs.should-run.outputs.concurrency-group }}-build-tasklist-frontend
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/build-frontend
        with:
          directory: ./tasklist/client
      - name: Upload Tasklist frontend artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tasklist-frontend
          path: tasklist/client/build
          retention-days: 1
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          job_name: docker-build-helm-integration-tasklist-frontend
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
      - name: Emit AlwaysGreen failure context
        if: ${{ always() && (failure() || cancelled()) }}
        run: |
          CONTEXT_FILE="${RUNNER_TEMP}/alwaysgreen-context-${{ github.job }}.json"
          OWNER_TEAM="none"
          FAILURE_CATEGORY="none"
          if [[ "${{ job.status }}" == "failure" || "${{ job.status }}" == "cancelled" ]]; then
            OWNER_TEAM="@camunda/monorepo-devops-team"
            FAILURE_CATEGORY="orchestration_frontend_build"
          fi
          jq -n \
            --arg stage "${{ github.job }}" \
            --arg failure_category "$FAILURE_CATEGORY" \
            --arg owner_team "$OWNER_TEAM" \
            --arg escalation_team "$OWNER_TEAM" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg status "${{ job.status }}" \
            '{stage:$stage,failure_category:$failure_category,owner_team:$owner_team,escalation_team:$escalation_team,run_url:$run_url,status:$status}' > "$CONTEXT_FILE"
      - name: Upload AlwaysGreen failure context artifact
        if: ${{ always() && (failure() || cancelled()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysgreen-failure-context-${{ github.job }}
          path: ${{ runner.temp }}/alwaysgreen-context-${{ github.job }}.json
          retention-days: 5
  build-identity-frontend:
    name: Build Identity Frontend
    needs: should-run
    permissions: { }
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: ${{ github.event_name == 'merge_group' }}
    concurrency:
      group: ${{ needs.should-run.outputs.concurrency-group }}-build-identity-frontend
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/build-frontend
        with:
          directory: ./identity/client
      - name: Upload Identity frontend artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: identity-frontend
          path: identity/client/dist
          retention-days: 1
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          job_name: docker-build-helm-integration-identity-frontend
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
      - name: Emit AlwaysGreen failure context
        if: ${{ always() && (failure() || cancelled()) }}
        run: |
          CONTEXT_FILE="${RUNNER_TEMP}/alwaysgreen-context-${{ github.job }}.json"
          OWNER_TEAM="none"
          FAILURE_CATEGORY="none"
          if [[ "${{ job.status }}" == "failure" || "${{ job.status }}" == "cancelled" ]]; then
            OWNER_TEAM="@camunda/monorepo-devops-team"
            FAILURE_CATEGORY="orchestration_frontend_build"
          fi
          jq -n \
            --arg stage "${{ github.job }}" \
            --arg failure_category "$FAILURE_CATEGORY" \
            --arg owner_team "$OWNER_TEAM" \
            --arg escalation_team "$OWNER_TEAM" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg status "${{ job.status }}" \
            '{stage:$stage,failure_category:$failure_category,owner_team:$owner_team,escalation_team:$escalation_team,run_url:$run_url,status:$status}' > "$CONTEXT_FILE"
      - name: Upload AlwaysGreen failure context artifact
        if: ${{ always() && (failure() || cancelled()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysgreen-failure-context-${{ github.job }}
          path: ${{ runner.temp }}/alwaysgreen-context-${{ github.job }}.json
          retention-days: 5

  # Main build job - waits for all frontends to complete
  build-and-push-images:
    name: Build and Push Docker Images
    # Includes should-run to consume its computed concurrency-group output.
    needs: [should-run, build-operate-frontend, build-tasklist-frontend, build-identity-frontend]
    permissions: { }
    runs-on: gcp-perf-core-8-default
    timeout-minutes: 30
    continue-on-error: ${{ github.event_name == 'merge_group' }}
    concurrency:
      group: ${{ needs.should-run.outputs.concurrency-group }}-build-and-push-images
      cancel-in-progress: true
    outputs:
      image-tag: ${{ steps.set-image-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          dockerhub-readonly: true
          harbor: true
          vault-address: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          minimus: true

      - name: Get Maven project version
        id: maven-version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout --non-recursive)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set semantic image tag
        id: set-image-tag
        shell: bash
        run: |
          MAVEN_VERSION="${{ steps.maven-version.outputs.version }}"
          if [[ -n "${{ inputs.version }}" ]]; then
            # Use explicitly provided version
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            # For merge queue: prefer <maven-version>-mq<PR_NUMBER>-run<run_id>-a<run_attempt>
            # but fall back to a SHA-based tag if we cannot derive PR numbers from merge_group payload/ref.
            PR_NUM="${{ needs.should-run.outputs.merge-group-pr-numbers }}"
            if [[ -n "${PR_NUM}" ]]; then
              echo "tag=${MAVEN_VERSION}-mq${PR_NUM}-run${{ github.run_id }}-a${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
            else
              SHA_SHORT="${GITHUB_SHA::7}"
              echo "::warning::Could not determine PR number from merge_group payload/ref; using merge-group SHA-based tag instead."
              echo "tag=${MAVEN_VERSION}-mq${SHA_SHORT}-run${{ github.run_id }}-a${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # For manual dispatch: <maven-version>-dispatch-run<run_id>-a<run_attempt> (e.g., 8.7.0-SNAPSHOT-dispatch-run12345678-a1)
            echo "tag=${MAVEN_VERSION}-dispatch-run${{ github.run_id }}-a${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
          else
            # For push to stable/8.7 (typically a backport): synthesize an
            # `-mq<N>-run<id>-a<n>` tag from the original PR number carried in
            # the commit subject's "(#NNNN)" suffix so the SRE Harbor
            # replication filter `**-mq**-run**` accepts the image. Without
            # this prefix, stable backport pushes produced `-stable-8.7-run`
            # tags that the replication rule silently dropped.
            # Fall back to a 7-char SHA-based mq tag if the subject doesn't
            # carry a PR number (manual squash, rebase, force-push).
            SUBJECT=$(git log -1 --format=%s)
            PR_NUM=$(sed -nE 's|.*\(#([0-9]+)\).*|\1|p' <<< "${SUBJECT}")
            if [[ -n "${PR_NUM}" ]]; then
              # e.g. 8.7.0-SNAPSHOT-mq53787-run12345678-a1
              echo "tag=${MAVEN_VERSION}-mq${PR_NUM}-run${{ github.run_id }}-a${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
            else
              SHA_SHORT="${GITHUB_SHA::7}"
              echo "::warning::Could not derive PR number from commit subject '${SUBJECT}'; using SHA-based mq tag instead."
              echo "tag=${MAVEN_VERSION}-mq${SHA_SHORT}-run${{ github.run_id }}-a${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Download Operate frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operate-frontend
          path: operate/client/build

      - name: Download Tasklist frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tasklist-frontend
          path: tasklist/client/build

      - name: Download Identity frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: identity-frontend
          path: identity/client/dist

      - name: Build Camunda
        id: build-camunda
        uses: ./.github/actions/build-zeebe
        with:
          maven-extra-args: -PskipFrontendBuild

      - name: Build and push Zeebe Docker image to Harbor
        id: build-zeebe-docker
        uses: ./.github/actions/build-platform-docker
        with:
          repository: ${{ env.HARBOR_ZEEBE_REPOSITORY }}
          version: ${{ steps.set-image-tag.outputs.tag }}
          distball: ${{ steps.build-camunda.outputs.distball }}
          platforms: linux/amd64
          dockerfile: Dockerfile
          push: true

      - name: Build and push Operate Docker image to Harbor
        id: build-operate-docker
        uses: ./.github/actions/build-platform-docker
        with:
          repository: ${{ env.HARBOR_OPERATE_REPOSITORY }}
          version: ${{ steps.set-image-tag.outputs.tag }}
          distball: ${{ steps.build-camunda.outputs.distball }}
          platforms: linux/amd64
          dockerfile: operate.Dockerfile
          push: true

      - name: Build and push Tasklist Docker image to Harbor
        id: build-tasklist-docker
        uses: ./.github/actions/build-platform-docker
        with:
          repository: ${{ env.HARBOR_TASKLIST_REPOSITORY }}
          version: ${{ steps.set-image-tag.outputs.tag }}
          distball: ${{ steps.build-camunda.outputs.distball }}
          platforms: linux/amd64
          dockerfile: tasklist.Dockerfile
          push: true

      - name: Output image details
        run: |
          {
            echo "### Docker Images Built and Pushed"
            echo ""
            echo "**Tag:** ${{ steps.set-image-tag.outputs.tag }}"
            echo ""
            echo "| Component | Image |"
            echo "|-----------|-------|"
            echo "| Zeebe | ${{ env.HARBOR_ZEEBE_REPOSITORY }}:${{ steps.set-image-tag.outputs.tag }} |"
            echo "| Operate | ${{ env.HARBOR_OPERATE_REPOSITORY }}:${{ steps.set-image-tag.outputs.tag }} |"
            echo "| Tasklist | ${{ env.HARBOR_TASKLIST_REPOSITORY }}:${{ steps.set-image-tag.outputs.tag }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          job_name: docker-build-helm-integration-build
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
      - name: Emit AlwaysGreen failure context
        if: ${{ always() && (failure() || cancelled()) }}
        run: |
          CONTEXT_FILE="${RUNNER_TEMP}/alwaysgreen-context-${{ github.job }}.json"
          OWNER_TEAM="none"
          FAILURE_CATEGORY="none"
          if [[ "${{ job.status }}" == "failure" || "${{ job.status }}" == "cancelled" ]]; then
            OWNER_TEAM="@camunda/monorepo-devops-team"
            FAILURE_CATEGORY="orchestration_build_and_push"
          fi
          jq -n \
            --arg stage "${{ github.job }}" \
            --arg failure_category "$FAILURE_CATEGORY" \
            --arg owner_team "$OWNER_TEAM" \
            --arg escalation_team "$OWNER_TEAM" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg status "${{ job.status }}" \
            '{stage:$stage,failure_category:$failure_category,owner_team:$owner_team,escalation_team:$escalation_team,run_url:$run_url,status:$status}' > "$CONTEXT_FILE"
      - name: Upload AlwaysGreen failure context artifact
        if: ${{ always() && (failure() || cancelled()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysgreen-failure-context-${{ github.job }}
          path: ${{ runner.temp }}/alwaysgreen-context-${{ github.job }}.json
          retention-days: 5

  format-identifier:
    name: Format Identifier
    # Runs in parallel with frontend builds (no dependency on their outputs)
    needs: should-run
    permissions: { }
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: ${{ github.event_name == 'merge_group' }}
    concurrency:
      group: ${{ needs.should-run.outputs.concurrency-group }}-format-identifier
      cancel-in-progress: true
    outputs:
      identifier: ${{ steps.format.outputs.identifier }}
    steps:
      - name: Format identifier
        id: format
        shell: bash
        run: |
          # Create a unique identifier based on run ID and short SHA
          SHA_SHORT="${GITHUB_SHA::7}"
          IDENTIFIER="docker-helm-${{ github.run_id }}-${SHA_SHORT}"
          # Truncate to max 40 chars if needed (k8s namespace limit)
          IDENTIFIER="${IDENTIFIER:0:40}"
          echo "identifier=${IDENTIFIER}" >> "$GITHUB_OUTPUT"
      - name: Emit AlwaysGreen failure context
        if: ${{ always() && (failure() || cancelled()) }}
        run: |
          CONTEXT_FILE="${RUNNER_TEMP}/alwaysgreen-context-${{ github.job }}.json"
          OWNER_TEAM="none"
          FAILURE_CATEGORY="none"
          if [[ "${{ job.status }}" == "failure" || "${{ job.status }}" == "cancelled" ]]; then
            OWNER_TEAM="@camunda/monorepo-devops-team"
            FAILURE_CATEGORY="orchestration_identifier"
          fi
          jq -n \
            --arg stage "${{ github.job }}" \
            --arg failure_category "$FAILURE_CATEGORY" \
            --arg owner_team "$OWNER_TEAM" \
            --arg escalation_team "$OWNER_TEAM" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg status "${{ job.status }}" \
            '{stage:$stage,failure_category:$failure_category,owner_team:$owner_team,escalation_team:$escalation_team,run_url:$run_url,status:$status}' > "$CONTEXT_FILE"
      - name: Upload AlwaysGreen failure context artifact
        if: ${{ always() && (failure() || cancelled()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysgreen-failure-context-${{ github.job }}
          path: ${{ runner.temp }}/alwaysgreen-context-${{ github.job }}.json
          retention-days: 5

  helm-deploy:
    name: Helm chart Integration Tests
    needs: [should-run, build-and-push-images, format-identifier]
    concurrency:
      group: ${{ needs.should-run.outputs.concurrency-group }}-helm-deploy
      cancel-in-progress: true
    uses: camunda/camunda-platform-helm/.github/workflows/test-integration-template.yaml@main
    secrets: inherit
    with:
      identifier: ${{ needs.format-identifier.outputs.identifier }}
      platforms: gke
      camunda-helm-git-ref: ${{ inputs.helmRepositoryBranchName || 'main' }}
      camunda-helm-dir: ${{ inputs.helmRepositoryDirName || 'camunda-platform-8.7' }}
      namespace-prefix: mono-8-7
      test-enabled: true
      e2e-enabled: true
      deployment-ttl: ${{ inputs.deployment-ttl || '' }}
      scenario: ${{ inputs.scenario || 'alwaysgreen' }}
      shortname: ${{ inputs.shortname || 'agrn' }}
      always-delete-namespace: true
      flows: install
      extra-values: |
        zeebe:
          image:
            registry: registry.camunda.cloud
            repository: team-camunda/zeebe
            tag: ${{ needs.build-and-push-images.outputs.image-tag }}
        zeebeGateway:
          image:
            registry: registry.camunda.cloud
            repository: team-camunda/zeebe
            tag: ${{ needs.build-and-push-images.outputs.image-tag }}
        operate:
          image:
            registry: registry.camunda.cloud
            repository: team-camunda/operate
            tag: ${{ needs.build-and-push-images.outputs.image-tag }}
        tasklist:
          image:
            registry: registry.camunda.cloud
            repository: team-camunda/tasklist
            tag: ${{ needs.build-and-push-images.outputs.image-tag }}
        global:
          image:
            pullSecrets:
              - name: index-docker-io
              - name: registry-camunda-cloud
      vault-secret-mapping: |
        secret/data/products/zeebe/ci/zeebe REGISTRY_HUB_DOCKER_COM_USR | TEST_DOCKER_USERNAME;
        secret/data/products/zeebe/ci/zeebe REGISTRY_HUB_DOCKER_COM_PSW | TEST_DOCKER_PASSWORD;
        secret/data/github.com/organizations/camunda NEXUS_USR | TEST_DOCKER_USERNAME_CAMUNDA_CLOUD;
        secret/data/github.com/organizations/camunda NEXUS_PSW | TEST_DOCKER_PASSWORD_CAMUNDA_CLOUD;
        secret/data/products/distribution/ci DISTRO_QA_E2E_TESTS_KEYCLOAK_CLIENTS_SECRET;

  helm-deploy-status:
    name: Observe Helm chart Integration Tests status
    needs: helm-deploy
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    continue-on-error: ${{ github.event_name == 'merge_group' }}
    permissions: { }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: |
          # shellcheck disable=SC2242
          exit ${{ ((contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure')) && 1) || 0 }}
      - name: Add Helm debugging guidance on failure
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COOKBOOK_URL="https://github.com/camunda/c8-cross-component-e2e-tests/blob/main/docs/ci-debugging-cookbook.md"
          {
            echo "## Helm Integration Tests Failed"
            echo ""
            echo "### Where to look"
            echo "Open [this run](${RUN_URL}) → job \`Helm chart Integration Tests\`"
            echo "Expand the reusable workflow steps to find the failing install or test step."
            echo ""
            echo "### Common failure patterns"
            echo "| Symptom | Likely cause |"
            echo "|---|---|"
            echo "| Pod not ready / CrashLoopBackOff | Container image issue or misconfiguration — check pod logs in the job output |"
            echo "| Helm install timeout | Resource limits, PVC issues, or missing secrets — check Kubernetes events |"
            echo "| E2E assertions failed | App started but behaving incorrectly — check E2E test output and screenshots |"
            echo "| ImagePullBackOff | Harbor push failed or wrong tag — re-run the Docker build job |"
            echo "| Namespace cleanup error | Previous run left dangling resources — usually safe to re-run |"
            echo ""
            echo "### Full debugging guide"
            echo "[CI Debugging Cookbook — Helm Chart Setup/Integration failures](${COOKBOOK_URL}#failure-type-3--helm-chart-setup--integration-tests) · [Helm Chart E2E failures](${COOKBOOK_URL}#failure-type-4--helm-chart-e2e-tests)"
            echo ""
            echo "### Need help?"
            echo "- Slack: [#ask-alwaysgreen](https://camunda.slack.com/archives/C0AQ378VBEV) / [#alwaysgreen-reliability](https://camunda.slack.com/archives/C0AK0AVKRL0)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ needs.helm-deploy.result }}
          job_name: docker-build-helm-integration-helm-deploy
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
      - name: Emit AlwaysGreen failure context
        if: ${{ always() && (needs.helm-deploy.result == 'failure' || needs.helm-deploy.result == 'cancelled') }}
        run: |
          CONTEXT_FILE="${RUNNER_TEMP}/alwaysgreen-context-${{ github.job }}.json"
          OWNER_TEAM="none"
          FAILURE_CATEGORY="none"
          if [[ "${{ needs.helm-deploy.result }}" == "failure" || "${{ needs.helm-deploy.result }}" == "cancelled" ]]; then
            OWNER_TEAM="@camunda/distribution"
            FAILURE_CATEGORY="helm_install_or_it"
          fi
          jq -n \
            --arg stage "${{ github.job }}" \
            --arg failure_category "$FAILURE_CATEGORY" \
            --arg owner_team "$OWNER_TEAM" \
            --arg escalation_team "$OWNER_TEAM" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg status "${{ job.status }}" \
            --arg upstream_result "${{ needs.helm-deploy.result }}" \
            '{stage:$stage,failure_category:$failure_category,owner_team:$owner_team,escalation_team:$escalation_team,run_url:$run_url,status:$status,upstream_result:$upstream_result}' > "$CONTEXT_FILE"
      - name: Upload AlwaysGreen failure context artifact
        if: ${{ always() && (needs.helm-deploy.result == 'failure' || needs.helm-deploy.result == 'cancelled') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysgreen-failure-context-${{ github.job }}
          path: ${{ runner.temp }}/alwaysgreen-context-${{ github.job }}.json
          retention-days: 5

  trigger-saas-e2e:
    name: Trigger SaaS E2E tests
    runs-on: ubuntu-latest
    needs: [should-run, build-and-push-images, format-identifier]
    timeout-minutes: 30
    permissions: { }
    concurrency:
      group: ${{ needs.should-run.outputs.concurrency-group }}-trigger-saas-e2e
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate GitHub App Token (for dispatch)
        id: github-token
        uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@main
        with:
          github-app-id-vault-key: GITHUB_APP_ID
          github-app-id-vault-path: secret/data/products/qa/ci/github.com/apps/camunda/quality-assurance-ci
          github-app-private-key-vault-key: GITHUB_APP_SECRET
          github-app-private-key-vault-path: secret/data/products/qa/ci/github.com/apps/camunda/quality-assurance-ci
          vault-auth-method: approle
          vault-auth-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-auth-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          vault-url: ${{ secrets.VAULT_ADDR }}
          owner: camunda
          repositories: camunda,c8-cross-component-e2e-tests

      - name: Trigger repository_dispatch for SaaS Monorepo
        env:
          GITHUB_TOKEN: ${{ steps.github-token.outputs.token }}
          CORRELATION_ID: ${{ github.repository }}:${{ github.run_id }}:${{ github.run_attempt }}:${{ github.sha }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/camunda/c8-cross-component-e2e-tests/dispatches \
            -d '{
                  "event_type": "run-saas-generation-smoke-mono",
                  "client_payload": {
                      "correlation_id": "'"$CORRELATION_ID"'",
                      "source_repo": "${{ github.repository }}",
                      "source_sha": "${{ github.sha }}",
                      "c8Version": "8.7",
                      "zeebeVersion": "${{ needs.build-and-push-images.outputs.image-tag }}",
                      "operateVersion": "8.7-SNAPSHOT",
                      "tasklistVersion": "8.7-SNAPSHOT",
                      "connectorsVersion": "8.7-SNAPSHOT",
                      "optimizeVersion": "8.7-SNAPSHOT"
                  }
                }'

      - name: Wait for downstream workflow to finish
        id: wait-downstream
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
          CORRELATION_ID: ${{ github.repository }}:${{ github.run_id }}:${{ github.run_attempt }}:${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Waiting for downstream E2E workflow run in camunda/c8-cross-component-e2e-tests for correlation id: $CORRELATION_ID"

          TARGET_REPO="camunda/c8-cross-component-e2e-tests"
          WORKFLOW_FILE="playwright_saas_pr_trigger_monorepo.yml"

          gh_api_with_retry() {
            local endpoint="$1"
            local max_attempts="${2:-6}"
            local sleep_s="${3:-2}"
            local attempt=1
            local out

            while true; do
              if out="$(gh api "$endpoint" 2>&1)"; then
                printf '%s' "$out"
                return 0
              fi

              if echo "$out" | grep -Eq 'HTTP 502|HTTP 503|HTTP 504|TLS handshake timeout|timeout|temporarily unavailable|connection reset by peer|EOF'; then
                if (( attempt >= max_attempts )); then
                  echo "gh api failed after ${attempt}/${max_attempts} attempts for $endpoint" >&2
                  echo "$out" >&2
                  return 1
                fi
                echo "Transient gh/api error (attempt ${attempt}/${max_attempts}) for $endpoint:" >&2
                echo "$out" >&2
                sleep "$sleep_s"
                attempt=$((attempt + 1))
                sleep_s=$((sleep_s * 2))
                continue
              fi

              echo "Non-retryable gh/api error for $endpoint:" >&2
              echo "$out" >&2
              return 1
            done
          }

          RUN_ID=""

          for _ in {1..80}; do
            if [[ -z "$RUN_ID" ]]; then
              RUN_ID=$(
                gh_api_with_retry "/repos/$TARGET_REPO/actions/workflows/$WORKFLOW_FILE/runs?event=repository_dispatch&per_page=50" \
                | jq -r --arg c "$CORRELATION_ID" '
                    .workflow_runs
                    | map(select(.display_title != null and (.display_title | contains($c))))
                    | sort_by(.created_at)
                    | last
                    | .id // empty
                  '
              )

              if [[ -z "$RUN_ID" ]]; then
                echo "No downstream run found yet for correlation id. Sleeping..."
                sleep 30
                continue
              fi

              echo "Locked onto downstream run id: $RUN_ID"
              echo "downstream_run_url=https://github.com/$TARGET_REPO/actions/runs/$RUN_ID" >> "$GITHUB_OUTPUT"
            fi

            RUN_JSON="$(gh_api_with_retry "/repos/$TARGET_REPO/actions/runs/$RUN_ID")"
            STATUS="$(jq -r .status <<<"$RUN_JSON")"
            CONCLUSION="$(jq -r .conclusion <<<"$RUN_JSON")"
            echo "Workflow run $RUN_ID status: $STATUS ($CONCLUSION)"

            if [[ "$STATUS" == "completed" ]]; then
              if [[ "$CONCLUSION" == "success" ]]; then
                echo "downstream_conclusion=success" >> "$GITHUB_OUTPUT"
                echo "Downstream workflow succeeded!"
                exit 0
              else
                echo "downstream_conclusion=${CONCLUSION}" >> "$GITHUB_OUTPUT"
                echo "Downstream workflow failed: $CONCLUSION"
                exit 1
              fi
            fi

            sleep 30
          done

          echo "downstream_conclusion=timeout" >> "$GITHUB_OUTPUT"
          echo "Timed out waiting for downstream workflow to complete."
          exit 1

      - name: Add SaaS downstream workflow link to Job Summary
        if: always()
        run: |
          if [ -n "${{ steps.wait-downstream.outputs.downstream_run_url }}" ]; then
            {
              echo "### SaaS Downstream Workflow Run"
              echo ""
              echo "**Correlation ID:** \`${{ github.repository }}:${{ github.run_id }}:${{ github.run_attempt }}:${{ github.sha }}\`"
              echo ""
              echo "[Open the triggered SaaS E2E workflow run in camunda/c8-cross-component-e2e-tests](${{ steps.wait-downstream.outputs.downstream_run_url }})"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No downstream workflow run URL found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Add debugging guidance on failure
        if: steps.wait-downstream.outcome == 'failure'
        run: |
          DOWNSTREAM_URL="${{ steps.wait-downstream.outputs.downstream_run_url }}"
          COOKBOOK_URL="https://github.com/camunda/c8-cross-component-e2e-tests/blob/main/docs/ci-debugging-cookbook.md"
          {
            echo ""
            echo "### Debugging the SaaS E2E Failure"
            echo ""
            if [ -n "$DOWNSTREAM_URL" ]; then
              echo "**Downstream run:** [$DOWNSTREAM_URL]($DOWNSTREAM_URL)"
              echo ""
              echo "**Artifacts (HTML report, screenshots, traces):** [playwright-report, screenshots, traces]($DOWNSTREAM_URL#artifacts)"
            fi
            echo ""
            echo "**Quick steps:**"
            echo "1. Click the downstream run link above"
            echo "2. In the \`run-tests-saas-manual\` job, expand \`Run tests\` for log output"
            echo "3. Download the \`playwright-report\` artifact → open \`index.html\`"
            echo "4. Download \`test-results\` for screenshots and Playwright traces:"
            echo "   \`\`\`"
            echo "   npx playwright show-trace trace.zip"
            echo "   \`\`\`"
            echo "   Or upload to https://trace.playwright.dev"
            echo ""
            echo "**Full guide:** [CI Debugging Cookbook — SaaS E2E section](${COOKBOOK_URL}#failure-type-5--saas-e2e-tests)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          job_name: docker-build-helm-integration-trigger-saas-e2e
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
      - name: Emit AlwaysGreen failure context
        if: ${{ always() && (failure() || cancelled()) }}
        run: |
          CONTEXT_FILE="${RUNNER_TEMP}/alwaysgreen-context-${{ github.job }}.json"
          OWNER_TEAM="none"
          FAILURE_CATEGORY="none"

          if [[ "${{ job.status }}" == "failure" || "${{ job.status }}" == "cancelled" ]]; then
            if [[ "${{ steps.wait-downstream.outputs.downstream_conclusion }}" == "failure" ]]; then
              OWNER_TEAM="@camunda/qa-engineering"
              FAILURE_CATEGORY="saas_e2e"
            else
              OWNER_TEAM="@camunda/monorepo-devops-team"
              FAILURE_CATEGORY="orchestration_dispatch_or_wait"
            fi
          fi

          jq -n \
            --arg stage "${{ github.job }}" \
            --arg failure_category "$FAILURE_CATEGORY" \
            --arg owner_team "$OWNER_TEAM" \
            --arg escalation_team "$OWNER_TEAM" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg status "${{ job.status }}" \
            --arg downstream_conclusion "${{ steps.wait-downstream.outputs.downstream_conclusion }}" \
            '{stage:$stage,failure_category:$failure_category,owner_team:$owner_team,escalation_team:$escalation_team,run_url:$run_url,status:$status,downstream_conclusion:$downstream_conclusion}' > "$CONTEXT_FILE"
      - name: Upload AlwaysGreen failure context artifact
        if: ${{ always() && (failure() || cancelled()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysgreen-failure-context-${{ github.job }}
          path: ${{ runner.temp }}/alwaysgreen-context-${{ github.job }}.json
          retention-days: 5
