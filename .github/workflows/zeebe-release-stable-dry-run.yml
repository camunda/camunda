# type: Release
# owner: @camunda/monorepo-devops-team
---
# NOTE: This workflow is not just for Zeebe, but also for 8.6+ monorepo release!
name: Zeebe Release Dry Run from stable branches

on:
  workflow_dispatch: {}
  schedule:
    # Runs at 02:00 every week day; see this link for more: https://crontab.guru/#0_2_*_*_1-5
    - cron: '0 2 * * 1-5'

jobs:
  # Create short-lived branches from each stable branch so that dry-run pushes
  # don't conflict with concurrent merges landing on the shared stable/* branches.
  create-dry-run-branches:
    name: Create temporary dry-run branches
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions: {}  # Uses GitHub App token instead of GITHUB_TOKEN as it needs to push branches with workflow files that trigger other workflows, which GITHUB_TOKEN cannot do
    steps:
      - name: Generate GitHub token
        id: github-token
        uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@main
        with:
          github-app-id-vault-key: MONOREPO_RELEASE_APP_ID
          github-app-id-vault-path: secret/data/products/camunda/ci/camunda
          github-app-private-key-vault-key: MONOREPO_RELEASE_APP_PRIVATE_KEY
          github-app-private-key-vault-path: secret/data/products/camunda/ci/camunda
          vault-auth-method: approle
          vault-auth-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-auth-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          vault-url: ${{ secrets.VAULT_ADDR }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.github-token.outputs.token }}
      - name: Create branches
        run: |
          for version in 8.6 8.7 8.8 8.9; do
            branch_name="tmp-dryrun-${version}-${{ github.run_id }}"
            git checkout "origin/stable/${version}"
            git checkout -b "${branch_name}"
            git push origin "${branch_name}"
            echo "Created ${branch_name} from stable/${version}"
          done
      - name: Create fake dry-run tags
        run: |
          declare -A tags=(
            [8.6]=0.0.0-dryrun-86
            [8.7]=0.0.0-dryrun-87
            [8.8]=0.0.0-dryrun-88
            [8.9]=0.0.0-dryrun-89
          )

          for version in 8.6 8.7 8.8 8.9; do
            tag_name="${tags[$version]}"
            git checkout "origin/stable/${version}"
            git tag -f "${tag_name}"
            git push origin --force "refs/tags/${tag_name}"
            echo "Prepared ${tag_name} from stable/${version}"
          done

  dry-run-release-89:
    name: "Release from stable/8.9"
    needs: create-dry-run-branches
    uses: camunda/camunda/.github/workflows/camunda-platform-release.yml@stable/8.9
    secrets: inherit
    strategy:
      fail-fast: false
    with:
      releaseBranch: tmp-dryrun-8.9-${{ github.run_id }}
      # Uses fake tag for dry run testing without affecting real releases
      releaseVersion: 0.0.0-dryrun-89
      nextDevelopmentVersion: 0.0.0-SNAPSHOT
      isLatest: true
      dryRun: true
  dry-run-release-88:
    name: "Release from stable/8.8"
    needs: create-dry-run-branches
    uses: camunda/camunda/.github/workflows/camunda-platform-release.yml@stable/8.8
    secrets: inherit
    strategy:
      fail-fast: false
    with:
      releaseBranch: tmp-dryrun-8.8-${{ github.run_id }}
      # Uses fake tag for dry run testing without affecting real releases
      releaseVersion: 0.0.0-dryrun-88
      nextDevelopmentVersion: 0.0.0-SNAPSHOT
      isLatest: true
      dryRun: true
  dry-run-release-87:
    name: "Release from stable/8.7"
    needs: create-dry-run-branches
    uses: camunda/camunda/.github/workflows/camunda-platform-release.yml@stable/8.7
    secrets: inherit
    strategy:
      fail-fast: false
    with:
      releaseBranch: tmp-dryrun-8.7-${{ github.run_id }}
      # Uses fake tag for dry run testing without affecting real releases
      releaseVersion: 0.0.0-dryrun-87
      nextDevelopmentVersion: 0.0.0-SNAPSHOT
      isLatest: true
      dryRun: true
  dry-run-release-86:
    name: "Release from stable/8.6"
    needs: create-dry-run-branches
    uses: camunda/camunda/.github/workflows/camunda-platform-release.yml@stable/8.6
    secrets: inherit
    strategy:
      fail-fast: false
    with:
      releaseBranch: tmp-dryrun-8.6-${{ github.run_id }}
      # Uses fake tag for dry run testing without affecting real releases
      releaseVersion: 0.0.0-dryrun-86
      nextDevelopmentVersion: 0.0.0-SNAPSHOT
      isLatest: true
      dryRun: true

  # Always run cleanup. Delete refs for successful dry runs and keep failed
  # ones available for targeted reruns.
  cleanup-dry-run-branches:
    name: Delete temporary dry-run branches
    runs-on: ubuntu-slim
    needs: [dry-run-release-86, dry-run-release-87, dry-run-release-88, dry-run-release-89]
    if: always()
    timeout-minutes: 5
    permissions: {}  # Uses GitHub App token instead of GITHUB_TOKEN
    steps:
      - name: Generate GitHub token
        id: github-token
        uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@main
        with:
          github-app-id-vault-key: MONOREPO_RELEASE_APP_ID
          github-app-id-vault-path: secret/data/products/camunda/ci/camunda
          github-app-private-key-vault-key: MONOREPO_RELEASE_APP_PRIVATE_KEY
          github-app-private-key-vault-path: secret/data/products/camunda/ci/camunda
          vault-auth-method: approle
          vault-auth-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-auth-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          vault-url: ${{ secrets.VAULT_ADDR }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.github-token.outputs.token }}
      - name: Delete temporary dryrun 8.9 branch and tag
        if: ${{ needs.dry-run-release-89.result == 'success' }}
        run: |
          branch_name="tmp-dryrun-8.9-${{ github.run_id }}"
          git push origin --delete "${branch_name}" || echo "::warning::Failed to delete ${branch_name}, it may have already been deleted"
          git push origin --delete "refs/tags/0.0.0-dryrun-89" 2>/dev/null || echo "::warning::Failed to delete 0.0.0-dryrun-89, it may have already been deleted"
      - name: Delete temporary dryrun 8.8 branch and tag
        if: ${{ needs.dry-run-release-88.result == 'success' }}
        run: |
          branch_name="tmp-dryrun-8.8-${{ github.run_id }}"
          git push origin --delete "${branch_name}" || echo "::warning::Failed to delete ${branch_name}, it may have already been deleted"
          git push origin --delete "refs/tags/0.0.0-dryrun-88" 2>/dev/null || echo "::warning::Failed to delete 0.0.0-dryrun-88, it may have already been deleted"
      - name: Delete temporary dryrun 8.7 branch and tag
        if: ${{ needs.dry-run-release-87.result == 'success' }}
        run: |
          branch_name="tmp-dryrun-8.7-${{ github.run_id }}"
          git push origin --delete "${branch_name}" || echo "::warning::Failed to delete ${branch_name}, it may have already been deleted"
          git push origin --delete "refs/tags/0.0.0-dryrun-87" 2>/dev/null || echo "::warning::Failed to delete 0.0.0-dryrun-87, it may have already been deleted"
      - name: Delete temporary dryrun 8.6 branch and tag
        if: ${{ needs.dry-run-release-86.result == 'success' }}
        run: |
          branch_name="tmp-dryrun-8.6-${{ github.run_id }}"
          git push origin --delete "${branch_name}" || echo "::warning::Failed to delete ${branch_name}, it may have already been deleted"
          git push origin --delete "refs/tags/0.0.0-dryrun-86" 2>/dev/null || echo "::warning::Failed to delete 0.0.0-dryrun-86, it may have already been deleted"

  notify-camunda:
    name: Send Slack notification for 8.6+
    runs-on: ubuntu-latest
    needs: [dry-run-release-86, dry-run-release-87, dry-run-release-88, dry-run-release-89, cleanup-dry-run-branches]
    if: always()
    timeout-minutes: 5
    permissions: {}  # GITHUB_TOKEN unused in this job
    steps:
      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false # we rely on step outputs, no need for environment variables
          secrets: |
            secret/data/products/camunda/ci/github-actions SLACK_TOPMONOREPORELEASE_WEBHOOK_URL;

      - name: Send failure Slack notification
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        if: ${{ (needs.dry-run-release-86.result != 'success' || needs.dry-run-release-87.result != 'success' || needs.dry-run-release-88.result != 'success' || needs.dry-run-release-89.result != 'success') && github.event_name == 'schedule' }}
        with:
          webhook: ${{ steps.secrets.outputs.SLACK_TOPMONOREPORELEASE_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          # For posting a rich message using Block Kit
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":alarm: *Release Dry Run* on `stable/*` failed!\n"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Please check this <https://github.com/camunda/camunda/actions/runs/${{ github.run_id }}|GHA workflow run>."
                  }
                }
              ]
            }
